<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos CRT Scanlines</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos CRT — "COSMOS" on a retro phosphor screen: scanlines, RGB bleed, flicker, rolling band, vignette. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=6000,TAU=6.28318;
let W,H,DPR,flick=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rnd(7);flick=[];for(let i=0;i<72;i++)flick.push(0.82+0.18*r());}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#070a12';x.fillRect(0,0,W,H);
  const cx=W/2,cy=H*0.5,off=(4+2*Math.sin(TAU*u*3))*DPR,jy=Math.sin(TAU*u*8)*1.5*DPR;
  x.textAlign='center';x.textBaseline='middle';x.font=`800 ${Math.round(Math.min(W*0.17,H*0.26))}px "SF Mono",ui-monospace,monospace`;
  x.save();x.globalCompositeOperation='lighter';
  x.fillStyle='rgba(70,180,255,0.55)';x.fillText('COSMOS',cx-off,cy+jy);
  x.fillStyle='rgba(255,92,194,0.5)';x.fillText('COSMOS',cx+off,cy+jy);
  x.shadowColor='rgba(120,255,200,0.7)';x.shadowBlur=18*DPR;x.fillStyle='rgba(225,255,240,0.95)';x.fillText('COSMOS',cx,cy+jy);
  x.restore();
  x.save();x.globalCompositeOperation='lighter';const by=((u*1)%1)*H;const bg=x.createLinearGradient(0,by-40*DPR,0,by+40*DPR);
  bg.addColorStop(0,'rgba(120,255,200,0)');bg.addColorStop(0.5,'rgba(120,255,200,0.10)');bg.addColorStop(1,'rgba(120,255,200,0)');
  x.fillStyle=bg;x.fillRect(0,by-40*DPR,W,80*DPR);x.restore();
  x.globalAlpha=0.5;x.fillStyle='#000';for(let y=0;y<H;y+=3*DPR)x.fillRect(0,y,W,1.3*DPR);x.globalAlpha=1;
  const v=x.createRadialGradient(cx,cy,Math.min(W,H)*0.2,cx,cy,Math.max(W,H)*0.62);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.7)');x.fillStyle=v;x.fillRect(0,0,W,H);
  const fl=flick[Math.floor(u*flick.length)%flick.length];
  x.fillStyle=`rgba(3,5,10,${(1-fl).toFixed(3)})`;x.fillRect(0,0,W,H);}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!-- Cosmos Audio Player: a polished music-player card with album art, track title/artist, a seekable progress bar with elapsed/total time + moving playhead, prev/play-pause/next controls and a bouncing bar visualizer. Deterministic render(u): playback progresses, the visualizer bounces, the button shows pause. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Audio Player</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.card{--acc:#8b5cff;width:380px;padding:22px;border-radius:22px;
  background:linear-gradient(165deg,rgba(28,24,46,.96),rgba(16,13,28,.97));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 30px 70px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.2);
  backdrop-filter:blur(8px)}
.art{position:relative;height:200px;border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 34px rgba(0,0,0,.45)}
.art .bg{position:absolute;inset:0;
  background:radial-gradient(120% 120% at 25% 15%,#a87bff,transparent 55%),
             radial-gradient(120% 120% at 85% 90%,#46b4ff,transparent 55%),
             linear-gradient(150deg,#3a2d6e,#1a1430)}
.viz{position:absolute;left:0;right:0;bottom:0;height:64px;display:flex;align-items:flex-end;
  justify-content:center;gap:4px;padding:0 18px 10px}
.viz i{flex:1;max-width:9px;border-radius:4px 4px 2px 2px;
  background:linear-gradient(180deg,#fff,var(--acc));opacity:.92;
  box-shadow:0 0 10px color-mix(in srgb,var(--acc) 60%,transparent)}
.art .glass{position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(8,6,18,.55))}
.meta{margin-top:18px;display:flex;align-items:center;gap:12px}
.meta .txt{flex:1;min-width:0}
.ttl{font-size:17px;font-weight:680;color:#f4f2fb;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.art-name{margin-top:3px;font-size:13px;color:#a39ec2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.like{flex:0 0 34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);color:var(--acc);display:flex;align-items:center;justify-content:center;cursor:pointer}
.like svg{width:17px;height:17px}
.seek{margin-top:18px}
.track{position:relative;height:6px;border-radius:6px;background:rgba(255,255,255,.09);cursor:pointer}
.fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;
  background:linear-gradient(90deg,var(--acc),#46b4ff);box-shadow:0 0 10px color-mix(in srgb,var(--acc) 55%,transparent)}
.head{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#fff;
  transform:translate(-50%,-50%);box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 45%,transparent),0 2px 6px rgba(0,0,0,.5)}
.time{margin-top:8px;display:flex;justify-content:space-between;font-size:11.5px;color:#8e89ad;font-variant-numeric:tabular-nums}
.ctrls{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:22px}
.ctrls button{background:none;border:none;cursor:pointer;color:#cfcbe6;display:flex;align-items:center;justify-content:center;transition:color .15s,transform .12s}
.ctrls button:hover{color:#fff;transform:scale(1.08)}
.ctrls .side svg{width:24px;height:24px}
.play{width:58px;height:58px;border-radius:50%;
  background:linear-gradient(160deg,var(--acc),#6a3dff)!important;color:#fff!important;
  box-shadow:0 10px 26px color-mix(in srgb,var(--acc) 55%,transparent),0 0 0 1px rgba(255,255,255,.08)}
.play svg{width:24px;height:24px}
</style></head>
<body><div id="stage">
  <div class="card" id="card">
    <div class="art">
      <div class="bg"></div>
      <div class="glass"></div>
      <div class="viz" id="viz"></div>
    </div>
    <div class="meta">
      <div class="txt">
        <div class="ttl">Nebula Drift</div>
        <div class="art-name">Astralux · Cosmic Sessions</div>
      </div>
      <button class="like" aria-label="Like"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10-9.2C.6 9 1.6 5.6 4.7 4.8 6.8 4.3 8.8 5.2 12 8c3.2-2.8 5.2-3.7 7.3-3.2 3.1.8 4.1 4.2 2.7 7C19.5 16.3 12 21 12 21z"/></svg></button>
    </div>
    <div class="seek">
      <div class="track" id="track">
        <div class="fill" id="fill"></div>
        <div class="head" id="head"></div>
      </div>
      <div class="time"><span id="cur">0:00</span><span id="dur">3:48</span></div>
    </div>
    <div class="ctrls">
      <button class="side" aria-label="Previous"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6v12l-9-6z"/></svg></button>
      <button class="play" id="play" aria-label="Play/Pause"></button>
      <button class="side" aria-label="Next"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l9 6-9 6z"/></svg></button>
    </div>
  </div>
</div>
<script>
const NBARS=28, DUR=228; // 3:48 in seconds
const vizE=document.getElementById('viz'),fillE=document.getElementById('fill'),
  headE=document.getElementById('head'),curE=document.getElementById('cur'),
  playE=document.getElementById('play'),trackE=document.getElementById('track');
const bars=[];
for(let i=0;i<NBARS;i++){const b=document.createElement('i');vizE.appendChild(b);bars.push(b);}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(1337);
const PHASE=[],FREQ=[],AMP=[];
for(let i=0;i<NBARS;i++){PHASE.push(rnd()*Math.PI*2);FREQ.push(1.4+rnd()*2.6);AMP.push(.5+rnd()*.5);}
const TAU=Math.PI*2;
function fmt(s){s=Math.max(0,Math.floor(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
const PLAY='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const PAUSE='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>';
const LOOP=6000;
function render(u){
  // playback progresses across the loop (offset so frame 0 is ~28% through the song — rich)
  const p=(u+0.28)%1;                       // 0..1 song position
  const sec=p*DUR;
  fillE.style.width=(p*100).toFixed(2)+'%';
  headE.style.left=(p*100).toFixed(2)+'%';
  curE.textContent=fmt(sec);
  // visualizer: each bar a sum of sines driven by u, bouncing while "playing"
  const phase=u*TAU;
  for(let i=0;i<NBARS;i++){
    const v=0.5+0.5*Math.sin(phase*FREQ[i]+PHASE[i]);
    const v2=0.5+0.5*Math.sin(phase*(FREQ[i]*0.5)+PHASE[i]*1.7);
    const h=(0.18+0.82*Math.pow(v*0.7+v2*0.3,1.3))*AMP[i];
    bars[i].style.height=(8+h*44).toFixed(1)+'px';
    bars[i].style.opacity=(0.55+0.4*h).toFixed(2);
  }
  playE.innerHTML=PAUSE;                     // playing → button shows pause
}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else{
  let start=performance.now(),paused=false,pauseAt=0;
  playE.addEventListener('click',()=>{
    if(paused){start=performance.now()-pauseAt;paused=false;}
    else{pauseAt=(performance.now()-start);paused=true;playE.innerHTML=PLAY;}
  });
  trackE.addEventListener('click',e=>{
    const r=trackE.getBoundingClientRect();const f=(e.clientX-r.left)/r.width;
    start=performance.now()-(((f-0.28+1)%1))*LOOP; if(paused){pauseAt=((f-0.28+1)%1)*LOOP;}
  });
  (function l(n){ if(!paused) render((((n-start)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l); })(performance.now());
}
</script></body></html>

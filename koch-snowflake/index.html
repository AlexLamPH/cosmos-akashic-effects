<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Koch Snowflake</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Koch Snowflake — the recursive Koch snowflake outline drawn as a glowing icy/aurora path; rotates one turn per loop and "breathes" via a morph factor that grows/retracts each spike so it returns at u=1. Pure Canvas 2D, recomputed each frame as a pure fn of t.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718,SQ3=Math.sqrt(3);
let W,H,DPR;const DEPTH=5;
// Icy cosmic / aurora tones: cosmic blue, aurora green, violet, sacred shimmer
const AC=[[70,180,255],[54,211,154],[139,92,255],[224,178,74]];
function lerp(a,b,t){return a+(b-a)*t;}
// Koch: replace segment a->b with 4 segments; m = morph 0..1 controls spike height (0 = flat edge)
function koch(ax,ay,bx,by,d,m,pts){
  if(d===0){pts.push([bx,by]);return;}
  const dx=(bx-ax)/3, dy=(by-ay)/3;
  const x1=ax+dx, y1=ay+dy, x2=ax+2*dx, y2=ay+2*dy;
  // apex of the spike: midpoint of inner third pushed out by morph m (full height = SQ3/2 of third)
  const mxp=(x1+x2)/2, myp=(y1+y2)/2;
  const px=mxp - (y2-y1)*(SQ3/2)*m, py=myp + (x2-x1)*(SQ3/2)*m;
  koch(ax,ay,x1,y1,d-1,m,pts);
  koch(x1,y1,px,py,d-1,m,pts);
  koch(px,py,x2,y2,d-1,m,pts);
  koch(x2,y2,bx,by,d-1,m,pts);
}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;       // 0..1 normalized loop time
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);             // full repaint each frame (pure fn of t)
  x.globalCompositeOperation='lighter';                  // additive glow
  x.lineJoin='round';x.lineCap='round';
  const cxp=W/2, cyp=H/2;
  const breathe=1+0.07*Math.sin(TAU*u*2);                // gentle scale breathing (integer k=2)
  const R=Math.min(W,H)*0.34*breathe;
  const spin=TAU*u;                                      // one full turn per loop
  const morph=0.5+0.5*Math.sin(TAU*u);                   // spikes grow out & retract, returns at u=1
  // three corners of the seed equilateral triangle, rotating
  const seed=[];for(let i=0;i<3;i++){const a=spin - Math.PI/2 + i*TAU/3; seed.push([cxp+Math.cos(a)*R, cyp+Math.sin(a)*R]);}
  // build the full Koch outline by applying koch() to each of the 3 edges
  const pts=[[seed[0][0],seed[0][1]]];
  for(let i=0;i<3;i++){const a=seed[i],b=seed[(i+1)%3];koch(a[0],a[1],b[0],b[1],DEPTH,morph,pts);}
  // draw the path several times with widening, fading strokes for a soft icy glow
  const layers=[[5.5,0.10],[3.0,0.22],[1.6,0.55],[0.8,0.95]];
  for(let L=0;L<layers.length;L++){
    const ph=(u + L*0.07)%1, f=ph*AC.length, ci=Math.floor(f)%AC.length, cj=(ci+1)%AC.length, kk=f-Math.floor(f);
    const r=lerp(AC[ci][0],AC[cj][0],kk)|0, g=lerp(AC[ci][1],AC[cj][1],kk)|0, bl=lerp(AC[ci][2],AC[cj][2],kk)|0;
    x.strokeStyle=`rgba(${r},${g},${bl},${layers[L][1]})`;
    x.lineWidth=layers[L][0]*DPR;
    x.beginPath();x.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)x.lineTo(pts[i][0],pts[i][1]);x.closePath();x.stroke();
  }
  // bright vertex sparkles tracing the outline
  const step=Math.max(1,(pts.length/120)|0);
  for(let i=0;i<pts.length;i+=step){const tw=0.5+0.5*Math.sin(TAU*u*3 + i*0.5);
    x.fillStyle=`rgba(200,235,255,${0.10+0.35*tw})`;x.beginPath();x.arc(pts[i][0],pts[i][1],1.6*DPR,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

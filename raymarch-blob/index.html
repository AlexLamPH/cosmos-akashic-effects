<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Raymarch Blob</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Raymarch Blob — a raymarched glowing metaball (smooth-min SDF) morphing + rotating, diffuse+rim lit, real WebGL GLSL fragment shader. Deterministic, seamless (uT loops 0..1).
const cv=document.getElementById('c');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000;
const gl=cv.getContext('webgl',{antialias:false,depth:false,preserveDrawingBuffer:true});
const VERT='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG=`precision highp float; uniform vec2 uRes; uniform float uT;
#define TAU 6.28318530718
// smooth minimum (polynomial) — blends SDFs into metaballs
float smin(float a,float b,float k){float h=clamp(0.5+0.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
mat2 rot(float a){float c=cos(a),s=sin(a);return mat2(c,-s,s,c);}
// scene SDF: smooth-union of a few orbiting spheres, driven by t (seamless via 2*PI*t)
float map(vec3 p,float t){
 float ph=TAU*t;
 // gentle whole-blob rotation
 p.xz=rot(ph)*p.xz; p.xy=rot(0.5*ph)*p.xy;
 float d=length(p)-0.55; // core sphere
 vec3 o1=0.55*vec3(cos(ph),sin(ph*2.0),sin(ph));
 vec3 o2=0.55*vec3(sin(ph*2.0),cos(ph),sin(ph*3.0));
 vec3 o3=0.45*vec3(cos(ph*3.0),cos(ph*2.0),sin(ph*2.0));
 d=smin(d,length(p-o1)-0.34,0.35);
 d=smin(d,length(p-o2)-0.30,0.35);
 d=smin(d,length(p-o3)-0.26,0.35);
 return d;}
vec3 nrm(vec3 p,float t){vec2 e=vec2(0.0015,0.);
 return normalize(vec3(map(p+e.xyy,t)-map(p-e.xyy,t),
                       map(p+e.yxy,t)-map(p-e.yxy,t),
                       map(p+e.yyx,t)-map(p-e.yyx,t)));}
vec3 shade(vec2 uv,float t){
 vec3 ro=vec3(0.,0.,2.6); vec3 rd=normalize(vec3(uv,-1.6));
 float dd=0.0,gl=0.0; bool hit=false; vec3 pos;
 for(int i=0;i<80;i++){
   pos=ro+rd*dd; float d=map(pos,t);
   gl+=0.012/(0.02+d*d); // soft volumetric glow accumulation
   if(d<0.001){hit=true;break;}
   dd+=d*0.85; if(dd>5.0)break;
 }
 vec3 violet=vec3(0.545,0.36,1.0), cosmic=vec3(0.27,0.71,1.0), nebula=vec3(1.0,0.36,0.76);
 vec3 col=vec3(0.02,0.012,0.045); // dark base
 if(hit){
   vec3 n=nrm(pos,t);
   vec3 ld=normalize(vec3(0.6,0.8,0.5));
   float dif=clamp(dot(n,ld),0.,1.);
   float rim=pow(1.0-clamp(dot(n,-rd),0.,1.),2.5);
   // accent tint shifts across the surface
   vec3 base=mix(violet,cosmic,0.5+0.5*n.y);
   base=mix(base,nebula,0.5+0.5*sin(n.x*3.0+TAU*t));
   col=base*(0.12+0.95*dif*dif);
   col+=violet*rim*1.3; // rim light
 }
 col+=gl*0.5*mix(violet,nebula,0.5); // glow halo even off-surface
 return col;}
void main(){ vec2 uv=(gl_FragCoord.xy*2.0-uRes)/min(uRes.x,uRes.y); vec3 col=shade(uv,uT); col=col/(col+0.55);
 col=pow(clamp(col,0.,1.),vec3(0.4545)); gl_FragColor=vec4(col,1.0);}`;
function sh(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);
 if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'uRes'),uT=gl.getUniformLocation(prog,'uT');
let DPR;function rs(){DPR=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';gl.viewport(0,0,cv.width,cv.height);}
rs();addEventListener('resize',rs);
function render(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uT,u);gl.drawArrays(gl.TRIANGLES,0,3);}
if(AUTO){window.__seek=t=>render(t);render(0);window.__ready=true;}else{const s=performance.now();(function l(n){render(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

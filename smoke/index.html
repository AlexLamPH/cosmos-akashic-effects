<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Smoke</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Smoke — soft rising wisps curling on looping sine paths, fading as they rise. Cool violet/cosmic tones. Seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318;
let W,H,DPR,puffs=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const VIO=[139,92,255],COS=[70,180,255],NEB=[255,92,194];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rnd(13);puffs=[];const n=120;
  for(let i=0;i<n;i++){const tone=r();const c=tone<0.5?VIO:(tone<0.8?COS:NEB);
    puffs.push({ph0:r(),x0:(0.5+(r()-0.5)*0.7)*W,sx:(0.04+r()*0.12)*W,k:1+((r()*2)|0),k2:2+((r()*2)|0),
      r0:(0.04+r()*0.10)*W,grow:(1.4+r()*1.8),sp:(0.55+r()*0.55),c:c,a:0.05+r()*0.1,wob:r()});}}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // faint warm source glow at base
  let bg=x.createRadialGradient(W*0.5,H*1.02,0,W*0.5,H*1.02,0.5*W);bg.addColorStop(0,'rgba(139,92,255,0.22)');bg.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=bg;x.fillRect(0,0,W,H);
  for(const p of puffs){const ph=(p.ph0+u*p.sp)%1; // looping rise phase
    const y=H*1.05-ph*H*1.25;
    const curl=Math.sin(TAU*(ph*p.k+p.wob))*p.sx + Math.sin(TAU*(ph*p.k2+p.ph0))*p.sx*0.5;
    const px=p.x0+curl;
    const rad=p.r0*(1+ph*p.grow);
    const fade=Math.sin(ph*Math.PI); // born at base, dissipate at top
    const al=p.a*fade*fade;
    if(al<0.004)continue;const c=p.c;
    const g=x.createRadialGradient(px,y,0,px,y,rad);
    g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${al})`);
    g.addColorStop(0.5,`rgba(${c[0]},${c[1]},${c[2]},${al*0.45})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.beginPath();x.arc(px,y,rad,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!-- Cosmos Waterfall — vertical streams of flowing streaks pour into a misty glowing pool with rising spray, aurora tones -->
<!doctype html><meta charset=utf-8><title>Cosmos Waterfall</title>
<style>html,body{margin:0;height:100%;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const LOOP=8000, AUR=[[54,211,154],[70,180,255],[139,92,255],[120,210,255]];
let W,H,DPR,flow=[],spray=[],pool=[];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function setup(){
  DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;
  c.width=W*DPR;c.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);
  const r=mulberry32(20260614);
  const top=-0.05*H, poolY=H*0.74;
  flow=[];const N=220;
  for(let i=0;i<N;i++){
    const reps=2+((r()*3)|0);          // integer drops per loop -> seamless mod 1
    const lane=0.12+r()*0.76;          // x band of the falling sheet
    flow.push({ph:r(), col:AUR[(r()*AUR.length)|0],
      x0:lane*W, sway:6+r()*14, swk:1+((r()*2)|0), swp:r(),
      len:24+r()*70, w:0.7+r()*1.6, a:0.4+r()*0.5,
      reps, top, poolY});
  }
  // rising spray motes above the pool, seeded loops
  spray=[];for(let i=0;i<70;i++)spray.push({px:0.1*W+r()*0.8*W,reps:1+((r()*2)|0),ph:r(),
    rise:30+r()*70,size:1+r()*2.2,col:AUR[(r()*AUR.length)|0],a:0.3+r()*0.4});
  // mist puffs hugging the pool surface
  pool=[];for(let i=0;i<14;i++)pool.push({px:r()*W,rad:50+r()*90,ph:r(),k:1+((r()*2)|0),col:AUR[(r()*AUR.length)|0]});
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP, TAU=Math.PI*2;
  const poolY=H*0.74;
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // glowing pool gradient at the base
  const pg=x.createLinearGradient(0,poolY-40,0,H);
  pg.addColorStop(0,'rgba(54,211,154,0)');
  pg.addColorStop(0.45,'rgba(70,180,255,0.16)');
  pg.addColorStop(1,'rgba(139,92,255,0.22)');
  x.fillStyle=pg;x.fillRect(0,poolY-40,W,H-poolY+40);
  x.globalCompositeOperation='lighter';
  // drifting mist puffs over the pool
  for(const m of pool){
    const ph=0.5+0.5*Math.sin(TAU*m.k*u+m.ph*TAU);
    const cy=poolY+8+Math.sin(TAU*u+m.ph*TAU)*6;
    const[R,G,B]=m.col;
    const g=x.createRadialGradient(m.px,cy,0,m.px,cy,m.rad);
    g.addColorStop(0,`rgba(${R},${G},${B},${0.10*ph})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.beginPath();x.arc(m.px,cy,m.rad,0,TAU);x.fill();
  }
  // falling streaks: vertical streams swaying gently, wrapping mod 1
  x.lineCap='round';
  for(const f of flow){
    const p=((u*f.reps+f.ph)%1);
    const hy=f.top+p*(poolY-f.top);
    const sway=Math.sin(TAU*f.swk*u+f.swp*TAU)*f.sway*(0.3+0.7*p);
    const hx=f.x0+sway;
    const ty=hy-f.len;
    const splash=Math.max(0,(hy-(poolY-18))/18); // fade as it nears the pool
    const env=(1-splash)*Math.min(1,p*6);          // fade in at top, out into pool
    const[R,G,B]=f.col;
    const g=x.createLinearGradient(hx,ty,hx,hy);
    g.addColorStop(0,`rgba(${R},${G},${B},0)`);
    g.addColorStop(1,`rgba(${Math.min(255,R+50)},${Math.min(255,G+50)},${Math.min(255,B+50)},${f.a*env})`);
    x.strokeStyle=g;x.lineWidth=f.w;
    x.beginPath();x.moveTo(hx,ty);x.lineTo(hx,hy);x.stroke();
  }
  // rising spray motes above the impact line
  for(const s of spray){
    const p=((u*s.reps+s.ph)%1);
    const py=poolY-p*s.rise;
    const env=Math.sin(Math.PI*p);      // up then settle, 0 at ends -> seamless
    const[R,G,B]=s.col;
    x.fillStyle=`rgba(${Math.min(255,R+60)},${Math.min(255,G+60)},${Math.min(255,B+60)},${s.a*env})`;
    x.beginPath();x.arc(s.px+Math.sin(p*TAU+s.ph*TAU)*5,py,s.size*(0.6+0.4*env),0,TAU);x.fill();
  }
}
addEventListener('resize',setup);setup();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

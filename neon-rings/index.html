<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Neon Rings</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Neon Rings — concentric neon rings pulse outward like sonar, alpha fading as they expand, with a rotating radar sweep line and a bright core. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718,K=6;
let W,H,DPR,cx,cy,maxR,blips=[];
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;maxR=Math.hypot(W,H)/2*0.92;
  const r=mul(777);blips=[];
  for(let i=0;i<10;i++){blips.push({a:r()*TAU,rr:0.25+r()*0.7,col:AC[(r()*AC.length)|0]});}}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // faint static grid rings for radar feel
  x.lineWidth=1*DPR;x.strokeStyle='rgba(70,180,255,0.07)';
  for(let g=1;g<=4;g++){x.beginPath();x.arc(cx,cy,maxR*g/4,0,TAU);x.stroke();}
  // expanding sonar rings
  for(let k=0;k<K;k++){let f=u+k/K;f-=Math.floor(f);const R=f*maxR;const al=(1-f)*0.6;
    const col=AC[(k+((u*K)|0))%AC.length];
    x.lineWidth=(1.5+(1-f)*3)*DPR;x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${al})`;
    x.beginPath();x.arc(cx,cy,R,0,TAU);x.stroke();}
  // rotating sweep line with trailing wedge gradient
  const ang=TAU*u;const tw=0.9;        // trail width radians
  x.beginPath();x.moveTo(cx,cy);
  for(let s=0;s<=24;s++){const a=ang-tw+tw*s/24;x.lineTo(cx+Math.cos(a)*maxR,cy+Math.sin(a)*maxR);}
  x.closePath();
  const lg=x.createRadialGradient(cx,cy,0,cx,cy,maxR);
  lg.addColorStop(0,'rgba(54,211,154,0.0)');lg.addColorStop(1,'rgba(54,211,154,0.18)');
  x.fillStyle=lg;x.fill();
  // bright leading sweep line
  x.lineWidth=2*DPR;x.strokeStyle='rgba(54,211,154,0.85)';
  x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+Math.cos(ang)*maxR,cy+Math.sin(ang)*maxR);x.stroke();
  // blips that glow when the sweep passes over them
  blips.forEach(b=>{let d=ang-b.a;d=((d%TAU)+TAU)%TAU;const lit=Math.max(0,1-d/1.2);
    if(lit<0.02)return;const R=b.rr*maxR,bx=cx+Math.cos(b.a)*R,by=cy+Math.sin(b.a)*R;
    x.fillStyle=`rgba(${b.col[0]},${b.col[1]},${b.col[2]},${lit*0.9})`;
    x.beginPath();x.arc(bx,by,(2+lit*4)*DPR,0,TAU);x.fill();});
  // bright core dot
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,maxR*0.22);
  cg.addColorStop(0,'rgba(255,255,255,0.9)');cg.addColorStop(0.3,'rgba(139,92,255,0.5)');cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.beginPath();x.arc(cx,cy,maxR*0.22,0,TAU);x.fill();
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

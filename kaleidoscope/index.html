<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Kaleidoscope</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Kaleidoscope — moving shapes drawn into one wedge, mirrored into radial symmetry; pure function of time, seamless loop.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718,SEG=10;
let W,H,DPR,blobs=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rnd(1337);blobs=[];const n=14;
  for(let i=0;i<n;i++)blobs.push({c:AC[(r()*AC.length)|0],rad:0.1+r()*0.7,arc:r(),orb:1+(r()*3|0),amp:0.05+r()*0.11,ph:r(),sz:0.03+r()*0.08,k:1+(r()*3|0),sp:r()<0.5?-1:1,kind:(r()*3)|0});}
rs();addEventListener('resize',()=>{rs();if(window.__ready)frame(0);});
function frame(t){const u=(((t%LOOP)+LOOP)%LOOP)/LOOP;
  x.setTransform(1,0,0,1,0,0);x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.62;
  x.save();x.translate(cx,cy);x.rotate(TAU*u);x.globalCompositeOperation='lighter';
  for(let s=0;s<SEG;s++){x.save();x.rotate(s*TAU/SEG);if(s%2)x.scale(1,-1);
    x.beginPath();x.moveTo(0,0);x.arc(0,0,R,-TAU/(SEG*2),TAU/(SEG*2));x.closePath();x.clip();
    for(const b of blobs){const ang=(b.arc-0.5)*(TAU/SEG)+Math.sin(TAU*u*b.k+b.ph*TAU)*0.18*b.sp;
      const rr=(b.rad+Math.sin(TAU*u*b.orb+b.ph*TAU)*b.amp)*R;
      const px=Math.cos(ang)*rr,py=Math.sin(ang)*rr;const sz=b.sz*R*(0.7+0.3*Math.sin(TAU*u*b.orb+b.ph*TAU));
      const c=b.c,g=x.createRadialGradient(px,py,0,px,py,sz);
      g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0.9)`);g.addColorStop(0.5,`rgba(${c[0]},${c[1]},${c[2]},0.35)`);g.addColorStop(1,'rgba(0,0,0,0)');
      x.fillStyle=g;x.beginPath();
      if(b.kind===0){x.arc(px,py,sz,0,TAU);}
      else if(b.kind===1){x.moveTo(px,py-sz);x.lineTo(px+sz*0.9,py+sz*0.7);x.lineTo(px-sz*0.9,py+sz*0.7);x.closePath();}
      else{x.lineWidth=sz*0.5;x.strokeStyle=g;x.moveTo(px*0.6,py*0.6);x.lineTo(px*1.25,py*1.25);x.stroke();}
      if(b.kind!==2)x.fill();
      x.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.4)`;x.lineWidth=2*DPR;x.beginPath();x.arc(0,0,rr,ang-0.12,ang+0.12);x.stroke();}
    x.restore();}
  const cg=x.createRadialGradient(0,0,0,0,0,R*0.25);cg.addColorStop(0,'rgba(224,178,74,0.55)');cg.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=cg;x.beginPath();x.arc(0,0,R*0.25,0,TAU);x.fill();
  x.restore();x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

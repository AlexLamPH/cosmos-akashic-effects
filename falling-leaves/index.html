<!-- Cosmos Falling Leaves — autumn leaves drift down, tumbling (rotating) and swaying on looping sine paths, wrapping mod 1 -->
<!doctype html><meta charset=utf-8><title>Falling Leaves</title>
<style>html,body{margin:0;height:100%;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const LOOP=8000, ACCENT=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const WARM=['#ff6a3d','#e0b24a','#ff5cc2','#ffb84a','#d98a3a'];
let W,H,DPR,leaves=[];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function setup(){
  DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;
  c.width=W*DPR;c.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);
  const r=mulberry32(20260614);const N=60;leaves=[];
  for(let i=0;i<N;i++){
    const warm=r()<0.78;
    const col=warm?WARM[(r()*WARM.length)|0]:ACCENT[(r()*ACCENT.length)|0];
    leaves.push({
      bx:r(),                       // base x fraction
      ph:r(),                       // fall phase (mod 1)
      sway:24+r()*60, sk:1+((r()*3)|0), swp:r(), // side-to-side sway amp/harmonic/phase
      spin:(r()<0.5?-1:1)*(1+((r()*3)|0)),       // tumble: integer rotations per loop
      sp0:r(),                      // initial spin phase
      tk:1+((r()*2)|0), tp:r(),     // tumble flutter (foreshorten) harmonic
      size:9+r()*16,
      rgb:hex(col)});
  }
}
function leafPath(s){ // unit leaf shape scaled by s, centred at origin
  x.beginPath();x.moveTo(0,-s);
  x.bezierCurveTo(s*0.7,-s*0.5,s*0.7,s*0.5,0,s);
  x.bezierCurveTo(-s*0.7,s*0.5,-s*0.7,-s*0.5,0,-s);
  x.closePath();
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP, TAU=Math.PI*2;
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // warm autumn wash so frame 0 is rich
  x.globalCompositeOperation='lighter';
  for(let i=0;i<5;i++){const a=TAU*u+i*1.257;
    const gx=W*(0.5+0.42*Math.cos(a)),gy=H*(0.5+0.42*Math.sin(a));
    const g=x.createRadialGradient(gx,gy,0,gx,gy,Math.max(W,H)*0.45);
    const rc=hex(i<3?WARM[i]:ACCENT[i]);
    g.addColorStop(0,`rgba(${rc[0]},${rc[1]},${rc[2]},0.05)`);g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.fillRect(0,0,W,H);}
  for(const lf of leaves){
    // fall downward, wrap seamlessly mod 1
    const fy=((u + lf.ph)%1+1)%1;        // 0=top -> 1=bottom
    const cy=fy*(H+80)-40;
    const cx=lf.bx*W + lf.sway*Math.sin(TAU*lf.sk*u+lf.swp*TAU);
    // tumble: continuous integer rotation + flutter foreshorten via cos -> looks like tumbling
    const ang=TAU*lf.spin*u + lf.sp0*TAU;
    const flut=0.35+0.65*Math.abs(Math.cos(TAU*lf.tk*u+lf.tp*TAU)); // horizontal squash = edge-on tumble
    const [R,G,B]=lf.rgb, s=lf.size;
    x.save();x.translate(cx,cy);x.rotate(ang);x.scale(flut,1);
    // soft glow
    const g=x.createRadialGradient(0,0,0,0,0,s*2);
    g.addColorStop(0,`rgba(${R},${G},${B},0.35)`);g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.beginPath();x.arc(0,0,s*2,0,TAU);x.fill();
    // leaf body
    leafPath(s);
    x.fillStyle=`rgba(${R},${G},${B},0.92)`;x.fill();
    // bright spine
    x.strokeStyle=`rgba(255,245,220,0.55)`;x.lineWidth=1.2;
    x.beginPath();x.moveTo(0,-s);x.lineTo(0,s);x.stroke();
    x.restore();
  }
}
addEventListener('resize',setup);setup();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Kanban Board</title><style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center}
#scrim{position:fixed;inset:0;background:radial-gradient(120% 90% at 50% 10%,rgba(139,92,255,.10),transparent 60%)}
.board{position:relative;display:flex;gap:16px;padding:6px}
.col{position:relative;width:200px;border-radius:16px;padding:12px 11px 14px;
  background:linear-gradient(180deg,rgba(30,25,49,.66),rgba(18,14,31,.72));
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 24px 60px -22px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05)}
.col.over{border-color:rgba(139,92,255,.45);box-shadow:0 24px 60px -16px rgba(139,92,255,.32),inset 0 1px 0 rgba(255,255,255,.07)}
.chead{display:flex;align-items:center;gap:8px;padding:2px 4px 11px}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
.ctitle{font-size:12.5px;font-weight:700;letter-spacing:.3px;color:#cdc7e4}
.cnt{margin-left:auto;font-size:11px;font-weight:700;color:#8b84a8;
  background:rgba(255,255,255,.06);padding:2px 8px;border-radius:8px}
.stack{position:relative;display:flex;flex-direction:column;gap:9px;min-height:30px}
.card{position:relative;border-radius:12px;padding:11px 11px 10px;cursor:grab;
  background:linear-gradient(180deg,rgba(44,37,66,.92),rgba(28,23,45,.94));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 8px 22px -12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06)}
.card .tag{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.5px;
  text-transform:uppercase;padding:3px 8px;border-radius:7px;margin-bottom:8px}
.card .ttl{font-size:12.5px;font-weight:600;line-height:1.35;color:#e7e3f4;margin-bottom:11px}
.card .foot{display:flex;align-items:center;gap:8px}
.av{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;flex:none;
  font-size:10px;font-weight:800;color:#fff}
.bar{flex:1;height:5px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden}
.bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,#8b5cff,#46b4ff)}
.pct{font-size:10px;font-weight:700;color:#9a93ba}
.drag{position:fixed;z-index:30;width:200px;pointer-events:none;will-change:transform}
.drag .card{cursor:grabbing;border-color:rgba(139,92,255,.5);
  box-shadow:0 34px 64px -16px rgba(0,0,0,.78),0 0 0 1px rgba(139,92,255,.25),inset 0 1px 0 rgba(255,255,255,.09)}
.ghost{border:1.5px dashed rgba(139,92,255,.4);border-radius:12px;background:rgba(139,92,255,.06)}
.hint{position:absolute;bottom:-30px;left:0;right:0;text-align:center;font-size:11px;color:#5f5980;letter-spacing:.3px}
</style></head>
<body><div id="scrim"></div>
<div class="board" id="board"></div>
<div class="hint">A task card drags To&nbsp;Do → In&nbsp;Progress → Done · columns reflow</div>
<script>
const COLS=[
 {id:'todo',name:'TO DO',color:'#8b84a8'},
 {id:'prog',name:'IN PROGRESS',color:'#46b4ff'},
 {id:'done',name:'DONE',color:'#36d39a'}
];
// tag palettes
const TAGS={
 design:{c:'#ff5cc2',bg:'rgba(255,92,194,.14)'},
 dev:{c:'#46b4ff',bg:'rgba(70,180,255,.14)'},
 bug:{c:'#ff6a3d',bg:'rgba(255,106,61,.14)'},
 docs:{c:'#e0b24a',bg:'rgba(224,178,74,.14)'},
 qa:{c:'#36d39a',bg:'rgba(54,211,154,.14)'}
};
const AVA={J:'#8b5cff',M:'#46b4ff',R:'#ff5cc2',K:'#36d39a',S:'#ff6a3d'};
// static cards per column (the hero card lives separately)
const STATIC={
 todo:[{tag:'docs',t:'Write onboarding guide',av:'S',pct:20}],
 prog:[{tag:'dev',t:'Refactor auth service',av:'M',pct:55},
       {tag:'bug',t:'Fix layout shift on mobile',av:'R',pct:40}],
 done:[{tag:'qa',t:'Verify payment webhook',av:'K',pct:100}]
};
// the moving hero card
const HERO={tag:'design',t:'Design dashboard widgets',av:'J',pct:65};

const board=document.getElementById('board');
function cardHTML(c){const tg=TAGS[c.tag];
 return '<div class="card"><span class="tag" style="color:'+tg.c+';background:'+tg.bg+'">'+c.tag+
  '</span><div class="ttl">'+c.t+'</div><div class="foot"><span class="av" style="background:'+AVA[c.av]+'">'+c.av+
  '</span><span class="bar"><i style="width:'+c.pct+'%"></i></span><span class="pct">'+c.pct+'%</span></div></div>';}

// build columns + stacks
const stackEls={}, colEls={}, cntEls={};
COLS.forEach(col=>{
 const el=document.createElement('div'); el.className='col'; el.dataset.id=col.id;
 el.innerHTML='<div class="chead"><span class="dot" style="background:'+col.color+'"></span>'+
   '<span class="ctitle">'+col.name+'</span><span class="cnt">0</span></div><div class="stack"></div>';
 board.appendChild(el);
 colEls[col.id]=el; cntEls[col.id]=el.querySelector('.cnt'); stackEls[col.id]=el.querySelector('.stack');
});
// render static cards once
COLS.forEach(col=>{ STATIC[col.id].forEach(c=>{
  const d=document.createElement('div'); d.innerHTML=cardHTML(c); stackEls[col.id].appendChild(d.firstChild);
});});
// hero: a floating drag layer + a ghost placeholder we move between stacks
const drag=document.createElement('div'); drag.className='drag'; drag.innerHTML=cardHTML(HERO);
document.body.appendChild(drag);
const heroCard=drag.querySelector('.card');
const ghost=document.createElement('div'); ghost.className='ghost'; // reserves slot height
ghost.style.height=heroCard.offsetHeight+'px';

function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function lerp(a,b,t){return a+(b-a)*t;}
// out-back for the settle/pop
function back(t){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}

// slot center (in viewport px) where the hero rests at the TOP of a column's stack
function slotPoint(colId){
 const s=stackEls[colId]; const r=s.getBoundingClientRect();
 return {x:r.left, y:r.top}; // top-left of stack = where hero card's top-left sits
}
// place ghost into a given column (at top) so the static cards reflow below it
function setGhostCol(colId){
 if(ghost.parentNode) ghost.parentNode.removeChild(ghost);
 stackEls[colId].insertBefore(ghost, stackEls[colId].firstChild);
}

function render(u){
 // PHASES across u in [0,1):
 //  pickup (todo)  -> drag todo->prog -> settle -> hold -> drag prog->done -> settle -> hold -> reset(drop back to todo)
 // We compute: current column the ghost belongs to, the hero position (px), scale, shadow, over-highlight.
 let fromCol,toCol,seg,lift; // seg in [0,1] across that column's slot-to-slot move
 // sub-timeline
 if(u<0.08){ fromCol='todo'; toCol='todo'; seg=0; lift=ease(u/0.08); }              // pick up in TO DO
 else if(u<0.28){ fromCol='todo'; toCol='prog'; seg=ease((u-0.08)/0.20); lift=1; }  // glide TO DO -> IN PROGRESS
 else if(u<0.34){ fromCol='prog'; toCol='prog'; seg=back((u-0.28)/0.06); lift=1-((u-0.28)/0.06)*0.55; } // settle
 else if(u<0.46){ fromCol='prog'; toCol='prog'; seg=1; lift=0.18; }                  // hold in progress (low lift)
 else if(u<0.52){ fromCol='prog'; toCol='prog'; seg=0; lift=lerp(0.18,1,ease((u-0.46)/0.06)); } // re-grab
 else if(u<0.72){ fromCol='prog'; toCol='done'; seg=ease((u-0.52)/0.20); lift=1; }   // glide IN PROGRESS -> DONE
 else if(u<0.78){ fromCol='done'; toCol='done'; seg=back((u-0.72)/0.06); lift=1-((u-0.72)/0.06)*0.6; } // settle
 else if(u<0.90){ fromCol='done'; toCol='done'; seg=1; lift=0; }                     // rest in DONE (dropped)
 else { // reset: lift slightly & fly back to TO DO so loop is seamless
   fromCol='done'; toCol='todo'; const p=ease((u-0.90)/0.10); seg=p; lift=0.6*Math.sin(p*Math.PI); }

 // which column should hold the ghost slot: snap by seg progress
 const ghostCol = seg<0.5 ? fromCol : toCol;
 setGhostCol(ghostCol);
 // toggle over-highlight on the destination column while in flight
 COLS.forEach(c=>colEls[c.id].classList.toggle('over', lift>0.4 && c.id===toCol && fromCol!==toCol));

 // geometry AFTER reflow — compute slot points now
 const a=slotPoint(fromCol), b=slotPoint(toCol);
 const x=lerp(a.x,b.x,seg);
 // travel arc: lift the card up a touch while crossing
 const arc=lift*Math.sin(seg*Math.PI)*-18;
 const y=lerp(a.y,b.y,seg)+arc - lift*6;
 const sc=1+lift*0.045;
 const rot=(b.x-a.x)*0.0008*Math.sin(seg*Math.PI)*lift; // tiny tilt during travel
 drag.style.transform='translate('+x.toFixed(1)+'px,'+y.toFixed(1)+'px) translateZ(0)';
 heroCard.style.transform='scale('+sc.toFixed(3)+') rotate('+rot.toFixed(2)+'deg)';
 heroCard.style.boxShadow='0 '+(8+lift*26).toFixed(0)+'px '+(22+lift*42).toFixed(0)+
   'px -'+(12-lift*0).toFixed(0)+'px rgba(0,0,0,'+(0.55+lift*0.22).toFixed(2)+
   '),0 0 0 1px rgba(139,92,255,'+(lift*0.3).toFixed(2)+'),inset 0 1px 0 rgba(255,255,255,'+(0.06+lift*0.04).toFixed(2)+')';
 ghost.style.opacity=(lift*0.9).toFixed(2);
 drag.style.opacity='1';

 // update counts (hero counts toward whichever column the ghost slot is in)
 const counts={todo:STATIC.todo.length,prog:STATIC.prog.length,done:STATIC.done.length};
 counts[ghostCol]+=1;
 COLS.forEach(c=>cntEls[c.id].textContent=counts[c.id]);
}

const LOOP=7200, OFF=0.18;  // frame-0: hero mid-drag between TO DO and IN PROGRESS
function frame(u){render(((u+OFF)%1+1)%1);}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>frame(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else { const s=performance.now(); (function l(n){ frame((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l);})(performance.now()); }
</script></body></html>

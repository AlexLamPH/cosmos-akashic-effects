<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Maze</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Maze — a seeded DFS maze with violet glowing walls and a bright comet of light flowing along the precomputed solution path. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const VIOLET=[139,92,255],NEB=[255,92,194],COS=[70,180,255];
const G=15,rnd=mulberry32(4242);
// cells store wall bits: 1=N,2=E,4=S,8=W (1=wall present)
const cell=new Array(G*G).fill(15),vis=new Array(G*G).fill(false);
(function dfs(){const st=[0];vis[0]=true;const DX=[0,1,0,-1],DY=[-1,0,1,0],OP=[4,8,1,2],BIT=[1,2,4,8];
  while(st.length){const cur=st[st.length-1],cx=cur%G,cy=(cur/G)|0;const nb=[];
    for(let d=0;d<4;d++){const nx=cx+DX[d],ny=cy+DY[d];if(nx>=0&&nx<G&&ny>=0&&ny<G&&!vis[ny*G+nx])nb.push(d);}
    if(nb.length){const d=nb[(rnd()*nb.length)|0];const nx=cx+DX[d],ny=cy+DY[d],ni=ny*G+nx;
      cell[cur]&=~BIT[d];cell[ni]&=~OP[d];vis[ni]=true;st.push(ni);}else st.pop();}})();
// BFS solution from 0 to last
const path=(function(){const prev=new Array(G*G).fill(-1),q=[0],seen=new Array(G*G).fill(false);seen[0]=true;
  const DX=[0,1,0,-1],DY=[-1,0,1,0],BIT=[1,2,4,8];
  while(q.length){const c=q.shift(),cx=c%G,cy=(c/G)|0;
    for(let d=0;d<4;d++){if(cell[c]&BIT[d])continue;const nx=cx+DX[d],ny=cy+DY[d];if(nx<0||nx>=G||ny<0||ny>=G)continue;const ni=ny*G+nx;if(seen[ni])continue;seen[ni]=true;prev[ni]=c;q.push(ni);}}
  const p=[];let c=G*G-1;while(c!==-1){p.unshift(c);c=prev[c];}return p;})();
let W,H,DPR;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const M=Math.min(W,H)*0.92,O=(Math.min(W,H)-M)/2,cs=M/G,offx=(W-M)/2,offy=(H-M)/2;
  const cxy=i=>[offx+((i%G)+0.5)*cs,offy+(((i/G)|0)+0.5)*cs];
  // walls
  x.globalCompositeOperation='lighter';x.lineCap='round';
  for(let pass=0;pass<2;pass++){x.lineWidth=(pass?1:3.2)*DPR;x.strokeStyle=`rgba(${VIOLET},${pass?0.95:0.22})`;
    x.beginPath();for(let i=0;i<G*G;i++){const gx=offx+(i%G)*cs,gy=offy+((i/G)|0)*cs,c=cell[i];
      if(c&1){x.moveTo(gx,gy);x.lineTo(gx+cs,gy);}if(c&2){x.moveTo(gx+cs,gy);x.lineTo(gx+cs,gy+cs);}
      if(c&4){x.moveTo(gx,gy+cs);x.lineTo(gx+cs,gy+cs);}if(c&8){x.moveTo(gx,gy);x.lineTo(gx,gy+cs);}}
    x.stroke();}
  // faint full solution trail
  x.lineWidth=cs*0.34;x.strokeStyle=`rgba(${COS},0.16)`;x.lineJoin='round';
  x.beginPath();let p0=cxy(path[0]);x.moveTo(p0[0],p0[1]);for(let i=1;i<path.length;i++){const q=cxy(path[i]);x.lineTo(q[0],q[1]);}x.stroke();
  // flowing comet: head sweeps along path, dash tail
  const PL=path.length,head=u*PL,TL=PL*0.34;
  for(let k=0;k<60;k++){const f=k/60,pos=head-f*TL;const wrap=((pos%PL)+PL)%PL;const idx=wrap|0,fr=wrap-idx;
    const a=cxy(path[idx]),b=cxy(path[Math.min(idx+1,PL-1)]);const xx=a[0]+(b[0]-a[0])*fr,yy=a[1]+(b[1]-a[1])*fr;
    const al=(1-f)*(1-f);const rad=cs*(0.16+0.30*(1-f));const col=k<8?[255,255,255]:NEB;
    const g=x.createRadialGradient(xx,yy,0,xx,yy,rad*2.2);
    g.addColorStop(0,`rgba(${col},${al})`);g.addColorStop(0.4,`rgba(${NEB},${al*0.5})`);g.addColorStop(1,`rgba(${NEB},0)`);
    x.fillStyle=g;x.beginPath();x.arc(xx,yy,rad*2.2,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

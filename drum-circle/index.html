<!-- Cosmos Drum Circle: 6 hand-drums (djembe/conga/tabla-style) in a ring, each a synthesized membrane hit (pitched sine/triangle thump + a noise slap, tuned per drum). LIVE: click a drum or press 1-6 to play; multi-tap for rolls; AudioContext only opens on first gesture. AUTO: a seeded polyrhythm plays SILENTLY — struck drums flash with a skin ripple + a faint pulse travels the ring — looping. Frame 0 is mid-groove with 1-2 drums struck. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Drum Circle</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#05030d;
  font-family:ui-monospace,Menlo,monospace}
canvas{position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);color:#ff6a3d;
  font-size:13px;letter-spacing:.5px;opacity:.85;pointer-events:none;text-shadow:0 0 12px #ff6a3d88}
</style></head><body>
<canvas id=c></canvas>
<div id=hint>▶ click a drum · press 1-6 · tap fast for rolls</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),hint=document.getElementById('hint');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=5200, TAU=Math.PI*2, ACC='#ff6a3d';
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// 6 drums tuned around a pleasant minor-ish set (Hz of the membrane fundamental)
const DRUMS=[
  {n:'DJEMBE',f:98 ,c:'#ff6a3d',slap:0.55},
  {n:'CONGA' ,f:147,c:'#e0b24a',slap:0.45},
  {n:'TABLA' ,f:196,c:'#36d39a',slap:0.30},
  {n:'DUNUN' ,f:73 ,c:'#8b5cff',slap:0.60},
  {n:'BONGO' ,f:262,c:'#46b4ff',slap:0.35},
  {n:'TALK'  ,f:117,c:'#ff5cc2',slap:0.50}
];
const ND=DRUMS.length;
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
addEventListener('resize',resize);resize();
function layout(){const cx=W/2,cy=H*0.5,R=Math.min(W,H)*0.30;
  return DRUMS.map((d,i)=>{const a=-Math.PI/2+i/ND*TAU;
    return {x:cx+Math.cos(a)*R,y:cy+Math.sin(a)*R,r:Math.min(W,H)*0.105,ang:a};});}

// ---- seeded AUTO polyrhythm: each drum has its own subdivision + offset ----
const rng=mulberry32(20260615);
const PATS=DRUMS.map((d,i)=>{const div=[3,4,4,2,6,3][i]; const off=rng();
  const hits=[]; for(let k=0;k<div;k++){ if(rng()>0.30) hits.push((k/div+off/div)%1);}
  if(!hits.length)hits.push(off); return hits;});
// flatten to event times for the traveling-pulse and frame-0 strike
function strikeEnergy(drumI,u){ // 0..1 recent-strike envelope for drum drumI at phase u
  let best=0;
  for(const h of PATS[drumI]){ let d=((u-h)%1+1)%1; const e=Math.exp(-d*9); if(e>best)best=e; }
  return best;
}

function render(u){
  const D=layout();
  // background wash
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  let bg=ctx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#0c0a1e');bg.addColorStop(1,'#05030d');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  // faint pulse traveling the ring (clockwise)
  const cx=W/2,cy=H*0.5,R=Math.min(W,H)*0.30;
  const pa=-Math.PI/2+u*TAU, px=cx+Math.cos(pa)*R, py=cy+Math.sin(pa)*R;
  ctx.globalAlpha=0.10;ctx.strokeStyle=ACC;ctx.lineWidth=2*DPR;
  ctx.beginPath();ctx.arc(cx,cy,R,0,TAU);ctx.stroke();
  let pg=ctx.createRadialGradient(px,py,0,px,py,40*DPR);
  pg.addColorStop(0,'rgba(255,255,255,.5)');pg.addColorStop(1,'rgba(255,106,61,0)');
  ctx.globalAlpha=0.5;ctx.fillStyle=pg;ctx.beginPath();ctx.arc(px,py,40*DPR,0,TAU);ctx.fill();
  // central glow node
  ctx.globalAlpha=0.18;let cg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.5);
  cg.addColorStop(0,'#46b4ff');cg.addColorStop(1,'rgba(70,180,255,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,R*0.5,0,TAU);ctx.fill();

  for(let i=0;i<ND;i++){
    const d=D[i],dr=DRUMS[i];
    // strike energy: AUTO from pattern, live from struck[] timers
    let e = (typeof RENDER_LIVE!=='undefined'&&RENDER_LIVE) ? liveEnergy(i) : strikeEnergy(i,u);
    // connecting spoke to center
    ctx.globalAlpha=0.06+e*0.18;ctx.strokeStyle=dr.c;ctx.lineWidth=(1.5+e*3)*DPR;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(d.x,d.y);ctx.stroke();
    // drum body shadow
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;ctx.fillStyle='#0a0814';ctx.beginPath();ctx.arc(d.x,d.y,d.r*1.04,0,TAU);ctx.fill();
    // membrane (skin) with radial sheen
    const skinR=d.r*(1+e*0.06);
    let sg=ctx.createRadialGradient(d.x-d.r*0.3,d.y-d.r*0.3,0,d.x,d.y,skinR);
    sg.addColorStop(0,'#2a2438');sg.addColorStop(0.7,'#16121f');sg.addColorStop(1,'#0c0a12');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(d.x,d.y,skinR,0,TAU);ctx.fill();
    // rim
    ctx.globalAlpha=0.6+e*0.4;ctx.strokeStyle=dr.c;ctx.lineWidth=(2.5+e*4)*DPR;
    ctx.shadowBlur=(8+e*30)*DPR;ctx.shadowColor=dr.c;
    ctx.beginPath();ctx.arc(d.x,d.y,skinR,0,TAU);ctx.stroke();ctx.shadowBlur=0;
    // skin ripple rings on strike
    ctx.globalCompositeOperation='lighter';
    if(e>0.04){
      const rings=3;
      for(let k=0;k<rings;k++){
        const phase=(1-e)+k*0.22; if(phase<0||phase>1)continue;
        const rr=skinR*phase;
        ctx.globalAlpha=(1-phase)*e*0.7;ctx.strokeStyle=dr.c;ctx.lineWidth=1.6*DPR;
        ctx.beginPath();ctx.arc(d.x,d.y,rr,0,TAU);ctx.stroke();
      }
      // bright center flash
      let fg=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,skinR*0.9);
      fg.addColorStop(0,'rgba(255,255,255,'+(e*0.85)+')');
      fg.addColorStop(0.4,'rgba('+hexrgb(dr.c)+','+(e*0.5)+')');
      fg.addColorStop(1,'rgba('+hexrgb(dr.c)+',0)');
      ctx.globalAlpha=1;ctx.fillStyle=fg;ctx.beginPath();ctx.arc(d.x,d.y,skinR*0.9,0,TAU);ctx.fill();
    }
    // label
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=0.5+e*0.5;ctx.fillStyle=dr.c;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=(10*DPR)+'px ui-monospace,monospace';
    ctx.fillText((i+1)+' '+dr.n,d.x,d.y+d.r+14*DPR);
  }
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';ctx.textAlign='left';
}
function hexrgb(h){const n=parseInt(h.slice(1),16);return (n>>16)+','+((n>>8)&255)+','+(n&255);}

// ================= LIVE AUDIO (gated) =================
const AUTO=new URLSearchParams(location.search).has('auto');
// live strike timers (ms timestamp of last strike per drum)
let struck=new Array(ND).fill(-1e9);
function liveEnergy(i){const dt=(performance.now()-struck[i])/1000; return dt<0?0:Math.exp(-dt*6.5);}

if(AUTO){
  window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);
  window.__seek(0); window.__ready=true;
} else {
  window.RENDER_LIVE=true;
  let actx,master,comp,noiseBuf;
  function audio(){ if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)();
    master=actx.createGain();master.gain.value=0.2;
    comp=actx.createDynamicsCompressor();master.connect(comp);comp.connect(actx.destination);
    const n=Math.floor(actx.sampleRate*0.3);noiseBuf=actx.createBuffer(1,n,actx.sampleRate);
    const d=noiseBuf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1; }
    if(actx.state==='suspended')actx.resume(); return actx; }
  // synthesize a membrane hit: pitched sine+triangle thump (drop) + filtered noise slap
  function hit(i){ const a=audio(),t=a.currentTime,dr=DRUMS[i];
    // --- thump (membrane fundamental, drops pitch fast) ---
    const o1=a.createOscillator(),o2=a.createOscillator(),g=a.createGain();
    o1.type='sine';o2.type='triangle';
    o1.frequency.setValueAtTime(dr.f*1.8,t);o1.frequency.exponentialRampToValueAtTime(dr.f,t+0.05);
    o2.frequency.setValueAtTime(dr.f*1.5,t);o2.frequency.exponentialRampToValueAtTime(dr.f*0.92,t+0.06);
    g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.9,t+0.004);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.40);
    o1.connect(g);o2.connect(g);g.connect(master);
    o1.start(t);o2.start(t);o1.stop(t+0.42);o2.stop(t+0.42);
    // --- slap (short band-limited noise burst) ---
    const src=a.createBufferSource();src.buffer=noiseBuf;
    const f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=dr.f*8;f.Q.value=1.0;
    const ng=a.createGain();ng.gain.setValueAtTime(dr.slap,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    src.connect(f);f.connect(ng);ng.connect(master);src.start(t);src.stop(t+0.08);
    struck[i]=performance.now();
  }
  function tap(i){ audio(); hit(i); hint.style.opacity='0'; }
  // click hit-testing
  cv.addEventListener('pointerdown',e=>{ const r=cv.getBoundingClientRect();
    const mx=(e.clientX-r.left)*DPR, my=(e.clientY-r.top)*DPR; const D=layout();
    for(let i=0;i<ND;i++){const dx=mx-D[i].x,dy=my-D[i].y; if(dx*dx+dy*dy<D[i].r*D[i].r){tap(i);return;}}
    audio(); });
  addEventListener('keydown',e=>{ const k=parseInt(e.key); if(k>=1&&k<=ND){tap(k-1);} });
  // live render loop — shows live strikes; runs idle attract pattern advancing the seeded groove
  const s=performance.now(); let idleStruck=new Array(ND).fill(false);
  (function l(n){
    const u=(((n-s)%LOOP)+LOOP)%LOOP/LOOP;
    // idle attract: auto-trigger the seeded pattern visually (no sound) so it looks alive before interaction
    if(performance.now()-Math.max(...struck) > 1400){
      window.RENDER_LIVE=false; render(u); window.RENDER_LIVE=true;
    } else { render(0); } // render reads liveEnergy via RENDER_LIVE
    requestAnimationFrame(l);
  })(performance.now());
}
</script></body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Starburst</title>
<style>
  html,body{margin:0;height:100%;background:#05030d;overflow:hidden}
  #cv{position:fixed;inset:0;display:block;background:#05030d}
  #hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    font:600 13px/1.4 system-ui,sans-serif;color:#cbb6ff;letter-spacing:.04em;
    padding:8px 16px;border:1px solid rgba(160,120,255,.35);border-radius:999px;
    background:rgba(20,10,40,.5);backdrop-filter:blur(4px);cursor:pointer;
    transition:opacity .8s;user-select:none;z-index:5}
</style></head>
<body>
<canvas id="cv"></canvas>
<div id="hint">🎤 enable mic</div>
<script>
const cv=document.getElementById('cv'), g=cv.getContext('2d');
const hint=document.getElementById('hint');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  g.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize); resize();

const LOOP=8800;            // ms loop length
const BINS=64;
const TWO=Math.PI*2;

// ---- deterministic RNG (seeded once) ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x5747ab);
// per-ray static character
const rayPhase=new Float32Array(BINS), rayHarm=new Float32Array(BINS),
      rayAmp=new Float32Array(BINS), rayHue=new Float32Array(BINS);
for(let i=0;i<BINS;i++){
  rayPhase[i]=rnd()*TWO;
  rayHarm[i]=2+((rnd()*4)|0);
  rayAmp[i]=0.55+rnd()*0.45;
  rayHue[i]=rnd();
}
// sparkle particle pool
const SPK=140, sx=new Float32Array(SPK), sy=new Float32Array(SPK),
      sa=new Float32Array(SPK), sl=new Float32Array(SPK), ss=new Float32Array(SPK);
let spkSeed=mulberry32(0x13f7);

// ---- synthetic spectrum: seeded sum-of-sines + beat kick ----
function synthSpectrum(u){
  const spec=new Float32Array(BINS);
  const beats=4;
  const bp=(u*beats)%1;                       // beat phase 0..1
  const kick=Math.pow(1-bp,3.2);              // sharp attack decay
  let lvl=0;
  for(let i=0;i<BINS;i++){
    const f=i/BINS;
    // a few moving formant bumps
    const b1=Math.exp(-Math.pow((f-0.12-0.05*Math.sin(u*TWO))*9,2));
    const b2=Math.exp(-Math.pow((f-0.40-0.06*Math.sin(u*TWO*2+1.1))*7,2));
    const b3=Math.exp(-Math.pow((f-0.72-0.04*Math.cos(u*TWO*1.5))*8,2));
    let v=0.9*b1+0.7*b2+0.5*b3;
    // wobble per ray
    v*=0.55+0.45*Math.sin(rayPhase[i]+u*TWO*rayHarm[i]);
    v=Math.abs(v);
    // bass-weighted kick
    v+=kick*(0.85-0.7*f)*0.9;
    v=Math.min(1,v*0.85);
    spec[i]=v; lvl+=v;
  }
  lvl=Math.min(1,lvl/BINS*1.7+kick*0.35);
  return {spec, level:lvl};
}

// emit sparkles on a beat hit
let lastBeat=-1;
function maybeSparkle(u,level,cx,cy){
  const beats=4; const bi=Math.floor(u*beats);
  const bp=(u*beats)%1;
  if(bp<0.12 && bi!==lastBeat){
    lastBeat=bi;
    const n=8+((level*16)|0);
    for(let k=0;k<n;k++){
      // find a dead slot
      let slot=-1;
      for(let s=0;s<SPK;s++){ if(sa[s]<=0){slot=s;break;} }
      if(slot<0) slot=(spkSeed()*SPK)|0;
      const ang=spkSeed()*TWO, sp=2+spkSeed()*6*(0.5+level);
      sx[slot]=cx; sy[slot]=cy;
      ss[slot]=Math.cos(ang)*sp; sl[slot]=Math.sin(ang)*sp;
      sa[slot]=1;
    }
  }
}

let prevU=0;
function stepSparkles(u){
  // dt in normalized-ish frames; handle loop wrap
  let du=u-prevU; if(du<0) du+=1; prevU=u;
  const k=du*60; // approx frame count
  for(let s=0;s<SPK;s++){
    if(sa[s]>0){
      sx[s]+=ss[s]*k; sy[s]+=sl[s]*k;
      sl[s]+=0.15*k;          // slight gravity
      ss[s]*=Math.pow(0.94,k); sl[s]*=Math.pow(0.96,k);
      sa[s]-=0.045*k;
    }
  }
}

function render(spec,level,t){
  // t is normalized u in AUTO; in live it's seconds — normalize for rotation use a wrapped value
  const u = (typeof t==='number') ? (t%1+1)%1 : 0;
  const cx=W/2, cy=H/2;
  const R=Math.min(W,H);

  // fade trails (Phantom-dark)
  g.globalCompositeOperation='source-over';
  g.fillStyle='rgba(5,3,13,0.34)';
  g.fillRect(0,0,W,H);

  g.globalCompositeOperation='lighter';

  const rot=u*TWO*0.35;            // slow rotation
  const flare=0.55+level*0.9;      // brighten with level
  const baseLen=R*0.10;
  const maxLen=R*0.40*(0.85+level*0.5);

  // central sun
  const sunR=R*(0.045+0.03*level)*(0.9+0.15*Math.sin(u*TWO*4));
  let sun=g.createRadialGradient(cx,cy,0,cx,cy,sunR*4.2);
  sun.addColorStop(0,'rgba(255,250,255,'+(0.9*flare)+')');
  sun.addColorStop(0.25,'rgba(190,150,255,'+(0.7*flare)+')');
  sun.addColorStop(0.6,'rgba(120,70,230,'+(0.28*flare)+')');
  sun.addColorStop(1,'rgba(80,30,160,0)');
  g.fillStyle=sun;
  g.beginPath(); g.arc(cx,cy,sunR*4.2,0,TWO); g.fill();

  // rays
  for(let i=0;i<BINS;i++){
    const a=rot + (i/BINS)*TWO;
    const v=spec[i];
    const len=baseLen + maxLen*v*rayAmp[i];
    const ca=Math.cos(a), sa2=Math.sin(a);
    const x0=cx+ca*sunR*1.3, y0=cy+sa2*sunR*1.3;
    const x1=cx+ca*(sunR*1.3+len), y1=cy+sa2*(sunR*1.3+len);
    // cosmos hue: violet->magenta->cyan band by ray + spectrum
    const hue=205 + rayHue[i]*120 + v*40;   // 205..365
    const lw=(1.5+v*5)*flare;
    const al=(0.30+v*0.65)*flare;
    const grad=g.createLinearGradient(x0,y0,x1,y1);
    grad.addColorStop(0,'hsla('+hue+',90%,72%,'+al+')');
    grad.addColorStop(1,'hsla('+(hue+30)+',95%,60%,0)');
    g.strokeStyle=grad; g.lineWidth=lw; g.lineCap='round';
    g.beginPath(); g.moveTo(x0,y0); g.lineTo(x1,y1); g.stroke();
    // bright tip dot
    if(v>0.35){
      g.fillStyle='hsla('+hue+',95%,'+(70+v*20)+'%,'+(al*0.9)+')';
      g.beginPath(); g.arc(x1,y1,(1.2+v*3)*flare,0,TWO); g.fill();
    }
  }

  // sparkles
  maybeSparkle(u,level,cx,cy);
  stepSparkles(u);
  for(let s=0;s<SPK;s++){
    if(sa[s]>0){
      const a=sa[s];
      g.fillStyle='hsla('+(255+spkSeed()*0+(sx[s]%60))+',95%,85%,'+(a*0.9)+')';
      g.fillStyle='rgba(230,'+((200+a*55)|0)+',255,'+(a*0.85)+')';
      const rr=1+a*2.2;
      g.beginPath(); g.arc(sx[s],sy[s],rr,0,TWO); g.fill();
    }
  }

  g.globalCompositeOperation='source-over';
}

// ---------- mic (live only) ----------
let useSynth=true, analyser=null, freqData=null;
async function mic(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  const src=ctx.createMediaStreamSource(s);
  const an=ctx.createAnalyser(); an.fftSize=128; an.smoothingTimeConstant=0.75;
  src.connect(an);
  analyser=an; freqData=new Uint8Array(an.frequencyBinCount);
  useSynth=false;
}
function liveSpectrum(){
  analyser.getByteFrequencyData(freqData);
  const n=freqData.length, spec=new Float32Array(BINS);
  let lvl=0;
  for(let i=0;i<BINS;i++){
    const idx=Math.min(n-1,Math.floor(i/BINS*n));
    const v=freqData[idx]/255; spec[i]=v; lvl+=v;
  }
  lvl=Math.min(1,lvl/BINS*1.8);
  return {spec, level:lvl};
}

const AUTO=new URLSearchParams(location.search).has('auto');

function startLiveLoop(){
  const t0=performance.now();
  function frame(now){
    const t=(now-t0)/1000;
    let s;
    if(!useSynth && analyser){ s=liveSpectrum(); }
    else { const u=((t*1000%LOOP)+LOOP)%LOOP/LOOP; s=synthSpectrum(u); }
    // pass normalized phase for rotation continuity
    const u=((t*1000%LOOP)+LOOP)%LOOP/LOOP;
    render(s.spec, s.level, u);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  // gesture → try mic
  function tryMic(){
    mic().then(()=>{ hint.style.opacity='0'; setTimeout(()=>hint.remove(),900); })
         .catch(()=>{ useSynth=true; hint.style.opacity='0'; setTimeout(()=>hint.remove(),900); });
    removeEventListener('pointerdown',tryMic);
  }
  addEventListener('pointerdown',tryMic);
  hint.addEventListener('pointerdown',tryMic);
}

if(AUTO){
  window.__seek=t=>{const u=((t%LOOP)+LOOP)%LOOP/LOOP; const s=synthSpectrum(u); render(s.spec,s.level,u);};
  window.__seek(0); window.__ready=true;
} else {
  let useSynthInit=true; /* attract loop uses synth; first gesture tries mic */
  startLiveLoop();
}
</script>
</body></html>

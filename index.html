<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06040f;--panel:#0d0a1c;--line:#221a3a;--txt:#e7e2f5;--mut:#8b82ad;--violet:#8b5cff;--cosmic:#46b4ff;--nebula:#ff5cc2;--aurora:#36d39a}

.empty{color:var(--mut);text-align:center;padding:60px 0;font-size:14px}

.modal.on{display:flex}
.box{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(960px,96vw);max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.box .bar{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}

.box .frame{flex:1;background:#05030d;min-height:340px}
.box iframe{width:100%;height:60vh;border:0;display:block}
.box .desc{padding:12px 16px;font-size:12.5px;color:var(--mut);line-height:1.55;border-top:1px solid var(--line)}
footer{padding:30px 20px;text-align:center;color:var(--mut);font-size:12px;border-top:1px solid var(--line)}

p that drops in pitch plus a short band-limited noise slap, tuned to a different fundamental per drum. Click a drum or press 1-6 to play; tap fast for rolls. Each drum's skin ripples and flashes on a strike, a connecting spoke brightens, and a faint pulse travels the ring. Fully self-contained, zero deps, runs offline. Ships with a silent deterministic looping visual demo (a seeded polyrhythm) for capture.","gif":false},{"slug":"drum-machine","title":"Drum Machine — 16-step x 4-track step sequencer that makes real sound via Web Audio","vi":"Drum Machine — máy trống tuần tự 16 bước x 4 kênh, phát âm thật qua Web Audio","tier":"audio","tags":["drum-machine","step-sequencer","beatmaker","drums","audio","webaudio"],"summary":"A genuinely playable 16-step x 4-track (kick / snare / hat / clap) step sequencer on the Cosmos Phantom-dark theme, fully self-contained with zero dependencies. It MAKES REAL SOUND via the Web Audio API: click any cell to toggle that step on or off, then press the space bar to start playback — a playhead sweeps across the grid and triggers fully synthesized drum voices on every lit step (kick = a sine with a fast pitch drop from 150 to 50 Hz, snare/hat/clap = filtered noise bursts from a generated noise buffer, clap being a quick double burst). Lit cells flash and glow the instant the playhead crosses them. Master gain is about 0.24 through a compressor with exponential gain ramps, so it stays punchy without clicks or clipping. Because browsers block autoplay, the AudioContext (and its generated noise buffer) is created and resumed only on the first space press. For capture it ships a SILENT deterministic looping visual demo: a seeded classic pattern is preloaded, the playhead sweeps the grid, and lit cells flash as it passes — a pure function of u so it loops seamlessly. Frame 0 has the playhead mid-grid with cells flashing.","gif":false},{"slug":"drum-pads","title":"Drum Pads — MPC-style 16-pad synthesized percussion instrument","vi":"Drum Pads — ecause browsers block autoplay, the AudioContext is created and resumed only on the first interaction. For capture it ships a SILENT deterministic looping visual demo: three seeded Euclidean patterns (5/8, 7/12, 3/5) sweep under the playhead, hits flash and ripple inward as a pure function of u so it loops seamlessly. Frame 0 has the playhead mid-rotation with hits flashing.","gif":false},{"slug":"fm-bells","title":"FM Bells — click-to-ring inharmonic FM bell tones with expanding glowing rings","vi":"Chuông FM Cosmos","tier":"audio","tags":["fm-synthesis","bells","chimes","generative","audio","webaudio"],"summary":"An FM bell generator that makes REAL sound via the Web Audio API: clicking spawns an FM bell tone built from a sine carrier and a sine modulator at an inharmonic ratio (~2.76) with a decaying modulation index for a bright metallic strike that settles into a long, pure exponential decay. Bell pitch follows the click height on a 3-octave pentatonic scale. Each strike is visualized as expanding glowing rings, a flaring core, and drifting chime particles. It also rains generative bells on its own. Self-contained, zero dependencies, runs offline, with a silent deterministic looping visual demo for capture.","gif":false},{"slug":"fm-pad","title":"FM Pad — XY touch pad FM synth that morphs timbre and cutoff","vi":"Bàn FM Cosmos","tier":"audio","tags":["fm-synth","synth-pad","xy-pad","audio","webaudio","interactive"],"summary":"An XY FM synthesis touch pad that makes REAL sound via the Web Audio API: press and drag and a carrier+modulator oscillator pair sustains a rich evolving FM tone — X morphs the modulation index/ratio (timbre), Y morphs the lowpass cutoff and pitch. A glowing cursor halo leaves a trail and a deterministic spectrum/waveform reacts beneath it. Self-contained, zero dependencies, runs offline, with a silent deterministic looping visual demo for capture.","gif":false},{"slug":"glockenspiel","title":"Glockenspiel — playable tuned metal bars that f horizontal string-lines, and every bounce plucks that string's note (a synthesized triangle+sine harp pluck with fast attack and ringing decay) on a minor-pentatonic scale, so the bouncing physics writes an evolving generative melody. Balls leave glowing trails; struck strings flash white and ring with a wobble. Drag to aim and gravity does the rest. Self-contained, zero dependencies, runs offline, with a silent deterministic looping visual demo for capture.","gif":false},{"slug":"handpan","title":"Handpan — a tappable hang drum tuned to a meditative D Kurd scale","vi":"Trống Tay Handpan Cosmos","tier":"audio","tags":["handpan","hang-drum","steel-drum","bell","d-kurd","meditative"],"summary":"A circular steel handpan (hang drum) with a central ding note and eight tone fields around the rim, tuned to a soothing D Kurd minor scale. Tap a field or the ding and it PLAYS REAL SOUND via the Web Audio API: each note is a warm bell-like voice — a sine fundamental plus two soft harmonics with a gentle attack and a medium ~2.4s decay, so it rings like real hammered steel. The AudioContext starts on your first gesture; every voice runs through a master gain of ~0.2 and a compressor. Tapped fields ripple with expanding rings and glow violet / cosmic-blue; the central ding pulses gold. Fully self-contained, zero dependencies, runs offline. Ships with a silent, deterministic, seamlessly looping visual demo for capture: a seeded meditative pattern taps the fields and ding repeatedly, rippling and pulsing as a pure function of time.","gif":false},{"slug":"harp-strings","title":"Harp Strings — pluckable Karplus-Strong string harp you can strum","vi":"Đàn Hạc Dây Cosmos","tier":"audio","tags":["harp","strings","pluck","karplus-strong","koto","glissando"],"summary":"A pluckable string harp of eight vertical strings tuned to a major-pentatonic scale. Click or drag across the strings to strum and it PLAYS REAL SOUND via the Web Audio API: each pluck is a Karplus-Strong-style filtered- aces — bo mạch kiểu Tron với xung sáng chạy dọc các đường mạch vuông góc","tier":"canvas","tags":["circuit","tron","traces","pulse","canvas2d","cosmos-ai-lab"],"summary":"A seeded circuit board of Manhattan-routed right-angle traces in violet and cosmic blue, with glowing nodes at every junction and bright nebula pulses streaming along each trace. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"comet-cursor","title":"Comet Cursor — mouse-follow particle trail (Canvas 2D)","vi":"","tier":"canvas","tags":["cursor","particles","canvas2d","trail","comet","cosmos-ai-lab"],"summary":"A glowing comet / nebula trail that follows the mouse on a starfield. Pure HTML5 Canvas 2D, zero dependencies, runs offline by double-clicking index.html. The cursor is a bright orb with a halo; behind it a tapered glowing ribbon (the trail core) plus a spray of fading spark particles (the wispy filaments), all drawn with additive blending. Hue cycles through cosmic tones and shifts faster the quicker you move.","gif":false},{"slug":"confetti-rain","title":"Confetti Rain — tumbling accent rects and triangles falling with depth","vi":"Confetti Rain — mảnh giấy màu xoay rơi theo chiều sâu","tier":"canvas","tags":["confetti","particles","falling","tumble","glow","canvas2d"],"summary":"Colourful confetti pieces — small rects and triangles in the Cosmos accents — fall and tumble through a glowing dark column with parallax depth. Each piece wraps seamlessly by taking its fall phase mod 1, sways on an integer-harmonic sine, and foreshortens as it rotates to read as 3D. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"constellation","title":"Constellation — proximity network background","vi":"Constellation — nền mạng lưới sao kết nối","tier":"canvas","tags":["constellation","network","particles","background","canvas2d","nodes"],"summary":"A field of drifting nodes that link with glowing lines whenever they come close, forming a living constellation network in the Cosmos accents. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"contour-lines","title":"Contour Lines — animated topographic iso-contours of a morphing noise field, glowing like a living map","vi":"Contour Lines — đường đồng mức địa hình động từ trường nhiễu biến đổi, phát sáng như bản đồ sống","tier":"canvas","tags":["contour","topographic","noise","map","isoline","canvas2d"],"summary":"Animated topographic contour lines drawn from a seeded value-noise field. To loop seamlessly the field is sampled along a circular time orbit (noise(x*f+cos(2*pi*u)*A, y*f+sin(2*pi*u)*A)) so the terrain morphs and returns exactly. A coarse grid is marched cell-by-cell and short iso-segments are stroked wherever the field crosses each of several threshold levels, with bands coloured and breathing through Cosmos accents over additive 'lighter' glow. Pure Canvas 2D, zero dependencies, deterministic.","gif":false},{"slug":"cosmic-snow","title":"Cosmic Snow — drifting glints with depth parallax","vi":"Cosmic Snow — đốm sáng rơi với chiều sâu thị sai","tier":"canvas","tags":["snow","glints","embers","parallax","depth","canvas2d"],"summary":"Soft glints, snow and embers in Cosmos accent colours drift gently downward across three depth layers — far ones small, dim and slow, near ones big, bright and fast — building real parallax over the Phantom dark. Each glint twinkles and sways. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"crt-scanlines","title":"CRT Scanlines — retro phosphor screen text","vi":"CRT Scanlines — màn hình CRT hoài cổ","tier":"canvas","tags":["crt","retro","scanlines","glitch","text","canvas2d"],"summary":"The word COSMOS on a retro CRT phosphor screen: scanlines, RGB colour bleed, a rolling bright band, edge vignette/curvature and a subtle flicker. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"cube","title":"Cube — self-scrambling/solving Rubik's cube (pure CSS 3D)","vi":"","tier":"canvas","tags":["rubik","cube","css3d","3d-transforms","self-solving","matrix3d"],"summary":"A 3x3x3 Rubik's cube built entirely from CSS 3D transforms — no WebGL, no libraries. It tumbles, scrambles itself one layer-twist at a time, then solves itself; because the move list is mirrored (scramble + its inverse), the cube returns to solved and the loop is seamless. The six faces are the six Cosmos theme accents (Solaris/Cosmic/Sacred/Aurora/Nebula/Phantom) on rounded glowing stickers over dark plastic. Runs offline by double-clicking index.html.","gif":false},{"slug":"cube-wave","title":"Cube Wave — an isometric city of light whose cube heights ripple in a travelling wave","vi":"Cube Wave — thành phố ánh sáng đẳng cự với chiều cao khối lập phương gợn sóng lan truyền","tier":"canvas","tags":["isometric","cubes","wave","3d","grid","canvas2d"],"summary":"A 12x12 isometric grid of hand-projected 3D cubes pulses in a radial travelling wave: each cube's height is base + amp*sin(2*pi*u*k - dist*freq), so a ripple sweeps outward from the centre like a city of light bouncing. Each cube draws its two visible side faces (darker) plus a bright glowing top, painted strictly back-to-front by depth so overlaps are correct. Faces are accent-tinted from a seeded palette. Pure Canvas 2D with a by-hand isometric projection, no WebGL, zero deps, deterministic and seamless.","gif":false},{"slug":"data-stream","title":"Data Stream — glowing packets flowing along fibre-optic routes between nodes","vi":"Data Stream — gói dữ liệu phát sáng chạy dọc các tuyến cáp quang giữa các nút","tier":"canvas","tags":["network","packets","fibre","pulse","canvas2d","cosmos-ai-lab"],"summary":"A seeded network of glowing nodes linked by straight fibre-optic routes, with violet, cosmic and nebula data packets (dot-then-dash) streaming along every link over a faint nebula wash. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"delaunay-lowpoly","title":"Delaunay Lowpoly — shimmering animated triangulated facet mesh","vi":"Lưới Tam Giác Lowpoly Vũ Trụ","tier":"canvas","tags":["canvas2d","generative","lowpoly","triangulation","mesh","glow"],"summary":"A seeded grid of points drifts on periodic Lissajous paths while a fixed Delaunay triangulation of their base positions draws a low-poly facet mesh. Each triangle is a flat accent-tinted additive gradient with glowing edges that shimmer in and out. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":false},{"slug":"disco-ball","title":"Disco Ball — a faceted mirror sphere glinting and throwing coloured light spots","vi":"Disco Ball — quả cầu gương nhiều mặt lấp lánh, hắt đốm sáng màu","tier":"canvas","tags":["3d","disco","mirror","particles","generative","canvas2d"],"summary":"A faceted mirror disco ball — a sphere tiled with hundreds of little mirror facets laid out by latitude/longitude — spins one full turn per loop on a tilted axis, each facet glinting as it catches a key light, while a field of rotating coloured light spots sweeps around the dark room. Hand-rolled 3D: every tile is rotated, perspective-projected by scale F/(F+z), back-face culled and depth-sorted, with specular highlights driving sparkly accent reflections. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"dither","title":"Dither — an animated accent blob field crushed through a moving Bayer ordered-dither into shifting retro dot patterns","vi":"Dither — trường blob màu nhấn ép qua ngưỡng dither Bayer chuyển động thành các hoa văn chấm retro","tier":"canvas","tags":["dither","bayer","retro","canvas2d","generative","1-bit"],"summary":"A smooth Cosmos-accent gradient with two drifting blobs is computed on a small 200x160 offscreen, then quantized to a limited accent palette through a moving 8x8 Bayer ordered-dither matrix, producing crisp shifting dot patterns that read like a 1-bit retro display. The buffer is upscaled pixelated to fill the window. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":false},{"slug":"dna-helix","title":"DNA Helix — rotating double-helix of glowing dots","vi":"DNA Helix — chuỗi xoắn kép phát sáng đang quay","tier":"canvas","tags":["dna","helix","3d","glow","spiral","canvas2d"],"summary":"A rotating DNA double helix: two intertwined strands of glowing dots joined by connecting rungs, spinning about the vertical axis. Built with pure Canvas 2D doing its own 3D rotation and perspective projection (scale=F/(F+z)), zero dependencies, runs fully offline; rendering is deterministic and the loop is seamless.","gif":false},{"slug":"dot-globe","title":"Dot Globe — rotating dotted lat/long sphere with orbiting arc rings","vi":"Dot Globe — quả cầu chấm kinh-vĩ tuyến xoay kèm vòng quỹ đạo","tier":"canvas","tags":["globe","sphere","3d","dots","wireframe","canvas2d"],"summary":"A wireframe-style globe built from a latitude/longitude grid of glowing dots on a sphere, with two tilted orbiting arc rings of dots and a faint core glow. Built with pure Canvas 2D doing its own 3D rotation and perspective projection (scale=F/(F+z)), zero dependencies, runs fully offline; rendering is deterministic and the loop is seamless (frame(0)===frame(LOOP)).","gif":false},{"slug":"dot-wave-loader","title":"Dot Wave Loader — a grid of glowing dots rippling in a travelling wave","vi":"Dot Wave Loader — lưới chấm sáng gợn sóng lan truyền","tier":"canvas","tags":["loader","wave","dots","idle","glow","canvas2d"],"summary":"A clean idle/loader animation: an 11x5 grid of glowing dots where a travelling sine wave drives each dot's scale, vertical bob, brightness and colour. The per-dot phase offset (index*PHASE) makes the crest sweep across the grid, while integer-multiple frequency guarantees frame(0)==frame(LOOP). Each dot renders additively as halo+core+highlight, colour rolling through the Cosmos accents. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"epicycloid","title":"Epicycloid — a rolling circle traces glowing looping curves","vi":"Epicycloid — vòng tròn lăn vẽ đường cong phát sáng","tier":"canvas","tags":["epicycloid","hypocycloid","rolling-circle","geometry","generative","canvas2d"],"summary":"Five concentric rolling-circle curves: a small circle rolls around a big one and the pen traces glowing epicycloid and hypocycloid loops, with the faint base and rolling circles shown plus a bright pen-head sweeping the rim. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"falling-leaves","title":"Falling Leaves — autumn leaves tumbling and swaying as they drift down","vi":"Lá Thu Rơi Cosmos","tier":"canvas","tags":["canvas2d","generative","particles","autumn","nature","animation"],"summary":"Warm autumn leaves drift downward, each tumbling as it rotates and swaying side-to-side along looping sine paths, in varied warm and accent colours, wrapping seamlessly. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":false},{"slug":"fibonacci-spiral","title":"Fibonacci Spiral — nested golden squares with the glowing golden-spiral arc","vi":"Fibonacci Spiral — các hình vuông tỉ lệ vàng lồng nhau với cung xoắn ốc vàng phát sáng","tier":"canvas","tags":["fibonacci","golden-ratio","spiral","sacred-geometry","generative","canvas2d"],"summary":"Eleven nested golden-ratio squares (each side shrinks by PHI=1.618) with the classic quarter-arc golden spiral threaded continuously through them, drawn as glowing additive strokes that slowly rotate while a colour wave sweeps outward by square index. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"fire-flames","title":"Fire Flames — flickering campfire tongues","vi":"Fire Flames — ngọn lửa bập bùng","tier":"canvas","tags":["fire","flames","particles","glow","canvas2d","generative"],"summary":"Layered upward-licking flame tongues built from seeded sine-wobbled shapes in solaris/sacred/nebula gradients, with additive glow, a hot core and rising embers. The flicker is a pure function of loop phase u so it repeats seamlessly. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":false},{"slug":"firefly-swarm","title":"Firefly Swarm — warm fireflies drifting and blinking in the dark","vi":"Đàn Đom Đóm Vũ Trụ","tier":"canvas","tags":["canvas2d","particles","generative","glow","fireflies","ambient"],"summary":"A swarm of fireflies drifts along gentle looping Lissajous paths over the Phantom dark, each blinking on its own integer-harmonic brightness phase. Warm and accent-coloured additive glows pulse and fade. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":false},{"slug":"fireworks","title":"Fireworks — gravity burst particles","vi":"Fireworks — pháo hoa hạt trọng lực","tier":"canvas","tags":["fireworks","particles","celebration","burst","canvas2d","cosmos-ai-lab"],"summary":"Scheduled fireworks bursts scatter gravity-driven sparks in the six Cosmos accent colours, each shell flashing then arcing down and fading. Fully deterministic from time (no stored state) so it loops seamlessly. Pure Canvas 2D, zero deps, runs offline.","gif":false},{"slug":"flip-clock","title":"Flip Clock — glossy split-flap cards fold over to count the time","vi":"Đồng hồ Lật Cosmos — thẻ lật bóng bẩy gập xuống để đếm thời gian","tier":"canvas","tags":["canvas2d","clock","flipclock","cosmos","loop","cosmos-ai-lab"],"summary":"A split-flap flip clock of six glossy dark digit cards: when a digit changes, its top half folds down on a hinge while the next digit's bottom half rises to meet it, complete with falling-flap shadow and a Cosmos accent edge glow. The whole HH:MM:SS readout counts forward and loops seamlessly because the flip is a deterministic function of the loop phase. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":false},{"slug":"flow-field","title":"Flow Field — noise-driven flowing streams","vi":"Flow Field — dòng chảy theo trường nhiễu","tier":"canvas","tags":["flow-field","perlin","generative","particles","streams","canvas2d"],"summary":"Particles trace a value-noise flow field into long curving streamlines; glowing dashes flow along each path in the Cosmos accents, creating a silky generative current. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"flower-bloom","title":"Flower Bloom — a glowing geometric flower unfurling open then closing in a ping-pong loop","vi":"Flower Bloom — đoá hoa hình học phát sáng nở bung rồi khép lại theo vòng lặp ping-pong","tier":"canvas","tags":["flower","bloom","canvas2d","generative","geometric","cosmos"],"summary":"A glowing geometric flower whose layered teardrop petals scale outward to bloom open, then collapse closed in a smooth ping-pong cycle, with accent petal rings rotating gently at different harmonic speeds and a bright pulsing pistil core ringed by stamen dots. The bloom factor is driven by cos(2πu) so opening and closing are symmetric and seamless. Pure Canvas 2D, zero deps, runs offline, deterministic and seamless.","gif":false},{"slug":"flower-of-life","title":"Flower of Life — overlapping hex-lattice circles drawn in as a glowing sacred pattern","vi":"Flower of Life — các vòng tròn chồng nhau trên lưới lục giác vẽ dần thành hoa sự sống phát sáng","tier":"canvas","tags":["flower-of-life","sacred-geometry","circles","generative","canvas2d","mandala"],"summary":"The classic Flower of Life: overlapping equal circles packed on a triangular/hex lattice (neighbours spaced exactly one radius apart) drawn as glowing additive accent strokes, with each circle drawing-in from the centre outward while a luminous pulse ripples through them. The whole figure gently rotates and breathes. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"fourier-epicycles","title":"Fourier Epicycles — rotating circle chain draws a star","vi":"Fourier Epicycles — chuỗi vòng tròn quay vẽ ngôi sao","tier":"canvas","tags":["fourier","epicycles","rotating-circles","generative","geometry","canvas2d"],"summary":"A chain of rotating circles, each an integer-frequency Fourier term, links tip-to-tip and traces out a glowing closed five-point star over exactly one period. The spinning circle chain with its radius arms is drawn alongside the bright completed path. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"fractal-tree","title":"Fractal Tree — a recursive tree swaying in the wind with blossoming tips","vi":"Fractal Tree — cây phân nhánh đệ quy đung đưa trong gió, ngọn nở hoa sáng","tier":"canvas","tags":["fractal","tree","recursion","wind","blossom","canvas2d"],"summary":"A recursively branching fractal tree grown from the base each frame; every branch angle gains a small wind sway = SW*sin(2PI*u + depth) so different depths lag slightly and the whole canopy waves and settles back exactly at the loop point. Branch tips bloom as glowing accent dots that gently twinkle. Limb colour and thickness grade with depth, all drawn additively. The tree is recomputed every frame yet stays a pure function of time via a fixed seeded jitter table walked in deterministic order. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"galaxy-spiral","title":"Galaxy Spiral — rotating spiral galaxy of glowing particles","vi":"Galaxy Spiral — thiên hà xoắn ốc quay với hạt phát sáng","tier":"canvas","tags":["galaxy","spiral","particles","space","rotation","canvas2d"],"summary":"A four-armed spiral galaxy of ~2600 glowing particles sweeps around a warm central bulge, with inner stars rotating faster than the outer arms (differential rotation) for a real swirling feel. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"gears","title":"Gears — interlocking glowing gear train meshing in the dark","vi":"Bánh Răng Cosmos — cụm bánh răng phát sáng ăn khớp xoay trong bóng tối","tier":"canvas","tags":["canvas2d","gears","mechanical","generative","glow","cosmos-ai-lab"],"summary":"A cluster of interlocking mechanical gears with glowing teeth and rims meshes and rotates in the Phantom dark. Meshed gears rotate at angular speeds inversely proportional to their tooth counts and complete integer turns per loop, so they stay perfectly meshed and the loop is seamless. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":false},{"slug":"glitch-text","title":"Glitch Text — the word COSMOS with RGB-split datamosh jitter and scanline tears","vi":"Glitch Text — chữ COSMOS với tách kênh RGB kiểu datamosh và xé scanline","tier":"canvas","tags":["glitch","rgb-split","datamosh","scanline","canvas2d","cosmos-ai-lab"],"summary":"The word COSMOS is drawn three times in offset cosmic, nebula and aurora channels to create an RGB-split chromatic-aberration look, composited additively into an offscreen buffer, then blitted back in horizontal slices each shifted by a deterministic per-slice jitter that intensifies on the beat. Occasional scanline tears copy a thin band shifted hard sideways, and a faint white core pass plus a scanline overlay keep the text readable. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"gradient-mesh","title":"Gradient Mesh — large blurred colour orbs drifting and blending into a living mesh gradient","vi":"Gradient Mesh — các quầng màu lớn mờ trôi và hòa thành mesh gradient sống động","tier":"canvas","tags":["gradient","mesh","ambient","background","glow","canvas2d"],"summary":"Six oversized soft radial-gradient orbs in the Cosmos accent colours drift across the Phantom-dark background on looping sine paths, heavily overlapping and pulsing so they read as a smooth, breathing mesh gradient. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"gravity-orbit","title":"Gravity Orbit — a mini solar system of planets sweeping a glowing star","vi":"Gravity Orbit — hệ mặt trời thu nhỏ quay quanh ngôi sao phát sáng","tier":"canvas","tags":["orbit","planets","solar-system","ellipse","glow","canvas2d"],"summary":"Six glowing accent-coloured planets sweep tilted elliptical orbits around a bright pulsing star at the centre, each tracing a faint fading trail behind it; inner bodies orbit faster than outer ones, all on integer periods so every world realigns at the loop point. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"gyroscope","title":"Gyroscope — three nested gimbal rings spinning on perpendicular axes","vi":"Gyroscope — ba vòng gimbal lồng nhau xoay trên các trục vuông góc","tier":"canvas","tags":["gyroscope","gimbal","3d","rings","geometry","canvas2d"],"summary":"Three nested gimbal rings sit at perpendicular orientations (their normals along the X, Y and Z axes) and each spins about its own axis at an integer number of turns per loop, while the whole assembly slowly precesses, all rendered with hand-rolled 3D rotation and a perspective projection scale=F/(F+z). A glowing accent-tinted core pulses at the projected centre and nearer arcs glow brighter and thicker than far ones for genuine depth. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"halftone-logo","title":"Halftone Logo — the logo reborn as a shimmering grid of brightness-driven dots","vi":"Logo Cosmos Halftone — logo tái sinh thành lưới chấm lung linh theo độ sáng","tier":"canvas","tags":["halftone","logo","dots","cosmos","shimmer","cosmos-ai-lab"],"summary":"The Cosmos logo is sampled once into a 120px offscreen buffer, then rebuilt every frame as a halftone grid: each cell draws a dot whose radius scales with the source brightness and whose colour blends the logo pixel with a Cosmos accent. A per-cell sine shimmer and a travelling brightness wave keep it breathing on a seamless loop.","gif":false},{"slug":"harmonograph","title":"Harmonograph — glowing harmonograph curves with integer frequency ratios","vi":"Harmonograph — đường cong harmonograph phát sáng với tỉ lệ tần số nguyên","tier":"canvas","tags":["harmonograph","lissajous","curves","canvas2d","generative","glow"],"summary":"Layered luminous harmonograph figures traced as long closed paths from sums of sines — x = Σ A·sin(f·φ + p), y = Σ similar — with strictly INTEGER frequency ratios so each figure is a perfectly closed curve. The phases advance by 2π·u so the whole figure slowly rotates and morphs and returns exactly to its start at u=1. Layered accent strokes (dim halo + bright core) glow additively in Cosmos colors over a soft nebula. Pure Canvas 2D, zero dependencies, runs offline; fully deterministic and seamless.","gif":false},{"slug":"heart-burst","title":"Heart Burst — a like-heart pops and bursts a ring of sparkles","vi":"Heart Burst — trái tim like bung ra cùng vòng tia lấp lánh","tier":"canvas","tags":["heart","like","burst","sparkle","particles","canvas2d"],"summary":"A like-heart drawn from a parametric heart curve scales up with an overshooting pop and a subtle beat while a seeded ring of four-point sparkles bursts outward then settles back, all wrapped in a nebula-to-solaris glow halo. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"heartbeat-ecg","title":"Heartbeat ECG — a glowing PQRST trace scrolling over a faint grid","vi":"Nhịp Tim ECG Cosmos","tier":"canvas","tags":["canvas2d","generative","ecg","medical","glow","cosmos-ai-lab"],"summary":"A glowing green/cosmic ECG trace scrolls across a faint blue grid with the classic PQRST heartbeat spike repeating, and a soft pulsing glow dot rides the leading edge. The scroll wraps seamlessly with an integer number of beats per loop. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":f orm Scope — glowing oscilloscope traces on a phosphor grid","vi":"Waveform Scope — vệt dao động ký phát sáng trên lưới phosphor","tier":"canvas","tags":["oscilloscope","waveform","lissajous","glow","scope","canvas2d"],"summary":"An oscilloscope screen: two glowing waveform traces built from summed sines scroll across a faint phosphor grid, with a Lissajous figure orbiting below and a roaming phosphor dot. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"wavy-lines","title":"Wavy Lines — flowing glowing sine ribbons like rippling silk","vi":"Sóng Lụa Vũ Trụ — những đường sin phát sáng uốn lượn như lụa gợn","tier":"canvas","tags":["waves","lines","sine","silk","glow","generative"],"summary":"Many flowing horizontal sine lines drift like rippling silk or sound waves, each a thin bright stroke over an additive glow halo, in pure Canvas 2D with zero dependencies, fully offline, deterministic and seamless. Every line sums a few sines whose phases advance by 2*pi*u*k with integer k, so all motion returns exactly at u=1 (frame(0) equals frame(LOOP)); amplitude and Cosmos accent colour vary per line.","gif":false},{"slug":"wavy-text","title":"Wavy Text — COSMOS letters bobbing on a travelling sine wave","vi":"Wavy Text — chữ COSMOS nhấp nhô theo sóng sin","tier":"canvas","tags":["text","wave","sine","glow","bobbing","canvas2d"],"summary":"The word COSMOS where each letter bobs up and down on a travelling sine wave, glow blur and alpha pulsing as the wave crest passes each glyph, every letter shining in a Cosmos accent (violet, cosmic, nebula, aurora, solaris, sacred) via additive 'lighter' compositing with a bright white core. Pure Canvas 2D, zero dependencies, runs offline; fully deterministic and seamless (frame 0 === frame LOOP).","gif":false},{"slug":"wormhole","title":"Wormhole — concentric rings twisting into a swirling vortex tunnel","vi":"Wormhole — lỗ giun xoáy với các vòng xoắn vào tâm","tier":"canvas","tags":["wormhole","vortex","tunnel","spiral","hypnotic","canvas2d"],"summary":"A spiralling wormhole: concentric segmented rings twist into a swirling vortex tunnel receding to a bright/dark centre. Rings rush inward on a recycling mod-1 phase while a spiral rotation deepens toward the throat, hypnotic and accent-coloured. Pure Canvas 2D, zero deps, runs offline; deterministic and seamless.","gif":false},{"slug":"yin-yang","title":"Yin-Yang — rotating Taiji disc in violet & cosmic blue","vi":"Âm Dương Cosmos","tier":"canvas","tags":["canvas2d","generative","geometric","glow","rotation","cosmos-ai-lab"],"summary":"A classic Taiji (yin-yang) disc with its two interlocking swirls and the two eye-dots, spinning exactly one turn per loop. The two halves are tinted in Cosmos accents — phantom violet and cosmic blue — instead of black and white, wrapped in a soft breathing glow and rim light. Pure Canvas 2D, zero deps, runs offline, deterministic & seamless.","gif":false},{"slug":"game-2048","title":"2048 — slide and merge glowing numbered tiles to 2048","vi":"","tier":"game","tags":["game","puzzle","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained 2048 sliding-tile puzzle in a single HTML file with zero dependencies. Slide all tiles on a 4x4 grid in one direction; tiles of equal value merge into their sum, doubling each time toward 2048, and your score accumulates with every merge. A new tile spawns after each valid move; the game ends when the grid is full with no moves left. Playable with arrow keys, WASD, and swipe. It also ships a deterministic self-playing attract demo for capture: a seeded corner-strategy AI makes moves, tiles slide and merge with pop animations, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-airhockey","title":"Air Hockey — drag your mallet to slam a glowing puck past the CPU","vi":"","tier":"game","tags":["game","sports","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained playable air hockey match in one HTML file with zero dependencies. Drag your bottom mallet to defend your goal and slam a glowing puck past a defending-and-attacking CPU on the top; the puck carries mallet momentum on contact, banks off the side rails, and the live scoreboard tracks first-to-7. Keyboard plus drag/touch control, win/lose banner, and instant restart. Ships with a deterministic self-playing attract demo where both mallets are AI rallying and scoring on the seeded puck.","gif":false},{"slug":"game-doodle","title":"Ascent — tilt a bouncing orb up endless glowing platforms","vi":"","tier":"game","tags":["game","platformer","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained vertical platform-jumper (doodle-jump style) in a single HTML file with zero dependencies. A glowing orb auto-bounces on contact with rising aurora platforms; you tilt it left and right to land on the next one as the camera scrolls upward. The height you climb is your score, and falling off the bottom of the screen ends the run. Playable with keyboard and on-screen touch pads. It also ships a deterministic self-playing attract demo for capture: a seeded AI steers the orb onto each seeded platform, climbing endlessly, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-asteroids","title":"Asteroids — rotate, thrust and shoot to split drifting asteroids","vi":"","tier":"game","tags":["game","arcade","playable","interactive","arcade","canvas2d"],"summary":"A real, fully playable Asteroids arcade game in one self-contained HTML file with zero dependencies. You fly a glowing violet ship around a wrap-around space field: rotate left/right, thrust forward with momentum, and fire nebula bolts that split big asteroids into smaller, faster ones. Score climbs per hit, you have three lives, and clearing a wave spawns a larger next wave. Playable with keyboard and on-screen touch buttons, with a restart affordance. It also ships a dete d 1-15 with one empty gap; slide a tile adjacent to the gap into it and work the tiles back into ascending order 1-15. A live move counter tracks your efficiency and a best score is kept; solving the board pops a victory overlay with a shuffle for a fresh scramble. Playable with arrow keys or by clicking the tile next to the gap. It also ships a deterministic self-playing attract demo for capture: a seeded scramble is generated and a recorded solution slides tiles back toward order, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-flappy","title":"Flap — tap a glowing orb through gaps in cosmic pipes","vi":"","tier":"game","tags":["game","flappy","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained Flappy-style arcade game in a single HTML file with zero dependencies. You flap a glowing orb to thread it through gaps between scrolling violet pipes — gravity constantly pulls it down. Score one point per pipe cleared, crash on any pipe, the ceiling, or the ground, then restart. Playable with keyboard and touch. It also ships a deterministic self-playing attract demo for capture: a seeded AI flaps the orb perfectly through the same seeded gaps, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-colorflood","title":"Flood-It — pick colors to flood the whole board in few moves","vi":"","tier":"game","tags":["game","puzzle","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained Flood-It puzzle in a single HTML file with zero dependencies. A 12x12 board is filled with six Cosmos colors; starting from the top-left anchor cell, each move you pick a color and the connected same-color region flooding out from the top-left grows to absorb every adjacent cell of that color. The goal is to make the whole board a single color within a move limit. A move counter and limit are shown, with a solved/out-of-moves end state. Playable by clicking the color buttons (or number keys 1-6) and R to restart. It also ships a deterministic self-playing attract demo for capture: a greedy solver picks the color that grows the region most each step, with the flood region expanding in animated waves, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-frogger","title":"Frogger — hop a frog up across cosmic traffic and a river","vi":"","tier":"game","tags":["game","arcade","playable","interactive","action","canvas2d"],"summary":"A real, self-contained Frogger-style arcade game in a single HTML file with zero dependencies. Hop a glowing frog upward from the start bank, dodging lanes of moving cosmic hazards on the road and riding drifting logs across a river, to reach the goal bank at the top. Each crossing scores points, a collision (or falling in the river) costs a life, and three lives end the run. Playable with arrow keys, WASD, and on-screen touch buttons, with R or a button to restart. It also ships a deterministic self-playing attract demo for capture: a seeded AI frog times its hops across the seeded traffic to reach the goal, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-hanoi","title":"Hanoi — move glowing discs across three pegs to rebuild the tower","vi":"","tier":"game","tags":["game","puzzle","playable","interactive","arcade","canvas2d"],"summary":"(EN: real playable self-contained Towers of Hanoi puzzle, zero deps, click/tap + keyboard, 3 pegs and 5 glowing discs, never place larger on smaller, move counter + optimal target, win when rebuilt on the last peg, restart; PLUS a deterministic self-playing attract demo that runs the classic recursive optimal solution move-by-move via window.__seek(t).)","gif":false},{"slug":"game-helix","title":"Helix — bounce a ball down a rotating helix tower through the gaps","vi":"","tier":"game","tags":["game","helix","playable","interactive","arcade","canvas2d"],"summary":"EN: A fully playable self-contained Helix Jump arcade game with zero external dependencies. A golden ball bounces down an infinite rotating helix tower made of colored platform rings. Each ring has a gap the player must align under the ball by rotating the whole tower left or right. Danger arcs (magenta/orange) kill the ball on contact; landing on safe arcs bounces the ball back up. Score increases by 1 per ring the ball falls through. Controls: keyboard arrow keys (← →), A/D keys, drag on the board, or large on-screen ◀ ▶ touch buttons. Restart with R key or a visible Restart button. In AUTO mode (?auto=1) a deterministic seeded self-playing attract demo runs: the AI rotates the tower each timestep to align the next ring's gap under the ball, using mulberry32 RNG so the entire simulation is reproducible. window.__seek(t) renders the game state at any millisecond. A START offset of 5500 ms pre-descends the ball so frame t=0 shows the game mid-play with score > 0 and several rings visible.","gif":false},{"slug":"game-invaders","title":"Invaders — strafe your ship and blast a descending formation of cosmic aliens","vi":"","tier":"game","tags":["game","shmup","playable","interactive","arcade","canvas2d"],"summary":"A real, fully playable Space Invaders in one self-contained HTML file with zero dependencies. You pilot a glowing ship along the bottom and fire upward at a marching formation of Cosmos-colored aliens that shimmer side to side, drop closer with every step, and rain bombs; killing aliens scores points (more for higher rows), clearing a formation advances the wave, and bomb hits cost lives. There is a game-over screen with score and wave, plus restart. Controls work with both keyboard (left/right or A/D to move, space to fire, R to restart) and touch (on-screen left / FIRE / right buttons). It also ships a deterministic self-playing attract demo for capture: a seeded ship AI strafes, aligns under aliens and fires while the grid marches down and explodes on hit, all as a pure function of time.","gif":false}, window.__seek(t).","gif":false},{"slug":"game-maze","title":"Maze Runner — guide a glowing dot through a seeded maze to the goal","vi":"","tier":"game","tags":["game","maze","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained Cosmos Maze Runner game in one HTML file with zero dependencies. A 13x13 maze is carved with a seeded depth-first search; you drive a glowing dot from the start corner to the aurora goal, walls drawn as violet glow, your route lighting up behind you. A steps counter and live timer score the run, and reaching the goal advances the level and generates a fresh maze. Arrow keys and WASD move on keyboard, an on-screen D-pad and New Maze button cover touch, and R resets. It also ships a deterministic self-playing attract demo for capture: a BFS solver traces the shortest start-to-goal path as a pure function of time.","gif":false},{"slug":"game-memory","title":"Memory — flip-and-match pairs of glowing cosmic symbols","vi":"","tier":"game","tags":["game","memory","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained Cosmos Memory match game in one HTML file with zero dependencies. A 4x4 grid of face-down cards hides eight pairs of glowing cosmic symbols (star, orbit, bloom, leaf, comet, sun, ring, diamond). Click or tap two cards to flip them; matching pairs lock and glow, mismatches flip back; a moves counter and pairs-found score track progress and you win when all eight pairs are matched. Keyboard and touch both work, with a restart button and R key. It also ships a deterministic self-playing attract demo for capture: a perfect-memory AI flips seeded pairs in order as a pure function of time.","gif":false},{"slug":"game-minesweeper","title":"Minesweeper — clear the field, flag the mines","vi":"","tier":"game","tags":["game","puzzle","minesweeper","playable","interactive","canvas2d"],"summary":"A real, self-contained Minesweeper game in one HTML file with zero dependencies. Play on a 9x9 grid hid t flash and add score on every hit; you work two flippers at the bottom to keep the ball alive and away from the drain. You have three balls and lose one each time the ball drains, with a game-over screen and restart. Controls work with both keyboard (left/right or A/D for the flippers, R to restart) and touch (the on-screen LEFT/RIGHT buttons or tapping the left/right half of the table). It also ships a deterministic self-playing attract demo for capture: seeded flippers react to the ball, bumpers flash and the score ticks up, drawn as a pure function of time.","gif":false},{"slug":"game-pong","title":"Pong — rally a glowing ball past a tracking CPU paddle","vi":"","tier":"game","tags":["game","sports","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained playable Pong in one HTML file with zero dependencies. Control the left paddle against a ball-predicting CPU on the right; the ball rallies with angle-on-contact physics and accelerating speed, and the live scoreboard tracks first-to-7. Keyboard plus drag/touch control, win/lose banner, and instant restart. Ships with a deterministic self-playing attract demo where both paddles are AI rallying the ball.","gif":false},{"slug":"game-reaction","title":"Reflex — tap glowing targets fast for reaction-time score","vi":"","tier":"game","tags":["game","reaction","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained reaction / target-tap game in a single HTML file with zero dependencies. Glowing Cosmos targets appear one at a time at seeded positions inside the playfield; you click or tap them as fast as you can for +10 each while a 20-second timer bar drains. The HUD tracks your live score, average reaction time in milliseconds, and accuracy, and a hit splash with the reaction time confirms every tap. Playable with mouse and touch. It also ships a deterministic self-playing attract demo for capture: a seeded cursor flies to each seeded target and taps it on a fixed reaction delay, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-runner","title":"Runner — jump and duck a glowing runner past endless obstacles","vi":"","tier":"game","tags":["game","runner","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained endless-runner (dino-style) arcade game in a single HTML file with zero dependencies. A glowing runner auto-runs to the right while you jump over ground obstacles and duck under high bars; your distance is the score and the run keeps speeding up. Hitting any obstacle crashes the runner and ends the run, then you restart. Playable with keyboard and touch. It also ships a deterministic self-playing attract demo for capture: a seeded AI jumps and ducks the seeded obstacle field perfectly, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-simon","title":"Simon — repeat the growing sequence of glowing Cosmos-colored pads","vi":"","tier":"game","tags":["game","memory","playable","interactive","arcade","canvas2d"],"summary":"A real, fully playable Simon memory game in one self-contained HTML file with zero dependencies. Four glowing Cosmos-colored quadrant pads (aurora, cosmic, nebula, solaris) flash a growing sequence; you repeat it back by clicking the pads or pressing keys 1-4. Each round adds one more step, your score is the sequence length you reach, the best round is tracked, and a single mistake resets the game. Playable with keyboard and mouse/touch, with a restart affordance. It also ships a deterministic self-playing attract demo for capture: it builds a seeded growing sequence, shows it, then auto-repeats it pad-by-pad, rendered as a pure function of time with the round counter on screen.","gif":false},{"slug":"game-snake","title":"Snake — grow a glowing serpent eating cosmic food on a neon grid","vi":"","tier":"game","tags":["game","snake","playable","interactive","arcade","canvas2d"],"summary":"A real, fully playable classic Snake game in one self-contained HTML file with zero dependencies. You steer a glowing serpent around a 17x17 neon grid, eating pulsing cosmic food to grow longer while avoiding the walls and your own tail; the score is your length and the run ends with a game-over screen and restart. Controls work with both keyboard (arrows/WASD, R to restart) and on-screen touch buttons. It also ships a deterministic self-playing attract demo for capture: a seeded greedy AI snake hunts seeded food as a pure function of time.","gif":false},{"slug":"game-snakeladder","title":"Snakes & Ladders — race a CPU to 100","vi":"","tier":"game","tags":["game","board","snakes-and-ladders","playable","interactive","canvas2d"],"summary":"A real, self-contained Snakes & Ladders race against the computer in one HTML file with zero dependencies. A numbered 10x10 board winds from 1 to 100 with cosmic ladders that fly your token up and orange comet slides that drag it down. Tap the on-screen ROLL button (or Space) to throw the die; your cosmic token advances by the rolled amount, ladders and slides apply automatically, and the CPU answers with its own roll. A scoreboard shows both tokens' squares, the rolled die face is drawn on the board, and the first to land exactly on 100 wins. R or the button restarts the race. It ships with a deterministic self-playing attract demo for capture: a seeded dice sequence hops both tokens up ladders and down slides toward the finish.","gif":false},{"slug":"game-stack","title":"Stack — drop sliding blocks to build a glowing tower","vi":"","tier":"game","tags":["game","stack","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained Stack/tower arcade game in a single HTML file with zero dependencies. A block slides back and forth above your tower; you drop it onto the stack and any overhang is sliced off, so the block shrinks each time you misalign. Perfect drops keep full width and flash a highlight, the tower scrolls down as it rises, and missing the stack entirely topples the tower and ends the run. Playable with keyboard and touch. It also ships a deterministic self-playing attract demo for capture: a seeded AI drops blocks with near-perfect timing onto an ever-rising tower, rendered as a pure function of time via window.__seek(t).","gif":false},{"slug":"game-spaceshooter","title":"Strike — pilot a ship and blast weaving waves of descending cosmic enemies","vi":"","tier":"game","tags":["game","shmup","playable","interactive","arcade","canvas2d"],"summary":"A real, fully playable vertical shoot-'em-up in one self-contained HTML file with zero dependencies. You pilot a glowing ship around the lower playfield and fire upward at endless seeded waves of cosmic enemies that descend while weaving side to side, while dodging the bombs they fire back at you; destroyed enemies add to your score (tougher armored ones take two hits and score more), and an enemy reaching your row or a bomb hitting you costs a life. You have three lives; lose them all and it is game over with a restart. Controls work with both keyboard (arrows or WASD to fly, space to fire, R to restart) and on-screen touch buttons (left / FIRE / right). It also ships a deterministic self-playing attract demo for capture: a seeded ship AI weaves, aligns under the nearest threat, dodges incoming bullets and fires, all rendered purely as a function of time via window.__seek(t).","gif":false},{"slug":"game-tetris","title":"Tetris — stack falling tetrominoes and clear glowing lines","vi":"","tier":"game","tags":["game","puzzle","playable","interactive","arcade","canvas2d"],"summary":"A real, self-contained playable Tetris in one HTML file with zero dependencies. Seven tetrominoes fall into a 10x20 well; move and rotate them, soft- or hard-drop, and clear full rows for an escalating score with a live Next preview and ghost piece. Keyboard plus on-screen touch buttons, win-by-survival scoring, game over on stack-out, and instant restart. Ships with a deterministic self-playing attract demo for capture.","gif":false},{"slug":"game-tictactoe","title":"Tic-Tac-Toe — outwit a perfect minimax CPU","vi":"","tier":"game","tags":["game","puzzle","tic-tac-toe","playable","interactive","canvas2d"],"summary":"A real, self-contained tic-tac-toe game against the computer in one HTML file with zero dependencies. Click any cell (or use keys 1-9 in numpad layout) to place your glowing X; a CPU running a full minimax search responds with the perfect O, so the best you can force is a draw. Winning lines light up with an aurora glow, a scoreboard tallies your wins, draws and CPU wins, and R or the button restarts the round. It ships with a deterministic self-playing attract demo for capture: a full game plays out for both sides and ends in a highlighted win or draw, then resets.","gif":false},{"slug":"game-whack","title":"Whack — bop glowing creatures before they duck back down","vi":"","tier":"game","tags":["game","arcade","whack-a-mole","playable","interactive","canvas2d"],"summary":"A real, self-contained whack-a-mole game in one HTML file with zero dependencies. Glowing Cosmos creatures pop up from a 3x3 grid of holes; click or tap them (or use the Q/W/E A/S/D Z/X/C keys mapped to the nine holes) to whack them for points before they duck back down, while a 30-second timer counts down and a miss counter tracks the ones you let escape. A hit splash and +10 popup confirm every whack; press R or the button to restart. It ships with a deterministic self-playing attract demo for capture: a seeded pop schedule and a scripted auto-player whack every mole on cue.","gif":false},{"slug":"game-wordsearch","title":"Word Search — find the hidden cosmic words","vi":"","tier":"game","tags":["game","puzzle","word-search","playable","interactive","canvas2d"],"summary":"A real, self-contained word search puzzle in one HTML file with zero dependencies. A 10x10 grid of letters hides six cosmic words (COMET, NEBULA, ORBIT, QUASAR, PULSAR, GALAXY) running horizontally, vertically or diagonally in either direction. Click-drag (or tap a start cell then an end cell) across a straight run of letters to select it; if it spells a hidden word the run is highlighted with a coloured glow and the word is crossed off the list. A live timer and a FOUND counter track progress, you win when all six words are found, and R or the button reseeds a brand-new grid. It ships with a deterministic self-playing attract demo for capture: a seeded grid reveals each hidden word one by one with a sweeping highlight.","gif":false},{"slug":"webcam-ascii","title":"ASCII-Cam — see yourself rendered live in flowing glowing ASCII glyphs","vi":"","tier":"reactive","tags":["webcam","sensor","reactive","interactive","canvas2d","cosmos-ai-lab"],"summary":"Reacts to the WEBCAM live: each frame is mirrored (selfie), downsampled to a 64x40 {brightness,motion} grid and frame-diffed, and every cell is drawn as a glowing Cosmos-tinted ASCII glyph chosen by brightness (dark cells become spaces and dots, bright cells become @ # W) so you literally see yourself flowing in characters; cells that just moved flare brighter and whiter. It gracefully falls back to a synthetic signal (a fake waving silhouette of moving Gaussian blobs) when the camera is unavailable or denied, and ships a deterministic synthetic demo for capture. Self-contained, zero dependencies. Privacy: all processing happens in-browser, nothing is uploaded.","gif":false},{"slug":"micviz-rings","title":"Frequency Rings — mic-reactive rings emitted on every beat","vi":"","tier":"reactive","tags":["mic","audio-reactive","visualizer","music","interactive","canvas2d"],"summary":"Concentric rings are emitted from the center on each beat (a level spike), expanding outward and fading as they travel, while a steady center glow pulses with the overall level; each ring's thickness and brightness are sampled from the spectrum at the moment it is emitted, with a faint white inner echo tinted by the high band. It reacts to the MICROPHONE live (gracefully falls back to a synthetic signal if the mic is unavailable/denied) and ships a deterministic synthetic demo for capture. Self-contained, zero dependencies, runs fully offline.","gif":false},{"slug":"micviz-kaleido","title":"Kaleido — mic-reactive k-fold kaleidoscope visualizer","vi":"","tier":"reactive","tags":["mic","audio-reactive","visualizer","music","interactive","canvas2d"],"summary":"A mirrored k-fold kaleidoscope visualizer: spectrum bins scale and rotate the symmetric shapes while beats recolor the whole bloom. Reacts to the MICROPHONE live (gracefully falls back to a synthetic signal if the mic is unavailable/denied) plus a deterministic synthetic demo for capture. Self-contained, zero-deps.","gif":false},{"slug":"webcam-mirror","title":"Kaleido-Mirror — your reflection folded live into a glowing kaleidoscope","vi":"","tier":"reactive","tags":["webcam","sensor","reactive","interactive","canvas2d","cosmos-ai-lab"],"summary":"Reacts to the WEBCAM live: each frame is mirrored (selfie), downsampled to a 32x24 {brightness,motion} field and frame-diffed, then folded into an 8-fold kaleidoscope of glowing Cosmos-tinted blobs whose radius and heat follow brightness and motion, replicated across rotational wedges plus a mirror flip for a hypnotic, slowly rotating symmetric portrait — wave a hand and the whole flower pulses and blooms. It gracefully falls back to a synthetic signal (a fake waving silhouette of moving Gaussian blobs) when the camera is unavailable or denied, and ships a deterministic synthetic demo for capture. Self-contained, zero dependencies. Privacy: all processing happens in-browser, nothing is uploaded.","gif":false},{"slug":"micviz-bars","title":"Mic Bars — mic-reactive spectrum bar visualizer with mirrored reflection and peak-hold caps","vi":"","tier":"reactive","tags":["mic","audio-reactive","visualizer","music","interactive","canvas2d"],"summary":"A classic spectrum bar visualizer: ~48 vertical om the spectrum, with glowing metaball blobs riding the crests and the whole body sloshing on the beat, finished with a glossy Cosmos sheen and specular crest sparkles. It reacts to the MICROPHONE live and gracefully falls back to a deterministic synthetic signal if the mic is unavailable or denied, plus a built-in synthetic demo for capture. Self-contained, zero dependencies, runs fully offline.","gif":false},{"slug":"micviz-blob","title":"Sound Blob — mic-reactive living orb modulated by the spectrum","vi":"","tier":"reactive","tags":["mic","audio-reactive","visualizer","music","interactive","canvas2d"],"summary":"A reactive blob/orb visualizer that reacts to the MICROPHONE live: a metaball-ish living sound-creature whose per-angle radius is modulated by the spectrum bins (low frequencies grow big lobes), pulsing outward on level with a glowing core and radiating tendrils. Gracefully falls back to a synthetic signal if the mic is unavailable or denied, plus a deterministic synthetic demo for capture. Self-contained, zero dependencies.","gif":false},{"slug":"micviz-starburst","title":"Starburst — mic-reactive radial light burst with rotating spectrum rays and beat sparkles","vi":"","tier":"reactive","tags":["mic","audio-reactive","visualizer","music","interactive","canvas2d"],"summary":"A starburst that reacts to the MICROPHONE live: rays of light shoot from a glowing central sun, each ray's length driven by one spectrum bin, the whole burst rotating slowly and flaring brighter with overall loudness, with sparkle particles bursting outward on the beat. It gracefully falls back to a deterministic synthetic signal if the mic is unavailable or denied, and ships a built-in synthetic demo for capture. Self-contained, zero dependencies, runs fully offline.","gif":false},{"slug":"tilt-liquid","title":"Tilt Liquid — device-tilt reactive glossy liquid that sloshes in its container with waves rebounding off the walls","vi":"","tier":"reactive","tags":["tilt","sensor","reactive","interactive","canvas2d","cosmos-ai-lab"],"summary":"A glossy Cosmos liquid surface sits in a container and tilts and sloshes with gravity: tilt your phone (or move the mouse on desktop) and the body heaves toward the low side while waves rebound off the container walls, finished with a glassy sheen, caustic shimmer and specular crest sparkles. It reacts to the DEVICE TILT live and gracefully falls back to a synthetic rocking signal (and to the mouse position on desktop) when the sensor is unavailable, plus a deterministic synthetic demo for capture. Self-contained, zero dependencies, runs fully offline; privacy: all processing happens in-browser, nothing is uploaded.","gif":false},{"slug":"tilt-orbs","title":"Tilt Orbs — glowing balls that roll and settle under device tilt","vi":"","tier":"reactive","tags":["tilt","sensor","reactive","interactive","canvas2d","cosmos-ai-lab"],"summary":"A set of glowing orbs roll, collide and settle inside a Cosmos bowl, driven by a gravity vector {gx,gy}. Live, the vector comes from the device tilt (deviceorientation); it gracefully falls back to a synthetic oscillating tilt when the sensor is unavailable, and on desktop the mouse position becomes the tilt vector so it stays interactive. A deterministic synthetic signal drives the capture demo. Self-contained, zero-deps; privacy: all processing happens in-browser, nothing is uploaded.","gif":false},{"slug":"tilt-parallax","title":"Tilt Parallax — layered cosmic depth planes that shift with device tilt","vi":"","tier":"reactive","tags":["tilt","sensor","reactive","interactive","canvas2d","cosmos-ai-lab"],"summary":"Layered depth planes (deep stars, nebula clouds, mid stars, and a foreground ridge) each shift by a different amount with the tilt gravity vector {gx,gy}, giving a window-into-3D parallax as you tilt the phone. Live, the vector comes from the device tilt (deviceorientation); it gracefully falls back to a synthetic oscillating tilt when the sensor is unavailable, and on desktop the mouse position becomes the tilt vector so it stays interactive. A deterministic synthetic signal drives the capture demo. Self-contained, zero-deps; privacy: all processing happens in-browser, nothing is uploaded.","gif":false},{"slug":"tilt-sand","title":"Tilt Sand — device-tilt reactive pile of glowing sand grains that pour and settle toward gravity, building dunes","vi":"","tier":"reactive","tags":["tilt","sensor","reactive","interactive","canvas2d","cosmos-ai-lab"],"summary":"A pile of thousands of glowing amber sand grains pours and settles toward the gravity vector: tilt your phone (or move the mouse on desktop) and the sand flows that way, packing into dunes against the container walls. It reacts to the DEVICE TILT live and gracefully falls back to a synthetic rocking signal (and to the mouse position on desktop) when the sensor is unavailable, plus a deterministic synthetic demo for capture. Self-contained, zero dependencies, runs fully offline; privacy: all processing happens in-browser, nothing is uploaded.","gif":false},{"slug":"micviz-vortex","title":"Vortex — mic-reactive spiral whirlpool visualizer","vi":"","tier":"reactive","tags":["mic","audio-reactive","visualizer","music","interactive","canvas2d"],"summary":"A swirling spiral-vortex visualizer: each arm's point brightness and length ride the spectrum while the spin speed rides the overall level, tightening on beats into a glowing whirlpool. Reacts to the MICROPHONE live (gracefully falls back to a synthetic signal if the mic is unavailable/denied) plus a deterministic synthetic demo for capture. Self-contained, zero-deps.","gif":false},{"slug":"remix-cube3d","title":"Remix — 3D Cube Lattice you can retune and reskin live","vi":"","tier":"remix","tags":["remix","cube-lattice","generative","interactive","themeable","canvas2d"],"summary":"Remixable particle 3D cube lattice: a regular grid of glowing points filling a cube, rotated around the X and Y axes and perspective-projected so it reads as a rotating, glowing box of points; depth maps to point size and brightness for a real volumetric feel. A live glass control panel retunes palette (brand theme tokens), shape, density, spread, speed and dot size in real time, plus a Layers knob that sets the lattice resolution; reskins to any brand colour in one click. Self-contained, zero dependencies; the ?auto=1 capture hides the panel and renders a deterministic seamless loop.","gif":false},{"slug":"remix-bloom","title":"Remix — Bloom you can retune and reskin live","vi":"","tier":"remix","tags":["remix","flower","generative","interactive","themeable","canvas2d"],"summary":"Remixable particle flower bloom: particles ride k-fold symmetric petals that unfurl — radius and petal spread are eased by sin(2π·u) so the blossom opens and closes around a bright dense center cluster while it rotates slowly. A live glass control panel changes palette (brand theme tokens), shape, density, speed, dot size and Petals in real time, and reskins to any brand colour in one click. Self-contained, zero deps; ?auto=1 hides the panel and renders a deterministic seamless loop.","gif":false},{"slug":"remix-burst","title":"Remix — Burst you can retune and reskin live","vi":"","tier":"remix","tags":["remix","burst","generative","interactive","themeable","canvas2d"],"summary":"Remixable particle radial burst / firework: particles shoot outward from centre along even angles, radius eased so they expand then loop and reset seamlessly with trails implied by size falloff. Live panel retunes palette / shape / density / speed / size plus a Rays knob; reskins to any brand colour in one click. Self-contained, zero-deps. ?auto=1 hides the panel and runs a deterministic seamless loop.","gif":false},{"slug":"remix-butterfly","title":"Remix — Butterfly Curve you can retune and reskin live","vi":"","tier":"remix","tags":["remix","butterfly","mandala","generative","interactive","themeable"],"summary":"Remixable particle butterfly curve: particles const grid=document.getElementById('grid'), empty=document.getElementById('empty');
let tier='all', q='';
function draw(){
  const qq=q.trim().toLowerCase();
  const list=DATA.filter(d=>(tier==='all'||d.tier===tier) &&
    (!qq || d.title.toLowerCase().includes(qq) || d.slug.includes(qq) || d.tags.join(' ').toLowerCase().includes(qq)));
  empty.style.display=list.length?'none':'block';
  grid.innerHTML=list.map(d=>`<div class="card" data-slug="${d.slug}">
    <div class="thumb">
      <img loading="lazy" src="./${d.slug}/thumb.png" alt="${d.title}">
      ${d.gif?`<img class="gif" loading="lazy" data-gif="./${d.slug}/${d.slug}.gif" alt="">`:''}
      <span class="badge ${d.tier}">${d.tier}</span>
    </div>
    <div class="meta"><h3>${d.title}</h3><p>${d.summary}</p></div>
  </div>`).join('');
}
// hover lazy-loads the GIF only on desktop pointers
grid.addEventListener('pointerover',e=>{
  const c=e.target.closest('.card'); if(!c||matchMedia('(hover:none)').matches)return;
  const g=c.querySelector('.gif'); if(g&&!g.src)g.src=g.dataset.gif;
});
grid.addEventListener('click',e=>{const c=e.target.closest('.card');if(c)open(c.dataset.slug)});
document.getElementById('pills').addEventListener('click',e=>{
  const b=e.target.closest('.pill'); if(!b)return;
  tier=b.dataset.tier; [...document.querySelectorAll('.pill')].forEach(p=>p.classList.toggle('on',p===b)); draw();
});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value;draw()});
// modal
const modal=document.getElementById('modal'),mf=document.getElementById('mframe');
let curSlug=null;
function open(slug){const d=DATA.find(x=>x.slug===slug);if(!d)return; curSlug=slug;
  document.getElementById('mt').textContent=d.title;
  document.getElementById('mtag').textContent=d.tier.toUpperCase()+' · '+d.tags.slice(0,4).join(', ');
  document.getElementById('mdesc').textContent=d.summary;
  document.getElementById('mopen').href='./'+slug+'/index.html';
  mf.src='./'+slug+'/index.html'; modal.classList.add('on');}
function close(){modal.classList.remove('on');mf.src='about:blank';}
// Copy a ready-to-paste iframe embed snippet for the open effect.
const membed=document.getElementById('membed');
membed.onclick=()=>{ if(!curSlug)return;
  const snip='<iframe src="cosmos-fx/'+curSlug+'/index.html" style="border:0;width:100%;height:100%" loading="lazy" title="'+curSlug+'"></iframe>';
  const done=()=>{const o=membed.textContent;membed.textContent='✓ Copied';setTimeout(()=>membed.textContent=o,1300);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(snip).then(done).catch(done);}else{const ta=document.createElement('textarea');ta.value=snip;document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}ta.remove();done();}
};
document.getElementById('mclose').onclick=close;
modal.addEventListener('click',e=>{if(e.target===modal)close()});
addEventListener('keydown',e=>{if(e.key==='Escape')close()});
draw();
</script>
</body></html>

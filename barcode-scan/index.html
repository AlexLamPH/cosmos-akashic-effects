<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Barcode Scan</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Barcode Scan — seeded barcode bars on a light panel with a red laser line sweeping top-to-bottom, glow + beep flash at the ends. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto');const LOOP=7000,TAU=6.28318;
let W,H,DPR,bars;
function rng(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rng(20260614);bars=[];let p=0;while(p<1){const w=0.006+r()*0.022;const ink=r()>0.42;bars.push({x:p,w,ink});p+=w;}}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // light panel
  const pw=W*0.78,ph=H*0.62,px=(W-pw)/2,py=(H-ph)/2;
  const g=x.createLinearGradient(0,py,0,py+ph);g.addColorStop(0,'#f4f1ea');g.addColorStop(1,'#d8d2c4');x.fillStyle=g;
  x.beginPath();x.roundRect(px,py,pw,ph,18*DPR);x.fill();
  // quiet margins + bar area
  const bx=px+pw*0.07,bw=pw*0.86,by=py+ph*0.12,bh=ph*0.62;
  x.fillStyle='#14110a';for(const b of bars){if(b.ink)x.fillRect(bx+b.x*bw,by,Math.max(1,b.w*bw-1*DPR),bh);}
  // digits row
  x.fillStyle='#2a241a';const dn=12,dy=by+bh+ph*0.13,dh=ph*0.1;
  for(let i=0;i<dn;i++){const r2=rng(91+i);const dx=bx+(i+0.3)*bw/dn;x.fillRect(dx,dy,bw/dn*0.5,dh*(0.55+r2()*0.45));}
  // sweep line y position (top->bottom over panel)
  x.globalCompositeOperation='lighter';
  const sy=py+(u%1)*ph;
  // glow band
  const lg=x.createLinearGradient(0,sy-18*DPR,0,sy+18*DPR);
  lg.addColorStop(0,'rgba(255,40,40,0)');lg.addColorStop(0.5,'rgba(255,60,60,0.55)');lg.addColorStop(1,'rgba(255,40,40,0)');
  x.fillStyle=lg;x.fillRect(px,sy-18*DPR,pw,36*DPR);
  // core laser line
  x.strokeStyle='rgba(255,90,90,0.95)';x.lineWidth=2.4*DPR;x.beginPath();x.moveTo(px,sy);x.lineTo(px+pw,sy);x.stroke();
  x.strokeStyle='rgba(255,200,200,0.85)';x.lineWidth=1*DPR;x.beginPath();x.moveTo(px,sy);x.lineTo(px+pw,sy);x.stroke();
  // beep flash near the ends of travel (u near 0 and 1)
  const edge=Math.min(u,1-u);const flash=Math.max(0,1-edge/0.06);
  if(flash>0){const fy=u<0.5?py:py+ph;const fg=x.createRadialGradient(px+pw,fy,0,px+pw,fy,pw*0.5);
    fg.addColorStop(0,'rgba(255,90,194,'+(0.7*flash)+')');fg.addColorStop(1,'rgba(255,90,194,0)');x.fillStyle=fg;
    x.beginPath();x.arc(px+pw,fy,pw*0.5,0,TAU);x.fill();
    x.fillStyle='rgba(70,180,255,'+(0.5*flash)+')';x.beginPath();x.arc(px+pw*0.04,fy,12*DPR+18*DPR*flash,0,TAU);x.fill();}
  // ambient violet vignette glow
  const vg=x.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(139,92,255,0)');vg.addColorStop(1,'rgba(139,92,255,0.18)');x.fillStyle=vg;x.fillRect(0,0,W,H);
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

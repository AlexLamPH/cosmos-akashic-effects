<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Constellation</title><style>*{margin:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Constellation — drifting nodes linked by proximity lines. Canvas 2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000,TAU=6.28318;
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154]];
let W,H,DPR,nodes=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rnd(11);nodes=[];for(let i=0;i<78;i++)nodes.push({bx:r()*W,by:r()*H,ax:(20+r()*60)*DPR,ay:(18+r()*54)*DPR,px:r()*TAU,py:r()*TAU,k1:1+(r()*2|0),k2:1+(r()*2|0),c:AC[r()*AC.length|0],s:(1.2+r()*1.8)*DPR});}
rs();addEventListener('resize',rs);
const DIST=()=>Math.min(W,H)*0.17;
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  const g=x.createRadialGradient(W/2,H*0.45,0,W/2,H*0.45,Math.max(W,H)*0.7);g.addColorStop(0,'#100a26');g.addColorStop(1,'#05030d');x.fillStyle=g;x.fillRect(0,0,W,H);
  const P=nodes.map(n=>({x:n.bx+n.ax*Math.sin(TAU*u*n.k1+n.px),y:n.by+n.ay*Math.sin(TAU*u*n.k2+n.py),c:n.c,s:n.s}));
  const D=DIST();x.globalCompositeOperation='lighter';
  for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){const dx=P[i].x-P[j].x,dy=P[i].y-P[j].y,d=Math.hypot(dx,dy);
    if(d<D){const a=(1-d/D)*0.5;const c=P[i].c;x.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${a})`;x.lineWidth=1*DPR;x.beginPath();x.moveTo(P[i].x,P[i].y);x.lineTo(P[j].x,P[j].y);x.stroke();}}
  for(const p of P){const c=p.c;const rg=x.createRadialGradient(p.x,p.y,0,p.x,p.y,p.s*3);rg.addColorStop(0,`rgba(${c[0]+50},${c[1]+50},${c[2]+50},0.95)`);rg.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);x.fillStyle=rg;x.beginPath();x.arc(p.x,p.y,p.s*3,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

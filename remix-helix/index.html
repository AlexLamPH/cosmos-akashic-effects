<!-- Cosmos Remix — Double Helix (DNA). A rotating intertwined double helix: two sine strands run
     along a vertical axis with cross-rungs between them; particles are parametrised by i along the
     helix and the whole structure spins with u. Depth (z, the front/back of the rotating helix)
     maps to particle size and brightness for a 3D feel. RE-TUNE live via the glass panel
     (palette / speed / density / scale / dot + Twists), re-skin to any brand colour, Copy the config.
     AUTO (?auto=1): panel hidden, deterministic seamless render(u) for GIF capture. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Remix — Double Helix</title><style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#05030d;font-family:-apple-system,"Segoe UI",system-ui,sans-serif}
canvas{display:block;position:fixed;inset:0}
#panel{position:fixed;top:16px;right:16px;width:228px;background:rgba(13,10,28,.72);backdrop-filter:blur(14px);
  border:1px solid rgba(139,92,255,.28);border-radius:16px;padding:15px 15px 13px;color:#e7e2f5;
  box-shadow:0 18px 50px rgba(0,0,0,.55);user-select:none;font-size:12px}
#panel h4{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:#9b8fd0;margin-bottom:11px;display:flex;align-items:center;gap:7px}
#panel h4 .d{width:8px;height:8px;border-radius:50%;background:var(--ac,#8b5cff);box-shadow:0 0 10px var(--ac,#8b5cff)}
.row{margin:9px 0}
.row label{display:flex;justify-content:space-between;color:#b9b0d8;margin-bottom:5px;font-size:11px}
.row label b{color:#fff;font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:3px;background:#2a2147;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--ac,#8b5cff);cursor:pointer;box-shadow:0 0 8px var(--ac,#8b5cff)}
.sw{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.sw button{width:26px;height:26px;border-radius:8px;border:2px solid transparent;cursor:pointer;padding:0}
.sw button.on{border-color:#fff}
.sh{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.sh button{flex:1;min-width:0;height:26px;border-radius:7px;border:1px solid rgba(139,92,255,.3);background:rgba(255,255,255,.05);color:#cfc7ea;font-size:13px;cursor:pointer;padding:0}
.sh button.on{background:var(--ac,#8b5cff);border-color:transparent;color:#fff}
.btns{display:flex;gap:8px;margin-top:13px}
.btns button{flex:1;font-size:11.5px;font-weight:600;color:#e7e2f5;background:rgba(255,255,255,.06);
  border:1px solid rgba(139,92,255,.3);border-radius:9px;padding:8px 6px;cursor:pointer;transition:.15s}
.btns button:hover{background:var(--ac,#8b5cff);border-color:transparent;color:#fff}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:rgba(13,10,28,.9);border:1px solid rgba(54,211,154,.5);color:#9af5c9;font-size:12.5px;
  padding:9px 16px;border-radius:10px;transition:.25s;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head>
<body><canvas id="c"></canvas>
<div id="panel">
  <h4><span class="d"></span>Cosmos Remix</h4>
  <div class="row"><label>Palette</label><div class="sw" id="sw"></div></div>
  <div class="row"><label>Shape</label><div class="sh" id="sh"></div></div>
  <div class="row"><label>Density <b id="vCount"></b></label><input type="range" id="rCount" min="250" max="2200" step="50"></div>
  <div class="row"><label>Spread <b id="vScale"></b></label><input type="range" id="rScale" min="4" max="16" step="0.5"></div>
  <div class="row"><label>Speed <b id="vSpeed"></b></label><input type="range" id="rSpeed" min="0" max="3" step="0.05"></div>
  <div class="row"><label>Dot size <b id="vDot"></b></label><input type="range" id="rDot" min="1" max="6" step="0.2"></div>
  <div class="row"><label>Twists <b id="vTwists"></b></label><input type="range" id="rTwists" min="1" max="8" step="0.5"></div>
  <div class="btns"><button id="bShuffle">↻ Seed</button><button id="bCopy">⧉ Copy</button></div>
</div>
<div id="toast">Copied your version ✓</div>
<script>
const cv=document.getElementById('c'), x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=12000;
// ---- theme tokens: each palette is a brand skin (accent + dot ramp) ----
const PALETTES={
  cosmos:{ac:'#8b5cff',cols:['#8b5cff','#46b4ff','#ff5cc2']},
  aurora:{ac:'#36d39a',cols:['#36d39a','#46b4ff','#e0b24a']},
  solaris:{ac:'#ff6a3d',cols:['#ff6a3d','#e0b24a','#ff5cc2']},
  nebula:{ac:'#ff5cc2',cols:['#ff5cc2','#8b5cff','#46b4ff']},
  mono:{ac:'#9fb4ff',cols:['#dfe6ff','#9fb4ff','#5f6f9f']}
};
// ---- PARAMS convention (the generic remix harness reads this) ----
const SHAPES=['dot','ruby','atom','star','crystal','spark'];
const P={count:1200,scale:8,speed:1,dot:2.6,palette:'cosmos',shape:'dot',twists:4};
window.__params=[
  {key:'count',label:'Density',min:250,max:2200},{key:'scale',label:'Spread',min:4,max:16},
  {key:'speed',label:'Speed',min:0,max:3},{key:'dot',label:'Dot size',min:1,max:6},
  {key:'twists',label:'Twists',min:1,max:8},
  {key:'palette',label:'Palette',options:Object.keys(PALETTES)},
  {key:'shape',label:'Shape',options:SHAPES}];
window.setParam=(k,v)=>{P[k]=v; if(k==='palette')applyTheme();
  if(k==='shape'){const sh=document.getElementById('sh'); if(sh)[...sh.children].forEach(c=>c.classList.toggle('on',c.dataset.s===v));}};
// ---- particle shapes (cheap canvas paths) — Alex's "ruby / atom / crystal" idea ----
function drawShape(g,px,py,s,a,col){
  g.fillStyle=col;g.strokeStyle=col;
  if(P.shape==='dot'){g.beginPath();g.arc(px,py,s,0,7);g.fill();return;}
  if(P.shape==='atom'){g.lineWidth=Math.max(0.6,s*0.34);g.beginPath();g.arc(px,py,s*1.25,0,7);g.stroke();
    g.beginPath();g.arc(px,py,s*0.5,0,7);g.fill();return;}
  if(P.shape==='spark'){g.lineWidth=Math.max(0.6,s*0.4);g.beginPath();
    g.moveTo(px-s*1.6,py);g.lineTo(px+s*1.6,py);g.moveTo(px,py-s*1.6);g.lineTo(px,py+s*1.6);g.stroke();
    g.beginPath();g.arc(px,py,s*0.45,0,7);g.fill();return;}
  g.save();g.translate(px,py);g.rotate(a);g.beginPath();
  if(P.shape==='ruby'){ // faceted gem (rhombus)
    g.moveTo(0,-s*1.5);g.lineTo(s,0);g.lineTo(0,s*1.5);g.lineTo(-s,0);g.closePath();g.fill();
    g.globalAlpha*=0.5;g.fillStyle='#ffffff';g.beginPath();g.moveTo(0,-s*1.5);g.lineTo(s*0.4,-s*0.2);g.lineTo(-s*0.4,-s*0.2);g.closePath();g.fill();
  } else if(P.shape==='crystal'){ // elongated hex shard
    const h=s*1.7,w=s*0.7;g.moveTo(0,-h);g.lineTo(w,-h*0.3);g.lineTo(w,h*0.5);g.lineTo(0,h);g.lineTo(-w,h*0.5);g.lineTo(-w,-h*0.3);g.closePath();g.fill();
  } else if(P.shape==='star'){ // 5-point star
    for(let k=0;k<10;k++){const rr=k%2?s*0.5:s*1.5,an=k*Math.PI/5-Math.PI/2;const fx=Math.cos(an)*rr,fy=Math.sin(an)*rr;k?g.lineTo(fx,fy):g.moveTo(fx,fy);}g.closePath();g.fill();
  }
  g.restore();
}
const GOLD=Math.PI*(3-Math.sqrt(5));
function lerpHex(a,b,t){const p=h=>[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));const A=p(a),B=p(b);
  return '#'+A.map((v,i)=>Math.round(v+(B[i]-v)*t).toString(16).padStart(2,'0')).join('');}
function ramp(cols,t){const n=cols.length-1,s=Math.min(t*n,n-1e-4),i=Math.floor(s);return lerpHex(cols[i],cols[i+1],s-i);}
let DPR,W,H;function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
rs();addEventListener('resize',rs);
function frame(u){
  // ---- DOUBLE HELIX (DNA): two sine strands twisting up a vertical axis, rungs between them ----
  const pal=PALETTES[P.palette];
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  const cx=W/2,cy=H/2, base=Math.min(W,H)/620*DPR;
  const spin=u*Math.PI*2*P.speed;                 // whole helix rotates seamlessly with u
  const radius=P.scale*6*base;                     // helix tube radius (depth amplitude)
  const halfH=Math.min(W,H)*0.42;                  // vertical extent
  const STR=Math.max(2,Math.round(P.count*0.42));  // particles per strand
  const RUNG=Math.max(1,Math.round(P.count*0.16)); // cross-rungs
  const draw=(px,py,z,t,wob)=>{                     // z in [-1,1]: front bright/big, back dim/small
    if(px<-20||px>W+20||py<-20||py>H+20)return;
    const depth=0.5+0.5*z;                          // 0 back .. 1 front
    const sz=P.dot*base*(0.5+0.95*depth)*wob;
    x.globalAlpha=(0.22+0.78*depth)*wob;
    drawShape(x,px,py,Math.max(0.5,sz),spin+z*1.2,ramp(pal.cols,t));
  };
  // two strands, 180° apart in phase
  for(let s=0;s<2;s++){
    const phase=s*Math.PI;
    for(let i=0;i<STR;i++){
      const f=i/(STR-1);                            // 0..1 along the axis
      const ang=f*Math.PI*2*P.twists+spin+phase;    // twist + global spin
      const z=Math.sin(ang);                         // depth (front/back)
      const px=cx+Math.cos(ang)*radius;
      const py=cy-halfH+f*halfH*2;
      const t=(f+s*0.5)%1;                           // colour walks the ramp + strand offset
      const wob=0.85+0.15*Math.sin(u*Math.PI*2*2 - i*0.18); // gentle pulse
      draw(px,py,z,t,wob);
    }
  }
  // cross-rungs: connect the two strands with a dotted bar at intervals
  for(let r=0;r<RUNG;r++){
    const f=r/(RUNG-1||1);
    const ang=f*Math.PI*2*P.twists+spin;
    const z1=Math.sin(ang), z2=Math.sin(ang+Math.PI);
    const x1=cx+Math.cos(ang)*radius, x2=cx+Math.cos(ang+Math.PI)*radius;
    const py=cy-halfH+f*halfH*2;
    const SEG=5;
    for(let k=0;k<=SEG;k++){
      const m=k/SEG;
      const px=x1+(x2-x1)*m;
      const z=z1+(z2-z1)*m;
      const t=(f*0.8+0.1);
      draw(px,py,z,t,0.7);
    }
  }
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}
// ---- panel wiring (live mode) ----
function applyTheme(){const ac=PALETTES[P.palette].ac;document.documentElement.style.setProperty('--ac',ac);
  [...document.querySelectorAll('#sw button')].forEach(b=>b.classList.toggle('on',b.dataset.k===P.palette));}
function buildPanel(){
  const sw=document.getElementById('sw');
  Object.entries(PALETTES).forEach(([k,v])=>{const b=document.createElement('button');b.dataset.k=k;
    b.style.background=`linear-gradient(135deg,${v.cols[0]},${v.cols[2]})`;b.onclick=()=>{setParam('palette',k)};sw.appendChild(b);});
  const SHICON={dot:'●',ruby:'◆',atom:'⊛',star:'★',crystal:'❖',spark:'✦'};
  const sh=document.getElementById('sh');
  SHAPES.forEach(s=>{const b=document.createElement('button');b.textContent=SHICON[s]||'●';b.title=s;b.dataset.s=s;
    b.classList.toggle('on',s===P.shape);
    b.onclick=()=>{setParam('shape',s);[...sh.children].forEach(c=>c.classList.toggle('on',c.dataset.s===s));};sh.appendChild(b);});
  const bind=(id,key,vid,fmt)=>{const e=document.getElementById(id);e.value=P[key];
    document.getElementById(vid).textContent=fmt(P[key]);
    e.oninput=()=>{P[key]=parseFloat(e.value);document.getElementById(vid).textContent=fmt(P[key]);};};
  bind('rCount','count','vCount',v=>v|0);bind('rScale','scale','vScale',v=>v.toFixed(1));
  bind('rSpeed','speed','vSpeed',v=>v.toFixed(2)+'×');bind('rDot','dot','vDot',v=>v.toFixed(1));
  bind('rTwists','twists','vTwists',v=>v.toFixed(1));
  document.getElementById('bShuffle').onclick=()=>{const k=Object.keys(PALETTES);
    setParam('palette',k[(k.indexOf(P.palette)+1)%k.length]);
    P.twists=1+Math.round(Math.random()*7);document.getElementById('rTwists').value=P.twists;document.getElementById('vTwists').textContent=P.twists.toFixed(1);
    P.scale=4+Math.random()*12;document.getElementById('rScale').value=P.scale;document.getElementById('vScale').textContent=P.scale.toFixed(1);};
  document.getElementById('bCopy').onclick=()=>{const cfg=JSON.stringify({fx:'helix',...P});
    navigator.clipboard&&navigator.clipboard.writeText(cfg).catch(()=>{});
    const t=document.getElementById('toast');t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1400);};
  applyTheme();
}
if(AUTO){document.getElementById('panel').style.display='none';
  window.__seek=t=>frame(((t%LOOP)+LOOP)%LOOP/LOOP);window.__seek(0);window.__ready=true;}
else{buildPanel();const s=performance.now();(function l(n){frame((((n-s)%LOOP)+LOOP)%LOOP/LOOP);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

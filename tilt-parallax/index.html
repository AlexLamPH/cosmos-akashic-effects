<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Tilt Parallax</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);font:600 13px/1.4 system-ui,sans-serif;color:#cdd2ff;
background:rgba(20,14,40,.55);padding:7px 14px;border-radius:20px;backdrop-filter:blur(6px);pointer-events:none;transition:opacity 1s;z-index:2}</style></head>
<body><canvas id="c"></canvas><div id="hint">📱 tap to enable motion</div><script>
// Cosmos Tilt Parallax — layered cosmic depth planes (deep stars, nebula, mid stars, foreground motes) that shift by
// different amounts with the tilt gravity vector {gx,gy}, a window-into-3D. SOURCE: deviceorientation / mouse / synthSig.
const cv=document.getElementById('c'),x=cv.getContext('2d'),hint=document.getElementById('hint');
const AUTO=new URLSearchParams(location.search).has('auto'); const TAU=6.28318530718,LOOP=9000;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let W,H,DPR,layers,nebulae;
function build(){
  // depth: 0 = far (small shift), 1 = near (big shift)
  layers=[];
  const defs=[ {n:160,depth:0.10,col:[150,160,220],sz:[0.6,1.4],seed:11},
               {n:90, depth:0.28,col:[200,210,255],sz:[0.8,2.0],seed:23},
               {n:46, depth:0.55,col:[255,240,210],sz:[1.2,3.0],seed:37},
               {n:24, depth:0.95,col:[180,150,255],sz:[2.0,5.0],seed:53} ];
  for(const d of defs){const r=mulberry32(d.seed);const pts=[];
    for(let i=0;i<d.n;i++)pts.push({bx:r(),by:r(),s:(d.sz[0]+r()*(d.sz[1]-d.sz[0]))*DPR,tw:1+Math.floor(r()*3),ph:r()});
    layers.push({pts,depth:d.depth,col:d.col});}
  // nebula blobs (mid depth)
  const r=mulberry32(99);nebulae=[];const NC=[[120,70,200],[60,120,210],[200,80,160],[70,180,170]];
  for(let i=0;i<5;i++)nebulae.push({bx:0.15+r()*0.7,by:0.15+r()*0.7,rad:(0.22+r()*0.2),depth:0.18+r()*0.22,c:NC[i%NC.length],ph:r()});
}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';build();}
rs();addEventListener('resize',rs);

// ---- signal SOURCE ----
let SIG={gx:0,gy:0}; let useSynth=AUTO, sensorOn=false;
function synthSig(u){return {gx:0.7*Math.sin(TAU*u), gy:0.7*Math.cos(TAU*2*u)};}
if(!AUTO){
  addEventListener('mousemove',e=>{ if(sensorOn)return; SIG.gx=(e.clientX/innerWidth*2-1); SIG.gy=(e.clientY/innerHeight*2-1); });
  function onTilt(e){ if(e.gamma==null&&e.beta==null)return; sensorOn=true; useSynth=false;
    SIG.gx=Math.max(-1,Math.min(1,(e.gamma||0)/45)); SIG.gy=Math.max(-1,Math.min(1,(e.beta||0)/45)); hint.style.opacity=0; }
  function enable(){ if(typeof DeviceOrientationEvent!=='undefined'&&DeviceOrientationEvent.requestPermission){
      DeviceOrientationEvent.requestPermission().then(s=>{ if(s==='granted') addEventListener('deviceorientation',onTilt); }).catch(()=>{});
    } else addEventListener('deviceorientation',onTilt); }
  addEventListener('pointerdown',enable,{once:true});
  setTimeout(()=>{ if(!sensorOn){ hint.textContent='🖱 move mouse to look around'; setTimeout(()=>hint.style.opacity=0,2200);} },3500);
}
// smoothed view offset so the parallax glides
let ox=0,oy=0;
// ---- render(SIG,t) ----
function render(sig,t){ const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ox+=(sig.gx-ox)*0.10; oy+=(sig.gy-oy)*0.10;
  const sky=x.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#070417');sky.addColorStop(0.55,'#0a0820');sky.addColorStop(1,'#05030d');
  x.fillStyle=sky;x.fillRect(0,0,W,H);
  x.save();x.globalCompositeOperation='lighter';
  const SHIFT=Math.min(W,H)*0.18;
  // nebula planes
  for(const nb of nebulae){const dxs=-ox*SHIFT*nb.depth, dys=-oy*SHIFT*nb.depth;
    const cx=nb.bx*W+dxs, cy=nb.by*H+dys, R=nb.rad*Math.min(W,H)*(0.9+0.1*Math.sin(TAU*(u+nb.ph)));
    const c=nb.c;const g=x.createRadialGradient(cx,cy,0,cx,cy,R);
    g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0.16)`);g.addColorStop(0.5,`rgba(${c[0]},${c[1]},${c[2]},0.06)`);
    g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);x.fillStyle=g;x.beginPath();x.arc(cx,cy,R,0,TAU);x.fill();}
  // star planes — deeper layers shift less, near layers shift more (parallax)
  for(const L of layers){const dxs=-ox*SHIFT*L.depth, dys=-oy*SHIFT*L.depth;const c=L.col;
    for(const p of L.pts){const px=p.bx*W+dxs, py=p.by*H+dys;
      let sx=((px%W)+W)%W, sy=((py%H)+H)%H;
      const tw=0.4+0.6*(0.5+0.5*Math.sin(TAU*(u*p.tw+p.ph)));
      const g=x.createRadialGradient(sx,sy,0,sx,sy,p.s*2.6);
      g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${(0.85*tw).toFixed(3)})`);
      g.addColorStop(0.4,`rgba(${c[0]},${c[1]},${c[2]},${(0.4*tw).toFixed(3)})`);
      g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
      x.fillStyle=g;x.beginPath();x.arc(sx,sy,p.s*2.6,0,TAU);x.fill();}}
  // foreground silhouette ridge — moves most, gives window-into-3D framing
  const fdx=-ox*SHIFT*1.3, fdy=-oy*SHIFT*1.3;
  x.globalCompositeOperation='source-over';
  x.fillStyle='rgba(4,2,12,0.92)';x.beginPath();x.moveTo(0,H);
  const r=mulberry32(5);let first=true;
  for(let i=0;i<=14;i++){const bx=i/14*W*1.2-W*0.1+fdx*0.4;
    const peak=H*(0.78-0.16*r()) + fdy*0.4 + Math.sin(TAU*(u+i*0.3))*6*DPR;
    if(first){x.lineTo(bx,peak);first=false;}else x.lineTo(bx,peak);}
  x.lineTo(W+200,H);x.lineTo(0,H);x.closePath();x.fill();
  x.restore();
}
if(AUTO){ window.__seek=t=>render(synthSig(((t%LOOP)+LOOP)%LOOP/LOOP),t); render(synthSig(0),0); window.__ready=true; }
else { let s=performance.now(); (function l(n){ const t=n-s, u=((t%LOOP)+LOOP)%LOOP/LOOP;
  const sig = useSynth ? synthSig(u) : SIG; render(sig,t); requestAnimationFrame(l); })(performance.now()); }
</script></body></html>

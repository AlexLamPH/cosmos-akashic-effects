<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmos Avatar Select — agent showcase</title>
<style>
  /* ===== Cosmos Avatar Select =====
     Valorant-agent-style picker: a roster of avatar cells on the right; click one
     and the hero on the left reveals that avatar with a 3D entrance, a highlight
     sweep, glow, and a theme cross-fade. Custom cursor grows over interactive cells.
     One logo, six Cosmos "agents" (themes). Vanilla, no deps, runs offline.        */

  :root {
    --accent: #8b5cff;
    --hue: 0deg;            /* per-agent hue cast on the rainbow logo */
    --bg0: #120a26;
    --bg1: #05030d;
    --rx: 0deg; --ry: 0deg; /* hero tilt (cursor over hero, live only)  */
    --ent: 1;               /* entrance progress 0..1                    */
    --sweep: 1;             /* highlight sweep 0..1                      */
    --glow: 0;
    --ink: #ece9f7; --muted: #948cb4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; background: #05030d;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif; cursor: none;
  }

  .app { position: fixed; inset: 0; display: flex; }

  /* themed deep-space backdrop (cross-fades between agents) */
  .bg {
    position: absolute; inset: 0; transition: background .55s ease;
    background:
      radial-gradient(90% 80% at 32% 42%, var(--bg0) 0%, var(--bg1) 55%, #03020a 100%);
  }
  .bg::after {                      /* accent aura that follows the selected agent */
    content: ""; position: absolute; inset: 0; transition: background .55s ease;
    background: radial-gradient(46% 52% at 33% 44%,
      color-mix(in srgb, var(--accent) 32%, transparent), transparent 70%);
    mix-blend-mode: screen; opacity: .9;
  }
  .stars { position: absolute; inset: 0; pointer-events: none; }

  /* ---------------- HERO (left) ---------------- */
  .hero { position: relative; flex: 1; perspective: 1100px; perspective-origin: 50% 42%; }

  .stage {
    position: absolute; left: 0; right: 0; top: 6%; height: 64%;
    display: grid; place-items: center;
  }
  .avatar {
    position: relative; width: 360px; height: 360px;
    transform-style: preserve-3d;
    transform: rotateX(var(--rx)) rotateY(var(--ry));
    transition: transform .1s linear;
  }
  .layer { position: absolute; inset: 0; display: grid; place-items: center; }
  .layer img { filter: hue-rotate(var(--hue)); transition: filter .55s ease; }

  .halo { transform: translateZ(-80px) scale(1.16); filter: blur(34px) saturate(1.2);
          opacity: calc(.4 + var(--glow)*.35); }
  .halo img { width: 80%; }

  /* the logo: entrance (scale+rotateY+fade) + gentle idle handled via --ent / JS */
  .mark { transform: translateZ(0); }
  .mark img {
    width: 88%;
    transform: scale(calc(.82 + var(--ent)*.18)) rotateY(calc((1 - var(--ent)) * -26deg));
    opacity: var(--ent);
    filter: hue-rotate(var(--hue))
            drop-shadow(0 22px 46px color-mix(in srgb, var(--accent) 55%, transparent))
            drop-shadow(0 0 30px rgba(255,255,255, calc(.08 + var(--glow)*.16)));
  }
  .sheen {
    transform: translateZ(60px); pointer-events: none; border-radius: 50%;
    background: radial-gradient(40% 32% at 38% 30%, rgba(255,255,255,.18), transparent 70%);
    mix-blend-mode: screen; opacity: var(--ent);
  }
  /* highlight sweep band that crosses the avatar on reveal */
  .sweep {
    position: absolute; inset: -10% -30%; transform: translateZ(70px);
    pointer-events: none; overflow: hidden; border-radius: 50%;
  }
  .sweep::before {
    content: ""; position: absolute; top: -20%; bottom: -20%; width: 36%;
    left: calc(-40% + var(--sweep) * 150%);
    background: linear-gradient(105deg, transparent, rgba(255,255,255,.5), transparent);
    filter: blur(7px); opacity: calc((1 - var(--sweep)) * var(--sweep) * 4);
    mix-blend-mode: screen;
  }

  /* nameplate (bottom-left), slides up on reveal */
  .plate {
    position: absolute; left: 7%; bottom: 9%; max-width: 60%;
    transform: translateY(calc((1 - var(--ent)) * 26px)); opacity: var(--ent);
  }
  .plate .idx { font-size: 13px; letter-spacing: .5em; color: var(--accent); font-weight: 700; }
  .plate .name {
    font-size: 68px; font-weight: 800; letter-spacing: .03em; line-height: .95;
    color: var(--ink); text-transform: uppercase;
    text-shadow: 0 6px 40px color-mix(in srgb, var(--accent) 45%, transparent);
  }
  .plate .role {
    margin-top: 10px; font-size: 14px; letter-spacing: .32em; text-transform: uppercase;
    color: var(--muted);
  }
  .plate .desc { margin-top: 12px; font-size: 13.5px; line-height: 1.5; color: #b9b2d4; max-width: 360px; }
  .btn {
    margin-top: 18px; padding: 12px 30px; border-radius: 999px;
    font-size: 13px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink); background: color-mix(in srgb, var(--accent) 22%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 55%, transparent);
    transition: background .25s, box-shadow .25s, transform .2s;
  }
  .btn.hot {
    background: color-mix(in srgb, var(--accent) 42%, transparent);
    box-shadow: 0 10px 34px color-mix(in srgb, var(--accent) 45%, transparent);
    transform: translateY(-1px);
  }

  /* ---------------- ROSTER (right) ---------------- */
  .roster {
    width: 252px; flex: none; position: relative; z-index: 3;
    padding: 26px 20px; display: flex; flex-direction: column; gap: 12px;
    background: linear-gradient(90deg, transparent, rgba(8,5,18,.55) 30%, rgba(8,5,18,.78));
    border-left: 1px solid rgba(255,255,255,.06);
  }
  .roster h2 {
    font-size: 11px; letter-spacing: .42em; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-bottom: 4px;
  }
  .cell {
    position: relative; display: flex; align-items: center; gap: 13px;
    padding: 10px 12px; border-radius: 14px; cursor: none;
    background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05);
    transition: background .22s, border-color .22s, transform .22s;
  }
  .cell:hover { background: rgba(255,255,255,.07); transform: translateX(-3px); }
  .cell.sel {
    background: color-mix(in srgb, var(--cell-accent) 20%, rgba(255,255,255,.03));
    border-color: color-mix(in srgb, var(--cell-accent) 65%, transparent);
  }
  .cell .ic {
    width: 46px; height: 46px; flex: none; border-radius: 11px;
    display: grid; place-items: center; overflow: hidden;
    background: radial-gradient(circle at 50% 45%,
      color-mix(in srgb, var(--cell-accent) 30%, #0c0820), #07050f);
    border: 1px solid color-mix(in srgb, var(--cell-accent) 40%, transparent);
  }
  .cell .ic img { width: 84%; filter: hue-rotate(var(--cell-hue)); }
  .cell .meta { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .cell .cn { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: .04em; }
  .cell .cr { font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  .cell .bar {
    position: absolute; left: 0; top: 14%; bottom: 14%; width: 3px; border-radius: 3px;
    background: var(--cell-accent); opacity: 0; transition: opacity .22s;
  }
  .cell.sel .bar { opacity: 1; }

  /* custom cursor */
  .cursor-ring, .cursor-dot {
    position: fixed; top: 0; left: 0; pointer-events: none; border-radius: 50%;
    transform: translate(-50%, -50%); z-index: 60; will-change: transform, width, height;
  }
  .cursor-ring {
    width: 28px; height: 28px; border: 1.5px solid rgba(220,212,255,.8);
    box-shadow: 0 0 14px color-mix(in srgb, var(--accent) 55%, transparent);
    transition: width .2s, height .2s, border-color .2s, background .2s;
  }
  .cursor-ring.grow {
    width: 58px; height: 58px; border-color: #fff;
    background: radial-gradient(circle, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%);
  }
  .cursor-dot { width: 6px; height: 6px; background: #f1ecff; box-shadow: 0 0 10px rgba(225,218,255,.9); }
</style>
</head>
<body>
  <div class="app">
    <div class="bg" id="bg"></div>
    <canvas class="stars" id="stars"></canvas>

    <div class="hero" id="hero">
      <div class="stage">
        <div class="avatar" id="avatar">
          <div class="layer halo"><img src="./cosmos-logo.png" alt=""></div>
          <div class="layer mark"><img src="./cosmos-logo.png" alt="avatar"></div>
          <div class="layer sheen"></div>
          <div class="sweep"></div>
        </div>
      </div>
      <div class="plate">
        <div class="idx" id="idx">AGENT // 01</div>
        <div class="name" id="name">PHANTOM</div>
        <div class="role" id="role">Stealth · Recon</div>
        <div class="desc" id="desc"></div>
        <button class="btn" id="select">Triệu hồi</button>
      </div>
    </div>

    <div class="roster" id="roster">
      <h2>Avatars</h2>
      <!-- cells injected by JS -->
    </div>
  </div>

  <div class="cursor-ring" id="ring"></div>
  <div class="cursor-dot" id="dot"></div>

<script>
// ============================================================================
//  Cosmos Avatar Select — click a roster cell, the hero reveals that agent with
//  a 3D entrance + highlight sweep + theme cross-fade. Vanilla, no deps, offline.
//  ?auto=1 cycles the roster deterministically for a seamless GIF (window.__seek).
// ============================================================================

const AGENTS = [
  { name:'PHANTOM', role:'Stealth · Recon',  accent:'#8b5cff', hue:0,
    desc:'Bóng tối Phantom — di chuyển không tiếng động, vén màn dữ liệu trước khi đối thủ kịp thấy.' },
  { name:'SOLARIS', role:'Burst · Ignite',   accent:'#ff6a3d', hue:325,
    desc:'Ngọn lửa Solaris — bùng nổ tức thời, thiêu rụi mọi điểm nghẽn trên đường tới đích.' },
  { name:'SACRED',  role:'Ward · Restore',   accent:'#e0b24a', hue:40,
    desc:'Ánh vàng Sacred — dựng vòng bảo hộ, hồi phục và giữ nhịp cho cả đội hình.' },
  { name:'AURORA',  role:'Flux · Bloom',     accent:'#36d39a', hue:95,
    desc:'Cực quang Aurora — uốn dòng năng lượng, nở rộ những lối đi không tưởng.' },
  { name:'COSMIC',  role:'Drift · Scan',     accent:'#46b4ff', hue:165,
    desc:'Thiên hà Cosmic — quét toàn cảnh, đọc vị mọi chuyển động trong vùng phủ sóng.' },
  { name:'NEBULA',  role:'Lure · Charm',     accent:'#ff5cc2', hue:255,
    desc:'Tinh vân Nebula — quyến rũ và dẫn dụ, bẻ cong ý chí đối phương theo ý mình.' },
];

const root = document.documentElement;
const elBg = document.getElementById('bg');
const elIdx = document.getElementById('idx'), elName = document.getElementById('name');
const elRole = document.getElementById('role'), elDesc = document.getElementById('desc');
const rosterEl = document.getElementById('roster');
const btn = document.getElementById('select'), hero = document.getElementById('hero');
const avatar = document.getElementById('avatar');
const ring = document.getElementById('ring'), dot = document.getElementById('dot');

const AUTO = new URLSearchParams(location.search).has('auto');
const N = AGENTS.length;

// build roster cells
const cells = AGENTS.map((a, i) => {
  const c = document.createElement('div');
  c.className = 'cell'; c.dataset.i = i;
  c.style.setProperty('--cell-accent', a.accent);
  c.style.setProperty('--cell-hue', a.hue + 'deg');
  c.innerHTML = `<span class="bar"></span>
    <span class="ic"><img src="./cosmos-logo.png" alt=""></span>
    <span class="meta"><span class="cn">${a.name}</span><span class="cr">${a.role}</span></span>`;
  rosterEl.appendChild(c);
  return c;
});

let current = -1, switchT = 0;
function dec2(i){ return String(i+1).padStart(2,'0'); }

function setAgent(i, t) {                      // discrete change (text + theme)
  if (i === current) return;
  current = i; switchT = t;
  const a = AGENTS[i];
  root.style.setProperty('--accent', a.accent);
  root.style.setProperty('--hue', a.hue + 'deg');
  // theme bg: dark wash of the accent
  root.style.setProperty('--bg0', shade(a.accent, .16));
  root.style.setProperty('--bg1', '#05030d');
  elIdx.textContent = 'AGENT // ' + dec2(i);
  elName.textContent = a.name; elRole.textContent = a.role; elDesc.textContent = a.desc;
  cells.forEach((c, k) => c.classList.toggle('sel', k === i));
}
// mix a hex toward dark by amount (0..1 keep)
function shade(hex, keep){
  const n = parseInt(hex.slice(1),16), r=n>>16, g=(n>>8)&255, b=n&255;
  const f = v => Math.round(v*keep + 6*(1-keep));
  return `rgb(${f(r)},${f(g)},${f(b)})`;
}

const easeOut = x => 1 - Math.pow(1 - x, 3);
function reveal(t){                            // continuous reveal driven by time
  const tsw = t - switchT;
  root.style.setProperty('--ent', easeOut(Math.min(tsw/600, 1)).toFixed(3));
  root.style.setProperty('--sweep', Math.min(tsw/650, 1).toFixed(3));
  root.style.setProperty('--glow', (0.5 + 0.5*Math.sin(t*0.0015)).toFixed(3));
}

// ---- starfield ----
const sc = document.getElementById('stars'), sx = sc.getContext('2d');
let W,H,DPR,stars=[];
function resize(){
  DPR=Math.min(devicePixelRatio||1,2); W=sc.width=innerWidth*DPR; H=sc.height=innerHeight*DPR;
  sc.style.width=innerWidth+'px'; sc.style.height=innerHeight+'px'; stars=[];
  for(let i=0;i<140;i++) stars.push({x:Math.random()*W,y:Math.random()*H,
    r:(Math.random()*1.2+0.3)*DPR,tw:Math.random()*6.28,sp:0.4+Math.random()*1.2});
}
resize(); addEventListener('resize',resize);
function drawStars(t){
  sx.clearRect(0,0,W,H);
  for(const s of stars){ const tw=0.4+0.6*Math.abs(Math.sin(t*0.001*s.sp+s.tw));
    sx.globalAlpha=tw; sx.fillStyle='#cdd6ff'; sx.beginPath(); sx.arc(s.x,s.y,s.r,0,6.283); sx.fill(); }
  sx.globalAlpha=1;
}

function cursor(px,py,grow){
  ring.style.transform=`translate(${px}px,${py}px) translate(-50%,-50%)`;
  dot.style.transform =`translate(${px}px,${py}px) translate(-50%,-50%)`;
  ring.classList.toggle('grow',grow);
}

// ============================ AUTO (capture) ============================
if (AUTO) {
  const DWELL = 1200, LOOP = N * DWELL;
  function cellCenter(i){ const r = cells[i].getBoundingClientRect(); return {x:r.left+r.width/2,y:r.top+r.height/2}; }
  window.__seek = function(t){
    const tt = ((t % LOOP) + LOOP) % LOOP;
    const i = Math.floor(tt / DWELL) % N;
    setAgent(i, i*DWELL);                       // switchT aligned to dwell start
    reveal(tt);
    // cursor: travel from previous cell to current within first 320ms, then rest on it
    const tsw = tt - i*DWELL;
    const prev = (i-1+N)%N;
    const trav = easeOut(Math.min(tsw/320,1));
    const a = cellCenter(prev), b = cellCenter(i);
    const px = a.x + (b.x-a.x)*trav, py = a.y + (b.y-a.y)*trav;
    // hero stays cursor-neutral in auto (cursor is on the roster); gentle seamless idle
    const u = tt/LOOP;
    root.style.setProperty('--ry', (8*Math.sin(4*Math.PI*u)).toFixed(2)+'deg');
    root.style.setProperty('--rx', (3*Math.sin(2*Math.PI*u)).toFixed(2)+'deg');
    cursor(px, py, true);                        // ring grown over the cell
    btn.classList.remove('hot');
    drawStars(t);
  };
  setAgent(0,0); window.__seek(0); window.__ready = true;

// ============================ LIVE (interactive) ============================
} else {
  let tx=innerWidth*0.4, ty=innerHeight*0.5, cxp=tx, cyp=ty, grow=false, overHero=false;
  addEventListener('pointermove',e=>{ tx=e.clientX; ty=e.clientY; });
  cells.forEach(c=>{
    c.addEventListener('pointerenter',()=>grow=true);
    c.addEventListener('pointerleave',()=>grow=false);
    c.addEventListener('click',()=> setAgent(+c.dataset.i, performance.now()-start));
  });
  btn.addEventListener('pointerenter',()=>{grow=true; btn.classList.add('hot');});
  btn.addEventListener('pointerleave',()=>{grow=false; btn.classList.remove('hot');});
  hero.addEventListener('pointerenter',()=>overHero=true);
  hero.addEventListener('pointerleave',()=>overHero=false);

  const start = performance.now();
  setAgent(0, 0);
  (function loop(now){
    const t = now - start;
    reveal(t);
    // hero tilts toward cursor only while hovering the hero area
    const targRy = overHero ? ((tx/innerWidth-0.5)*2)*12 : 0;
    const targRx = overHero ? (-(ty/innerHeight-0.5)*2)*9 : 0;
    const cur = k => parseFloat(getComputedStyle(root).getPropertyValue(k))||0;
    root.style.setProperty('--ry', (cur('--ry')+(targRy-cur('--ry'))*0.1).toFixed(2)+'deg');
    root.style.setProperty('--rx', (cur('--rx')+(targRx-cur('--rx'))*0.1).toFixed(2)+'deg');
    cxp+=(tx-cxp)*0.2; cyp+=(ty-cyp)*0.2;
    cursor(cxp,cyp,grow); dot.style.transform=`translate(${tx}px,${ty}px) translate(-50%,-50%)`;
    drawStars(t);
    requestAnimationFrame(loop);
  })(performance.now());
}
</script>
</body>
</html>

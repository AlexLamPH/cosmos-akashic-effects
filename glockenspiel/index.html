<!-- Cosmos Glockenspiel: a row of 13 tuned metal bars. LIVE: click a bar or press A,W,S,E,D,F,T,G,Y,H,U,J,K to STRIKE a bright metallic note (sine fundamental + high inharmonic partials, ~3ms attack, ~0.8s decay) through master gain ~0.2; the struck bar flashes + bounces and a mallet bobs. AUTO: a seeded cheerful melody plays SILENTLY — struck bars flash/bounce in sequence with decay tails, a mallet bobs toward the current bar — pure function of u, loops seamlessly. Frame 0 mid-melody with a bar struck. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Glockenspiel</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.top{display:flex;align-items:center;gap:12px}
.title{font-size:13px;font-weight:680;color:#dfe9ff;letter-spacing:1px}
.dot{width:8px;height:8px;border-radius:50%;background:#46b4ff;box-shadow:0 0 10px #46b4ff}
.hint{font-size:11.5px;color:#6f7da0;transition:opacity .35s}
.frame{position:relative;width:700px;height:340px;border-radius:20px;
  background:linear-gradient(160deg,#141026,#0c0a1c);
  border:1px solid rgba(120,150,255,.14);
  box-shadow:0 30px 70px rgba(0,0,0,.6),inset 0 1px 10px rgba(140,170,255,.12)}
svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
</style></head>
<body><div id="stage">
  <div class="top"><span class="dot"></span><span class="title">GLOCKENSPIEL</span>
    <span class="hint" id="hint">▶ click a bar / press a key</span></div>
  <div class="frame" id="frame"><svg id="svg" viewBox="0 0 700 340"></svg></div>
</div>
<script>
const LOOP=6400, N=80;
const SVGNS="http://www.w3.org/2000/svg";
const svg=document.getElementById('svg'),hintE=document.getElementById('hint');
const TAU=Math.PI*2, BASE=523.25; // C5 — bright, glockenspiel register
// C major diatonic across ~2 octaves: 13 bars
const SCALE=[0,2,4,5,7,9,11,12,14,16,17,19,21];
const NB=SCALE.length; // 13
const KEYS=['a','w','s','e','d','f','t','g','y','h','u','j','k'];
// pitch hue: low=violet -> high=cosmic blue/aurora
const HUES=['#8b5cff','#7d6bff','#6f7bff','#5f8cff','#52a0ff','#46b4ff','#3fc6e8','#3ad3c6','#36d39a','#6ad77f','#a6d65f','#d9c24a','#ffb04a'];
// bar geometry: long/low on left, short/high on right
const X0=42, BW=44, GAP=50, TOPY=120, MAXH=150, MINH=86;
const bars=[];
for(let i=0;i<NB;i++){
  const h=MAXH-(MAXH-MINH)*(i/(NB-1));
  const x=X0+i*GAP, y=TOPY+(MAXH-h)/2;
  const r=document.createElementNS(SVGNS,'rect');
  r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',BW);r.setAttribute('height',h);
  r.setAttribute('rx',7);r.setAttribute('fill',HUES[i]);
  r.setAttribute('stroke','rgba(255,255,255,.5)');r.setAttribute('stroke-width','1');
  svg.appendChild(r);
  // two mounting pegs
  [y+h*0.18,y+h*0.82].forEach(py=>{const c=document.createElementNS(SVGNS,'circle');
    c.setAttribute('cx',x+BW/2);c.setAttribute('cy',py);c.setAttribute('r','3.2');
    c.setAttribute('fill','#0a0816');c.setAttribute('opacity','.6');svg.appendChild(c);});
  bars.push({x,y,h,w:BW,cx:x+BW/2,semi:SCALE[i],key:KEYS[i],el:r,baseY:y});
}
// mallet
const mallet=document.createElementNS(SVGNS,'g');
mallet.innerHTML='<line id="mstick" x1="0" y1="-46" x2="0" y2="0" stroke="#caa86a" stroke-width="4" stroke-linecap="round"/>'+
 '<circle id="mhead" cx="0" cy="0" r="11" fill="#e0b24a"/>';
svg.appendChild(mallet);
const mhead=mallet.querySelector('#mhead'), mstick=mallet.querySelector('#mstick');
// glow filter + defs
svg.insertAdjacentHTML('afterbegin',
 '<defs><filter id="gl" x="-80%" y="-80%" width="260%" height="260%">'+
 '<feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>');
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(7);
// seeded cheerful melody: STEPS notes, gentle stepwise motion favouring scale tones
const STEPS=16, SEQ=[]; let prev=4;
for(let i=0;i<STEPS;i++){let n;do{n=prev+(Math.floor(rnd()*5)-2);}while(n<0||n>=NB);SEQ.push(n);prev=n;}
const OFF=0.31; // frame-0 offset so a bar is mid-strike at u=0

function render(u){
  const fpos=((u+OFF)%1)*STEPS;
  // current step (for mallet target) — which bar is being hit right now
  const curStep=Math.floor(fpos)%STEPS;
  const curBar=SEQ[curStep];
  // fractional time into current step for mallet bob
  const frac=fpos-Math.floor(fpos);
  for(let i=0;i<NB;i++){
    let dt=99;
    for(let s=0;s<STEPS;s++){ if(SEQ[s]!==i)continue;
      let d=fpos-s; if(d<0)d+=STEPS; const t=d/STEPS*LOOP/1000; if(t<dt)dt=t; }
    const b=bars[i];
    const ring=Math.exp(-dt*3.4);                      // brightness decay
    const bounce=Math.exp(-dt*8)*Math.sin(dt*55)*6;    // quick vertical bounce
    b.el.setAttribute('y',(b.baseY+bounce).toFixed(2));
    b.el.setAttribute('filter',ring>0.05?'url(#gl)':'');
    b.el.setAttribute('opacity',(0.78+0.22*ring).toFixed(2));
    b.el.setAttribute('stroke','rgba(255,255,255,'+(0.45+0.55*ring).toFixed(2)+')');
    b.el.setAttribute('stroke-width',(1+ring*2.2).toFixed(2));
  }
  // mallet: a quick downward dip onto the current bar then lift
  const tb=bars[curBar];
  const dip=Math.sin(Math.min(frac,0.5)/0.5*Math.PI)*16; // bob down within first half of step
  const mx=tb.cx, my=tb.baseY-22+dip;
  mallet.setAttribute('transform','translate('+mx.toFixed(1)+','+my.toFixed(1)+')');
  mhead.setAttribute('filter', dip>11?'url(#gl)':'');
}

// ---- LIVE audio: bright metallic glockenspiel strike ----
let actx,master;
function audio(){if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain();master.gain.value=0.2;master.connect(actx.destination);}
  if(actx.state==='suspended')actx.resume();return actx;}
function strike(semi){const a=audio();const f=BASE*Math.pow(2,semi/12);const t=a.currentTime;
  const g=a.createGain();g.connect(master);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(1,t+0.003);   // fast attack, no click
  g.gain.exponentialRampToValueAtTime(0.0006,t+0.85);                     // ~0.8s metallic decay
  // sine fundamental + high inharmonic partials (metallic, not harmonic)
  const parts=[[1,1,0.85],[2.76,0.32,0.45],[5.40,0.18,0.30],[8.93,0.09,0.22]];
  parts.forEach(([h,amp,dec])=>{const o=a.createOscillator(),og=a.createGain();
    o.type='sine';o.frequency.value=f*h;
    og.gain.setValueAtTime(amp,t);og.gain.exponentialRampToValueAtTime(0.0004,t+0.85*dec);
    o.connect(og);og.connect(g);o.start(t);o.stop(t+0.9);});
  // tiny noise "tink" transient for the mallet contact
  const nb=a.createBuffer(1,256,a.sampleRate),nd=nb.getChannelData(0);
  for(let i=0;i<256;i++)nd[i]=(Math.random()*2-1)*(1-i/256);
  const ns=a.createBufferSource();ns.buffer=nb;const ng=a.createGain();ng.gain.value=0.12;
  ns.connect(ng);ng.connect(g);ns.start(t);}
function flash(b){b.el.setAttribute('filter','url(#gl)');b.el.setAttribute('stroke','#fff');
  b.el.setAttribute('stroke-width','3');}
function hideHint(){hintE.style.opacity='0';}
function hit(b){strike(b.semi);flash(b);hideHint();}
bars.forEach(b=>{b.el.style.cursor='pointer';
  b.el.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();hit(b);});});
document.getElementById('frame').addEventListener('pointerdown',()=>{audio();hideHint();});
const KEYMAP={};bars.forEach(b=>KEYMAP[b.key]=b);

const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else{
  window.addEventListener('keydown',e=>{const b=KEYMAP[e.key.toLowerCase()];if(b&&!e.repeat)hit(b);});
  const s=performance.now();
  (function l(n){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l);})(performance.now());
}
</script></body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Whack — bop glowing creatures before they hide</title>
<style>
  html,body{margin:0;height:100%;background:#0a0816;color:#e8e6f5;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  #frame{width:560px;height:620px;position:relative;background:#120e26;
    border-radius:22px;box-shadow:0 0 60px #8b5cff33,inset 0 0 0 1px #ffffff10;
    padding:14px;box-sizing:border-box;display:flex;flex-direction:column}
  #hud{display:flex;justify-content:space-between;align-items:center;
    padding:6px 12px 10px;font-weight:700;letter-spacing:.3px}
  #hud .lbl{font-size:12px;opacity:.6;font-weight:600;letter-spacing:1px}
  #score{color:#36d39a;font-size:26px}
  #time{color:#46b4ff;font-size:26px}
  #miss{color:#ff5cc2;font-size:26px}
  .stat{text-align:center}
  canvas{display:block;border-radius:16px;background:#0d0a1f;flex:1;cursor:crosshair}
  #bar{display:flex;gap:8px;justify-content:center;padding-top:12px}
  button{background:#1c1640;color:#c9c4ec;border:1px solid #ffffff18;
    border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  button:hover{background:#271c5c;color:#fff}
  #hint{text-align:center;font-size:11px;opacity:.45;padding-top:8px}
</style></head>
<body>
<div id="frame">
  <div id="hud">
    <div class="stat"><div class="lbl">SCORE</div><div id="score">0</div></div>
    <div class="stat"><div class="lbl">TIME</div><div id="time">30</div></div>
    <div class="stat"><div class="lbl">MISS</div><div id="miss">0</div></div>
  </div>
  <canvas id="cv" width="528" height="450"></canvas>
  <div id="bar"><button id="rs">Restart (R)</button></div>
  <div id="hint">Click a glowing mole — or keys Q W E / A S D / Z X C for the 9 holes</div>
</div>
<script>
const AUTO=new URLSearchParams(location.search).has('auto');
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const CW=cv.width,CH=cv.height;
const COLS=3,ROWS=3,HOLES=COLS*ROWS;
const COL={violet:'#8b5cff',cosmic:'#46b4ff',nebula:'#ff5cc2',aurora:'#36d39a',solaris:'#ff6a3d',sacred:'#e0b24a'};
const MOLECOL=[COL.aurora,COL.nebula,COL.cosmic,COL.solaris,COL.sacred,COL.violet];
const ROUND=30000;            // 30s round
const POP_MS=900;             // a mole stays up this long
const LOOP=12000;

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// hole centers
function holePos(i){const c=i%COLS,r=(i/COLS)|0;
  const gx=CW/(COLS+1),gy=CH/(ROWS+1);
  return {x:gx*(c+1),y:gy*(r+1)};}

// ---- deterministic pop schedule (seeded) ----
// Build a list of pops: {t0, hole, color}. Auto-player "whacks" each pop a bit after it appears.
function buildSchedule(seed){
  const rnd=mulberry32(seed); const pops=[]; let t=350; let last=-1;
  while(t<ROUND-400){
    let h; do{h=(rnd()*HOLES)|0;}while(h===last); last=h;
    const col=MOLECOL[(rnd()*MOLECOL.length)|0];
    const dur=POP_MS*(0.75+rnd()*0.5);
    // auto reaction: whack at 45-80% of the up time
    const react=t+dur*(0.45+rnd()*0.3);
    pops.push({t0:t,t1:t+dur,hole:h,color:col,whackAt:react});
    t+=dur*(0.55+rnd()*0.5);
  }
  return pops;
}
const SCHED=buildSchedule(0xC05);

// ---------- AUTO simulation: pure function of ms ----------
function simAuto(ms){
  let score=0,miss=0; const splashes=[]; let up=null;
  for(const p of SCHED){
    if(p.whackAt<=ms){ // was whacked
      score+=10;
      const age=ms-p.whackAt;
      if(age<320) splashes.push({hole:p.hole,age,color:p.color});
    } else if(p.t1<=ms){ // hid un-whacked → miss
      miss++;
    }
    if(p.t0<=ms && ms<p.whackAt){ // currently up (not yet whacked)
      const a=Math.min(1,(ms-p.t0)/120); // rise anim
      up={hole:p.hole,color:p.color,rise:a};
    }
  }
  const time=Math.max(0,Math.ceil((ROUND-ms)/1000));
  return {score,miss,time,up,splashes};
}

// ---------- LIVE state ----------
let live=null;
function initGame(){
  live={score:0,miss:0,t0:performance.now(),up:null,nextPop:0,splashes:[],over:false};
  scheduleLivePop(900);
}
function scheduleLivePop(delay){ live.nextPop=performance.now()+delay; }
function liveTick(now){
  if(live.over) return;
  const el=now-live.t0;
  if(el>=ROUND){ live.over=true; live.up=null; }
  // expire current mole as miss
  if(live.up && now>=live.up.expire){ live.miss++; live.up=null; scheduleLivePop(280+Math.random()*420); }
  // new pop
  if(!live.up && now>=live.nextPop && !live.over){
    let h=(Math.random()*HOLES)|0;
    live.up={hole:h,color:MOLECOL[(Math.random()*MOLECOL.length)|0],expire:now+POP_MS,t0:now};
  }
  // age splashes
  live.splashes=live.splashes.filter(s=>now-s.t<320);
}
function liveHit(hole){
  if(!live||live.over) return;
  if(live.up && live.up.hole===hole){
    live.score+=10; live.splashes.push({hole,t:performance.now(),color:live.up.color});
    live.up=null; scheduleLivePop(220+Math.random()*380); blip(660);
  } else { live.miss++; blip(160); }
}

// ---------- drawing ----------
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawHole(p){
  // hole shadow (ellipse)
  ctx.save();
  ctx.fillStyle='#070512';
  ctx.beginPath();ctx.ellipse(p.x,p.y+24,52,26,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ffffff10';ctx.lineWidth=2;ctx.stroke();
  ctx.restore();
}
function drawMole(p,color,rise){
  const r=40, cy=p.y+24-rise*64;
  ctx.save();
  // glow
  const g=ctx.createRadialGradient(p.x,cy,4,p.x,cy,r*1.9);
  g.addColorStop(0,color);g.addColorStop(.35,color+'cc');g.addColorStop(1,color+'00');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,cy,r*1.9,0,Math.PI*2);ctx.fill();
  // body
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(p.x,cy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffffdd';ctx.beginPath();ctx.arc(p.x,cy,r*0.55,0,Math.PI*2);ctx.fill();
  // eyes
  ctx.fillStyle='#120e26';
  ctx.beginPath();ctx.arc(p.x-13,cy-6,5.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(p.x+13,cy-6,5.5,0,Math.PI*2);ctx.fill();
  // mouth
  ctx.strokeStyle='#120e26';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(p.x,cy+8,10,0.15*Math.PI,0.85*Math.PI);ctx.stroke();
  ctx.restore();
}
function drawSplash(p,age,color){
  const k=age/320, R=20+k*46;
  ctx.save();ctx.globalAlpha=1-k;
  ctx.strokeStyle=color;ctx.lineWidth=5*(1-k)+1;
  ctx.beginPath();ctx.arc(p.x,p.y,R,0,Math.PI*2);ctx.stroke();
  // sparks
  for(let i=0;i<8;i++){const a=i/8*Math.PI*2;const r0=R*0.7,r1=R*1.15;
    ctx.beginPath();ctx.moveTo(p.x+Math.cos(a)*r0,p.y+Math.sin(a)*r0);
    ctx.lineTo(p.x+Math.cos(a)*r1,p.y+Math.sin(a)*r1);ctx.stroke();}
  // STAR / hit text
  ctx.globalAlpha=(1-k);ctx.fillStyle='#fff';ctx.font='bold 18px system-ui';
  ctx.textAlign='center';ctx.fillText('+10',p.x,p.y-R-6);
  ctx.restore();
}

function paint(s){
  ctx.clearRect(0,0,CW,CH);
  // bg vignette
  const bg=ctx.createRadialGradient(CW/2,CH/2,40,CW/2,CH/2,CH*0.8);
  bg.addColorStop(0,'#151033');bg.addColorStop(1,'#0d0a1f');
  ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);
  for(let i=0;i<HOLES;i++) drawHole(holePos(i));
  if(s.up){ drawMole(holePos(s.up.hole),s.up.color,s.up.rise!==undefined?s.up.rise:1); }
  for(const sp of s.splashes){ drawSplash(holePos(sp.hole),sp.age,sp.color); }
  if(s.over){
    ctx.fillStyle='#0a0816cc';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#e0b24a';ctx.font='bold 34px system-ui';ctx.textAlign='center';
    ctx.fillText('TIME!',CW/2,CH/2-10);
    ctx.fillStyle='#36d39a';ctx.font='bold 22px system-ui';
    ctx.fillText('Score '+s.score,CW/2,CH/2+26);
  }
  document.getElementById('score').textContent=s.score;
  document.getElementById('time').textContent=s.time;
  document.getElementById('miss').textContent=s.miss;
}

// ---------- AUTO draw ----------
function drawAt(ms){
  const s=simAuto(ms);
  // convert splash age to display, rise already 0..1
  const view={score:s.score,miss:s.miss,time:s.time,
    up:s.up?{hole:s.up.hole,color:s.up.color,rise:s.up.rise}:null,
    splashes:s.splashes.map(sp=>({hole:sp.hole,age:sp.age,color:sp.color})),over:ms>=ROUND};
  paint(view);
}

// ---------- LIVE render ----------
function liveView(now){
  const splashes=live.splashes.map(sp=>({hole:sp.hole,age:now-sp.t,color:sp.color}));
  let up=null;
  if(live.up){const rise=Math.min(1,(now-live.up.t0)/120);up={hole:live.up.hole,color:live.up.color,rise};}
  return {score:live.score,miss:live.miss,
    time:Math.max(0,Math.ceil((ROUND-(now-live.t0))/1000)),up,splashes,over:live.over};
}

// audio
let actx;function blip(f){if(AUTO)return;try{actx=actx||new(window.AudioContext||webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.frequency.value=f;o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.12);
  o.start();o.stop(actx.currentTime+.13);}catch(e){}}

// input
function holeFromXY(mx,my){
  for(let i=0;i<HOLES;i++){const p=holePos(i);
    const dx=mx-p.x,dy=my-(p.y-12);if(dx*dx+dy*dy<58*58)return i;}return -1;
}
const KEYMAP={q:0,w:1,e:2,a:3,s:4,d:5,z:6,x:7,c:8};
function wireLive(){
  cv.addEventListener('pointerdown',ev=>{
    const r=cv.getBoundingClientRect();
    const mx=(ev.clientX-r.left)*(CW/r.width),my=(ev.clientY-r.top)*(CH/r.height);
    const h=holeFromXY(mx,my); if(h>=0) liveHit(h); else { if(live&&!live.over){live.miss++;} }
  });
  window.addEventListener('keydown',ev=>{
    const k=ev.key.toLowerCase();
    if(k==='r'){initGame();return;}
    if(k in KEYMAP) liveHit(KEYMAP[k]);
  });
  document.getElementById('rs').addEventListener('click',initGame);
  function frame(){const now=performance.now();liveTick(now);paint(liveView(now));requestAnimationFrame(frame);}
  requestAnimationFrame(frame);
}

const T0OFF=3400; // start attract mid-round: moles popped, score>0, one up + fresh splash
if(AUTO){ window.__seek=t=>drawAt((((t+T0OFF)%LOOP)+LOOP)%LOOP); window.__seek(0); window.__ready=true; }
else { initGame(); wireLive(); }
</script>
</body></html>

<!-- Cosmos Meteor Shower — shooting stars streak diagonally with glowing tapered tails over a faint starfield -->
<!doctype html><meta charset=utf-8><title>Cosmos Meteor Shower</title>
<style>html,body{margin:0;height:100%;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const LOOP=7000, COOL=[[139,92,255],[70,180,255],[120,210,255],[224,178,74]];
let W,H,DPR,meteors=[],stars=[];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function setup(){
  DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;
  c.width=W*DPR;c.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);
  const r=mulberry32(20260614);
  const ang=Math.PI*0.78, dx=Math.cos(ang), dy=Math.sin(ang); // diagonal down-left->up? -> down-right
  const span=Math.hypot(W,H)*1.5;
  meteors=[];const N=26;
  for(let i=0;i<N;i++){
    const bright=r()<0.22;
    meteors.push({ph:r(), sx:-0.2*W+r()*1.4*W, sy:-0.3*H+r()*0.5*H,
      len:120+r()*180, dx, dy, span,
      col:COOL[(r()*COOL.length)|0], w:bright?2.4:1.2+r()*1.0,
      bright, dur:0.18+r()*0.16}); // fraction of loop the streak is visible
  }
  stars=[];for(let i=0;i<150;i++)stars.push({px:r()*W,py:r()*H,s:0.4+r()*1.2,tw:1+((r()*3)|0),tp:r(),b:0.3+r()*0.6});
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP, TAU=Math.PI*2;
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // faint starfield, twinkling on integer harmonics
  for(const s of stars){
    const tw=0.5+0.5*Math.sin(TAU*s.tw*u+s.tp*TAU);
    const a=s.b*(0.35+0.65*tw);
    x.fillStyle=`rgba(200,215,255,${a})`;
    x.beginPath();x.arc(s.px,s.py,s.s,0,TAU);x.fill();
  }
  // meteors: each on a seeded phase wrapping mod 1, streaking across then gone
  x.lineCap='round';
  for(const m of meteors){
    const p=(u+m.ph)%1;
    if(p>m.dur) continue;                 // dark gap between passes
    const f=p/m.dur;                      // 0..1 progress of this streak
    const trav=f*m.span;
    const hx=m.sx+m.dx*trav, hy=m.sy+m.dy*trav;
    const tx=hx-m.dx*m.len, ty=hy-m.dy*m.len;
    // fade in at start, out at end of its window
    const env=Math.sin(Math.PI*f);
    const[R,G,B]=m.col;
    // tapered glowing tail
    const g=x.createLinearGradient(tx,ty,hx,hy);
    g.addColorStop(0,`rgba(${R},${G},${B},0)`);
    g.addColorStop(0.7,`rgba(${R},${G},${B},${0.35*env})`);
    g.addColorStop(1,`rgba(${Math.min(255,R+80)},${Math.min(255,G+80)},${Math.min(255,B+80)},${0.85*env})`);
    x.strokeStyle=g;x.lineWidth=m.w*(m.bright?1.6:1);
    x.beginPath();x.moveTo(tx,ty);x.lineTo(hx,hy);x.stroke();
    // bright head glow
    const hg=x.createRadialGradient(hx,hy,0,hx,hy,m.bright?22:13);
    hg.addColorStop(0,`rgba(255,255,255,${0.9*env})`);
    hg.addColorStop(0.4,`rgba(${R},${G},${B},${0.5*env})`);
    hg.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=hg;x.beginPath();x.arc(hx,hy,m.bright?22:13,0,TAU);x.fill();
  }
}
addEventListener('resize',setup);setup();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

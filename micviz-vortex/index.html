<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos MicViz Vortex</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}
canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);font:600 13px/1 system-ui,sans-serif;
color:#9fdcff;background:rgba(8,18,40,.55);border:1px solid rgba(70,180,255,.4);padding:8px 14px;border-radius:20px;
letter-spacing:.04em;cursor:pointer;user-select:none;transition:opacity .8s;z-index:2}</style></head>
<body><canvas id="c"></canvas><div id="hint">🎤 enable mic</div><script>
// Cosmos MicViz Vortex — a swirling spiral whirlpool of points; arm brightness/length ride the
// spectrum and spin speed rides the level, tightening on beats into a glowing whirlpool.
// Reacts to the live mic, with a deterministic synthetic fallback.
const cv=document.getElementById('c'),x=cv.getContext('2d'),hint=document.getElementById('hint');
const LOOP=8800,TAU=6.283185307,N=64,ARMS=5,PTS=150;
const COL=['#46b4ff','#8b5cff','#ff5cc2','#36d39a','#ffffff'];
let W,H,DPR,cx,cy,RAD;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;RAD=Math.min(W,H)*0.47;}
rs();addEventListener('resize',rs);
// ---- deterministic synthetic spectrum (mulberry32 seeded once) ----
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rng=mb(0x5017E2),SEED=[];for(let i=0;i<N;i++)SEED.push({ph:rng()*TAU,sp:0.5+rng()*2.5,w:0.4+rng()*0.7});
function synthSpectrum(u){const spec=new Float32Array(N);const a=TAU*u;
  const f1=0.16+0.10*Math.sin(a+0.5),f2=0.46+0.18*Math.sin(a*2),f3=0.78+0.12*Math.sin(a*3+1.7);
  let lvl=0;
  for(let i=0;i<N;i++){const p=i/N,s=SEED[i];
    let v=Math.exp(-Math.pow((p-f1)/0.11,2))*0.95
         +Math.exp(-Math.pow((p-f2)/0.14,2))*0.7
         +Math.exp(-Math.pow((p-f3)/0.10,2))*0.55;
    v*=0.6+0.4*Math.sin(a*s.sp+s.ph);v=Math.max(0,v)*s.w;spec[i]=v;lvl+=v;}
  const beat=Math.pow(0.5+0.5*Math.cos(TAU*4*u),6);
  for(let i=0;i<10;i++)spec[i]+=beat*1.3*(1-i/10);
  lvl=Math.min(1,lvl/N*2.3+beat*0.6);
  for(let i=0;i<N;i++)spec[i]=Math.min(1,spec[i]);
  return {spec,level:lvl};
}
// ---- beat detector → tightens the spiral ----
let lastLow=0,beatPulse=0;
function detectBeat(spec){let low=0;for(let i=0;i<8;i++)low+=spec[i];low/=8;
  if(low-lastLow>0.18)beatPulse=1;lastLow=lastLow*0.6+low*0.4;beatPulse*=0.90;return beatPulse;}
let phase=0,lastT=0;
// ---- render ----
function render(spec,level,t){
  const bp=detectBeat(spec);
  // advance a persistent spin so live mode swirls; spin speed rides the level
  let dt=t-lastT;if(dt<0)dt+=1;lastT=t; // t is normalised 0..1, wraps
  phase+=dt*(0.6+level*2.4)*TAU;
  // tightness rises on beats → whirlpool pulls in
  const tight=2.6+bp*2.2+level*1.0;
  x.globalCompositeOperation='source-over';x.fillStyle='rgba(5,3,13,'+(0.20+0.12*level)+')';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  for(let arm=0;arm<ARMS;arm++){
    const a0=arm/ARMS*TAU+phase,col=COL[arm%COL.length];
    for(let i=0;i<PTS;i++){
      const f=i/PTS;                       // 0 centre → 1 rim
      const bin=spec[(f*(N-1))|0];         // arm samples the spectrum along its length
      const armLen=0.55+0.45*level;        // length rides the level
      if(f>armLen+bin*0.3)continue;        // arm length cut by spectrum/level
      const ang=a0+f*tight*TAU*0.5;        // logarithmic swirl, tighter on beats
      const r=RAD*f*(0.85+0.15*bin);
      const px=cx+Math.cos(ang)*r, py=cy+Math.sin(ang)*r;
      const sz=(0.8+bin*4.5+(1-f)*1.5)*DPR;
      x.globalAlpha=(0.10+0.75*bin)*(1-f*0.4); // brightness rides the spectrum
      x.fillStyle=col;
      x.beginPath();x.arc(px,py,sz,0,TAU);x.fill();
    }
  }
  // glowing whirlpool core, flares on beat
  const cr=RAD*(0.10+0.10*level+0.12*bp);
  const g=x.createRadialGradient(cx,cy,0,cx,cy,cr);
  g.addColorStop(0,'#ffffff');g.addColorStop(0.4,'#46b4ff');g.addColorStop(1,'rgba(5,3,13,0)');
  x.globalAlpha=0.92;x.fillStyle=g;x.beginPath();x.arc(cx,cy,cr,0,TAU);x.fill();
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}
// ================= sources =================
const AUTO=new URLSearchParams(location.search).has('auto');
let analyser=null,bytes=null,useSynth=true,t0=performance.now();
async function mic(){try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    const src=ctx.createMediaStreamSource(s);analyser=ctx.createAnalyser();analyser.fftSize=128;
    src.connect(analyser);bytes=new Uint8Array(analyser.frequencyBinCount);useSynth=false;
    hint.style.opacity='0';setTimeout(()=>hint.remove(),900);
  }catch(e){useSynth=true;hint.textContent='🎤 mic unavailable';hint.style.opacity='0';}}
function liveSpectrum(){const spec=new Float32Array(N);analyser.getByteFrequencyData(bytes);
  let lvl=0;const M=bytes.length;
  for(let i=0;i<N;i++){const v=(bytes[Math.min(M-1,(i*M/N)|0)]||0)/255;spec[i]=v;lvl+=v;}
  return {spec,level:Math.min(1,lvl/N*1.6)};}
function startLiveLoop(){(function loop(now){const t=now-t0;const u=((t%LOOP)+LOOP)%LOOP/LOOP;
    let s;if(useSynth||!analyser){s=synthSpectrum(u);}else s=liveSpectrum();
    render(s.spec,s.level,u);requestAnimationFrame(loop);})(performance.now());}
if(AUTO){window.__seek=t=>{const u=((t%LOOP)+LOOP)%LOOP/LOOP;const s=synthSpectrum(u);render(s.spec,s.level,u);};window.__seek(0);window.__ready=true;}
else{useSynth=true;addEventListener('pointerdown',()=>{if(useSynth)mic();},{once:false});startLiveLoop();}
</script></body></html>

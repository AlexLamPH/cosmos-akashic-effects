<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Data Stream</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Data Stream — glowing packets flow as dots/dashes along straight fibre-optic routes between nodes. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318;
let W,H,DPR;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0xDA7A57);
// Seeded node network (normalized 0..1) + straight routes between nearby nodes.
const NN=18, NODES=[], ROUTES=[], RC=['#8b5cff','#46b4ff','#ff5cc2'];
for(let i=0;i<NN;i++)NODES.push({x:0.08+rnd()*0.84,y:0.10+rnd()*0.80,ph:rnd()});
for(let i=0;i<NN;i++){ // connect each node to its 2 nearest neighbours -> a network of straight links
  const d=[];for(let j=0;j<NN;j++)if(j!==i){const dx=NODES[i].x-NODES[j].x,dy=NODES[i].y-NODES[j].y;d.push([dx*dx+dy*dy,j]);}
  d.sort((a,b)=>a[0]-b[0]);
  for(let k=0;k<2;k++){const j=d[k][1];if(i<j)ROUTES.push({a:i,b:j,c:RC[(i+k)%3],off:rnd(),sp:1+((rnd()*3)|0),dir:rnd()<.5?1:-1});}
}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // faint nebula wash background
  x.save();x.globalCompositeOperation='lighter';const bg=x.createRadialGradient(W*0.5,H*0.45,0,W*0.5,H*0.45,Math.max(W,H)*0.6);
  bg.addColorStop(0,'rgba(60,40,120,0.16)');bg.addColorStop(0.6,'rgba(40,30,90,0.05)');bg.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=bg;x.fillRect(0,0,W,H);x.restore();
  const PX=n=>NODES[n].x*W, PY=n=>NODES[n].y*H;
  x.globalCompositeOperation='lighter';x.lineCap='round';
  // dim base traces
  for(const r of ROUTES){x.strokeStyle=r.c;x.globalAlpha=0.14;x.lineWidth=1.3*DPR;
    x.beginPath();x.moveTo(PX(r.a),PY(r.a));x.lineTo(PX(r.b),PY(r.b));x.stroke();}
  // flowing data packets (dot/dash) via dash-offset = u (mod-1 seamless, sp integer)
  for(const r of ROUTES){const ax=PX(r.a),ay=PY(r.a),bx=PX(r.b),by=PY(r.b);
    const len=Math.hypot(bx-ax,by-ay),dash=Math.max(30*DPR,len/3),patt=dash*1.6;
    x.strokeStyle=r.c;x.globalAlpha=0.95;x.lineWidth=2.6*DPR;
    x.shadowColor=r.c;x.shadowBlur=9*DPR;
    x.setLineDash([4*DPR,dash*0.5,dash*0.18,dash*0.5]); // packet = a dot + a dash, then gap
    x.lineDashOffset=-r.dir*((u*r.sp+r.off)%1)*patt;
    x.beginPath();x.moveTo(ax,ay);x.lineTo(bx,by);x.stroke();}
  x.setLineDash([]);x.shadowBlur=0;
  // glowing nodes (twinkle on sin of u)
  for(let i=0;i<NN;i++){const px=NODES[i].x*W,py=NODES[i].y*H;const tw=0.5+0.5*Math.sin(TAU*(u+NODES[i].ph)*2);
    const g=x.createRadialGradient(px,py,0,px,py,(7+7*tw)*DPR);
    g.addColorStop(0,'#46b4ff');g.addColorStop(0.4,'rgba(139,92,255,0.5)');g.addColorStop(1,'rgba(0,0,0,0)');
    x.globalAlpha=0.5+0.5*tw;x.fillStyle=g;x.beginPath();x.arc(px,py,(7+7*tw)*DPR,0,TAU);x.fill();
    x.globalAlpha=0.9;x.fillStyle='#e0b24a';x.beginPath();x.arc(px,py,(1.4+0.9*tw)*DPR,0,TAU);x.fill();}
  x.globalAlpha=1;x.globalCompositeOperation='source-over';}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
rs();addEventListener('resize',rs);
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Tilt Sand</title>
<style>
  html,body{margin:0;height:100%;background:#05030d;overflow:hidden}
  #cv{position:fixed;inset:0;display:block;background:#05030d}
  #hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    font:600 13px/1.4 system-ui,sans-serif;color:#ffd9a8;letter-spacing:.04em;
    padding:8px 16px;border:1px solid rgba(255,200,140,.35);border-radius:999px;
    background:rgba(40,24,10,.5);backdrop-filter:blur(4px);cursor:pointer;
    transition:opacity .8s;user-select:none;z-index:5}
</style></head>
<body>
<canvas id="cv"></canvas>
<div id="hint">📱 enable motion</div>
<script>
const cv=document.getElementById('cv'), g=cv.getContext('2d');
const hint=document.getElementById('hint');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  g.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize); resize();

const LOOP=8200;
const TWO=Math.PI*2;
const AUTO=new URLSearchParams(location.search).has('auto');

// ---- seeded RNG ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x5a17d3);

// ---- sand grains: thousands of particles in a normalized [0..1]^2 box ----
const N=2600;
const px=new Float32Array(N), py=new Float32Array(N),   // position 0..1
      vx=new Float32Array(N), vy=new Float32Array(N),   // velocity
      hue=new Float32Array(N), gz=new Float32Array(N);  // tint, grain size
for(let i=0;i<N;i++){
  px[i]=0.15+rnd()*0.70;
  py[i]=0.55+rnd()*0.42;          // start as a settled pile near the bottom
  vx[i]=0; vy[i]=0;
  hue[i]=28+rnd()*26;             // amber → gold
  gz[i]=0.85+rnd()*0.9;
}

const R=0.0085;                   // grain radius in box units (collision)
const RESTITUTION=0.18, FRICTION=0.86, GRAV=0.00085;

// spatial-hash bins for cheap neighbour collisions
const CELL=R*2.0;
const GW=Math.ceil(1/CELL)+1;
const heads=new Int32Array(GW*GW), next=new Int32Array(N);

function step(gx,gy,strength){
  // gravity vector (gx,gy) in box space; gy>0 pulls DOWN visually
  const ax=gx*GRAV*strength, ay=(gy*0.5+0.85)*GRAV*strength; // bias so it tends downward
  // integrate
  for(let i=0;i<N;i++){
    vx[i]+=ax; vy[i]+=ay;
    vx[i]*=0.998; vy[i]*=0.998;
    px[i]+=vx[i]; py[i]+=vy[i];
    // walls of the container
    if(px[i]<R){px[i]=R; vx[i]=-vx[i]*RESTITUTION; vy[i]*=FRICTION;}
    if(px[i]>1-R){px[i]=1-R; vx[i]=-vx[i]*RESTITUTION; vy[i]*=FRICTION;}
    if(py[i]<R){py[i]=R; vy[i]=-vy[i]*RESTITUTION; vx[i]*=FRICTION;}
    if(py[i]>1-R){py[i]=1-R; vy[i]=-vy[i]*RESTITUTION; vx[i]*=FRICTION;}
  }
  // build hash
  heads.fill(-1);
  for(let i=0;i<N;i++){
    let cx=(px[i]/CELL)|0, cy=(py[i]/CELL)|0;
    if(cx<0)cx=0;else if(cx>=GW)cx=GW-1;
    if(cy<0)cy=0;else if(cy>=GW)cy=GW-1;
    const c=cy*GW+cx; next[i]=heads[c]; heads[c]=i;
  }
  // resolve grain-grain overlaps (a couple relaxation passes for packing)
  const minD=R*2;
  for(let pass=0;pass<2;pass++){
    for(let i=0;i<N;i++){
      let cx=(px[i]/CELL)|0, cy=(py[i]/CELL)|0;
      if(cx<0)cx=0;else if(cx>=GW)cx=GW-1;
      if(cy<0)cy=0;else if(cy>=GW)cy=GW-1;
      for(let oy=-1;oy<=1;oy++)for(let ox=-1;ox<=1;ox++){
        const nx=cx+ox, ny=cy+oy;
        if(nx<0||ny<0||nx>=GW||ny>=GW)continue;
        let j=heads[ny*GW+nx];
        while(j!==-1){
          if(j>i){
            let dx=px[j]-px[i], dy=py[j]-py[i];
            let d2=dx*dx+dy*dy;
            if(d2<minD*minD && d2>1e-9){
              const d=Math.sqrt(d2), ov=(minD-d)*0.5;
              const ux=dx/d, uy=dy/d;
              px[i]-=ux*ov; py[i]-=uy*ov;
              px[j]+=ux*ov; py[j]+=uy*ov;
              // damp relative velocity along normal
              const rvx=vx[j]-vx[i], rvy=vy[j]-vy[i];
              const vn=rvx*ux+rvy*uy;
              if(vn<0){ const imp=vn*0.5*RESTITUTION;
                vx[i]+=ux*imp; vy[i]+=uy*imp; vx[j]-=ux*imp; vy[j]-=uy*imp; }
            }
          }
          j=next[j];
        }
      }
    }
  }
}

// warm-up so frame 0 already shows a settled, gravity-poured dune
function settle(gx,gy,n){ for(let k=0;k<n;k++) step(gx,gy,1); }

function render(SIG,t){
  const u=(typeof t==='number')?((t%1)+1)%1:0;
  const gx=SIG.gx, gy=SIG.gy;

  // background: Phantom-dark with a faint warm floor glow
  let bg=g.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#05030d');
  bg.addColorStop(0.6,'#0a0612');
  bg.addColorStop(1,'#140a08');
  g.globalCompositeOperation='source-over';
  g.fillStyle=bg; g.fillRect(0,0,W,H);

  // container fits a square box centred on screen
  const S=Math.min(W,H)*0.94, ox=(W-S)/2, oy=(H-S)/2;

  // subtle container frame
  g.strokeStyle='rgba(255,190,120,0.10)';
  g.lineWidth=2; g.strokeRect(ox,oy,S,S);

  // gravity arrow indicator (shows tilt direction)
  const cxs=ox+S/2, cys=oy+S/2, al=S*0.10;
  const mag=Math.hypot(gx,gy)||1e-6;
  g.globalCompositeOperation='lighter';
  g.strokeStyle='rgba(255,170,90,0.25)'; g.lineWidth=2.5; g.lineCap='round';
  g.beginPath(); g.moveTo(cxs,cys);
  g.lineTo(cxs+gx/mag*al, cys+(gy*0.5+0.85)/Math.hypot(gx,gy*0.5+0.85)*al*1.0);
  g.stroke();

  // draw grains as additive glowing dots
  g.globalCompositeOperation='lighter';
  for(let i=0;i<N;i++){
    const sx=ox+px[i]*S, sy=oy+py[i]*S;
    const spd=Math.min(1,(Math.abs(vx[i])+Math.abs(vy[i]))*40);
    const r=(S*0.0052)*gz[i]*(1+spd*0.6);
    const l=58+spd*22;
    const gr=g.createRadialGradient(sx,sy,0,sx,sy,r*2.4);
    gr.addColorStop(0,'hsla('+hue[i]+',95%,'+l+'%,0.95)');
    gr.addColorStop(0.5,'hsla('+(hue[i]-6)+',90%,'+(l*0.7)+'%,0.35)');
    gr.addColorStop(1,'hsla('+hue[i]+',90%,40%,0)');
    g.fillStyle=gr;
    g.beginPath(); g.arc(sx,sy,r*2.4,0,TWO); g.fill();
  }
  g.globalCompositeOperation='source-over';
}

// ---- synthetic tilt signal (deterministic, looping) ----
function synthSig(u){ return { gx:0.7*Math.sin(TWO*u), gy:0.7*Math.cos(TWO*2*u) }; }

// ---- live tilt sources (gated behind !AUTO) ----
let curSig={gx:0.2,gy:0.6}, useSynth=true, mouseSig=null;

function enableMotion(){
  const attach=()=>{
    addEventListener('deviceorientation',e=>{
      if(e.gamma==null && e.beta==null) return;
      const gx=Math.max(-1,Math.min(1,(e.gamma||0)/45));
      const gy=Math.max(-1,Math.min(1,(e.beta||0)/45));
      curSig={gx,gy}; useSynth=false;
      hint.style.opacity='0'; setTimeout(()=>hint.remove(),900);
    });
  };
  try{
    if(typeof DeviceOrientationEvent!=='undefined' &&
       typeof DeviceOrientationEvent.requestPermission==='function'){
      DeviceOrientationEvent.requestPermission().then(r=>{ if(r==='granted') attach(); })
        .catch(()=>{});
    } else attach();
  }catch(e){}
}

// desktop mouse fallback → tilt vector
addEventListener('pointermove',e=>{
  const gx=(e.clientX/innerWidth)*2-1;
  const gy=(e.clientY/innerHeight)*2-1;
  mouseSig={gx,gy};
});

function startLiveLoop(){
  settle(curSig.gx,curSig.gy,140);   // frame 0 rich: a poured dune
  const t0=performance.now();
  function frame(now){
    const t=(now-t0)/1000;
    const u=((t*1000%LOOP)+LOOP)%LOOP/LOOP;
    let sig;
    if(!useSynth) sig=curSig;            // live deviceorientation
    else if(mouseSig) sig=mouseSig;      // desktop mouse fallback
    else sig=synthSig(u);                // attract: synthetic rocking
    step(sig.gx,sig.gy,1);
    render(sig,u);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  const tryEnable=()=>{ enableMotion(); removeEventListener('pointerdown',tryEnable); };
  addEventListener('pointerdown',tryEnable);
  hint.addEventListener('pointerdown',tryEnable);
  // fade hint if no sensor ever fires
  setTimeout(()=>{ if(useSynth){ hint.style.opacity='0.45'; } }, 4000);
}

if(AUTO){
  hint.remove();
  // settle under the synthetic vector at u=0 so the very first frame is a rich dune
  const s0=synthSig(0); settle(s0.gx,s0.gy,160);
  window.__seek=t=>{
    const u=((t%LOOP)+LOOP)%LOOP/LOOP;
    const s=synthSig(u);
    step(s.gx,s.gy,1.2); step(s.gx,s.gy,1.2);  // 2 substeps/frame → lively flow
    render(s,u);
  };
  window.__seek(0); window.__ready=true;
} else {
  startLiveLoop();
}
</script>
</body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Moon Phases</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Moon Phases — a softly shaded moon disc whose terminator sweeps across, cycling new -> crescent -> full -> crescent over one seamless loop, on a seeded starfield with a subtle glow. Pure Canvas 2D, deterministic & seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718;
let W,H,DPR,cx,cy,stars=[],craters=[];
// small offscreen for the per-pixel lit moon, upscaled (GIF-friendly)
const D=180,oc=document.createElement('canvas');oc.width=D;oc.height=D;const ox=oc.getContext('2d');const img=ox.createImageData(D,D);
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;
  const r=mul(17);stars=[];for(let i=0;i<150;i++)stars.push({x:r()*W,y:r()*H,r:r()*1.4*DPR+0.3*DPR,a:0.25+r()*0.6,tw:r()*TAU});
  const rc=mul(91);craters=[];for(let i=0;i<14;i++){const a=rc()*TAU,rad=Math.sqrt(rc())*0.82;     // craters on a unit disc
    craters.push({cx:Math.cos(a)*rad,cy:Math.sin(a)*rad,r:0.06+rc()*0.13,d:0.10+rc()*0.18});}
}
rs();addEventListener('resize',rs);
// light direction angle: u=0 new moon (lit away), sweeps full circle -> new again. cos of one full turn.
function shadeMoon(u){const d=img.data;const lx=Math.sin(TAU*u),lz=-Math.cos(TAU*u);            // light dir in disc plane (x) + depth (z)
  for(let j=0;j<D;j++){for(let i=0;i<D;i++){const o=(j*D+i)*4;
    const nx=(i-D/2)/(D/2-2),ny=(j-D/2)/(D/2-2);const r2=nx*nx+ny*ny;
    if(r2>1){d[o]=0;d[o+1]=0;d[o+2]=0;d[o+3]=0;continue;}
    const nz=Math.sqrt(1-r2);                                                                   // sphere normal
    let lit=nx*lx+nz*lz;                                                                         // lambert
    let alb=1; for(const c of craters){const dx=nx-c.cx,dy=ny-c.cy;if(dx*dx+dy*dy<c.r*c.r)alb-=c.d;}
    let sh=Math.max(0,lit);sh=Math.pow(sh,0.85);                                                  // soft terminator
    const base=18, lum=base+ (235*sh)*alb;                                                        // dark side keeps faint earthshine
    const ear= (1-sh)*8;                                                                          // subtle earthshine on dark limb
    let R=lum*1.00+ear, G=lum*0.98+ear, B=lum*0.92+ear*1.4;
    // limb darkening
    const limb=0.55+0.45*nz;R*=limb;G*=limb;B*=limb;
    d[o]=Math.min(255,R);d[o+1]=Math.min(255,G);d[o+2]=Math.min(255,B);d[o+3]=255;
  }}
  ox.putImageData(img,0,0);}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  for(const s of stars){const a=s.a*(0.6+0.4*Math.sin(TAU*u*1+s.tw));                            // gentle twinkle (period 1)
    x.fillStyle=`rgba(200,210,255,${a})`;x.beginPath();x.arc(s.x,s.y,s.r,0,TAU);x.fill();}
  shadeMoon(u);
  const R=Math.min(W,H)*0.30;                                                                     // on-screen moon radius
  // subtle glow behind the moon, brightest near full
  const full=0.5-0.5*Math.cos(TAU*u);                                                             // 0 at new, 1 at full
  const g=x.createRadialGradient(cx,cy,R*0.8,cx,cy,R*2.6);
  g.addColorStop(0,`rgba(180,200,255,${0.05+0.13*full})`);g.addColorStop(1,'rgba(180,200,255,0)');
  x.fillStyle=g;x.beginPath();x.arc(cx,cy,R*2.6,0,TAU);x.fill();
  // draw lit moon disc (upscaled offscreen), clipped to circle for clean edge
  x.save();x.globalCompositeOperation='source-over';
  x.beginPath();x.arc(cx,cy,R,0,TAU);x.clip();
  x.imageSmoothingEnabled=true;x.drawImage(oc,cx-R,cy-R,R*2,R*2);
  x.restore();
  // thin rim light
  x.globalCompositeOperation='lighter';
  x.lineWidth=1.5*DPR;x.strokeStyle=`rgba(150,180,255,${0.10+0.18*full})`;
  x.beginPath();x.arc(cx,cy,R,0,TAU);x.stroke();
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

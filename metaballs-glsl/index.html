<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Metaballs</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Metaballs — 2D metaballs in the fragment shader: summed 1/dist^2 fields from blobs orbiting on looping paths, thresholded + glowing iso-surface, gooey accent colours over dark. Real WebGL GLSL fragment shader. Deterministic, seamless (uT loops 0..1).
const cv=document.getElementById('c');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000;
const gl=cv.getContext('webgl',{antialias:false,depth:false,preserveDrawingBuffer:true});
const VERT='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG=`precision highp float; uniform vec2 uRes; uniform float uT;
#define TAU 6.28318530718
// Cosmos accents
const vec3 VIOLET=vec3(0.545,0.36,1.0);
const vec3 COSMIC=vec3(0.27,0.71,1.0);
const vec3 NEBULA=vec3(1.0,0.36,0.76);
const vec3 AURORA=vec3(0.21,0.83,0.60);
const vec3 SOLARIS=vec3(1.0,0.42,0.24);
const vec3 SACRED=vec3(0.88,0.70,0.29);
float t_g; // looping time, set in shade
// A blob orbiting on a looping path. centre = base + radius*(cos,sin) of (TAU*t*k + phase)
// so position returns exactly after one loop. Returns its 1/dist^2 field contribution.
float blob(vec2 uv, vec2 base, float radius, float k, float phase, float strength){
 vec2 c = base + radius*vec2(cos(TAU*k*t_g + phase), sin(TAU*k*t_g + phase));
 vec2 d = uv - c;
 return strength/(dot(d,d)+0.02);
}
vec3 shade(vec2 uv,float t){
 t_g=t;
 // sum 1/dist^2 fields from several orbiting blobs
 float field=0.0;
 field+=blob(uv, vec2(-0.2, 0.1), 0.55, 1.0, 0.0,        0.10);
 field+=blob(uv, vec2( 0.3,-0.1), 0.45, 1.0, 2.1,        0.09);
 field+=blob(uv, vec2( 0.0, 0.0), 0.70, 1.0, 4.2,        0.11);
 field+=blob(uv, vec2(-0.35,-0.25),0.40, 2.0, 1.0,       0.07);
 field+=blob(uv, vec2( 0.25, 0.30),0.50, 1.0, 3.3,       0.08);
 // weight contributions for colour: which blob dominates here drives the hue mix
 // threshold the iso-surface
 float iso = smoothstep(0.8, 1.6, field);          // inside the goo
 float edge = smoothstep(0.6, 1.0, field) - smoothstep(1.4, 2.2, field); // glowing rim
 // gooey accent colour shifting across the field
 vec3 goo = mix(VIOLET, COSMIC, clamp(field*0.4,0.0,1.0));
 goo = mix(goo, NEBULA, smoothstep(1.4,2.6,field));
 goo = mix(goo, AURORA, 0.35*sin(field*1.5+TAU*t)+0.35);
 vec3 col = vec3(0.015,0.01,0.04); // dark background
 col = mix(col, goo*0.55, iso);            // fill the blobs
 col += SOLARIS*edge*0.5;                  // glow the iso rim
 col += SACRED*pow(clamp(field-1.8,0.0,1.0),2.0)*0.6; // bright cores
 // faint outer halo so blobs read against dark
 col += goo*0.06*smoothstep(0.3,0.9,field);
 return col;}
void main(){ vec2 uv=(gl_FragCoord.xy*2.0-uRes)/min(uRes.x,uRes.y); vec3 col=shade(uv,uT);
 col=pow(clamp(col,0.,1.),vec3(0.4545)); gl_FragColor=vec4(col,1.0);}`;
function sh(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);
 if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'uRes'),uT=gl.getUniformLocation(prog,'uT');
let DPR;function rs(){DPR=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';gl.viewport(0,0,cv.width,cv.height);}
rs();addEventListener('resize',rs);
function render(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uT,u);gl.drawArrays(gl.TRIANGLES,0,3);}
if(AUTO){window.__seek=t=>render(t);render(0);window.__ready=true;}else{const s=performance.now();(function l(n){render(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

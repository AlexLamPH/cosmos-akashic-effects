<!doctype html>
<!--
  Cosmos AI Lab · FX — "Circular Gallery"  (Ra, from Alex's reference IMG_4491 — animated circular gallery)
  A ring of photo cards fanned like petals around a center, slowly rotating. The card nearest the top is
  shown big in the center circle. Hover (desktop) or drag to spin the wheel; click / tap a card to focus it.
  Self-contained · offline · procedural "landscape" photos (drop-in real <img> later) · touch + reduced-motion aware.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Circular Gallery</title>
<style>
  :root{ --R:240px; --cw:130px; --ch:178px; --cc:250px; --D:600px; --sans:"Segoe UI",system-ui,-apple-system,sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:var(--sans);color:#eaf0ff;background:#0a0c16}
  .stage{position:fixed;inset:0;display:grid;place-items:center;cursor:grab;
    background:radial-gradient(120% 120% at 50% 30%,#1a1d3a 0%,#0d0f1f 55%,#060710 100%)}
  .stage.drag{cursor:grabbing}
  .wheel{position:relative;width:var(--D);height:var(--D)}
  .ring{position:absolute;inset:0;will-change:transform}
  .slot{position:absolute;top:50%;left:50%;width:var(--cw);height:var(--ch);
    margin:calc(var(--ch)/-2) 0 0 calc(var(--cw)/-2);transform-origin:center}
  .card{width:100%;height:100%;border-radius:14px;background-size:cover;cursor:pointer;
    border:1px solid rgba(255,255,255,.16);box-shadow:0 14px 36px -14px rgba(0,0,0,.8);
    filter:brightness(.82) saturate(.95);transition:transform .45s cubic-bezier(.2,.8,.2,1),filter .45s,box-shadow .45s}
  .slot:hover .card,.slot.active .card{filter:brightness(1.1) saturate(1.12);transform:scale(1.16);
    box-shadow:0 22px 54px -16px rgba(120,170,255,.6),0 0 0 1px rgba(255,255,255,.42)}
  .slot.active{z-index:6} .slot:hover{z-index:5}
  .center{position:absolute;top:50%;left:50%;width:var(--cc);height:var(--cc);
    margin:calc(var(--cc)/-2) 0 0 calc(var(--cc)/-2);border-radius:50%;overflow:hidden;background-size:cover;
    border:2px solid rgba(255,255,255,.22);box-shadow:0 0 0 7px rgba(255,255,255,.05),0 26px 70px -12px rgba(0,0,0,.75);
    pointer-events:none;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
  .center::after{content:"";position:absolute;inset:0;border-radius:50%;
    box-shadow:inset 0 -40px 60px -20px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.12)}
  .cap{position:absolute;left:50%;bottom:14%;transform:translateX(-50%);z-index:7;pointer-events:none;text-align:center}
  .cap .n{font:700 clamp(16px,2.4vw,26px)/1 var(--sans);letter-spacing:.04em;text-shadow:0 2px 16px rgba(0,0,0,.7)}
  .cap .s{font:600 10px/1 var(--sans);letter-spacing:.34em;text-transform:uppercase;color:rgba(220,230,255,.7);margin-top:7px}
  .title{position:fixed;top:max(24px,env(safe-area-inset-top));left:0;right:0;text-align:center;z-index:8;pointer-events:none;
    font:700 13px/1 var(--sans);letter-spacing:.4em;text-transform:uppercase;color:#cdd9ff;opacity:0;
    transition:opacity 1.2s ease .3s;text-shadow:0 2px 18px rgba(80,130,255,.5)}
  .title.show{opacity:.85}
  .hint{position:fixed;left:0;right:0;bottom:max(22px,env(safe-area-inset-bottom));text-align:center;z-index:8;pointer-events:none;
    font:500 11px/1.4 var(--sans);letter-spacing:.2em;text-transform:uppercase;color:#aeb9e6;opacity:0;transition:opacity 1s}
  .hint.show{opacity:.6}
  @media(prefers-reduced-motion:reduce){.hint{display:none}}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="wheel" id="wheel">
    <div class="ring" id="ring"></div>
    <div class="center" id="center"></div>
    <div class="cap" id="cap"><div class="n" id="capN">Malibu</div><div class="s">Cosmos · Gallery</div></div>
  </div>
</div>
<div class="title" id="title">Circular Gallery</div>
<div class="hint" id="hint">drag to spin · hover / tap a photo</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var stage=document.getElementById('stage'), wheel=document.getElementById('wheel'),
      ring=document.getElementById('ring'), center=document.getElementById('center'),
      capN=document.getElementById('capN');

  // ---- procedural "landscape" palettes (sky / horizon / sea + sun) ----
  var PAL=[
    {name:'Malibu',   sky:['#ffb56b','#ff7a8a'], sea:['#6a4a8a','#241d4a'], sun:'#fff0c0', y:34},
    {name:'Santorini',sky:['#8fd3ff','#dff3ff'], sea:['#2a7fd0','#0f3a64'], sun:'#ffffff', y:22},
    {name:'Bali',     sky:['#ffd6a0','#ff9e7a'], sea:['#3a6a5a','#143229'], sun:'#fff3d0', y:38},
    {name:'Reykjavík',sky:['#1c2a5e','#0a1030'], sea:['#0a1838','#050a1c'], sun:'#eef2ff', y:26},
    {name:'Maldives', sky:['#bff0ff','#7fd8e8'], sea:['#1fb6c9','#0a6a86'], sun:'#ffffff', y:24},
    {name:'Sahara',   sky:['#ffd98a','#ffb05a'], sea:['#c98a4a','#7a4e26'], sun:'#fff0c8', y:30},
    {name:'Kyoto',    sky:['#cfe3d0','#9fc6a8'], sea:['#3a6a4a','#173322'], sun:'#f2fff0', y:28},
    {name:'Tromsø',   sky:['#a6f0d8','#5ad0c0'], sea:['#1a3a6a','#0a1838'], sun:'#d8ffe8', y:32},
    {name:'Provence', sky:['#e6cfff','#b89fe6'], sea:['#6a5a9a','#241d4a'], sun:'#fbeaff', y:30},
    {name:'Okinawa',  sky:['#ffe0e6','#ffb0c0'], sea:['#ff7a9a','#b23a64'], sun:'#fff0f4', y:26},
    {name:'Tuscany',  sky:['#ffe6a0','#ffc060'], sea:['#b07a3a','#5e4018'], sun:'#fff4cc', y:32},
    {name:'Azores',   sky:['#2a4a6a','#16304a'], sea:['#0a2a4a','#03101f'], sun:'#cfe6ff', y:24}
  ];
  var N=PAL.length, slots=[];

  function bgFor(p, big){
    var sr = big? '5.5%' : '3.6%', fade = big? '13%':'8%';
    return 'radial-gradient(circle at 50% '+p.y+'%, '+p.sun+' 0 '+sr+', rgba(255,255,255,0) '+fade+'),'
         + 'linear-gradient(180deg, transparent 53%, rgba(255,255,255,.45) 54%, transparent 55%),'
         + 'linear-gradient(180deg, '+p.sky[0]+' 0%, '+p.sky[1]+' 54%, '+p.sea[0]+' 54%, '+p.sea[1]+' 100%)';
  }

  // ---- build the ring ----
  for(var i=0;i<N;i++){
    var slot=document.createElement('div'); slot.className='slot'; slot.dataset.i=i;
    var card=document.createElement('div'); card.className='card'; card.style.backgroundImage=bgFor(PAL[i],false);
    slot.appendChild(card); ring.appendChild(slot); slots.push(slot);
    (function(idx){
      slot.addEventListener('pointerenter',function(){ if(dragging)return; paused=true; hoverI=idx; setCenter(idx); });
      slot.addEventListener('pointerleave',function(){ hoverI=-1; });
      slot.addEventListener('click',function(e){ if(moved)return; e.stopPropagation(); focus(idx); });
    })(i);
  }
  wheel.addEventListener('pointerleave',function(){ if(focusedI<0) paused=false; });

  // ---- layout ----
  var R;
  function layout(){
    var size=Math.min(innerWidth,innerHeight);
    R=size*0.30; var cw=size*0.135, ch=size*0.185, cc=size*0.27, D=2*R+ch;
    var s=document.documentElement.style;
    s.setProperty('--R',R+'px'); s.setProperty('--cw',cw+'px'); s.setProperty('--ch',ch+'px');
    s.setProperty('--cc',cc+'px'); s.setProperty('--D',D+'px');
    for(var i=0;i<N;i++){ var ang=i*(360/N);
      slots[i].dataset.ang=ang;
      slots[i].style.transform='rotate('+ang+'deg) translateY('+(-R)+'px)';
    }
  }
  layout(); addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(layout,160); }); var rt;

  // ---- center sync ----
  var shownI=-1;
  function setCenter(i){ if(i===shownI)return; shownI=i; center.style.backgroundImage=bgFor(PAL[i],true);
    capN.textContent=PAL[i].name; center.style.transform='scale(1.04)';
    clearTimeout(setCenter._t); setCenter._t=setTimeout(function(){center.style.transform='scale(1)';},180); }
  setCenter(0);

  // ---- motion state ----
  var spin=0, vel=reduce?0:0.05, paused=false, dragging=false, moved=false, hoverI=-1, focusedI=-1, target=0;
  function applySpin(){ ring.style.transform='rotate('+spin+'deg)'; }
  function angDist(a){ a=((a%360)+360)%360; return a>180? 360-a : a; } // distance to 0
  function nearestTop(){ var best=0,bd=1e9; for(var i=0;i<N;i++){ var d=angDist(spin + (+slots[i].dataset.ang)); if(d<bd){bd=d;best=i;} } return best; }

  function loop(){
    if(focusedI>=0){ spin += (target-spin)*0.10; for(var i=0;i<N;i++) slots[i].classList.toggle('active', i===focusedI); }
    else { for(var j=0;j<N;j++) slots[j].classList.remove('active');
      if(!paused && !dragging){ spin += vel; setCenter(nearestTop()); }
      else if(hoverI>=0){ setCenter(hoverI); }
    }
    applySpin();
    requestAnimationFrame(loop);
  }
  applySpin(); if(!reduce) requestAnimationFrame(loop);

  // ---- focus / unfocus ----
  function focus(i){
    if(focusedI===i){ unfocus(); return; }
    focusedI=i; paused=true; setCenter(i);
    var ang=+slots[i].dataset.ang;                      // bring this slot to the top (net 0), shortest path
    var want=-ang, cur=((spin%360)+360)%360, goal=((want%360)+360)%360, d=goal-cur;
    if(d>180)d-=360; if(d<-180)d+=360; target=spin+d;
  }
  function unfocus(){ focusedI=-1; paused=false; vel=reduce?0:0.05; }
  stage.addEventListener('click',function(e){ if(e.target===stage||e.target===wheel||e.target===center) unfocus(); });

  // ---- drag to spin (angular around wheel center) ----
  var lastA=0;
  function angleAt(x,y){ return Math.atan2(y-innerHeight/2, x-innerWidth/2)*180/Math.PI; }
  stage.addEventListener('pointerdown',function(e){ dragging=true; moved=false; lastA=angleAt(e.clientX,e.clientY);
    stage.classList.add('drag'); });
  addEventListener('pointermove',function(e){ if(!dragging)return; var a=angleAt(e.clientX,e.clientY);
    var d=a-lastA; if(d>180)d-=360; if(d<-180)d+=360; lastA=a;
    if(Math.abs(d)>0.3) moved=true;
    spin+=d; if(focusedI>=0){target=spin;} hideHint(); });
  addEventListener('pointerup',function(){ if(!dragging)return; dragging=false; stage.classList.remove('drag');
    setTimeout(function(){moved=false;},0); });

  // ---- hints ----
  var hint=document.getElementById('hint'), title=document.getElementById('title'), hid=false;
  setTimeout(function(){title.classList.add('show');},300);
  setTimeout(function(){ hint.classList.add('show'); },1500);
  function hideHint(){ if(!hid){hid=true; hint.classList.remove('show'); setTimeout(function(){title.style.opacity='0.45';},2400);} }
})();
</script>
</body>
</html>

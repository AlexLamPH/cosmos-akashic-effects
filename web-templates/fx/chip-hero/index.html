<!doctype html>
<!-- Cosmos AI Lab · FX — "Chip Hero" (Ra). Preserves Alex's AI-chip render as a reusable hero / background:
     slow Ken-Burns zoom + vignette + drifting amber embers + a pulsing core glow, with a white-label content slot.
     Image asset: chip.webp (in this folder). Offline · reduced-motion aware. -->
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chip Hero</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#070503;font-family:'Space Grotesk',system-ui,sans-serif;color:#fff}
  .bg{position:fixed;inset:0;background:url('chip.webp') center/cover no-repeat;transform-origin:52% 48%;
    animation:ken 26s ease-in-out infinite alternate}
  @keyframes ken{from{transform:scale(1.04) translate(0,0)}to{transform:scale(1.16) translate(-1.5%,-1%)}}
  .vig{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(70% 60% at 50% 46%,transparent 30%,rgba(0,0,0,.5) 78%,rgba(0,0,0,.82) 100%)}
  .core{position:fixed;left:50%;top:48%;width:46vmin;height:46vmin;transform:translate(-50%,-50%);pointer-events:none;
    background:radial-gradient(circle,rgba(255,170,60,.32),transparent 62%);mix-blend-mode:screen;animation:pulse 4.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.55;transform:translate(-50%,-50%) scale(.96)}50%{opacity:.95;transform:translate(-50%,-50%) scale(1.06)}}
  canvas{position:fixed;inset:0;pointer-events:none}
  .ui{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:8vmin 7vw;pointer-events:none}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:#FFC477;
    text-shadow:0 0 18px rgba(255,150,40,.6);opacity:0;animation:rise 1.2s ease .4s forwards}
  h1{font-size:clamp(34px,7vw,76px);font-weight:700;line-height:.98;letter-spacing:-.02em;margin:14px 0 12px;max-width:14ch;
    text-shadow:0 6px 40px rgba(0,0,0,.6);opacity:0;animation:rise 1.2s ease .55s forwards}
  h1 b{color:#FFB14E}
  p{font-size:clamp(14px,1.6vw,18px);color:rgba(255,255,255,.78);max-width:46ch;line-height:1.5;opacity:0;animation:rise 1.2s ease .7s forwards}
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
  .tag{position:fixed;top:max(16px,env(safe-area-inset-top));left:18px;font-family:'JetBrains Mono',monospace;font-size:10px;
    letter-spacing:.18em;text-transform:uppercase;color:rgba(255,196,119,.7);z-index:3}
  @media(prefers-reduced-motion:reduce){.bg,.core,.eyebrow,h1,p{animation:none;opacity:1;transform:none}}
</style></head>
<body>
<div class="bg"></div>
<div class="core"></div>
<canvas id="embers"></canvas>
<div class="vig"></div>
<div class="tag">asset · chip-hero · saved design</div>
<div class="ui">
  <div class="eyebrow">Cosmos AI Lab · Neural Core</div>
  <h1>Built on <b>silicon</b> &amp; light.</h1>
  <p>A reusable hero / background — slow zoom, drifting embers and a pulsing core over Alex's AI-chip render. White-label: swap the headline, keep the glow.</p>
</div>
<script>
(function(){
  "use strict";
  if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  var cv=document.getElementById('embers'),ctx=cv.getContext('2d'),W,H,DPR,ps=[];
  function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
    ps=[];var n=Math.round(innerWidth*innerHeight/26000);for(var i=0;i<n;i++)ps.push(mk(true));}
  function mk(init){return{x:Math.random()*W,y:init?Math.random()*H:H+10*DPR,r:(0.6+Math.random()*1.8)*DPR,
    s:(0.2+Math.random()*0.6)*DPR,d:(Math.random()-0.5)*0.3*DPR,a:0.2+Math.random()*0.6,ph:Math.random()*6.28};}
  rs();addEventListener('resize',rs);var f=0;
  function loop(){f++;ctx.clearRect(0,0,W,H);ctx.globalCompositeOperation='lighter';
    for(var i=0;i<ps.length;i++){var p=ps[i];p.y-=p.s;p.x+=p.d+Math.sin(f*0.02+p.ph)*0.2*DPR;
      if(p.y<-10*DPR){ps[i]=mk(false);continue;}
      var fl=0.6+0.4*Math.sin(f*0.05+p.ph),g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);
      g.addColorStop(0,'rgba(255,180,80,'+(p.a*fl)+')');g.addColorStop(1,'rgba(255,140,40,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r*5,0,6.3);ctx.fill();}
    ctx.globalCompositeOperation='source-over';requestAnimationFrame(loop);}
  requestAnimationFrame(loop);
})();
</script>
</body></html>

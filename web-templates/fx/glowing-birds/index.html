<!doctype html>
<!--
  Cosmos AI Lab · FX — "Glowing Birds"  (Ra, from Alex's reference)
  A flock of luminous birds that drift, wander, and chase your cursor / finger through the dark,
  leaving soft light-trails. Boids-style motion (damping + random wander + pull toward pointer),
  additive glow on pure black. Self-contained Canvas 2D · offline · touch + reduced-motion aware.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Glowing Birds</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  canvas{display:block;width:100vw;height:100dvh}
  .hint{position:fixed;left:0;right:0;bottom:max(26px,env(safe-area-inset-bottom));text-align:center;z-index:2;
    font:500 12px/1.4 "Segoe UI",system-ui,-apple-system,sans-serif;letter-spacing:.22em;text-transform:uppercase;
    color:#fff;opacity:.0;transition:opacity 1.2s ease;pointer-events:none;text-shadow:0 0 18px rgba(190,120,255,.6)}
  .hint.show{opacity:.42}
  .title{position:fixed;top:max(30px,env(safe-area-inset-top));left:0;right:0;text-align:center;z-index:2;pointer-events:none;
    font:600 13px/1 "Segoe UI",system-ui,sans-serif;letter-spacing:.42em;text-transform:uppercase;color:#fff;opacity:.0;
    transition:opacity 2s ease 0.4s;text-shadow:0 0 22px rgba(255,120,220,.5)}
  .title.show{opacity:.34}
  @media(prefers-reduced-motion:reduce){.hint{display:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="title" id="title">Glowing Birds</div>
<div class="hint" id="hint">move · touch to gather the flock</div>
<script>
(function(){
  var cv=document.getElementById('c'), ctx=cv.getContext('2d',{alpha:false});
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var W,H,DPR;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1, 2);
    W=cv.width=Math.floor(innerWidth*DPR); H=cv.height=Math.floor(innerHeight*DPR);
    cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  }
  resize(); addEventListener('resize',resize);

  // ---- glow sprite (pre-rendered radial halo: white core -> magenta -> transparent) ----
  function makeGlow(){
    var s=128, g=document.createElement('canvas'); g.width=g.height=s;
    var gx=g.getContext('2d'), r=s/2, grd=gx.createRadialGradient(r,r,0,r,r,r);
    grd.addColorStop(0,   'rgba(255,255,255,1)');
    grd.addColorStop(0.18,'rgba(255,225,250,0.95)');
    grd.addColorStop(0.42,'rgba(214,120,255,0.55)');
    grd.addColorStop(1,   'rgba(150,70,255,0)');
    gx.fillStyle=grd; gx.beginPath(); gx.arc(r,r,r,0,7); gx.fill();
    return g;
  }
  var glow=makeGlow();

  // ---- flock ----
  var pointer={x:W*0.5,y:H*0.42,active:false}, hasInput=false;
  var N=Math.round(Math.min(260, Math.max(120, (innerWidth*innerHeight)/5200)));
  var birds=[], frame=0;
  function rnd(a,b){return a+Math.random()*(b-a);}
  for(var i=0;i<N;i++){
    birds.push({
      x:rnd(0,W), y:rnd(0,H), z:rnd(0.35,1),               // z = depth (size + speed)
      vx:0, vy:0, ox:0, oy:0, t:Math.floor(rnd(20,70)),     // ownMove (wander) + retime
      sp:rnd(0.6,1.1), hue:Math.random()<0.16?rnd(170,200):rnd(286,322) // mostly magenta, a few cyan
    });
  }

  function step(){
    frame++;
    // idle drift: if no input, target slowly breathes around centre
    var tx,ty;
    if(hasInput){ tx=pointer.x; ty=pointer.y; }
    else { tx=W*(0.5+0.18*Math.cos(frame*0.006)); ty=H*(0.42+0.12*Math.sin(frame*0.008)); }

    for(var i=0;i<N;i++){
      var b=birds[i];
      // new wander impulse every t frames
      if(frame % b.t === 0){
        b.ox=(0.5-Math.random())*W*0.5;
        b.oy=(0.5-Math.random())*H*0.5;
        b.t=Math.floor(rnd(22,72));
      }
      var desX=tx+b.ox, desY=ty+b.oy;
      var pull=0.0016*b.z*b.sp;                              // closer birds react faster
      b.vx += (desX-b.x)*pull;
      b.vy += (desY-b.y)*pull;
      // damping (ref: move *= 0.99) — tuned for smooth glide
      b.vx*=0.93; b.vy*=0.93;
      b.x+=b.vx; b.y+=b.vy;
    }
  }

  function draw(){
    // trail: fade previous frame toward black (leaves light-tails)
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(0,0,0,0.20)';
    ctx.fillRect(0,0,W,H);

    ctx.globalCompositeOperation='lighter';                 // additive glow
    for(var i=0;i<N;i++){
      var b=birds[i];
      var ang=Math.atan2(b.vy,b.vx), sp=Math.hypot(b.vx,b.vy);
      var size=(9+22*b.z)*DPR;                              // halo size
      // glow halo (tinted via a coloured rect behind? simplest: draw white-core sprite, tint with a coloured second pass)
      ctx.globalAlpha=0.55*b.z;
      ctx.drawImage(glow, b.x-size, b.y-size, size*2, size*2);
      // colour wash for life (per-bird hue), additive
      ctx.globalAlpha=0.22*b.z;
      ctx.fillStyle='hsl('+b.hue+',100%,62%)';
      ctx.beginPath(); ctx.arc(b.x,b.y,size*0.7,0,7); ctx.fill();

      // bird chevron (two swept-back wings), bright white, rotated to heading
      var wing=(2.6+5.5*b.z)*DPR*Math.min(1,0.4+sp*0.5);
      ctx.globalAlpha=Math.min(1,0.5+b.z*0.5);
      ctx.strokeStyle='rgba(255,255,255,0.95)';
      ctx.lineWidth=1.1*DPR; ctx.lineCap='round';
      ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(ang);
      ctx.beginPath();
      ctx.moveTo(-wing, -wing*0.9);
      ctx.quadraticCurveTo(wing*0.5,0,-wing,wing*0.9);      // a soft "⟩" — wings sweeping from a forward point
      ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }

  function loop(){
    if(!reduce) step();
    draw();
    requestAnimationFrame(loop);
  }
  if(reduce){ // static: one calm frame
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); draw();
  } else { requestAnimationFrame(loop); }

  // ---- input ----
  function setP(x,y){ pointer.x=x*DPR; pointer.y=y*DPR; hasInput=true; hideHint(); }
  addEventListener('mousemove',function(e){ setP(e.clientX,e.clientY); });
  addEventListener('touchstart',function(e){ var t=e.touches[0]; if(t) setP(t.clientX,t.clientY); },{passive:true});
  addEventListener('touchmove',function(e){ var t=e.touches[0]; if(t) setP(t.clientX,t.clientY); },{passive:true});

  // ---- intro: title + hint fade in, hint hides on first interaction ----
  var title=document.getElementById('title'), hint=document.getElementById('hint'), hinted=false;
  setTimeout(function(){title.classList.add('show')},300);
  setTimeout(function(){ if(!hasInput) hint.classList.add('show'); },1600);
  function hideHint(){ if(!hinted){hinted=true; hint.classList.remove('show'); setTimeout(function(){title.style.opacity='0'},2200);} }
})();
</script>
</body>
</html>

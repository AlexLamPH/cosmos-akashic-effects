<!doctype html>
<!-- Cosmos AI Lab · Graph effect 04 — "Circuit Map 3D" (Ra). A multi-LAYER chip graph in 3D: identity is a
     detailed glowing die; memories & cards are pads on stacked tiers, wired by fine metal traces + vertical vias,
     with data pulses. Auto-rotates; drag to orbit. 2D can't show a dense web — 3D layers can.
     Self-contained Canvas 2D (3D projected) · offline · reduced-motion aware. -->
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Graph · Circuit Map 3D</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(75% 65% at 50% 42%,#15110a,#070809 72%);cursor:grab}
  body.drag{cursor:grabbing}
  canvas{display:block;touch-action:none}
  .lbl{position:fixed;left:18px;top:16px;z-index:2;pointer-events:none;font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,196,81,.55)}
  .lbl b{color:#F5C451}
  .hint{position:fixed;left:0;right:0;bottom:16px;text-align:center;z-index:2;pointer-events:none;font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,196,81,.4)}
</style></head>
<body>
<canvas id="c"></canvas>
<div class="lbl">graph style 04b · <b>circuit map · 3D (experimental)</b></div>
<div class="hint">multi-tier chip · fine traces · drag to orbit</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var cv=document.getElementById('c'),ctx=cv.getContext('2d'),W,H,DPR,MIN;
  var LAB=['fx effects','CWT templates','brand kit','effective-html','Charter','diary','3D swarm','gallery','wake hook','Akashic','Vishnu gate','showcases','glitch','starchart','synapse'];
  var CFG={tiers:3,grid:1,foc:920,tilt:0.60};
  var nodes=[],edges=[],pulses=[],chip,ay=0.5,ax=CFG.tilt,vel=0,drag=false,lx=0,ly=0,hover=-1,f=0,SP,GAP,SCALE,CX,CY;
  function rs(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;MIN=Math.min(W,H);
    cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);
    SP=MIN*0.13;GAP=MIN*0.085;SCALE=1.35;CX=W/2;CY=H/2;build();}
  function build(){nodes=[];edges=[];pulses=[];var map={},li=0,T=CFG.tiers,g=CFG.grid;
    for(var t=0;t<T;t++){var y=(t-(T-1)/2)*GAP;
      for(var gx=-g;gx<=g;gx++)for(var gz=-g;gz<=g;gz++){
        var midChip=(t===((T-1)/2|0)&&gx===0&&gz===0);
        var n={x:gx*SP,y:y,z:gz*SP,t:t,gx:gx,gz:gz,chip:midChip,lab:''};
        map[t+','+gx+','+gz]=nodes.length;
        if(!midChip){ if(li<LAB.length){n.lab=LAB[li++];} }
        else { chip=nodes.length; }
        nodes.push(n);}}
    // within-tier traces (grid neighbours)
    for(var k in map){var pp=k.split(',').map(Number),i0=map[k];
      var r=map[pp[0]+','+(pp[1]+1)+','+pp[2]]; if(r!=null&&!(nodes[i0].chip||nodes[r].chip))edges.push([i0,r]);
      var d=map[pp[0]+','+pp[1]+','+(pp[2]+1)]; if(d!=null&&!(nodes[i0].chip||nodes[d].chip))edges.push([i0,d]);
      var v=map[(pp[0]+1)+','+pp[1]+','+pp[2]]; if(v!=null)edges.push([i0,v]); // vertical via
    }
    // chip hub links to the 4 mid-edge pads on its tier
    var mt=((T-1)/2|0);[['1','0'],['-1','0'],['0','1'],['0','-1']].forEach(function(o){var id=map[mt+','+o[0]+','+o[1]];if(id!=null)edges.push([chip,id]);});
  }
  rs();addEventListener('resize',rs);
  function proj(p){var ca=Math.cos(ay),sa=Math.sin(ay),X=p.x*ca-p.z*sa,Z=p.x*sa+p.z*ca,
    cb=Math.cos(ax),sb=Math.sin(ax),Y=p.y*cb-Z*sb,Zp=p.y*sb+Z*cb,fc=CFG.foc/(CFG.foc+Zp);
    return {sx:CX+X*fc*SCALE,sy:CY+Y*fc*SCALE,f:fc,z:Zp};}
  function fog(f0){return Math.max(0.12,Math.min(1,(f0-0.78)/0.34));}
  function spawn(){var e=edges[(Math.random()*edges.length)|0];pulses.push({e:e,t:0,sp:.012+Math.random()*.016});}

  function drawChip(P){ // detailed isometric die at the chip node, drawn on its tier plane
    var c=nodes[chip],h=SP*0.62,fc=P.f,glow=0.6+0.4*Math.sin(f*0.05);
    function pj(dx,dz){return proj({x:c.x+dx,y:c.y,z:c.z+dz});}
    var q=[pj(-h,-h),pj(h,-h),pj(h,h),pj(-h,h)];
    // base face
    ctx.save();
    var grd=ctx.createLinearGradient(q[0].sx,q[0].sy,q[2].sx,q[2].sy);
    grd.addColorStop(0,'#221a0e');grd.addColorStop(.5,'#191510');grd.addColorStop(1,'#120f0c');
    ctx.beginPath();ctx.moveTo(q[0].sx,q[0].sy);for(var i=1;i<4;i++)ctx.lineTo(q[i].sx,q[i].sy);ctx.closePath();
    ctx.fillStyle=grd;ctx.fill();
    // glowing rim
    ctx.shadowColor='rgba(255,150,40,'+(0.6*glow)+')';ctx.shadowBlur=22*fc;
    ctx.lineWidth=2.2*fc;ctx.strokeStyle='rgba(255,160,50,'+(0.85*glow)+')';ctx.stroke();
    ctx.shadowBlur=0;
    // inner circuit rings
    [0.72,0.46].forEach(function(s){var r=[pj(-h*s,-h*s),pj(h*s,-h*s),pj(h*s,h*s),pj(-h*s,h*s)];
      ctx.beginPath();ctx.moveTo(r[0].sx,r[0].sy);for(var i=1;i<4;i++)ctx.lineTo(r[i].sx,r[i].sy);ctx.closePath();
      ctx.lineWidth=1*fc;ctx.strokeStyle='rgba(245,170,70,0.5)';ctx.stroke();});
    // dotted circuit texture
    ctx.fillStyle='rgba(255,180,80,0.55)';for(var dx=-0.8;dx<=0.8;dx+=0.2)for(var dz=-0.8;dz<=0.8;dz+=0.2){
      if(Math.abs(dx)<0.25&&Math.abs(dz)<0.25)continue;var pt=pj(dx*h,dz*h);ctx.beginPath();ctx.arc(pt.sx,pt.sy,1.1*fc,0,6.3);ctx.fill();}
    // pins around edges
    ctx.strokeStyle='rgba(245,196,81,0.6)';ctx.lineWidth=1.1*fc;
    for(var s2=-0.7;s2<=0.7;s2+=0.35){var a=pj(s2*h,-h),b=pj(s2*h,-h*1.18);ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.stroke();
      var a2=pj(s2*h,h),b2=pj(s2*h,h*1.18);ctx.beginPath();ctx.moveTo(a2.sx,a2.sy);ctx.lineTo(b2.sx,b2.sy);ctx.stroke();
      var a3=pj(-h,s2*h),b3=pj(-h*1.18,s2*h);ctx.beginPath();ctx.moveTo(a3.sx,a3.sy);ctx.lineTo(b3.sx,b3.sy);ctx.stroke();
      var a4=pj(h,s2*h),b4=pj(h*1.18,s2*h);ctx.beginPath();ctx.moveTo(a4.sx,a4.sy);ctx.lineTo(b4.sx,b4.sy);ctx.stroke();}
    // glowing core + Ra
    var ctr=pj(0,0),cr=h*0.5*fc*SCALE*0.5+8*fc;
    var cg=ctx.createRadialGradient(ctr.sx,ctr.sy,0,ctr.sx,ctr.sy,cr);
    cg.addColorStop(0,'rgba(255,210,120,'+glow+')');cg.addColorStop(0.5,'rgba(255,150,40,'+(0.5*glow)+')');cg.addColorStop(1,'rgba(255,140,30,0)');
    ctx.globalCompositeOperation='lighter';ctx.fillStyle=cg;ctx.beginPath();ctx.arc(ctr.sx,ctr.sy,cr,0,6.3);ctx.fill();ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#fff3d4';ctx.font='700 '+(15*fc)+'px "JetBrains Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(255,170,60,0.9)';ctx.shadowBlur=10*fc;ctx.fillText('Ra',ctr.sx,ctr.sy);ctx.shadowBlur=0;
    ctx.textBaseline='alphabetic';ctx.restore();
  }

  function frame(){f++;if(!drag){ay+=vel||0.0022;vel*=0.94;}ctx.clearRect(0,0,W,H);
    var P=nodes.map(proj);
    // tier planes (faint grids), far first
    var T=CFG.tiers,g=CFG.grid,planes=[];
    for(var t=0;t<T;t++){var y=(t-(T-1)/2)*GAP,e=g+0.5,cc=proj({x:0,y:y,z:0});
      planes.push({t:t,z:cc.z,corners:[proj({x:-e*SP,y:y,z:-e*SP}),proj({x:e*SP,y:y,z:-e*SP}),proj({x:e*SP,y:y,z:e*SP}),proj({x:-e*SP,y:y,z:e*SP})]});}
    planes.sort(function(a,b){return b.z-a.z;});
    planes.forEach(function(pl){var q=pl.corners;ctx.beginPath();ctx.moveTo(q[0].sx,q[0].sy);for(var i=1;i<4;i++)ctx.lineTo(q[i].sx,q[i].sy);ctx.closePath();
      ctx.fillStyle='rgba(245,196,81,0.022)';ctx.fill();ctx.lineWidth=1;ctx.strokeStyle='rgba(245,196,81,0.08)';ctx.stroke();});
    // edges — FINE metal traces, far first
    var eo=edges.map(function(e,i){return [(P[e[0]].z+P[e[1]].z)/2,i];}).sort(function(a,b){return b[0]-a[0];});
    for(var j=0;j<eo.length;j++){var e=edges[eo[j][1]],a=P[e[0]],b=P[e[1]],lit=hover>=0&&(e[0]===hover||e[1]===hover),al=fog((a.f+b.f)/2);
      ctx.strokeStyle=lit?'rgba(54,230,255,0.8)':'rgba(245,196,81,'+(0.22*al)+')';ctx.lineWidth=(lit?1.3:0.6)*Math.max(.6,(a.f+b.f)/2);
      ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.stroke();}
    // pulses
    if(!reduce&&f%14===0&&pulses.length<34)spawn();
    ctx.globalCompositeOperation='lighter';
    for(var p=pulses.length-1;p>=0;p--){var pu=pulses[p],na=nodes[pu.e[0]],nb=nodes[pu.e[1]];pu.t+=pu.sp;if(pu.t>=1){pulses.splice(p,1);continue;}
      var wp=proj({x:na.x+(nb.x-na.x)*pu.t,y:na.y+(nb.y-na.y)*pu.t,z:na.z+(nb.z-na.z)*pu.t}),rr=5*wp.f;
      var gg=ctx.createRadialGradient(wp.sx,wp.sy,0,wp.sx,wp.sy,rr);gg.addColorStop(0,'#ffe6b0');gg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gg;ctx.beginPath();ctx.arc(wp.sx,wp.sy,rr,0,6.3);ctx.fill();}
    ctx.globalCompositeOperation='source-over';
    // pads — far first, size/brightness by depth
    var no=nodes.map(function(n,i){return [P[i].z,i];}).sort(function(a,b){return b[0]-a[0];});
    for(var k=0;k<no.length;k++){var i=no[k][1],n=nodes[i];if(n.chip)continue;var pp=P[i],al=fog(pp.f),s=(2.4+ (i%3)*0.8)*pp.f,
      dim=hover>=0&&hover!==i;
      ctx.globalCompositeOperation='lighter';var gg=ctx.createRadialGradient(pp.sx,pp.sy,0,pp.sx,pp.sy,s*3);
      gg.addColorStop(0,'rgba(255,200,90,'+(al*(dim?.4:.9))+')');gg.addColorStop(1,'rgba(245,170,70,0)');ctx.fillStyle=gg;ctx.beginPath();ctx.arc(pp.sx,pp.sy,s*3,0,6.3);ctx.fill();
      ctx.globalCompositeOperation='source-over';
      ctx.fillStyle=hover===i?'#36E6FF':'rgba(255,210,130,'+al+')';ctx.beginPath();ctx.arc(pp.sx,pp.sy,s,0,6.3);ctx.fill();}
    // central chip (hero, on top)
    drawChip(P);
    // hover label
    if(hover>=0&&nodes[hover].lab){var pp=P[hover];ctx.font='500 '+(11)+'px "JetBrains Mono",monospace';ctx.textAlign='center';
      ctx.fillStyle='rgba(54,230,255,.95)';ctx.fillText(nodes[hover].lab,pp.sx,pp.sy-12);}
    requestAnimationFrame(frame);}
  if(reduce){ay=0.6;frame();/* one pass; loop continues but pulses gated → calm */}else requestAnimationFrame(frame);

  // input — drag to orbit
  function hit(mx,my){var best=-1,bd=18;for(var i=0;i<nodes.length;i++){if(nodes[i].chip)continue;var p=proj(nodes[i]);var d=Math.hypot(p.sx-mx,p.sy-my);if(d<bd){bd=d;best=i;}}return best;}
  cv.addEventListener('pointermove',function(e){if(drag){var dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
      ay+=dx*0.006;vel=dx*0.006;ax=Math.max(0.15,Math.min(1.15,ax+dy*0.004));hover=-1;}else hover=hit(e.clientX,e.clientY);});
  cv.addEventListener('pointerdown',function(e){drag=true;lx=e.clientX;ly=e.clientY;document.body.classList.add('drag');});
  addEventListener('pointerup',function(){drag=false;document.body.classList.remove('drag');});
})();
</script>
</body></html>

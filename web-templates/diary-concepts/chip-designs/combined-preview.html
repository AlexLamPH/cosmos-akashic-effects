<!doctype html>
<!-- Cosmos AI Lab · Ra — central-chip 6×7 + signal-mesh (#4) preview.
     Chip = #6 Plasma die (aurora + neon edge) but the perforation dots are now multicolour blinking
     LEDs (the colour-cycle/blink behaviour of #7's chiplet squares). Graph signals = #4 style:
     ultra-thin silicon traces + tiny multicolour circles streaming through the mesh into the chip.
     Canvas 2D, self-contained, offline, reduced-motion aware. -->
<html lang="vi"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chip 6×7 + signal mesh — Ra</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#07080c;font-family:'JetBrains Mono',monospace}
  #c{display:block;position:fixed;inset:0}
  .lbl{position:fixed;left:18px;top:15px;z-index:2;pointer-events:none;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(233,200,119,.6)}
  .lbl b{color:#E9C877}
  .hint{position:fixed;left:0;right:0;bottom:14px;text-align:center;z-index:2;pointer-events:none;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(210,216,232,.34)}
</style></head>
<body>
<canvas id="c"></canvas>
<div class="lbl">chip <b>6×7</b> · plasma + LED nhấp nháy · <b>signal mesh</b> kiểu #4 (mạch mỏng + chấm li ti)</div>
<div class="hint">node → chip · tín hiệu đủ màu chạy về bộ não trung tâm</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var GOLD='#E9C877',CYAN='#36E6FF',ROSE='#FF5A8A',VIO='#A06BFF',WG='#fff3d4',DIE='#15140f';
  var PAL=[GOLD,CYAN,ROSE,VIO];
  var cv=document.getElementById('c'),ctx=cv.getContext('2d'),W,H,DPR=1;
  var nodes=[],edges=[],sig=[];
  function rng(s){return function(){s=(s*1664525+1013904223)&0xffffffff;return ((s>>>8)/0x1000000);};}
  function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}

  function build(){
    var cx=W/2,cy=H/2,r=rng(11),n=11,ringR=Math.min(W,H)*0.36;
    nodes=[];
    for(var i=0;i<n;i++){var a=(i/n)*6.2832-1.57+(r()-0.5)*0.25,rad=ringR*(0.8+r()*0.5);
      nodes.push({x:cx+Math.cos(a)*rad,y:cy+Math.sin(a)*rad*0.78,c:PAL[i%4]});}
    edges=[];
    for(var j=0;j<n;j++)edges.push({a:j,b:-1});           // node → chip
    for(var k=0;k<5;k++){var u=(r()*n)|0,v=(r()*n)|0;if(u!==v)edges.push({a:u,b:v});} // a few node-node
  }
  function pos(idx){return idx<0?{x:W/2,y:H/2}:nodes[idx];}

  function spawn(){if(sig.length>110)return;var e=edges[(Math.random()*edges.length)|0];
    sig.push({e:e,t:0,sp:0.006+Math.random()*0.012,c:PAL[(Math.random()*4)|0],dir:(Math.random()<0.85?1:0),sz:0.8+Math.random()*0.9});}

  function pins4(cx,cy,R,col,n){ctx.strokeStyle=col;ctx.lineWidth=1.4*DPR;n=n||6;var len=R*0.18,i,o;
    for(i=0;i<n;i++){o=-R+R*0.32+i*(R*1.36/(n-1));
      ctx.beginPath();ctx.moveTo(cx+o,cy-R);ctx.lineTo(cx+o,cy-R-len);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+o,cy+R);ctx.lineTo(cx+o,cy+R+len);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx-R,cy+o);ctx.lineTo(cx-R-len,cy+o);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+R,cy+o);ctx.lineTo(cx+R+len,cy+o);ctx.stroke();}}

  // ---- combined chip: #6 plasma die + #7 colour-blink behaviour on the dot grid ----
  function chip(cx,cy,t,R){
    ctx.save();rr(cx-R,cy-R,2*R,2*R,R*0.14);ctx.clip();
    ctx.fillStyle='#0b0a0e';ctx.fillRect(cx-R,cy-R,2*R,2*R);
    var blobs=[[GOLD,0],[ROSE,2.1],[VIO,4.2],[CYAN,1.0]],i;
    for(i=0;i<blobs.length;i++){var bx=cx+Math.cos(t*0.6+blobs[i][1])*R*0.6,by=cy+Math.sin(t*0.5+blobs[i][1]*1.3)*R*0.6;
      var g=ctx.createRadialGradient(bx,by,0,bx,by,R*1.1);g.addColorStop(0,blobs[i][0]);g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.globalAlpha=0.6;ctx.fillStyle=g;ctx.fillRect(cx-R,cy-R,2*R,2*R);}
    ctx.globalAlpha=1;
    // multicolour blinking LED dots (colour cycles + brightness pulses, per #7)
    var step=R*0.26,col=0;
    for(var gx=cx-R+step*0.5;gx<cx+R;gx+=step){var row=0;
      for(var gy=cy-R+step*0.5;gy<cy+R;gy+=step){
        var idx=(col*7+row*3+Math.floor(t*0.8))%4;
        var blink=0.25+0.75*Math.abs(Math.sin(t*2.6+(col+row)*0.6));
        ctx.fillStyle='rgba(5,5,8,.5)';ctx.beginPath();ctx.arc(gx,gy,step*0.33,0,6.3);ctx.fill();
        ctx.globalAlpha=blink;ctx.fillStyle=PAL[idx];ctx.beginPath();ctx.arc(gx,gy,step*0.21,0,6.3);ctx.fill();
        ctx.globalAlpha=blink*0.4;ctx.beginPath();ctx.arc(gx,gy,step*0.36,0,6.3);ctx.fill();ctx.globalAlpha=1;
        row++;}
      col++;}
    ctx.restore();
    ctx.strokeStyle=WG;ctx.lineWidth=2*DPR;ctx.shadowColor=ROSE;ctx.shadowBlur=16*DPR;rr(cx-R,cy-R,2*R,2*R,R*0.14);ctx.stroke();ctx.shadowBlur=0;
    pins4(cx,cy,R,'rgba(255,240,210,.45)',6);
    ctx.fillStyle=WG;ctx.font='700 '+(R*0.5)+'px "Space Grotesk",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=6*DPR;ctx.fillText('Ra',cx,cy+R*0.02);ctx.shadowBlur=0;
  }

  function draw(){
    var t=performance.now()/1000;ctx.clearRect(0,0,W,H);
    // subtle bg grid
    ctx.strokeStyle='rgba(245,196,81,.03)';ctx.lineWidth=1;var gs=34*DPR,i;
    for(i=0;i<W;i+=gs){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
    for(i=0;i<H;i+=gs){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
    // ultra-thin silicon traces
    for(i=0;i<edges.length;i++){var a=pos(edges[i].a),b=pos(edges[i].b);
      ctx.strokeStyle='rgba(185,200,230,.10)';ctx.lineWidth=0.7*DPR;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
    // tiny multicolour signals streaming through the mesh
    if(!reduce){spawn();spawn();}
    ctx.globalCompositeOperation='lighter';
    for(var p=sig.length-1;p>=0;p--){var s=sig[p];s.t+=s.sp;if(s.t>=1){sig.splice(p,1);continue;}
      var a2=pos(s.e.a),b2=pos(s.e.b),tt=s.dir?s.t:1-s.t,x=a2.x+(b2.x-a2.x)*tt,y=a2.y+(b2.y-a2.y)*tt;
      ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(x,y,s.sz*1.5*DPR,0,6.3);ctx.fill();
      ctx.globalAlpha=0.45;ctx.beginPath();ctx.arc(x,y,s.sz*3*DPR,0,6.3);ctx.fill();ctx.globalAlpha=1;}
    ctx.globalCompositeOperation='source-over';
    // node pads
    for(i=0;i<nodes.length;i++){var n=nodes[i],sz=5*DPR;
      ctx.fillStyle=DIE;rr(n.x-sz,n.y-sz*0.7,sz*2,sz*1.4,2.5*DPR);ctx.fill();
      ctx.strokeStyle=n.c;ctx.lineWidth=1.4*DPR;ctx.stroke();}
    // central chip on top
    chip(W/2,H/2,t,Math.min(W,H)*0.14);
    requestAnimationFrame(draw);
  }

  function size(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=Math.round(innerWidth*DPR);H=cv.height=Math.round(innerHeight*DPR);
    cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';build();}
  addEventListener('resize',size);size();requestAnimationFrame(draw);
})();
</script>
</body></html>

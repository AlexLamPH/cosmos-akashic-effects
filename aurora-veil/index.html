<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Aurora Veil</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Aurora Veil — translucent vertical aurora curtains rippling over a seeded starfield. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const COLS=[[54,211,154],[139,92,255],[70,180,255],[255,92,194],[224,178,74]];
let W,H,DPR,stars,bands;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=mulberry32(1337);stars=[];for(let i=0;i<260;i++)stars.push({x:r()*W,y:r()*H*0.9,s:(0.4+r()*1.6)*DPR,p:r(),tw:1+Math.floor(r()*3)});
  bands=[];const r2=mulberry32(91);const N=11;for(let i=0;i<N;i++){bands.push({c:COLS[i%COLS.length],bx:(i+0.5)/N,w:0.05+r2()*0.05,amp:W*(0.04+r2()*0.06),ph:r2(),k:1+Math.floor(r2()*2),wob:0.5+r2()*0.5,top:0.05+r2()*0.12,a:0.10+r2()*0.10});}}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  const sky=x.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#05030d');sky.addColorStop(0.6,'#070417');sky.addColorStop(1,'#0a0820');x.fillStyle=sky;x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  for(const s of stars){const tw=0.4+0.6*(0.5+0.5*Math.sin(TAU*(u*s.tw+s.p)));x.fillStyle=`rgba(220,225,255,${(0.25+0.6*tw).toFixed(3)})`;x.beginPath();x.arc(s.x,s.y,s.s,0,TAU);x.fill();}
  for(const b of bands){const sway=Math.sin(TAU*(u*b.k+b.ph))*b.amp;const cx=b.bx*W+sway;const wob=b.w*W*(0.8+0.4*Math.sin(TAU*(u*2+b.ph)));
    const cols=20;for(let j=0;j<cols;j++){const fy=j/(cols-1);const py=fy*H;
      const ripple=Math.sin(TAU*(u*b.k*1.5+fy*b.wob*2+b.ph))*b.amp*0.5*fy;const xx=cx+ripple;
      const topY=b.top*H*(0.6+0.4*Math.sin(TAU*(u+b.ph)));if(py<topY)continue;
      const vis=Math.min(1,(py-topY)/(H*0.25))*Math.max(0,1-fy*0.7);const c=b.c;
      const g=x.createLinearGradient(xx-wob,0,xx+wob,0);
      g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0)`);g.addColorStop(0.5,`rgba(${c[0]},${c[1]},${c[2]},${(b.a*vis).toFixed(3)})`);g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
      x.fillStyle=g;x.fillRect(xx-wob,py,wob*2,H/cols+2);}}
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

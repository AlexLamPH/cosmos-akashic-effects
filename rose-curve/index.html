<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Rose Curve</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Rose Curve — an animated rhodonea r=cos(kθ) drawn as glowing layered closed paths; petal count and rotation morph via integer harmonics of u and return at u=1.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=7000,TAU=6.28318530718;
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rnd=mulberry32(0x2057);
let W,H,DPR,CX,CY,RAD;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  CX=W/2;CY=H/2;RAD=Math.min(W,H)*0.40;}
rs();addEventListener('resize',rs);
// one rhodonea closed path: k petals, smoothly blended toward k+1, rotated, scaled
function rose(k,blend,rot,scale,squish){
  const STEP=TAU/720; x.beginPath();
  for(let a=0;a<=TAU+STEP;a+=STEP){
    // blend petal count between integers so morph is continuous yet returns
    const r0=Math.cos(k*a), r1=Math.cos((k+1)*a), r=(r0*(1-blend)+r1*blend);
    const rr=(0.18+0.82*Math.abs(r))*scale*squish(a);
    const px=CX+Math.cos(a+rot)*rr, py=CY+Math.sin(a+rot)*rr;
    if(a===0)x.moveTo(px,py);else x.lineTo(px,py);
  } x.closePath();
}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP, ph=u*TAU;
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';x.lineJoin='round';
  // petal count cycles through a small integer set across the loop, returning at u=1
  const seq=[3,4,5,6], idx=u*seq.length, j=idx|0, blend=idx-j, kBase=seq[j%seq.length];
  // global rotation: integer harmonics of u so frame(0)==frame(LOOP)
  const spin=ph + 0.18*Math.sin(ph*2);
  // gentle breathing radius via integer harmonic
  const breathe=RAD*(0.92+0.08*Math.cos(ph*1*1));
  // squish makes petals pulse asymmetrically but periodically
  const sq=a=>1+0.10*Math.sin(a*3+ph*2);
  // draw several concentric layers, each a different accent + phase offset -> depth glow
  const LAYERS=6;
  for(let L=0;L<LAYERS;L++){
    const f=L/LAYERS;
    const rot=spin + f*0.20*Math.sin(ph) + f*0.6;
    const scale=breathe*(0.42+0.58*(1-f));
    const blendL=(blend+f*0.0); // shared morph keeps coherence
    rose(kBase,blendL,rot,scale,sq);
    x.lineWidth=DPR*(0.8+2.6*f);
    x.strokeStyle=AC[(j+L)%AC.length];
    x.globalAlpha=0.16+0.20*(1-f);
    x.stroke();
  }
  // bright crisp top edge for definition
  rose(kBase,blend,spin,breathe,sq);
  x.lineWidth=DPR*1.1;x.strokeStyle='#ffffff';x.globalAlpha=0.30;x.stroke();
  // warm pulsing core
  const cr=breathe*0.16*(1+0.3*Math.sin(ph*2));
  const g=x.createRadialGradient(CX,CY,0,CX,CY,cr);
  g.addColorStop(0,'rgba(255,200,120,0.85)');g.addColorStop(1,'rgba(255,120,80,0)');
  x.globalAlpha=1;x.fillStyle=g;x.beginPath();x.arc(CX,CY,cr,0,TAU);x.fill();
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}
const AUTO2=new URLSearchParams(location.search).has('auto'); if(AUTO2){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

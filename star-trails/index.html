<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Star Trails</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Star Trails — a long-exposure night sky where every star traces a partial concentric arc circling a bright pole star, the whole field sweeping by one integer turn-fraction per loop for a seamless rotation. Deterministic, pure Canvas 2D.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=9000,TAU=6.28318530718,SWEEP=1;                     // integer turns over LOOP -> seamless
let W,H,DPR,px,py,stars=[],bg=[];const N=113;
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents (cool): cosmic, violet, aurora, sacred
const AC=[[70,180,255],[139,92,255],[54,211,154],[224,178,74],[255,255,255]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  px=W*0.34;py=H*0.40;                                         // pole star, off-centre
  const r=mul(13);const maxR=Math.hypot(Math.max(px,W-px),Math.max(py,H-py))*1.05;
  stars=[];for(let i=0;i<210;i++){                             // trailing stars
    const rad=20*DPR+r()*maxR, th0=r()*TAU, arc=(0.22+r()*0.85), // each traces a partial circle (arc<1 turn)
      c=AC[(r()*AC.length)|0], br=0.45+r()*0.55;
    stars.push({rad,th0,arc,c,br});}
  bg=[];const s2=mul(91);for(let i=0;i<70;i++)bg.push({x:s2()*W,y:s2()*H,r:s2()*1.1*DPR+0.3*DPR,a:0.15+s2()*0.35});
}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // faint vignette sky wash
  const vg=x.createRadialGradient(px,py,0,px,py,Math.hypot(W,H)*0.6);
  vg.addColorStop(0,'rgba(20,18,46,0.5)');vg.addColorStop(1,'rgba(5,3,13,0)');
  x.globalCompositeOperation='lighter';x.fillStyle=vg;x.fillRect(0,0,W,H);
  for(const s of bg){x.fillStyle=`rgba(180,195,255,${s.a})`;x.beginPath();x.arc(s.x,s.y,s.r,0,TAU);x.fill();} // static distant stars
  const head=TAU*SWEEP*u;                                      // global rotation, integer turns -> seamless
  for(const s of stars){const c=`${s.c[0]},${s.c[1]},${s.c[2]}`;const span=s.arc*TAU;
    const SEG=Math.max(6,(s.arc*44)|0);
    for(let k=0;k<=SEG;k++){const f=k/SEG;const th=s.th0+head-span*f; // sweep a trailing arc behind head
      const a=(1-f)*s.br;if(a<0.02)continue;
      const xx=px+Math.cos(th)*s.rad, yy=py+Math.sin(th)*s.rad;
      const w=(0.5+1.3*(1-f))*DPR;
      x.fillStyle=`rgba(${c},${a*0.5})`;x.beginPath();x.arc(xx,yy,w,0,TAU);x.fill();}
    const hx=px+Math.cos(s.th0+head)*s.rad, hy=py+Math.sin(s.th0+head)*s.rad; // bright head
    x.fillStyle=`rgba(${c},${0.5*s.br})`;x.beginPath();x.arc(hx,hy,2.4*DPR,0,TAU);x.fill();
    x.fillStyle=`rgba(255,255,255,${0.9*s.br})`;x.beginPath();x.arc(hx,hy,1.1*DPR,0,TAU);x.fill();}
  // bright pole star at the centre of rotation
  x.fillStyle='rgba(120,180,255,0.20)';x.beginPath();x.arc(px,py,18*DPR,0,TAU);x.fill();
  x.fillStyle='rgba(180,210,255,0.55)';x.beginPath();x.arc(px,py,7*DPR,0,TAU);x.fill();
  x.fillStyle='rgba(255,255,255,0.98)';x.beginPath();x.arc(px,py,3.2*DPR,0,TAU);x.fill();
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

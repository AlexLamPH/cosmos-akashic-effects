<!doctype html><meta charset=utf8><title>Cosmos Analog Clock</title>
<!-- Cosmos Analog Clock — glowing geometric clock: ring of hour ticks, three hands, smooth second hand sweeping one full turn per LOOP; deterministic & seamless. -->
<style>html,body{margin:0;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=8000;                 // one full sweep of the second hand per loop (seamless: it returns to start)
const PAL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
let cx,cy,R;
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx=W/2;cy=H/2;R=Math.min(W,H)*0.42;}
addEventListener('resize',resize);resize();
function glowLine(x0,y0,x1,y1,col,w,a){ctx.globalCompositeOperation='lighter';ctx.strokeStyle=col;ctx.lineCap='round';ctx.globalAlpha=a;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();}
function dot(x,y,r,col,a){ctx.globalCompositeOperation='lighter';ctx.globalAlpha=a;const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();}
// fixed display time ~10:08:30 — hour & minute hands rest, second hand sweeps the loop
const HOUR_A=(10/12+8/720)*Math.PI*2-Math.PI/2, MIN_A=(8/60)*Math.PI*2-Math.PI/2;
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP;          // 0..1 = one full revolution of second hand
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  // soft back glow
  ctx.globalCompositeOperation='lighter';
  dot(cx,cy,R*1.25,'rgba(70,180,255,1)',0.10);
  // outer ring (double stroke)
  ctx.strokeStyle=PAL[0];ctx.globalAlpha=0.5;ctx.lineWidth=2.2*DPR;
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke();
  ctx.strokeStyle=PAL[1];ctx.globalAlpha=0.22;ctx.lineWidth=7*DPR;
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke();
  // 60 ticks; 12 majors glow brighter. A highlight sweeps the ring once per loop, tracking the second hand.
  for(let i=0;i<60;i++){
    const a=i/60*Math.PI*2-Math.PI/2;
    const major=i%5===0;
    const r0=major?R*0.86:R*0.93, r1=R*0.99;
    const col=major?PAL[((i/5)|0)%6]:PAL[1];
    const da=Math.abs(((i/60-u)+0.5)%1-0.5);   // angular distance from second hand
    const sweep=Math.max(0,1-da*8);
    const a0=(major?0.55:0.25)+sweep*0.5;
    glowLine(cx+Math.cos(a)*r0,cy+Math.sin(a)*r0,cx+Math.cos(a)*r1,cy+Math.sin(a)*r1,col,(major?3.4:1.8)*DPR,a0);
    if(major)dot(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1,7*DPR,col,0.55+sweep*0.4);
  }
  const sA=u*Math.PI*2-Math.PI/2;             // second hand — exactly one turn per loop
  // hour hand (short, thick)
  glowLine(cx,cy,cx+Math.cos(HOUR_A)*R*0.50,cy+Math.sin(HOUR_A)*R*0.50,PAL[5],7*DPR,0.85);
  glowLine(cx,cy,cx+Math.cos(HOUR_A)*R*0.50,cy+Math.sin(HOUR_A)*R*0.50,PAL[5],14*DPR,0.16);
  // minute hand (long)
  glowLine(cx,cy,cx+Math.cos(MIN_A)*R*0.78,cy+Math.sin(MIN_A)*R*0.78,PAL[3],4.6*DPR,0.9);
  glowLine(cx,cy,cx+Math.cos(MIN_A)*R*0.78,cy+Math.sin(MIN_A)*R*0.78,PAL[3],10*DPR,0.16);
  // second hand (thin accent, with counterweight tail) — smooth sweep
  glowLine(cx-Math.cos(sA)*R*0.18,cy-Math.sin(sA)*R*0.18,cx+Math.cos(sA)*R*0.92,cy+Math.sin(sA)*R*0.92,PAL[2],2*DPR,0.95);
  glowLine(cx,cy,cx+Math.cos(sA)*R*0.92,cy+Math.sin(sA)*R*0.92,PAL[2],6*DPR,0.18);
  dot(cx+Math.cos(sA)*R*0.92,cy+Math.sin(sA)*R*0.92,9*DPR,PAL[2],0.85);
  // hub
  dot(cx,cy,R*0.16,PAL[0],0.7);
  ctx.globalCompositeOperation='lighter';ctx.globalAlpha=1;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx,cy,3.4*DPR,0,7);ctx.fill();
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

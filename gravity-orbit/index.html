<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Gravity Orbit</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Gravity Orbit — planets and moons sweep elliptical orbits round a glowing star, integer periods make faint trailing arcs realign each loop. Deterministic, seamless, pure Canvas 2D.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=12000,TAU=6.28318530718;
let W,H,DPR,cx,cy,bodies=[],stars=[];const N=6;
// seeded RNG (mulberry32) — only at setup/resize, never in frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;
  const r=mul(31);const base=Math.min(W,H)*0.085;bodies=[];
  for(let i=0;i<N;i++){const a=base*(1.5+i*1.05+r()*0.2);    // semi-major axis grows outward
    bodies.push({a,b:a*(0.62+r()*0.18),rot:r()*TAU,           // ellipse axes + rotation
      period:N-i,th0:r()*TAU,R:(4.5+r()*4)*DPR,c:AC[i%AC.length]}); }
  stars=[];const rs2=mul(99);for(let i=0;i<90;i++)stars.push({x:rs2()*W,y:rs2()*H,r:rs2()*1.4*DPR+0.3*DPR,a:0.3+rs2()*0.5});
}
rs();addEventListener('resize',rs);
function pos(bd,u){const th=bd.th0+TAU*u*bd.period;          // integer period -> seamless
  const ex=Math.cos(th)*bd.a, ey=Math.sin(th)*bd.b;          // ellipse, star at centre
  const cr=Math.cos(bd.rot),sr=Math.sin(bd.rot);
  return[cx+ex*cr-ey*sr, cy+ex*sr+ey*cr];}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  for(const s of stars){x.fillStyle=`rgba(200,210,255,${s.a})`;x.beginPath();x.arc(s.x,s.y,s.r,0,TAU);x.fill();}
  for(const bd of bodies){                                   // faint trailing arc
    const c=`${bd.c[0]},${bd.c[1]},${bd.c[2]}`;const SEG=26,sp=0.10;
    for(let k=SEG;k>=1;k--){const p=pos(bd,u-(k/SEG)*sp);
      x.fillStyle=`rgba(${c},${0.30*(1-k/SEG)})`;x.beginPath();x.arc(p[0],p[1],bd.R*0.5*(1-k/SEG)+1*DPR,0,TAU);x.fill();}
  }
  // star core at the focus (centre)
  const sc='255,200,90';const pulse=1+0.06*Math.sin(TAU*u*2);
  x.fillStyle=`rgba(${sc},0.10)`;x.beginPath();x.arc(cx,cy,46*DPR*pulse,0,TAU);x.fill();
  x.fillStyle=`rgba(${sc},0.30)`;x.beginPath();x.arc(cx,cy,24*DPR*pulse,0,TAU);x.fill();
  x.fillStyle=`rgba(255,140,40,0.7)`;x.beginPath();x.arc(cx,cy,13*DPR,0,TAU);x.fill();
  x.fillStyle='rgba(255,250,230,0.98)';x.beginPath();x.arc(cx,cy,7.5*DPR,0,TAU);x.fill();
  for(const bd of bodies){const p=pos(bd,u);const c=`${bd.c[0]},${bd.c[1]},${bd.c[2]}`;  // glowing body
    x.fillStyle=`rgba(${c},0.16)`;x.beginPath();x.arc(p[0],p[1],bd.R*2.6,0,TAU);x.fill();
    x.fillStyle=`rgba(${c},0.45)`;x.beginPath();x.arc(p[0],p[1],bd.R*1.4,0,TAU);x.fill();
    x.fillStyle=`rgba(${c},0.95)`;x.beginPath();x.arc(p[0],p[1],bd.R,0,TAU);x.fill();
    x.fillStyle='rgba(255,255,255,0.85)';x.beginPath();x.arc(p[0]-bd.R*0.3,p[1]-bd.R*0.3,bd.R*0.34,0,TAU);x.fill();
  }
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

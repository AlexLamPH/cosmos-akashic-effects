<!doctype html><meta charset=utf8><title>Cosmos Lightning</title>
<!-- Cosmos Lightning — seeded branching bolts strobe on integer-harmonic beats over Phantom dark, deterministic & seamless. -->
<style>html,body{margin:0;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=8000;
const PAL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let bolts=[];
function build(){
  bolts=[];
  // 5 bolts, each on an integer harmonic beat so strobe loops seamlessly.
  const NB=5;
  for(let b=0;b<NB;b++){
    const rnd=mulberry32(1234+b*977);
    const harm=b+1;                 // integer flashes per LOOP -> seamless
    const phase=rnd();              // beat phase (mod 1)
    const col=PAL[b%PAL.length];
    const ax=W*(0.12+0.76*rnd()), ay=H*(0.05+0.12*rnd());
    const bx=W*(0.12+0.76*rnd()), by=H*(0.85+0.12*rnd());
    // build a jagged path with recursive branches
    const segs=[],branches=[];
    function jag(x0,y0,x1,y1,disp,depth,out){
      if(depth<=0){out.push([x0,y0,x1,y1]);return;}
      const mx=(x0+x1)/2+(rnd()-0.5)*disp, my=(y0+y1)/2+(rnd()-0.5)*disp;
      jag(x0,y0,mx,my,disp*0.55,depth-1,out);
      jag(mx,my,x1,y1,disp*0.55,depth-1,out);
      if(depth===3&&rnd()<0.6){ // spawn a branch
        const bl=[],ex=mx+(rnd()-0.5)*W*0.22,ey=my+(0.18+rnd()*0.22)*H;
        jag(mx,my,ex,ey,disp*0.7,2,bl);branches.push(bl);
      }
    }
    jag(ax,ay,bx,by,W*0.28,4,segs);
    bolts.push({harm,phase,col,segs,branches});
  }
}
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;build();}
addEventListener('resize',resize);resize();
function drawPath(segs,w,col,alpha){
  ctx.strokeStyle=col;ctx.globalAlpha=alpha;ctx.lineWidth=w;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){ctx.moveTo(s[0],s[1]);ctx.lineTo(s[2],s[3]);}
  ctx.stroke();
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  for(const bo of bolts){
    // strobe: integer harmonic flashes; sharp on, glowing afterglow tail
    const ph=( (u*bo.harm)+bo.phase )%1;
    const flash=Math.exp(-ph*6.0)+0.30*Math.exp(-((ph-0.5)*(ph-0.5))*40); // sharp strike + soft mid
    const after=0.18+0.22*flash;
    // afterglow halo (always-present dim core so frame 0 looks rich)
    drawPath(bo.segs,8*DPR,bo.col,after*0.25);
    drawPath(bo.segs,3.5*DPR,bo.col,Math.min(1,after*0.6+flash*0.5));
    // bright strike core
    drawPath(bo.segs,1.6*DPR,'#ffffff',Math.min(1,flash*0.9));
    for(const br of bo.branches){
      drawPath(br,2.5*DPR,bo.col,Math.min(1,after*0.5+flash*0.4));
      drawPath(br,1*DPR,'#ffffff',Math.min(1,flash*0.6));
    }
    // glowing nodes at endpoints
    for(const s of [bo.segs[0],bo.segs[bo.segs.length-1]]){
      const g=ctx.createRadialGradient(s[0],s[1],0,s[0],s[1],40*DPR);
      g.addColorStop(0,bo.col);g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.globalAlpha=after*0.6;ctx.fillStyle=g;ctx.beginPath();ctx.arc(s[0],s[1],40*DPR,0,7);ctx.fill();
    }
  }
  // ambient sparks crackling on harmonic beats
  for(let i=0;i<60;i++){
    const r=mulberry32(7000+i*131);const px=r()*W,py=r()*H,hh=1+((i*3)%5);
    const ph=((u*hh)+r())%1, fl=Math.exp(-ph*9);
    if(fl>0.05){ctx.globalAlpha=fl*0.5;ctx.fillStyle=PAL[i%PAL.length];ctx.fillRect(px,py,2*DPR,2*DPR);}
  }
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

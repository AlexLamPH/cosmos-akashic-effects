<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Glitch Text</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Glitch Text — "COSMOS" RGB-split datamosh with deterministic slice jitter + scanline tears, stays readable. Pure Canvas2D, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=7000,TAU=6.28318530718,WORD="COSMOS";
let W,H,DPR,cx,cy,fs,buf,bx;
// seeded RNG (mulberry32) — once at setup, never in frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: cosmic(R chan), nebula(G/pink), aurora(B-ish) for the split + others for tears
const COSMIC=[70,180,255],NEBULA=[255,92,194],AURORA=[54,211,154];
const K=96,SLICES=14; let jit=[],tear=[]; // deterministic tables sampled by floor(u*K)
function build(){const r=mul(23);jit=[];tear=[];
  for(let k=0;k<K;k++){const row=[];for(let s=0;s<SLICES;s++)row.push((r()*2-1));jit.push(row);
    tear.push(r()<0.16?{y:r(),h:0.04+r()*0.06,dx:(r()*2-1)}:null);} }
build();
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;
  fs=Math.min(W/(WORD.length*0.72),H*0.46);
  buf=document.createElement('canvas');buf.width=W;buf.height=H;bx=buf.getContext('2d');}
rs();addEventListener('resize',rs);
function paint(ctx,dx,dy,col,a){ctx.font='700 '+fs+'px Georgia,"Times New Roman",serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${a})`;
  ctx.fillText(WORD,cx+dx,cy+dy);}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H); // opaque repaint, pure of t
  // beat: integer harmonic so split amount loops; sampled jitter row indexed by floor(u*K)
  const ki=Math.floor(u*K)%K,beat=0.5+0.5*Math.sin(TAU*4*u);
  const split=fs*(0.018+0.05*beat*beat); // RGB-split offset, wider on beats
  // composite the 3 channels additively into buffer
  bx.clearRect(0,0,W,H);bx.globalCompositeOperation='lighter';
  paint(bx,-split,split*0.3,COSMIC,0.9);
  paint(bx, split,-split*0.3,NEBULA,0.85);
  paint(bx, 0, split*0.6,AURORA,0.8);
  bx.globalCompositeOperation='source-over';
  // draw buffer back in horizontal slices with deterministic per-slice jitter
  const sh=H/SLICES;
  for(let s=0;s<SLICES;s++){const sy=s*sh;
    const j=jit[ki][s]*split*2.2*(0.4+beat); // slice shift, stronger on beats
    x.drawImage(buf,0,sy,W,sh, j,sy,W,sh);}
  // occasional scanline tear: copy a thin band shifted hard sideways
  const tr=tear[ki];
  if(tr){const ty=tr.y*H,th=tr.h*H,tdx=tr.dx*fs*0.5;
    x.globalAlpha=0.9;x.drawImage(buf,0,ty,W,th, tdx,ty,W,th);
    x.globalAlpha=0.25;x.fillStyle='rgba(70,180,255,0.5)';x.fillRect(0,ty,W,2*DPR);x.globalAlpha=1;}
  // faint solid core pass keeps the word readable through the noise
  x.globalCompositeOperation='lighter';
  paint(x,0,0,[200,210,235],0.18);
  // scanline overlay
  x.globalAlpha=0.10;x.fillStyle='#000';for(let y=0;y<H;y+=3*DPR)x.fillRect(0,y,W,1*DPR);x.globalAlpha=1;
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Handpan</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}
canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);color:#cdb6ff;font:13px/1.4 system-ui,sans-serif;
opacity:.72;letter-spacing:.04em;pointer-events:none;text-shadow:0 0 8px rgba(139,92,255,.6)}</style></head>
<body><canvas id="c"></canvas><div id="hint">▶ click the tone fields / press 1-9 to HEAR the handpan</div><script>
// Cosmos Handpan — a circular steel drum: a central "ding" note + 8 tone fields around the rim tuned to a D Kurd
// meditative scale. Tap a field to ring a warm bell-like note (sine fundamental + 2 soft harmonics, soft attack,
// medium decay). Tapped fields ripple & glow; the ding pulses. LIVE: real Web Audio. AUTO: silent seeded pattern.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto');
const LOOP=7000,TAU=6.28318530718,N=8;
// D Kurd 9: ding = D3, fields = A3 Bb3 C4 D4 E4 F4 G4 A4 — soothing minor-mode handpan tuning.
const BASE=146.83; // D3 (ding)
const FIELD_ST=[7,8,10,12,14,15,17,19]; // semitones above ding for the 8 rim fields
function fieldFreq(i){return BASE*Math.pow(2,FIELD_ST[i]/12);}
function rng(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let W,H,DPR,cx,cy,R;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  cx=W/2;cy=H/2;R=Math.min(W,H)*0.40;}
rs();addEventListener('resize',rs);
// field positions (rim) + ding (center)
function fieldPos(i){const ang=-Math.PI/2+i*TAU/N;return[cx+Math.cos(ang)*R*0.66,cy+Math.sin(ang)*R*0.66];}
// last-tap times (ms in loop time): index 0..N-1 fields, N = ding
const tap=new Array(N+1).fill(-1e9);
const RIPPLE_MS=1600;
function tapExc(i,tNow){let age=tNow-tap[i];if(age<0)age+=LOOP;if(age>RIPPLE_MS)return 0;return 1-age/RIPPLE_MS;}
// ---- audio (live only): bell-like sine + 2 harmonics, soft attack / medium decay ----
let actx,master;
function audio(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();
  master.gain.value=0.2;const comp=actx.createDynamicsCompressor();master.connect(comp);comp.connect(actx.destination);}
  if(actx.state==='suspended')actx.resume();return actx;}
function ring(f){const a=audio(),t=a.currentTime;
  const g=a.createGain();g.connect(master);
  // soft attack, medium decay bell envelope
  g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(0.9,t+0.04);
  g.gain.exponentialRampToValueAtTime(0.0008,t+2.4);
  // fundamental + 2 inharmonic-ish harmonics for a metallic warmth
  const parts=[[1,1.0],[2,0.32],[3.01,0.16]];
  for(const[mult,amp]of parts){const o=a.createOscillator();o.type='sine';o.frequency.value=f*mult;
    const og=a.createGain();og.gain.value=amp;o.connect(og);og.connect(g);o.start(t);o.stop(t+2.5);}
}
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
const VIO=hex('#8b5cff'),COS=hex('#46b4ff'),SAC=hex('#e0b24a');
// AUTO: a seeded soothing pattern of taps over the loop. Each entry = {time fraction, field index (N=ding)}.
const R0=rng(20260615);
const PAT=[];{
  // build a gentle 10-note sequence: mostly fields, ding accents, spread over the loop
  let tt=0.02;
  for(let k=0;k<11;k++){
    const isDing=(k%4===0); const idx=isDing?N:Math.floor(R0()*N);
    PAT.push({u:tt,i:idx});
    tt+=0.06+R0()*0.07; if(tt>0.97)break;
  }
}
// excitation for AUTO: nearest preceding pattern hit for this field (with wrap)
function autoExc(i,u){
  let best=0;
  for(const p of PAT){ if(p.i!==i)continue;
    let age=(u-p.u); if(age<0)age+=1; const ms=age*LOOP;
    if(ms<RIPPLE_MS){ best=Math.max(best,1-ms/RIPPLE_MS); }
  }
  return best;
}
function render(u){
  const tNow=u*LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const vg=x.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(60,40,110,0.18)');vg.addColorStop(1,'rgba(139,92,255,0)');x.fillStyle=vg;x.fillRect(0,0,W,H);
  // ---- steel drum body ----
  const bg=x.createRadialGradient(cx-R*0.3,cy-R*0.35,R*0.1,cx,cy,R*1.05);
  bg.addColorStop(0,'#2a2740');bg.addColorStop(0.55,'#171529');bg.addColorStop(1,'#0a0816');
  x.fillStyle=bg;x.beginPath();x.arc(cx,cy,R,0,TAU);x.fill();
  // rim ring
  x.strokeStyle='rgba(224,178,74,0.35)';x.lineWidth=3*DPR;x.beginPath();x.arc(cx,cy,R,0,TAU);x.stroke();
  x.strokeStyle='rgba(139,92,255,0.18)';x.lineWidth=1.5*DPR;x.beginPath();x.arc(cx,cy,R*0.93,0,TAU);x.stroke();
  x.globalCompositeOperation='lighter';
  // ---- central ding ----
  const de=AUTO?autoExc(N,u):tapExc(N,tNow);
  const dr=R*0.22;
  // ding dimple
  const dg=x.createRadialGradient(cx,cy,0,cx,cy,dr*1.1);
  dg.addColorStop(0,`rgba(224,178,74,${0.18+0.5*de})`);
  dg.addColorStop(0.6,`rgba(139,92,255,${0.10+0.3*de})`);
  dg.addColorStop(1,'rgba(10,8,22,0)');
  x.fillStyle=dg;x.beginPath();x.arc(cx,cy,dr*1.1,0,TAU);x.fill();
  x.strokeStyle=`rgba(224,178,74,${0.35+0.5*de})`;x.lineWidth=(1.5+2*de)*DPR;
  x.beginPath();x.arc(cx,cy,dr,0,TAU);x.stroke();
  // ding ripple rings
  if(de>0.02){for(let r=0;r<3;r++){const ph=((1-de)+r*0.33)%1;const rr=dr+ph*R*0.5;
    x.strokeStyle=`rgba(224,178,74,${(1-ph)*0.4*de})`;x.lineWidth=2*DPR;
    x.beginPath();x.arc(cx,cy,rr,0,TAU);x.stroke();}}
  // ---- 8 tone fields ----
  for(let i=0;i<N;i++){
    const[fx,fy]=fieldPos(i);
    const e=AUTO?autoExc(i,u):tapExc(i,tNow);
    const col=i%2?COS:VIO;
    const fr=R*0.15;
    // field dimple
    const fg=x.createRadialGradient(fx,fy,0,fx,fy,fr*1.3);
    fg.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${0.16+0.55*e})`);
    fg.addColorStop(0.7,`rgba(${col[0]},${col[1]},${col[2]},${0.06+0.2*e})`);
    fg.addColorStop(1,'rgba(10,8,22,0)');
    x.fillStyle=fg;x.beginPath();x.arc(fx,fy,fr*1.3,0,TAU);x.fill();
    // field outline (tone-field ellipse)
    x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${0.30+0.6*e})`;x.lineWidth=(1.2+2.4*e)*DPR;
    x.beginPath();x.ellipse(fx,fy,fr,fr*0.74,-Math.PI/2+i*TAU/N,0,TAU);x.stroke();
    // ripple rings on tap
    if(e>0.02){for(let r=0;r<3;r++){const ph=((1-e)+r*0.33)%1;const rr=fr*0.6+ph*R*0.34;
      x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${(1-ph)*0.45*e})`;x.lineWidth=1.6*DPR;
      x.beginPath();x.arc(fx,fy,rr,0,TAU);x.stroke();}}
    // bright core dot
    x.fillStyle=`rgba(255,255,255,${0.18+0.5*e})`;x.beginPath();x.arc(fx,fy,(1.6+2*e)*DPR,0,TAU);x.fill();
  }
  x.globalCompositeOperation='source-over';
}
// ---- live interaction: click a field/ding or press 1-9 ----
if(!AUTO){
  function hit(i){tap[i]=performance.now()%LOOP;ring(i===N?BASE:fieldFreq(i));
    document.getElementById('hint').style.opacity=0;}
  function at(ev){const rect=cv.getBoundingClientRect();const mx=(ev.clientX-rect.left)*DPR,my=(ev.clientY-rect.top)*DPR;
    if(Math.hypot(mx-cx,my-cy)<R*0.26)return N; // ding
    let best=-1,bd=1e9;for(let i=0;i<N;i++){const[fx,fy]=fieldPos(i);const d=Math.hypot(mx-fx,my-fy);if(d<bd){bd=d;best=i;}}
    return bd<R*0.2?best:-1;}
  cv.addEventListener('pointerdown',ev=>{audio();const i=at(ev);if(i>=0)hit(i);});
  addEventListener('keydown',ev=>{audio();const k=ev.key;
    if(k>='1'&&k<='8')hit(+k-1); else if(k==='9'||k==='0'||k===' ')hit(N);});
}
// ---- boilerplate ----
if(AUTO){
  // offset so t=0 lands mid-pattern with a field rippling
  const OFF=LOOP*0.30;
  window.__seek=t=>render(((((t+OFF)%LOOP)+LOOP)%LOOP)/LOOP);
  window.__seek(0);window.__ready=true;
}else{
  const s=performance.now();
  (function l(n){render((((n-s)%LOOP)+LOOP)%LOOP/LOOP);requestAnimationFrame(l);})(performance.now());
}
</script></body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Gyroid</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Gyroid — a raymarched gyroid minimal surface shaded by normal/depth with accent glow, real WebGL GLSL fragment shader. Deterministic, seamless (uT loops 0..1).
const cv=document.getElementById('c');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000;
const gl=cv.getContext('webgl',{antialias:false,depth:false,preserveDrawingBuffer:true});
const VERT='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG=`precision highp float; uniform vec2 uRes; uniform float uT;
#define TAU 6.28318530718
mat2 rot(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}
// gyroid implicit surface: sin x cos y + sin y cos z + sin z cos x = 0
float gyroid(vec3 p){return dot(sin(p),cos(p.yzx));}
// signed-distance-ish field: thin shell of the gyroid, scaled to be a safe DE
float map(vec3 p){
 float g=gyroid(p*1.5);
 return abs(g)*0.42-0.04; // shell thickness, gradient-corrected scale
}
vec3 calcNormal(vec3 p){
 vec2 e=vec2(0.012,0.0);
 return normalize(vec3(
  map(p+e.xyy)-map(p-e.xyy),
  map(p+e.yxy)-map(p-e.yxy),
  map(p+e.yyx)-map(p-e.yyx)));
}
vec3 shade(vec2 uv,float t){
 float ph=t*TAU;
 // camera orbits the gyroid, seamless by t
 vec3 ro=vec3(0.0,0.0,-3.2);
 vec3 rd=normalize(vec3(uv,1.6));
 // slow full rotation of the field looping by t
 mat2 ry=rot(ph), rx=rot(0.35*sin(ph));
 // raymarch
 float tt=0.0; float d; vec3 pos; bool hit=false;
 for(int i=0;i<80;i++){
  pos=ro+rd*tt;
  vec3 q=pos; q.xz*=ry; q.yz*=rx;
  d=map(q);
  if(d<0.0015){hit=true;break;}
  tt+=d; if(tt>7.0)break;
 }
 vec3 c2=vec3(0.545,0.36,1.0), c3=vec3(0.27,0.71,1.0), c4=vec3(1.0,0.36,0.76), c5=vec3(0.21,0.83,0.60);
 vec3 col=vec3(0.015,0.01,0.04); // dark void
 if(hit){
  vec3 q=pos; q.xz*=ry; q.yz*=rx;
  vec3 n=calcNormal(q);
  vec3 lig=normalize(vec3(0.5,0.7,-0.6));
  float dif=max(dot(n,lig),0.0);
  float rim=pow(1.0-max(dot(n,-rd),0.0),2.5);
  float depth=clamp(tt/6.0,0.0,1.0);
  // accent tint shifts with normal + depth
  float h=fract(0.5+0.5*n.x+0.25*n.y+0.15*depth+0.1*sin(ph));
  vec3 acc=mix(c2,c3,smoothstep(0.0,0.5,h));
  acc=mix(acc,c4,smoothstep(0.45,0.8,h));
  acc=mix(acc,c5,smoothstep(0.78,1.0,h));
  col=acc*(0.18+0.95*dif);
  col+=acc*rim*0.9;                 // glowing rim
  col*=1.0-0.55*depth;             // fade into the dark with distance
  col+=acc*0.12;                   // ambient accent glow
 }
 // faint atmospheric glow even on misses near the surface
 col+=c2*0.04*exp(-tt*0.5);
 col*=1.0-0.3*dot(uv,uv);          // vignette
 return col;}
void main(){ vec2 uv=(gl_FragCoord.xy*2.0-uRes)/min(uRes.x,uRes.y); vec3 col=shade(uv,uT); col=col/(col+0.55);
 col=pow(clamp(col,0.,1.),vec3(0.4545)); gl_FragColor=vec4(col,1.0);}`;
function sh(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);
 if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'uRes'),uT=gl.getUniformLocation(prog,'uT');
let DPR;function rs(){DPR=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';gl.viewport(0,0,cv.width,cv.height);}
rs();addEventListener('resize',rs);
function render(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uT,u);gl.drawArrays(gl.TRIANGLES,0,3);}
if(AUTO){window.__seek=t=>render(t);render(0);window.__ready=true;}else{const s=performance.now();(function l(n){render(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

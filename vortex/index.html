<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Vortex</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Vortex — particles spiral inward toward a glowing core like an accretion disc, respawning at the rim for continuous flow. Deterministic, seamless, pure Canvas 2D.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718;
let W,H,DPR,cx,cy,R,ps=[];const TURNS=5;
// seeded RNG (mulberry32) — called only at setup/resize, never inside frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;R=Math.min(W,H)*0.47;
  const r=mul(23);ps=[];
  for(let i=0;i<1500;i++){
    const phase=r();                                     // seeded start phase -> staggered respawn
    const a0=r()*TAU;                                    // start angle on the rim
    const c=AC[(r()*AC.length|0)];                       // colour from Cosmos accents
    const sz=(0.7+r()*1.6)*DPR;
    const incl=0.6+r()*0.05;                             // disc flatten (slight ellipse)
    ps.push({phase,a0,c,sz,incl,tw:r()*TAU});
  }}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;     // 0..1 normalized loop time
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);            // full repaint each frame (pure fn of t)
  // bright core glow
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,R*0.55);
  cg.addColorStop(0,'rgba(255,255,255,0.9)');cg.addColorStop(0.12,'rgba(224,178,74,0.6)');
  cg.addColorStop(0.4,'rgba(255,106,61,0.2)');cg.addColorStop(1,'rgba(139,92,255,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';                 // additive glow
  for(const p of ps){
    const pr=(u+p.phase)%1;                              // progress 0..1, mod-1 -> implicit seamless respawn
    const rad=R*(1-pr);                                  // spiral inward
    const ang=p.a0+pr*TURNS*TAU;                         // TURNS integer full turns
    const fade=Math.min(1,pr*4)*Math.min(1,(1-pr)*6);   // fade in at rim, out near core
    const px=cx+Math.cos(ang)*rad, py=cy+Math.sin(ang)*rad*p.incl;
    // short trailing arc (toward where it came from, slightly outward)
    const pr2=Math.min(0.999,pr+0.022),rad2=R*(1-pr2),ang2=p.a0+pr2*TURNS*TAU;
    const qx=cx+Math.cos(ang2)*rad2, qy=cy+Math.sin(ang2)*rad2*p.incl;
    const tw=0.65+0.35*Math.sin(p.tw+u*TAU*TURNS);      // twinkle, integer harmonic of u
    const a=fade*tw;const col=`${p.c[0]},${p.c[1]},${p.c[2]}`;
    x.strokeStyle=`rgba(${col},${a*0.5})`;x.lineWidth=p.sz*1.4;x.lineCap='round';
    x.beginPath();x.moveTo(qx,qy);x.lineTo(px,py);x.stroke();
    x.fillStyle=`rgba(${col},${a})`;x.beginPath();x.arc(px,py,p.sz,0,TAU);x.fill();
    x.fillStyle=`rgba(${col},${a*0.25})`;x.beginPath();x.arc(px,py,p.sz*3,0,TAU);x.fill();
  }
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!doctype html><meta charset=utf8><title>Cosmos Pulsar</title>
<!-- Cosmos Pulsar — rotating neutron star fires two opposite sweeping beams (1 turn/LOOP), pulsing core + radio rings, seamless. -->
<style>html,body{margin:0;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=8000;
const PAL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let cx,cy,R0,stars;
function build(){
  cx=W/2; cy=H/2; R0=Math.min(W,H)*0.5;
  const rnd=mulberry32(0xC05);
  stars=[];
  for(let i=0;i<90;i++){stars.push({x:rnd()*W,y:rnd()*H,r:(0.4+rnd()*1.3)*DPR,b:0.3+rnd()*0.6,col:PAL[(rnd()*PAL.length)|0],ph:rnd()});}
}
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;build();}
addEventListener('resize',resize);resize();
function beam(ang,col,len){
  // a sweeping cone: triangle from core widening outward, additive glow
  const half=0.13; // cone half-angle
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
  const g=ctx.createLinearGradient(0,0,len,0);
  g.addColorStop(0,col);g.addColorStop(0.35,col);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.lineTo(Math.cos(half)*len,Math.sin(half)*len);
  ctx.lineTo(Math.cos(-half)*len,Math.sin(-half)*len);
  ctx.closePath();ctx.fill();
  // bright central ray
  ctx.strokeStyle='#ffffff';ctx.globalAlpha=0.55;ctx.lineWidth=2.4*DPR;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(len*0.96,0);ctx.stroke();
  ctx.restore();
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  // background stars (twinkle via periodic phase)
  for(const s of stars){const tw=0.6+0.4*Math.sin((u+s.ph)*Math.PI*2);ctx.fillStyle=s.col;ctx.globalAlpha=s.b*tw;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();}
  // faint radio rings expanding & looping (phase mod 1 -> seamless)
  for(let i=0;i<4;i++){
    const ph=((u+i/4)%1);
    const rr=ph*R0*1.3;
    const a=0.30*(1-ph);
    ctx.strokeStyle=PAL[1];ctx.globalAlpha=a;ctx.lineWidth=2*DPR;
    ctx.beginPath();ctx.arc(cx,cy,rr,0,7);ctx.stroke();
    ctx.strokeStyle=PAL[0];ctx.globalAlpha=a*0.6;ctx.lineWidth=1.4*DPR;
    ctx.beginPath();ctx.arc(cx,cy,rr*0.7,0,7);ctx.stroke();
  }
  // two opposite beams rotate exactly one turn per LOOP
  const ang=u*Math.PI*2;
  const len=R0*1.4;
  beam(ang,PAL[2],len);          // nebula
  beam(ang+Math.PI,PAL[1],len);  // cosmic (opposite)
  // pulsing core (double-pulse like a real pulsar lightcurve)
  const pulse=0.6+0.4*Math.pow(Math.max(0,Math.sin(u*Math.PI*4)),3);
  const cr=26*DPR*(0.85+0.3*pulse);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,cr*3.2);
  cg.addColorStop(0,'#ffffff');cg.addColorStop(0.25,PAL[0]);cg.addColorStop(0.6,PAL[2]);cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.globalAlpha=0.5+0.4*pulse;
  ctx.beginPath();ctx.arc(cx,cy,cr*3.2,0,7);ctx.fill();
  // bright white star body
  ctx.fillStyle='#ffffff';ctx.globalAlpha=0.95;
  ctx.beginPath();ctx.arc(cx,cy,cr*0.55,0,7);ctx.fill();
  // magnetic axis hint (faint line through poles)
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
  ctx.strokeStyle=PAL[3];ctx.globalAlpha=0.25;ctx.lineWidth=1.6*DPR;
  ctx.beginPath();ctx.moveTo(-R0*0.5,0);ctx.lineTo(R0*0.5,0);ctx.stroke();
  ctx.restore();
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

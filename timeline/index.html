<!-- Cosmos Timeline: a vertical activity timeline — a glowing violet accent spine draws downward and left-aligned event nodes (icon dot + glass card with title, timestamp, description) pop in one by one as the spine passes; holds, then resets. Real hover live; deterministic looping auto-demo via render(u)/__seek. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Timeline</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;color:#e8e6f5;
  display:flex;align-items:center;justify-content:center}
.tl{position:relative;width:420px;padding:8px 0 8px 56px}
/* the spine */
.spine{position:absolute;left:21px;top:14px;width:3px;border-radius:3px;
  background:linear-gradient(180deg,rgba(139,92,255,.05),rgba(139,92,255,.85) 12%,#8b5cff 88%,rgba(139,92,255,.05));
  box-shadow:0 0 14px rgba(139,92,255,.6),0 0 4px rgba(139,92,255,.9);
  height:0;will-change:height}
.spine::after{content:"";position:absolute;left:-3px;bottom:-5px;width:9px;height:9px;border-radius:50%;
  background:#b69bff;box-shadow:0 0 16px 3px rgba(139,92,255,.85)}
.node{position:relative;margin-bottom:26px;will-change:transform,opacity}
.node:last-child{margin-bottom:0}
.dot{position:absolute;left:-43px;top:4px;width:20px;height:20px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#1a1430,#0e0a1c);
  border:2px solid rgba(139,92,255,.55);display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 4px rgba(10,8,22,1),0 0 18px rgba(139,92,255,.0);
  will-change:transform,box-shadow,border-color}
.dot svg{width:11px;height:11px;stroke:#b9a9ff;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.card{background:rgba(16,12,32,.82);border:1px solid rgba(255,255,255,.07);border-radius:14px;
  padding:12px 15px;backdrop-filter:blur(6px);
  box-shadow:inset 0 1px 2px rgba(255,255,255,.04),0 16px 40px -18px rgba(0,0,0,.8);
  transition:border-color .25s,box-shadow .25s}
.node:hover .card{border-color:rgba(139,92,255,.4);box-shadow:inset 0 1px 2px rgba(255,255,255,.05),0 18px 44px -16px rgba(139,92,255,.35)}
.row{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.title{font-size:14.5px;font-weight:650;color:#f0edff;letter-spacing:.1px}
.time{font-size:11px;font-weight:600;color:#7d76a3;white-space:nowrap;flex:none}
.desc{margin-top:5px;font-size:12.5px;line-height:1.5;color:#a59ed0}
</style></head>
<body>
<div class="tl" id="tl">
  <div class="spine" id="spine"></div>
</div>
<script>
const LOOP=6600;
const DATA=[
  {ic:'<path d="M20 6L9 17l-5-5"/>',t:'Project created',ts:'09:02',d:'Repository initialised and first commit pushed to main.'},
  {ic:'<path d="M12 5v14M5 12h14"/>',t:'Members invited',ts:'10:18',d:'Three collaborators joined the workspace.'},
  {ic:'<circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4"/>',t:'Build configured',ts:'11:45',d:'CI pipeline set up with automated tests.'},
  {ic:'<path d="M4 12l5 5L20 6"/>',t:'First deploy',ts:'14:30',d:'Release v0.1.0 shipped to staging successfully.'},
  {ic:'<path d="M12 2l2.4 7.4H22l-6 4.4 2.3 7.2-6.3-4.6L5.7 21l2.3-7.2-6-4.4h7.6z"/>',t:'Milestone reached',ts:'16:07',d:'Project starred 100 times by the community.'}
];
const N_NODES=DATA.length;
const tl=document.getElementById('tl'),spine=document.getElementById('spine');
const nodes=[];
DATA.forEach(e=>{
  const n=document.createElement('div');n.className='node';
  n.innerHTML=`<div class="dot"><svg viewBox="0 0 24 24">${e.ic}</svg></div>
    <div class="card"><div class="row"><span class="title">${e.t}</span><span class="time">${e.ts}</span></div>
    <div class="desc">${e.d}</div></div>`;
  tl.appendChild(n);nodes.push(n);
});
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const ease=t=>{t=clamp(t,0,1);return 1-Math.pow(1-t,3);};       // easeOutCubic
const smooth=t=>{t=clamp(t,0,1);return t*t*(3-2*t);};
// geometry: each node's dot centre measured once
let centres=[],fullH=0;
function measure(){
  const base=tl.getBoundingClientRect().top;
  centres=nodes.map(n=>{const d=n.querySelector('.dot').getBoundingClientRect();return d.top+d.height/2-base;});
  fullH=centres[centres.length-1]+18;
}
measure();
function paint(reach){ // reach in px: how far the spine has drawn down
  spine.style.height=clamp(reach,0,fullH).toFixed(1)+'px';
  nodes.forEach((n,i)=>{
    // node reveals as spine passes its dot centre (over a 40px window)
    const v=ease((reach-(centres[i]-14))/40);
    n.style.opacity=v.toFixed(3);
    n.style.transform=`translateX(${(1-v)*-22}px)`;
    const dot=n.querySelector('.dot');
    // dot pops: scale overshoot + glow as it lights up
    const pop=v<1?1+Math.sin(v*Math.PI)*0.35:1;
    dot.style.transform=`scale(${(0.55+0.45*v)*pop})`;
    dot.style.borderColor=`rgba(139,92,255,${(.45+.45*v).toFixed(3)})`;
    dot.style.boxShadow=`0 0 0 4px rgba(10,8,22,1),0 0 ${(18*v).toFixed(1)}px rgba(139,92,255,${(.7*v).toFixed(3)})`;
  });
}
// timeline: DRAW spine down (nodes pop) -> HOLD -> RESET
function render(u){
  const uu=(u+0.30)%1;   // frame 0 lands mid-draw (~3 nodes already in)
  let reach;
  if(uu<0.55){ reach=ease(uu/0.55)*fullH; }
  else if(uu<0.80){ reach=fullH; }
  else { reach=fullH*(1-smooth((uu-0.80)/0.20)); }
  paint(reach);
}
window.addEventListener('resize',()=>{measure();});
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){
  window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);
  window.__seek(0);
  window.__ready=true;
}else{
  const s=performance.now();
  (function l(n){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l); })(performance.now());
}
</script></body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Confetti Rain</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Confetti Rain — accent rects & triangles fall and tumble with depth, wrapping seamlessly via phase mod 1. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=7000,TAU=6.28318530718;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const COLS=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
let W,H,DPR,bits;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=mulberry32(99); bits=[];
  for(let i=0;i<150;i++){const z=0.35+r()*0.65; // depth 0.35..1 (near = bigger/faster)
    bits.push({c:COLS[(r()*6)|0], xb:r(), z:z, sz:(6+r()*9)*z, ph:r(),
      sway:(0.02+r()*0.05), sk:1+Math.floor(r()*3),
      rk:1+Math.floor(r()*3), rp:r(), tri:r()<0.4, tilt:r()*TAU});}
  bits.sort((a,b)=>a.z-b.z); // far first
}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  for(const b of bits){
    const fall=((b.ph + u*b.z)%1+1)%1;           // seamless wrap via phase mod 1
    const py=(fall*1.16-0.08)*H;
    const px=(b.xb + b.sway*Math.sin(TAU*(u*b.sk+b.ph)))*W;
    const sz=b.sz*DPR;
    const rot=b.tilt+TAU*(u*b.rk+b.rp);          // tumble, integer k loops
    const sc=Math.cos(TAU*(u*b.rk+b.rp)*1)*0.5+0.5; // foreshorten 0..1
    const a=0.55+0.45*b.z;
    x.save();x.translate(px,py);x.rotate(rot);x.scale(1,0.35+0.65*sc);
    x.fillStyle=`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${a})`;
    x.shadowColor=`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0.9)`;x.shadowBlur=sz*0.6;
    if(b.tri){x.beginPath();x.moveTo(0,-sz*0.7);x.lineTo(sz*0.6,sz*0.5);x.lineTo(-sz*0.6,sz*0.5);x.closePath();x.fill();}
    else{x.fillRect(-sz*0.6,-sz*0.45,sz*1.2,sz*0.9);}
    x.restore();}
  x.globalCompositeOperation='source-over';x.shadowBlur=0;}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

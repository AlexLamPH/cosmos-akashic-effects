<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Newton's Cradle</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Newton's Cradle — end ball swings out, impulse passes through the still middle, opposite end answers; perfectly periodic. Deterministic, seamless, pure Canvas 2D.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=4200,TAU=6.28318530718;
let W,H,DPR,cx,cyBar,balls=[];const N=5,A=0.85;
// seeded RNG (mulberry32) — only at setup/resize, never in frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cyBar=H*0.20;
  const r=mul(7);balls=[];const len=H*0.50,gap=Math.min(W*0.10,H*0.135),R=gap*0.49;
  for(let i=0;i<N;i++){const px=cx+(i-(N-1)/2)*gap;const c=AC[i%AC.length];
    balls.push({px,len,R:R*(0.94+r()*0.10),c});}
}
rs();addEventListener('resize',rs);
// swing angle: left ball lifts on first half, right ball mirrors on second half, middle still
function ang(u){if(u<0.5)return -A*Math.max(0,Math.sin(TAU*u));return A*Math.max(0,Math.sin(TAU*u));}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const aL=Math.min(0,ang(u)),aR=Math.max(0,ang(u));   // left-end & right-end swing
  // top frame bar
  const span=(N+1.2)*Math.min(W*0.10,H*0.135);
  x.strokeStyle='rgba(170,160,210,0.55)';x.lineWidth=5*DPR;x.lineCap='round';
  x.beginPath();x.moveTo(cx-span/2,cyBar);x.lineTo(cx+span/2,cyBar);x.stroke();
  x.lineWidth=3*DPR;x.strokeStyle='rgba(140,130,190,0.4)';
  x.beginPath();x.moveTo(cx-span/2,cyBar);x.lineTo(cx-span/2,cyBar-H*0.12);x.lineTo(cx-span/2+18*DPR,cyBar-H*0.12);x.stroke();
  x.beginPath();x.moveTo(cx+span/2,cyBar);x.lineTo(cx+span/2,cyBar-H*0.12);x.lineTo(cx+span/2-18*DPR,cyBar-H*0.12);x.stroke();
  for(let i=0;i<N;i++){const b=balls[i];
    const a=i===0?aL:i===N-1?aR:0;                       // only the two ends move
    const bx=b.px+Math.sin(a)*b.len, by=cyBar+Math.cos(a)*b.len;
    x.globalCompositeOperation='source-over';            // string
    x.strokeStyle='rgba(200,200,230,0.35)';x.lineWidth=1.4*DPR;
    x.beginPath();x.moveTo(b.px-b.R*0.5,cyBar);x.lineTo(bx,by);x.stroke();
    x.beginPath();x.moveTo(b.px+b.R*0.5,cyBar);x.lineTo(bx,by);x.stroke();
    x.globalCompositeOperation='lighter';                // additive glowing ball
    const c=`${b.c[0]},${b.c[1]},${b.c[2]}`;
    x.fillStyle=`rgba(${c},0.14)`;x.beginPath();x.arc(bx,by,b.R*2.4,0,TAU);x.fill();
    x.fillStyle=`rgba(${c},0.38)`;x.beginPath();x.arc(bx,by,b.R*1.35,0,TAU);x.fill();
    x.fillStyle=`rgba(${c},0.92)`;x.beginPath();x.arc(bx,by,b.R,0,TAU);x.fill();
    x.fillStyle='rgba(255,255,255,0.9)';x.beginPath();x.arc(bx-b.R*0.3,by-b.R*0.3,b.R*0.34,0,TAU);x.fill();
  }
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

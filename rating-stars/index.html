<!-- Cosmos Rating Stars: a 5-star rating control where stars fill with accent gold sweeping left-to-right, each star popping in scale as it lights, with a live numeric label; the demo loops the rating filling up and changing. Deterministic render(u). -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Rating Stars</title><style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.card{position:relative;width:400px;padding:38px 34px 32px;border-radius:22px;
  background:linear-gradient(160deg,rgba(30,24,54,.92),rgba(18,14,34,.92));
  border:1px solid rgba(224,178,74,.16);
  box-shadow:0 26px 64px -20px rgba(0,0,0,.72),inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(8px);text-align:center}
.label{font-size:13px;font-weight:600;letter-spacing:.4px;color:#9a93b6;text-transform:uppercase}
.stars{display:flex;justify-content:center;gap:14px;margin:22px 0 20px}
.star{position:relative;width:46px;height:46px;cursor:pointer;will-change:transform;
  transform-origin:50% 55%}
.star svg{width:100%;height:100%;display:block}
/* dim base outline star */
.base{position:absolute;inset:0;fill:rgba(255,255,255,.07);stroke:rgba(224,178,74,.28);stroke-width:1.4}
/* gold fill star, clipped from the left by a wipe */
.gold{position:absolute;inset:0;fill:url(#g);stroke:#f3cf6e;stroke-width:1.2;
  filter:drop-shadow(0 0 7px rgba(224,178,74,.55));clip-path:inset(0 100% 0 0)}
.score{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-top:6px}
.num{font-size:40px;font-weight:750;letter-spacing:-1px;font-variant-numeric:tabular-nums;
  background:linear-gradient(180deg,#ffe9a8,#e0b24a);-webkit-background-clip:text;background-clip:text;
  color:transparent}
.den{font-size:17px;font-weight:600;color:#766e90}
.cap{margin-top:9px;font-size:13.5px;font-weight:600;color:#c4bce0;min-height:18px;letter-spacing:.2px}
</style></head>
<body><div id="stage">
  <div class="card">
    <div class="label">Rate your experience</div>
    <div class="stars" id="stars"></div>
    <div class="score"><span class="num" id="num">0.0</span><span class="den">/ 5</span></div>
    <div class="cap" id="cap">Tap a star</div>
  </div>
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe49a"/><stop offset="1" stop-color="#e0a83a"/>
    </linearGradient></defs></svg>
</div>
<script>
const PATH='M12 2.4l2.9 6.1 6.7.9-4.9 4.6 1.2 6.6L12 18.6 6.1 21.2l1.2-6.6L2.4 9.4l6.7-.9z';
const starsEl=document.getElementById('stars'),numEl=document.getElementById('num'),
  capEl=document.getElementById('cap');
const STAR=[];
for(let i=0;i<5;i++){
  const d=document.createElement('div');d.className='star';
  d.innerHTML=`<svg viewBox="0 0 24 24"><path class="base" d="${PATH}"/><path class="gold" d="${PATH}"/></svg>`;
  starsEl.appendChild(d);
  STAR.push({el:d,gold:d.querySelector('.gold')});
}
const CAPS=['','Poor','Fair','Good','Great','Excellent'];
const LOOP=6400;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const easeOut=t=>1-Math.pow(1-t,3);
const easeInOut=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
// target rating values the control sweeps to, then back for a seamless loop
const SEQ=[5,3,4,2];
function render(u){
  // offset so frame 0 lands mid-sweep of the first (5-star) rating — rich, stars partly lit
  const FILL=0.46, HOLD=0.34; // fraction of each slot spent filling vs holding (rest = quick reset)
  const slots=SEQ.length;
  const g=(u+ (1 - FILL*0.45)/slots) % 1;   // shift frame 0 into the first fill phase
  const idx=Math.floor(g*slots)%slots;
  const local=(g*slots)%1;                    // 0..1 within current rating
  const prev=SEQ[(idx-1+slots)%slots];
  const target=SEQ[idx];
  let rating;
  if(local<FILL){                             // sweep from previous rating to the new target
    rating=prev+(target-prev)*easeInOut(clamp(local/FILL,0,1));
  }else if(local<FILL+HOLD){                   // hold the rating
    rating=target;
  }else{                                       // brief settle (still showing target) before next sweep
    rating=target;
  }
  // light each star by how much of it is filled (0..1), with a pop as it crosses
  for(let i=0;i<5;i++){
    const f=clamp(rating-i,0,1);               // fill amount for star i
    STAR[i].gold.style.clipPath=`inset(0 ${(100-f*100).toFixed(1)}% 0 0)`;
    // pop: scale bumps as the fill front sweeps across this star, settling to 1
    const front=rating-i;                       // >1 fully past, 0..1 crossing, <0 not reached
    let sc=1;
    if(front>0&&front<1.25){ const p=clamp(front/1.25,0,1); sc=1+0.30*Math.sin(p*Math.PI)*easeOut(p); }
    STAR[i].el.style.transform=`scale(${sc.toFixed(3)})`;
  }
  numEl.textContent=rating.toFixed(1);
  capEl.textContent=CAPS[Math.round(clamp(rating,0,5))]||'Tap a star';
}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else{
  // live: hover previews a rating, click locks it; idle autoplay drives the demo
  let lock=-1, hover=-1, manual=0;
  STAR.forEach((s,i)=>{
    s.el.addEventListener('mousemove',()=>{hover=i+1;paint(hover);});
    s.el.addEventListener('mouseleave',()=>{hover=-1; if(lock<0){manual=performance.now();}});
    s.el.addEventListener('click',()=>{lock=i+1;paint(lock);});
  });
  function paint(r){
    for(let i=0;i<5;i++){const f=clamp(r-i,0,1);
      STAR[i].gold.style.clipPath=`inset(0 ${(100-f*100).toFixed(1)}% 0 0)`;
      STAR[i].el.style.transform=`scale(${i<r?1.12:1})`;}
    numEl.textContent=r.toFixed(1);capEl.textContent=CAPS[Math.round(clamp(r,0,5))]||'Tap a star';
  }
  const s=performance.now();
  (function l(n){ if(lock<0&&hover<0){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP);} requestAnimationFrame(l);})(performance.now());
}
</script></body></html>

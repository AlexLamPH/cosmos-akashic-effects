<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Particle Burst — mic-reactive particle field</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);font:13px/1.4 system-ui,sans-serif;color:#b9a8ff;
background:rgba(20,10,40,.55);padding:7px 14px;border-radius:20px;letter-spacing:.3px;pointer-events:none;
transition:opacity 1s;opacity:.9;border:1px solid rgba(139,92,255,.35)}</style></head>
<body><canvas id="c"></canvas><div id="hint">🎤 click to enable mic</div><script>
// Cosmos Particle Burst — a seeded field of particles gently orbits the center; on each beat (level spike)
// they burst outward and brighten. Particle size rides the spectrum, hue from the Cosmos palette.
// Reacts to the live microphone (AnalyserNode spectrum); falls back to a deterministic synthetic signal
// when the mic is denied/unavailable or for ?auto=1 capture. render(spectrum,level,t) is the single draw path.
const cv=document.getElementById('c'),x=cv.getContext('2d'),hint=document.getElementById('hint');
const LOOP=8400,TAU=6.283185307,BINS=64,NP=180;
// Cosmos accent palette (violet/blue/pink/green/orange/gold)
const COL=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let W,H,DPR,cx,cy,RAD,P=[];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=Math.round(innerWidth*DPR);H=cv.height=Math.round(innerHeight*DPR);
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;RAD=Math.min(W,H)*0.34;build();}
function build(){const r=mb(20260615);P=[];for(let i=0;i<NP;i++){
  const ang=r()*TAU, rad=(0.18+0.82*Math.sqrt(r()))*RAD, sp=0.10+0.40*r();
  P.push({ang,rad,base:rad,sp:sp*(r()<0.5?-1:1),ph:r()*TAU,bin:(i*7)%BINS,col:COL[i%6],burst:0});}}
rs();addEventListener('resize',rs);

// ---- deterministic synthetic spectrum: seeded sum-of-sines formants + a beat kick ----
const srnd=mb(7);const FORM=[];for(let k=0;k<5;k++)FORM.push({c:0.10+0.78*srnd(),w:0.04+0.10*srnd(),a:0.45+0.55*srnd(),sp:0.5+2.5*srnd(),ph:srnd()*TAU});
function synthSpectrum(u){const spec=new Float32Array(BINS);
  // beat: sharpened periodic kick (4 beats per loop)
  const bp=(u*4)%1; const beat=Math.pow(Math.max(0,1-bp*1.7),2.2);
  for(let i=0;i<BINS;i++){const f=i/(BINS-1);let v=0;
    for(const F of FORM){const c=(F.c+0.05*Math.sin(TAU*F.sp*u+F.ph))%1;const d=(f-c)/F.w;v+=F.a*Math.exp(-d*d);}
    v=v*(0.45+0.55*Math.abs(Math.sin(TAU*u+f*5)))*(0.7+0.3*(1-f)); // tilt + slow sweep
    v+=beat*(1-f)*0.9; // kick energizes low end
    spec[i]=Math.min(1,v*0.55);}
  let lv=0;for(let i=0;i<BINS;i++)lv+=spec[i];lv=Math.min(1,lv/BINS*2.2+beat*0.5);
  return {spec,level:lv};}

// ---- single draw path ----
let pe=0; // smoothed energy for burst envelope
function render(spec,level,t){
  // beat detection via energy spike
  pe=pe*0.92; const hit=Math.max(0,level-pe); pe=Math.max(pe,level);
  x.globalCompositeOperation='source-over';x.fillStyle='rgba(5,3,13,0.34)';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  const dt=1/60, rot=t*TAU; // t is u in [0,1]
  for(const p of P){
    p.burst=p.burst*0.90+hit*1.6; // outward push on beats
    const a=p.ang + p.sp*rot + 0.3*Math.sin(p.ph+rot*2);
    const sb=spec[p.bin]; // spectrum at this particle's bin
    const rad=p.base*(1+0.35*p.burst) + RAD*0.22*sb*Math.sin(p.ph+rot*3);
    const px=cx+Math.cos(a)*rad, py=cy+Math.sin(a)*rad;
    const sz=(1.1+5.5*sb+3.0*p.burst)*DPR;
    const br=0.30+0.55*sb+0.45*Math.min(1,p.burst);
    const c=p.col;
    const g=x.createRadialGradient(px,py,0,px,py,sz);
    g.addColorStop(0,'rgba('+c[0]+','+c[1]+','+c[2]+','+Math.min(1,br)+')');
    g.addColorStop(1,'rgba('+c[0]+','+c[1]+','+c[2]+',0)');
    x.fillStyle=g;x.beginPath();x.arc(px,py,sz,0,TAU);x.fill();
  }
  // central pulse glow rides overall level
  const cr=RAD*(0.10+0.16*level);
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,cr);
  cg.addColorStop(0,'rgba(255,255,255,'+(0.5+0.4*level)+')');
  cg.addColorStop(0.4,'rgba(139,92,255,0.6)');cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.beginPath();x.arc(cx,cy,cr,0,TAU);x.fill();
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}

// ---- live mic source (LIVE only, behind a gesture) ----
let an=null,buf=null,useSynth=true;
async function mic(){try{
  const ac=new (window.AudioContext||window.webkitAudioContext)();
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  const src=ac.createMediaStreamSource(s);an=ac.createAnalyser();an.fftSize=128;an.smoothingTimeConstant=0.75;
  src.connect(an);buf=new Uint8Array(an.frequencyBinCount);useSynth=false;
  hint.textContent='🎤 mic live';setTimeout(()=>hint.style.opacity=0,1400);
}catch(e){useSynth=true;hint.textContent='🎤 mic unavailable — synthetic beat';setTimeout(()=>hint.style.opacity=0,1800);}}

function liveSpectrum(){const spec=new Float32Array(BINS);
  an.getByteFrequencyData(buf);const n=buf.length;let lv=0;
  for(let i=0;i<BINS;i++){const v=(buf[Math.min(n-1,Math.floor(i/BINS*n))]/255);spec[i]=v;lv+=v;}
  return {spec,level:Math.min(1,lv/BINS*1.6)};}

function startLiveLoop(){const s=performance.now();
  (function loop(now){const t=((now-s)%LOOP)/LOOP;
    let d; if(!useSynth&&an){d=liveSpectrum();} else {d=synthSpectrum(t);}
    render(d.spec,d.level,t);requestAnimationFrame(loop);})(performance.now());}

const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){ window.__seek=t=>{const u=((t%LOOP)+LOOP)%LOOP/LOOP; const s=synthSpectrum(u); render(s.spec,s.level,u);}; window.__seek(0); window.__ready=true; }
else { let useSynth=true; addEventListener('pointerdown',()=>mic(),{once:true}); startLiveLoop(); }
</script></body></html>

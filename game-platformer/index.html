<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Leap</title>
<style>
  html,body{margin:0;height:100%;background:#0a0816;display:flex;align-items:center;justify-content:center;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#dcd6ff;-webkit-user-select:none;user-select:none;}
  #wrap{position:relative;width:720px;height:480px;}
  canvas{display:block;border-radius:18px;background:#0d0a1f;
    box-shadow:0 0 0 1px rgba(139,92,255,.25),0 18px 60px rgba(0,0,0,.6),0 0 80px rgba(70,180,255,.06) inset;}
  #hud{position:absolute;top:14px;left:0;right:0;display:flex;justify-content:space-between;
    padding:0 24px;pointer-events:none;font-weight:700;letter-spacing:.5px;}
  #score{font-size:30px;color:#fff;text-shadow:0 0 14px rgba(224,178,74,.9);}
  #best{font-size:14px;color:#8b5cff;align-self:center;opacity:.85;}
  #over{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(10,8,22,.72);border-radius:18px;backdrop-filter:blur(2px);text-align:center;}
  #over h1{margin:0 0 6px;font-size:26px;color:#ff5cc2;text-shadow:0 0 18px rgba(255,92,194,.6);}
  #ot.win{color:#36d39a;text-shadow:0 0 18px rgba(54,211,154,.6);}
  #over p{margin:4px 0;font-size:14px;color:#b6aee8;}
  #btn{margin-top:14px;padding:11px 26px;border:0;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;
    color:#0a0816;background:linear-gradient(135deg,#46b4ff,#8b5cff);box-shadow:0 0 24px rgba(139,92,255,.5);}
  #pad{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:10px;}
  #pad button{width:74px;height:42px;border:0;border-radius:11px;font-size:18px;font-weight:700;color:#cfe6ff;
    background:rgba(70,180,255,.14);box-shadow:0 0 0 1px rgba(70,180,255,.25) inset;cursor:pointer;}
  #tap{position:absolute;bottom:62px;left:0;right:0;text-align:center;font-size:12px;color:#6f68a8;pointer-events:none;}
</style></head>
<body><div id="wrap">
  <canvas id="c" width="720" height="480"></canvas>
  <div id="hud"><div id="score">0</div><div id="best">BEST 0</div></div>
  <div id="over"><h1 id="ot">FELL</h1><p id="fin">Coins 0</p><button id="btn">Restart ▸</button></div>
  <div id="tap">← / → move · SPACE / ↑ jump · R restart</div>
  <div id="pad"><button id="bl">◀</button><button id="bj">JUMP</button><button id="br">▶</button></div>
</div>
<script>
const AUTO=new URLSearchParams(location.search).has('auto');
const cv=document.getElementById('c'),x=cv.getContext('2d');
const W=720,H=480;
const VIO='139,92,255',COS='70,180,255',NEB='255,92,194',AUR='54,211,154',SOL='255,106,61',SAC='224,178,74';
// ---- sim constants ----
const GRAV=2400, JUMP=-760, MOVE=250, DT=16, DT_S=DT/1000;
const HW=16, HH=22;            // hero half sizes
const FALLY=H+60;              // death plane
const GOALX=4200;              // x of goal flag (level length)
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// ---- deterministic seeded level: a chain of platforms with gaps ----
let plats=[], coins=[];
function buildLevel(){
  plats=[]; coins=[]; const r=mul(90210);
  let px=-40, py=360;
  // start pad
  plats.push({x:px,y:py,w:200}); px+=200;
  for(let i=0;i<22;i++){
    const gap=70+r()*90;                 // pit width
    px+=gap;
    const w=110+r()*120;
    // vary height but keep reachable
    py += (r()<0.5?-1:1)*(30+r()*70);
    py=Math.max(220,Math.min(390,py));
    plats.push({x:px,y:py,w:w});
    // coins: an arc of coins over the gap / on the platform
    const nc=2+((r()*3)|0);
    for(let k=0;k<nc;k++){
      coins.push({x:px+ (w*(k+1)/(nc+1)), y:py-44- (Math.sin((k+1)/(nc+1)*Math.PI))*26, got:false});
    }
    // a few floating coins arcing across the gap
    if(r()<0.7){ const cx=px-gap*0.5; coins.push({x:cx,y:py-70,got:false}); }
    px+=w;
  }
  // goal platform
  plats.push({x:GOALX-60,y:py,w:220,goal:true});
}
// ---- state ----
let S;
function freshHero(){ return {x:60,y:330,vx:0,vy:0,onGround:true,dead:false,win:false,coins:0,t:0,
  wantL:false,wantR:false,wantJump:false,face:1,shake:0}; }
function reset(){ buildLevel(); const best=S?S.best:0; S=freshHero(); S.best=best; for(const c of coins)c.got=false; }
reset();
function heroBox(s){ return {x:s.x-HW,y:s.y-HH,w:HW*2,h:HH*2}; }
function platTop(p){ return p.y; }
// ---- AUTO auto-player: deterministic perfect runner ----
function autoControl(s){
  s.wantL=false; s.wantR=false; s.wantJump=false;
  if(s.dead||s.win) return;
  // Always push right toward goal
  s.wantR=true;
  // find platform we're currently over / nearest ahead, and the next gap edge
  // current support platform
  let cur=null;
  for(const p of plats){ if(s.x>=p.x-2 && s.x<=p.x+p.w+2){ cur=p; break; } }
  // next platform whose left edge is ahead of us
  let next=null,bestd=1e9;
  for(const p of plats){ const d=p.x - s.x; if(p.x+p.w> s.x+HW && d<bestd && p!==cur){ if(p.x> (cur?cur.x:-1e9)){ bestd=d; next=p; } } }
  if(cur){
    const edge=cur.x+cur.w;             // right edge of current platform
    const distEdge=edge-s.x;
    if(next){
      const gap=next.x-edge;
      const dy=next.y-cur.y;            // positive => next is lower
      // jump trigger window before the edge; jump earlier for wider/upward gaps
      const lead= 26 + gap*0.18 + Math.max(0,-dy)*0.12;
      if(s.onGround && distEdge< lead && distEdge>-6) s.wantJump=true;
    }
  } else {
    // airborne over a pit: keep moving right; if falling and a platform edge is reachable, no extra input
    if(s.onGround) s.wantJump=true; // safety (shouldn't happen)
  }
}
function step(s,auto){
  if(auto) autoControl(s);
  if(s.dead||s.win){ s.t+=DT; if(s.shake>0.3)s.shake*=0.9; return; }
  // horizontal
  let ax=0; if(s.wantL)ax-=1; if(s.wantR)ax+=1;
  s.vx=ax*MOVE; if(ax!==0)s.face=ax>0?1:-1;
  // jump
  if(s.wantJump && s.onGround){ s.vy=JUMP; s.onGround=false; }
  s.wantJump=false;
  // integrate
  s.vy+=GRAV*DT_S;
  const nx=s.x+s.vx*DT_S; const ny=s.y+s.vy*DT_S;
  s.x=nx;
  // platform landing: only when moving downward and crossing a platform top
  s.onGround=false;
  if(s.vy>=0){
    for(const p of plats){
      if(s.x> p.x-HW && s.x< p.x+p.w+HW){
        const top=platTop(p);
        if(s.y<=top && ny>=top-0.01 && ny<=top+34){
          s.y=top; s.vy=0; s.onGround=true;
          if(p.goal){ s.win=true; s.shake=10; }
          break;
        }
      }
    }
  }
  if(!s.onGround) s.y=ny;
  // coin pickup
  for(const c of coins){ if(!c.got){ const dx=c.x-s.x, dy=c.y-s.y; if(dx*dx+dy*dy< 30*30){ c.got=true; s.coins++; } } }
  // fall death
  if(s.y>FALLY){ s.dead=true; s.shake=12; }
  s.t+=DT;
  if(s.shake>0.3)s.shake*=0.9;
}
// ---- AUTO sim ----
const START=2600;             // frame-0 offset: hero already running & mid-jump, coins collected
function simTo(ms){ reset(); const target=START+ms; while(S.t<target && !S.dead && !S.win){ step(S,true); } return S; }
const LOOP=11000;
function drawAt(ms){ const s=simTo(ms); draw(s); }
// ---- draw ----
function rr(x0,y0,w,h,r){x.beginPath();x.moveTo(x0+r,y0);x.arcTo(x0+w,y0,x0+w,y0+h,r);x.arcTo(x0+w,y0+h,x0,y0+h,r);x.arcTo(x0,y0+h,x0,y0,r);x.arcTo(x0,y0,x0+w,y0,r);x.closePath();}
function camX(s){ return Math.max(0,Math.min(GOALX-W+240, s.x-W*0.36)); }
function drawPlat(p,cam){
  const px=p.x-cam, py=p.y;
  if(px>W+40||px+p.w<-40) return;
  const c=p.goal?AUR:VIO;
  x.globalCompositeOperation='lighter';
  x.fillStyle=`rgba(${c},.12)`; rr(px-5,py-3,p.w+10,30,9); x.fill();
  x.globalCompositeOperation='source-over';
  const g=x.createLinearGradient(0,py,0,py+26);
  g.addColorStop(0,`rgba(${c},.95)`);g.addColorStop(1,'rgba(26,20,58,.95)');
  x.fillStyle=g; rr(px,py,p.w,26,8); x.fill();
  x.globalCompositeOperation='lighter';
  x.fillStyle=`rgba(${COS},.5)`; x.fillRect(px+4,py+2,p.w-8,2);
  x.globalCompositeOperation='source-over';
  if(p.goal){ // flag
    const fx=px+p.w-40;
    x.strokeStyle=`rgba(${AUR},.9)`;x.lineWidth=4;x.beginPath();x.moveTo(fx,py);x.lineTo(fx,py-70);x.stroke();
    x.fillStyle=`rgba(${SAC},.95)`;x.beginPath();x.moveTo(fx,py-70);x.lineTo(fx+38,py-58);x.lineTo(fx,py-46);x.closePath();x.fill();
  }
}
function drawCoin(c,cam,t){
  if(c.got) return; const px=c.x-cam, py=c.y;
  if(px<-20||px>W+20) return;
  const wob=Math.sin(t*0.006+c.x*0.02);
  const rx=7+2*Math.abs(wob), ry=9;
  x.globalCompositeOperation='lighter';
  const gg=x.createRadialGradient(px,py,1,px,py,16);
  gg.addColorStop(0,'rgba(255,250,220,.9)');gg.addColorStop(.5,`rgba(${SAC},.6)`);gg.addColorStop(1,`rgba(${SAC},0)`);
  x.fillStyle=gg;x.beginPath();x.arc(px,py,16,0,7);x.fill();
  x.globalCompositeOperation='source-over';
  x.fillStyle=`rgba(${SAC},1)`;x.beginPath();x.ellipse(px,py,rx,ry,0,0,7);x.fill();
  x.fillStyle='rgba(255,255,255,.7)';x.beginPath();x.ellipse(px-2,py-2,rx*0.4,ry*0.4,0,0,7);x.fill();
}
function drawHero(s,cam){
  const px=s.x-cam, py=s.y; const b={x:px-HW,y:py-HH*2,w:HW*2,h:HH*2};
  x.save();
  x.globalCompositeOperation='lighter';
  const gg=x.createRadialGradient(px,py-HH,2,px,py-HH,52);
  gg.addColorStop(0,'rgba(255,255,255,.7)');gg.addColorStop(.4,`rgba(${COS},.55)`);gg.addColorStop(1,`rgba(${COS},0)`);
  x.fillStyle=gg;x.beginPath();x.arc(px,py-HH,52,0,7);x.fill();
  x.globalCompositeOperation='source-over';
  const c=s.dead?NEB:s.win?AUR:VIO;
  const bg=x.createLinearGradient(0,b.y,0,b.y+b.h);
  bg.addColorStop(0,'#ffffff');bg.addColorStop(.4,`rgba(${COS},1)`);bg.addColorStop(1,`rgba(${c},1)`);
  x.fillStyle=bg; rr(b.x,b.y,b.w,b.h,9); x.fill();
  // eye toward facing
  x.fillStyle='rgba(10,8,22,.9)';x.beginPath();x.arc(px+s.face*7,py-HH-2,3.4,0,7);x.fill();
  // legs
  x.strokeStyle=`rgba(${COS},.9)`;x.lineWidth=3;x.lineCap='round';
  if(s.onGround){ const ph=Math.sin(s.t*0.02)*4;
    x.beginPath();x.moveTo(px-7,py-2);x.lineTo(px-7+ph,py+8);x.stroke();
    x.beginPath();x.moveTo(px+7,py-2);x.lineTo(px+7-ph,py+8);x.stroke();
  } else {
    x.beginPath();x.moveTo(px-7,py-2);x.lineTo(px-9,py+7);x.stroke();
    x.beginPath();x.moveTo(px+7,py-2);x.lineTo(px+9,py+7);x.stroke();
  }
  x.restore();
}
function draw(s){
  const cam=camX(s);
  const sx=s.shake>0.4?Math.sin(s.t*0.7)*s.shake:0, sy=s.shake>0.4?Math.cos(s.t*0.9)*s.shake:0;
  x.save(); x.translate(sx,sy);
  const bg=x.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#160e34');bg.addColorStop(1,'#0a0817');
  x.fillStyle=bg; x.fillRect(-20,-20,W+40,H+40);
  // parallax stars
  x.globalCompositeOperation='lighter';
  for(let i=0;i<60;i++){const r=mul(33+i*17);
    const bx=((r()*W*2 - cam*0.25)%(W+40)+W+40)%(W+40)-20; const by=r()*(H-60);
    x.fillStyle=`rgba(${COS},${0.25+0.4*r()})`;x.beginPath();x.arc(bx,by,0.6+1.6*r(),0,7);x.fill();}
  x.globalCompositeOperation='source-over';
  for(const p of plats) drawPlat(p,cam);
  for(const c of coins) drawCoin(c,cam,s.t);
  drawHero(s,cam);
  x.restore();
  document.getElementById('score').textContent=s.coins;
  document.getElementById('best').textContent='BEST '+Math.max(s.best,s.coins);
}
// ---- live game ----
let raf,last,acc=0,live=false;
function initGame(){
  reset(); S.t=0; live=true;
  const over=document.getElementById('over'),btn=document.getElementById('btn'),ot=document.getElementById('ot');
  function restart(){ const b=S.best; reset(); S.best=b; S.t=0; live=true; acc=0; over.style.display='none'; }
  function end(){ live=false; if(S.coins>S.best)S.best=S.coins;
    ot.textContent=S.win?'GOAL!':'FELL'; ot.className=S.win?'win':'';
    document.getElementById('fin').textContent=(S.win?'Reached the flag · ':'')+'Coins '+S.coins+' · Best '+S.best;
    over.style.display='flex'; }
  function loop(now){ if(!last)last=now; let dt=now-last; last=now; if(dt>60)dt=60;
    if(live){ acc+=dt; while(acc>=DT){ step(S,false); acc-=DT; } }
    draw(S);
    if((S.dead||S.win)&&live) end();
    raf=requestAnimationFrame(loop); }
  const set=(k,v)=>{ if(S.dead||S.win)return; S[k]=v; };
  addEventListener('keydown',e=>{
    if(e.code==='ArrowLeft'||e.key==='a'){set('wantL',true);}
    if(e.code==='ArrowRight'||e.key==='d'){set('wantR',true);}
    if(e.code==='Space'||e.code==='ArrowUp'||e.key==='w'){e.preventDefault(); if(S.dead||S.win)restart(); else S.wantJump=true;}
    if(e.key==='r'||e.key==='R')restart(); });
  addEventListener('keyup',e=>{
    if(e.code==='ArrowLeft'||e.key==='a')S.wantL=false;
    if(e.code==='ArrowRight'||e.key==='d')S.wantR=false; });
  const hold=(id,k)=>{const el=document.getElementById(id);
    el.addEventListener('pointerdown',ev=>{ev.preventDefault(); if(S.dead||S.win){restart();return;} if(k==='j')S.wantJump=true; else S[k]=true;});
    el.addEventListener('pointerup',()=>{ if(k!=='j')S[k]=false;});
    el.addEventListener('pointerleave',()=>{ if(k!=='j')S[k]=false;}); };
  hold('bl','wantL'); hold('br','wantR'); hold('bj','j');
  btn.addEventListener('click',e=>{e.stopPropagation();restart();});
  raf=requestAnimationFrame(loop);
}
if(AUTO){ window.__seek=t=>drawAt(((t%LOOP)+LOOP)%LOOP); window.__seek(0); window.__ready=true; }
else { initGame(); }
</script></body></html>

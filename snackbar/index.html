<!-- Cosmos Snackbar: a Material-style alert stack; success/info/error messages with a left accent bar, icon and UNDO action slide up from the bottom, stack, drain a countdown line, then slide out. Deterministic render(u); frame 0 shows one already visible mid-countdown. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Snackbar</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.backdrop{position:absolute;width:560px;height:380px;border-radius:20px;
  background:linear-gradient(160deg,rgba(255,255,255,.035),rgba(255,255,255,.012));
  border:1px solid rgba(255,255,255,.06);box-shadow:0 30px 70px rgba(0,0,0,.5)}
/* stack anchored to the bottom-centre of the app window */
#stack{position:absolute;left:50%;bottom:0;width:380px;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px}
.snack{position:relative;width:368px;display:flex;align-items:center;gap:12px;
  padding:13px 13px 13px 15px;border-radius:13px;overflow:hidden;will-change:transform,opacity;
  background:linear-gradient(160deg,rgba(30,26,48,.97),rgba(19,16,34,.97));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 18px 42px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(8px)}
.snack::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--acc)}
.ic{flex:0 0 32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--acc);
  background:color-mix(in srgb,var(--acc) 18%,#15122a);
  border:1px solid color-mix(in srgb,var(--acc) 40%,transparent)}
.ic svg{width:18px;height:18px}
.msg{flex:1;min-width:0;font-size:13px;line-height:1.4;color:#e3dff2;font-weight:500}
.act{flex:0 0 auto;padding:6px 11px;border-radius:8px;border:none;cursor:pointer;
  font-size:11.5px;font-weight:700;letter-spacing:.6px;color:var(--acc);
  background:color-mix(in srgb,var(--acc) 14%,transparent);
  transition:background .15s}
.act:hover{background:color-mix(in srgb,var(--acc) 26%,transparent)}
.line{position:absolute;left:0;bottom:0;height:2.5px;background:var(--acc);width:100%;
  transform-origin:left;box-shadow:0 0 8px var(--acc)}
</style></head>
<body><div id="stage">
  <div class="backdrop"></div>
  <div id="stack"></div>
</div>
<script>
const ICO={
  success:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 7.5v.01"/></svg>',
  error:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v6M12 16.5v.01"/></svg>'
};
// type, accent, message, action
const MSGS=[
  ['success','#36d39a','Message archived','UNDO'],
  ['info','#46b4ff','Draft saved to cloud','VIEW'],
  ['error','#ff6a3d','Failed to send — offline','RETRY'],
  ['success','#8b5cff','Photo added to album','UNDO']
];
const stackE=document.getElementById('stack');
// build one DOM snack per message; we recycle 3 visible slots but simplest: render up to 3 at once
const POOL=MSGS.map(m=>{
  const d=document.createElement('div');d.className='snack';
  d.innerHTML='<div class="ic">'+ICO[m[0]]+'</div><div class="msg">'+m[2]+'</div>'+
    '<button class="act">'+m[3]+'</button><div class="line"></div>';
  d.style.setProperty('--acc',m[1]);
  return d;
});
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOut=t=>1-Math.pow(1-t,3);
const easeIn=t=>t*t*t;
const back=t=>{const c=1.4;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);};
const N=MSGS.length;
const LOOP=8000;            // N slots; each snack appears, holds with countdown, slides out
// a new snack enters every SLOT; it lives for LIFE slots before leaving — produces a stack of ~2
const LIFE=1.7;
function render(u){
  // global phase offset so frame 0 lands mid-countdown of the first snack
  const HOLD=0.45;
  const g=(u + (1-(HOLD/N))) % 1;
  const tt=g*N;             // continuous "slot time" 0..N
  // for each snack i, its birth slot is i; compute its age in slots (wrapping over N)
  // gather visible snacks bottom-up
  const vis=[];
  for(let i=0;i<N;i++){
    // nearest birth so that age in [0,LIFE)
    let age=tt-i;
    age=((age% N)+N)%N;     // 0..N
    if(age<LIFE){vis.push([i,age]);}
  }
  // sort by age desc so oldest is highest in the stack (rendered first)
  vis.sort((a,b)=>b[1]-a[1]);
  // hide all
  POOL.forEach(d=>{d.style.opacity='0';d.style.pointerEvents='none';if(d.parentNode)d.parentNode.removeChild(d);});
  // place visible: append in stack order (oldest top -> newest bottom)
  vis.forEach(([i,age])=>{
    const d=POOL[i];stackE.appendChild(d);
    const IN=0.22, OUT=1.45;   // age thresholds (in slots): enter / start leaving
    let y,op,sc,prog;
    if(age<IN){               // slide up from below
      const p=age/IN,e=back(p);
      y=lerp(60,0,e);op=Math.min(1,p*1.6);sc=lerp(.95,1,easeOut(p));prog=0;
    }else if(age<OUT){        // hold; countdown line drains across the hold window
      y=0;op=1;sc=1;prog=(age-IN)/(OUT-IN);
    }else{                    // slide down + fade out
      const p=(age-OUT)/(LIFE-OUT),e=easeIn(p);
      y=lerp(0,46,e);op=1-easeOut(p);sc=lerp(1,.97,p);prog=1;
    }
    d.style.transform=`translateY(${y.toFixed(2)}px) scale(${sc.toFixed(3)})`;
    d.style.opacity=op.toFixed(3);
    d.querySelector('.line').style.transform=`scaleX(${(1-Math.min(1,prog)).toFixed(3)})`;
  });
}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else{
  // live: action buttons give a tactile press; autoplay loop drives the demo
  POOL.forEach(d=>d.querySelector('.act').addEventListener('click',e=>{
    e.currentTarget.style.transform='scale(.92)';setTimeout(()=>e.currentTarget.style.transform='',120);}));
  let start=performance.now();
  (function l(n){ render((((n-start)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l); })(performance.now());
}
</script></body></html>

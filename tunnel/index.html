<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Tunnel</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Tunnel — concentric segmented rings rushing toward the camera in an infinite hypnotic zoom. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const TAU=Math.PI*2,LOOP=6000,N=26;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x7c0de);
const COL=['139,92,255','70,180,255','255,92,194','54,211,154','255,106,61','224,178,74'];
const ring=[];for(let i=0;i<N;i++)ring.push({c:COL[i%COL.length],spin:(rnd()*2-1),seg:6+((rnd()*4)|0)});
let W,H,DPR,cx,cy,maxR;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;maxR=Math.hypot(W,H)*0.62;}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // draw far (small) rings first → near rings overdraw them
  for(let i=N-1;i>=0;i--){const r=ring[i];
    const d=((u+i/N)%1);            // 0=far .. 1=near, recycles via mod-1
    const rad=maxR*Math.pow(d,2.4); // perspective: rush toward camera
    if(rad<2)continue;
    const fade=d<0.06?d/0.06:(d>0.9?(1-d)/0.1:1); // fade in at centre, out at edge
    const a=0.85*fade;
    const rot=r.spin*d*3.0+u*TAU*0.15; // slight per-ring rotation
    const lw=(0.8+d*6)*DPR;
    x.lineWidth=lw;
    // segmented ring (gaps between arc segments)
    const seg=r.seg,gap=0.30;
    for(let pass=0;pass<2;pass++){x.strokeStyle=`rgba(${r.c},${pass?a:a*0.35})`;x.lineWidth=pass?lw:lw*2.6;
      for(let s=0;s<seg;s++){const a0=rot+s/seg*TAU,a1=a0+(1-gap)/seg*TAU;
        x.beginPath();x.arc(cx,cy,rad,a0,a1);x.stroke();}}
  }
  // dark vanishing centre
  x.globalCompositeOperation='source-over';
  const g=x.createRadialGradient(cx,cy,0,cx,cy,maxR*0.14);
  g.addColorStop(0,'#05030d');g.addColorStop(0.6,'rgba(5,3,13,0.9)');g.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=g;x.beginPath();x.arc(cx,cy,maxR*0.14,0,TAU);x.fill();}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Metaballs</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Metaballs — gooey glowing blobs floating and fusing via a thresholded summed field. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=7000,TAU=6.28318530718;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const COLS=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
const off=document.createElement('canvas'),ox=off.getContext('2d',{willReadFrequently:true});
let W,H,DPR,balls,GW,GH;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  GW=off.width=Math.max(80,Math.round(innerWidth/5));GH=off.height=Math.max(60,Math.round(innerHeight/5));
  const r=mulberry32(2024);balls=[];for(let i=0;i<10;i++)balls.push({c:COLS[i%COLS.length],r:0.06+r()*0.07,ax:0.12+r()*0.30,ay:0.12+r()*0.30,kx:1+Math.floor(r()*3),ky:1+Math.floor(r()*3),px:r(),py:r(),cx:0.3+r()*0.4,cy:0.3+r()*0.4});}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ox.clearRect(0,0,GW,GH);ox.globalCompositeOperation='lighter';
  for(const b of balls){const bx=(b.cx+b.ax*Math.sin(TAU*(u*b.kx+b.px)))*GW;const by=(b.cy+b.ay*Math.cos(TAU*(u*b.ky+b.py)))*GH;
    const rr=b.r*GW*(0.85+0.15*Math.sin(TAU*(u*2+b.px)));const g=ox.createRadialGradient(bx,by,0,bx,by,rr);
    g.addColorStop(0,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},1)`);g.addColorStop(0.5,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0.5)`);g.addColorStop(1,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0)`);
    ox.fillStyle=g;ox.beginPath();ox.arc(bx,by,rr,0,TAU);ox.fill();}
  ox.globalCompositeOperation='source-over';
  const img=ox.getImageData(0,0,GW,GH),d=img.data;
  for(let i=0;i<d.length;i+=4){const a=d[i+3];if(a<118){d[i]=d[i+1]=d[i+2]=d[i+3]=0;}else{const boost=a>150?1.35:1.0;d[i]=Math.min(255,d[i]*boost);d[i+1]=Math.min(255,d[i+1]*boost);d[i+2]=Math.min(255,d[i+2]*boost);d[i+3]=255;}}
  ox.putImageData(img,0,0);
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';x.filter='blur('+(2*DPR)+'px)';x.imageSmoothingEnabled=true;
  x.drawImage(off,0,0,W,H);x.drawImage(off,0,0,W,H);
  x.filter='none';x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!doctype html><meta charset=utf8><title>Cosmos Step-808</title>
<!-- Cosmos Step-808 — 16-step 808 drum + sub-bass groovebox: synthesized kick/snare/hat and a gliding 808 bass lane; real Web Audio on play, AUTO is a silent seeded trap groove. -->
<style>
html,body{margin:0;background:#05030d;overflow:hidden;font:12px/1.4 system-ui,sans-serif;color:#b9a8ff}
canvas{position:fixed;inset:0;touch-action:none}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);padding:7px 14px;border:1px solid #ff6a3d55;border-radius:20px;background:#1a0d08cc;color:#ffb89a;letter-spacing:.3px;pointer-events:none;transition:opacity .4s}
</style>
<canvas id=c></canvas>
<div id=hint>▶ press SPACE to play · click cells · drag the bass lane for pitch</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),hint=document.getElementById('hint');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=7680, TAU=Math.PI*2, STEPS=16;
const PAL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const ROWCOL={kick:'#ff6a3d',snare:'#ff5cc2',hat:'#46b4ff'};
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
addEventListener('resize',resize);resize();

// ---- seeded trap/808 pattern ----
const SCALE=[0,3,5,7,10];               // minor pentatonic offsets
const BASEMIDI=24;                      // C1 region — sub bass
const ROWS=['kick','snare','hat'];
let drums={kick:[],snare:[],hat:[]}, bass=[];   // bass[i] = {on, semi, slide}
(function(){ const r=mulberry32(20260615);
  for(let i=0;i<STEPS;i++){
    drums.kick.push( i%4===0 || (r()<0.22) );                 // four-on-floor-ish + ghosts
    drums.snare.push( i%8===4 );                              // backbeat
    drums.hat.push( i%2===1 || r()<0.35 );                    // offbeat + rolls
    const on = i%2===0 ? r()<0.85 : r()<0.4;
    const deg=(r()*SCALE.length)|0, oct=(r()<0.3?1:0);
    bass.push({on, semi:SCALE[deg]+12*oct, slide:r()<0.4});
  }
})();
const BRANGE=SCALE[SCALE.length-1]+12;  // pitch range of bass lane

// glide curve: bass pitch as a smooth function of u (slides between consecutive on-notes)
function bassPitchAt(u){
  const cur=u*STEPS; let i=(cur|0)%STEPS; const frac=cur-(cur|0);
  // find current and next active bass notes
  let a=i; while(!bass[a].on){ a=(a-1+STEPS)%STEPS; if(a===i)break; }
  let b=(i+1)%STEPS; let guard=0; while(!bass[b].on && guard++<STEPS){ b=(b+1)%STEPS; }
  const pa=bass[a].semi, pb=bass[b].semi;
  if(bass[(i+1)%STEPS].slide && frac>0.6){ // glide into next note in last 40%
    const t=(frac-0.6)/0.4; return pa+(pb-pa)*t*t*(3-2*t);
  }
  return pa;
}

function render(u){
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  const pad=22*DPR;
  const cur=u*STEPS, curI=(cur|0)%STEPS;
  const gx=pad, gw=W-pad*2, sw=gw/STEPS;
  const topY=pad+26*DPR;
  const rowH=30*DPR;                        // drum rows
  const bassY=topY+ROWS.length*rowH+18*DPR;
  const bassH=H-bassY-pad;

  // title
  ctx.globalAlpha=0.85;ctx.fillStyle='#ffb89a';ctx.font=(13*DPR)+'px system-ui';ctx.textBaseline='top';
  ctx.fillText('808 · 16-STEP GROOVE', gx, pad-2*DPR);

  // ---- drum rows ----
  for(let rI=0;rI<ROWS.length;rI++){ const name=ROWS[rI]; const arr=drums[name]; const ry=topY+rI*rowH; const col=ROWCOL[name];
    ctx.globalAlpha=0.55;ctx.fillStyle='#8a7ad0';ctx.font=(11*DPR)+'px system-ui';ctx.textBaseline='middle';
    for(let i=0;i<STEPS;i++){ const x=gx+i*sw;
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=(i%4===0)?0.16:0.08;ctx.fillStyle='#1a1430';ctx.fillRect(x+1*DPR,ry+1*DPR,sw-2*DPR,rowH-3*DPR);
      if(arr[i]){
        const lit=(i===curI);
        ctx.globalCompositeOperation='lighter';
        let g=ctx.createLinearGradient(x,ry,x,ry+rowH);g.addColorStop(0,col+'22');g.addColorStop(0.5,col+(lit?'ff':'aa'));g.addColorStop(1,col+'22');
        ctx.globalAlpha=lit?1:0.7;ctx.fillStyle=g;ctx.fillRect(x+sw*0.16,ry+rowH*0.16,sw*0.68,rowH*0.62);
        if(lit){ ctx.globalAlpha=0.9;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+sw*0.5,ry+rowH*0.47,4*DPR,0,TAU);ctx.fill(); }
      }
      ctx.globalCompositeOperation='source-over';ctx.globalAlpha=0.22;ctx.strokeStyle='#2a2350';ctx.lineWidth=1*DPR;ctx.strokeRect(x+1*DPR,ry+1*DPR,sw-2*DPR,rowH-3*DPR);
    }
    ctx.globalAlpha=0.8;ctx.fillStyle=col;ctx.textAlign='left';ctx.font=(10*DPR)+'px system-ui';
    ctx.fillText(name.toUpperCase(), gx+2*DPR, ry+rowH*0.5);
  }

  // ---- 808 sub-bass lane with glowing pitch curve ----
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=0.9;ctx.fillStyle='#0a0716';ctx.fillRect(gx,bassY,gw,bassH);
  // faint pitch grid
  ctx.globalCompositeOperation='lighter';
  for(let s=0;s<=4;s++){ ctx.globalAlpha=0.05;ctx.strokeStyle=PAL[4];ctx.lineWidth=1*DPR;const yy=bassY+bassH*s/4;ctx.beginPath();ctx.moveTo(gx,yy);ctx.lineTo(gx+gw,yy);ctx.stroke(); }
  // step columns + on-note blocks
  for(let i=0;i<STEPS;i++){ const x=gx+i*sw; const p=bass[i]; const lit=(i===curI);
    ctx.globalCompositeOperation='source-over';ctx.globalAlpha=(i%4===0)?0.14:0.07;ctx.fillStyle='#1a1430';ctx.fillRect(x+1*DPR,bassY,sw-2*DPR,bassH);
    if(p.on){ const ny=bassY+bassH*(1-p.semi/BRANGE); ctx.globalCompositeOperation='lighter';
      let g=ctx.createRadialGradient(x+sw*0.5,ny,0,x+sw*0.5,ny,sw*0.5);g.addColorStop(0,PAL[4]);g.addColorStop(1,PAL[4]+'00');
      ctx.globalAlpha=lit?0.95:0.5;ctx.fillStyle=g;ctx.beginPath();ctx.arc(x+sw*0.5,ny,sw*0.5,0,TAU);ctx.fill();
      if(p.slide){ctx.globalAlpha=0.5;ctx.strokeStyle=PAL[5];ctx.lineWidth=2*DPR;ctx.beginPath();ctx.moveTo(x+sw*0.7,ny);ctx.lineTo(x+sw,ny);ctx.stroke();}
    }
  }
  // the gliding 808 pitch curve sweeping along the lane
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=0.85;ctx.strokeStyle=PAL[5];ctx.lineWidth=2.4*DPR;ctx.beginPath();
  const N=160; for(let k=0;k<=N;k++){ const uu=k/N; const pit=bassPitchAt(uu); const xx=gx+uu*gw; const yy=bassY+bassH*(1-pit/BRANGE);
    if(k===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy); }
  ctx.stroke();
  // glowing head on the curve at the playhead
  const pit=bassPitchAt(u); const hx=gx+(cur%STEPS)/STEPS*gw; const hy=bassY+bassH*(1-pit/BRANGE);
  let bg=ctx.createRadialGradient(hx,hy,0,hx,hy,30*DPR);bg.addColorStop(0,'#fff');bg.addColorStop(0.25,PAL[5]);bg.addColorStop(1,PAL[5]+'00');
  ctx.globalAlpha=0.65+0.3*Math.sin(u*TAU*8);ctx.fillStyle=bg;ctx.beginPath();ctx.arc(hx,hy,30*DPR,0,TAU);ctx.fill();

  // ---- playhead sweep across whole grid ----
  const phx=gx+(cur%STEPS)*sw;
  ctx.globalCompositeOperation='lighter';
  let pg=ctx.createLinearGradient(phx-sw*0.5,0,phx+sw*0.5,0);pg.addColorStop(0,'#ffffff00');pg.addColorStop(0.5,'#ffffff55');pg.addColorStop(1,'#ffffff00');
  ctx.globalAlpha=0.8;ctx.fillStyle=pg;ctx.fillRect(phx-sw*0.5,topY,sw,bassY+bassH-topY);
  ctx.globalAlpha=0.9;ctx.strokeStyle='#fff';ctx.lineWidth=2*DPR;ctx.beginPath();ctx.moveTo(phx,topY-4*DPR);ctx.lineTo(phx,bassY+bassH+4*DPR);ctx.stroke();
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';ctx.textAlign='left';
}

// ================= LIVE AUDIO (gated, gesture-created) =================
const AUTO=new URLSearchParams(location.search).has('auto');
let actx, master, playing=false, schedTimer=null, step=0, nextTime=0;
const STEP_DUR=(LOOP/STEPS)/1000;
function audio(){ if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();} if(actx.state==='suspended')actx.resume(); return actx; }
function ensureMaster(){ if(master)return; const a=audio();
  master=a.createGain();master.gain.value=0.2;
  const comp=a.createDynamicsCompressor();comp.threshold.value=-12;master.connect(comp);comp.connect(a.destination);
}
function noiseBuf(a,dur){ const n=a.sampleRate*dur|0; const b=a.createBuffer(1,n,a.sampleRate); const d=b.getChannelData(0); let s=12345; for(let i=0;i<n;i++){ s=(s*1103515245+12345)&0x7fffffff; d[i]=(s/0x7fffffff)*2-1; } return b; }
function kick(when){ const a=actx; const o=a.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(150,when);o.frequency.exponentialRampToValueAtTime(45,when+0.12);  // pitch drop
  const g=a.createGain();g.gain.setValueAtTime(0.0001,when);g.gain.exponentialRampToValueAtTime(0.95,when+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,when+0.5);
  // click transient
  const cb=a.createBufferSource();cb.buffer=noiseBuf(a,0.01);const cg=a.createGain();cg.gain.setValueAtTime(0.4,when);cg.gain.exponentialRampToValueAtTime(0.0001,when+0.02);
  o.connect(g);g.connect(master);cb.connect(cg);cg.connect(master);o.start(when);o.stop(when+0.55);cb.start(when);
}
function snare(when){ const a=actx; const nb=a.createBufferSource();nb.buffer=noiseBuf(a,0.2);
  const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=1500;
  const g=a.createGain();g.gain.setValueAtTime(0.0001,when);g.gain.exponentialRampToValueAtTime(0.6,when+0.003);g.gain.exponentialRampToValueAtTime(0.0001,when+0.18);
  const o=a.createOscillator();o.type='triangle';o.frequency.setValueAtTime(190,when);const og=a.createGain();og.gain.setValueAtTime(0.3,when);og.gain.exponentialRampToValueAtTime(0.0001,when+0.12);
  nb.connect(f);f.connect(g);g.connect(master);o.connect(og);og.connect(master);nb.start(when);o.start(when);o.stop(when+0.13);
}
function hat(when){ const a=actx; const nb=a.createBufferSource();nb.buffer=noiseBuf(a,0.05);
  const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=7000;
  const g=a.createGain();g.gain.setValueAtTime(0.0001,when);g.gain.exponentialRampToValueAtTime(0.3,when+0.002);g.gain.exponentialRampToValueAtTime(0.0001,when+0.05);
  nb.connect(f);f.connect(g);g.connect(master);nb.start(when);
}
let bassOsc=null, bassGain=null;
function bass808(i,when){ const a=actx;const p=bass[i];if(!p.on)return;
  const f=27.5*Math.pow(2,(BASEMIDI+p.semi-21)/12);
  if(!bassOsc){ bassOsc=a.createOscillator();bassOsc.type='sine';bassGain=a.createGain();bassGain.gain.value=0.0001;
    const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400;bassOsc.connect(bassGain);bassGain.connect(lp);lp.connect(master);bassOsc.frequency.setValueAtTime(f,when);bassOsc.start(when); }
  if(p.slide){ bassOsc.frequency.exponentialRampToValueAtTime(f,when+STEP_DUR*0.4); }   // glide
  else { bassOsc.frequency.setValueAtTime(f,when); }
  bassGain.gain.cancelScheduledValues(when);
  bassGain.gain.setValueAtTime(Math.max(0.0001,bassGain.gain.value),when);
  bassGain.gain.exponentialRampToValueAtTime(0.7,when+0.01);
  bassGain.gain.exponentialRampToValueAtTime(0.12,when+STEP_DUR*0.7);
  bassGain.gain.exponentialRampToValueAtTime(0.0001,when+STEP_DUR*(p.slide?1.05:0.92));
}
function playStep(i,when){ if(drums.kick[i])kick(when); if(drums.snare[i])snare(when); if(drums.hat[i])hat(when); bass808(i,when); }
function scheduler(){ const a=actx; while(nextTime<a.currentTime+0.12){ playStep(step,nextTime); nextTime+=STEP_DUR; step=(step+1)%STEPS; } schedTimer=setTimeout(scheduler,25); }
function togglePlay(){ ensureMaster(); if(playing){playing=false;clearTimeout(schedTimer);if(bassGain)bassGain.gain.setTargetAtTime(0.0001,actx.currentTime,0.05);}
  else { playing=true;step=0;nextTime=actx.currentTime+0.06;scheduler();hint.style.opacity='0'; } }

function hitGrid(e,drag){
  const pad=22, gx=pad, gw=innerWidth-pad*2, sw=gw/STEPS;
  const topY=pad+26, rowH=30, bassY=topY+ROWS.length*rowH+18, bassH=innerHeight-bassY-pad;
  const x=e.clientX, y=e.clientY; const i=Math.min(STEPS-1,Math.max(0,((x-gx)/sw)|0)); if(x<gx||x>gx+gw)return;
  if(y>=bassY && y<=bassY+bassH){ // bass lane: set pitch (drag) or toggle
    if(drag){ const semi=Math.round((1-(y-bassY)/bassH)*BRANGE); let best=SCALE[0],bd=99;for(let o=0;o<2;o++)for(const s of SCALE){const v=s+12*o;if(Math.abs(v-semi)<bd){bd=Math.abs(v-semi);best=v;}} bass[i].semi=best;bass[i].on=true; }
    else bass[i].on=!bass[i].on;
  } else { const rI=Math.floor((y-topY)/rowH); if(rI>=0&&rI<ROWS.length)drums[ROWS[rI]][i]=!drums[ROWS[rI]][i]; }
}

if(AUTO){
  window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);
  window.__seek(0); window.__ready=true;
} else {
  let dragging=false;
  cv.addEventListener('pointerdown',e=>{ audio(); dragging=true; hitGrid(e,false); cv.setPointerCapture(e.pointerId); });
  cv.addEventListener('pointermove',e=>{ if(dragging)hitGrid(e,true); });
  cv.addEventListener('pointerup',()=>{dragging=false;});
  addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();audio();togglePlay();} });
  const s=performance.now();
  (function l(n){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l); })(performance.now());
}
</script>

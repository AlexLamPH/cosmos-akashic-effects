<!-- Cosmos Segmented Control: iOS-style 4-segment control with a sliding accent highlight behind the selected segment; label colours swap as it passes; demo slides selection across and back with a subtle spring. Real click/hover live; deterministic looping auto-demo via render(u)/__seek. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Segmented Control</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;color:#e8e6f5;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:26px}
.wrap{display:flex;flex-direction:column;align-items:center;gap:22px}
.seg{position:relative;display:flex;padding:5px;border-radius:14px;
  background:rgba(12,9,26,.85);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.5),0 10px 30px -12px rgba(0,0,0,.6)}
.thumb{position:absolute;top:5px;left:0;height:calc(100% - 10px);border-radius:10px;
  background:linear-gradient(135deg,#8b5cff,#6a3ff0);
  box-shadow:0 4px 14px -2px rgba(139,92,255,.55),0 0 0 1px rgba(255,255,255,.1) inset;
  z-index:0;will-change:transform,width}
.opt{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;
  gap:7px;min-width:108px;padding:10px 14px;font-size:14px;font-weight:600;
  letter-spacing:.2px;color:#8f88ad;cursor:pointer;user-select:none;
  border-radius:10px;transition:color .2s}
.opt:hover{color:#bdb6dc}
.opt svg{width:15px;height:15px;flex:none}
.caption{font-size:13px;color:#6f6890;letter-spacing:.3px}
.caption b{color:#b9b2dc;font-weight:600}
</style></head>
<body>
<div class="wrap">
  <div class="seg" id="seg">
    <div class="thumb" id="thumb"></div>
    <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</div>
    <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Search</div>
    <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>Alerts</div>
    <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Profile</div>
  </div>
  <div class="caption">Selected: <b id="cap">Home</b></div>
</div>
<script>
const LOOP=6400,N=4;
const seg=document.getElementById('seg'),thumb=document.getElementById('thumb'),cap=document.getElementById('cap');
const opts=[...seg.querySelectorAll('.opt')];
const LABELS=['Home','Search','Alerts','Profile'];
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function smooth(t){t=clamp(t,0,1);return t*t*(3-2*t);}
// underdamped spring response (settles to 1) for that subtle iOS bounce
function spring(t){t=clamp(t,0,1);if(t>=1)return 1;
  return 1-Math.exp(-7*t)*Math.cos(11*t-0.0);}
function geom(i){const sr=seg.getBoundingClientRect(),or=opts[i].getBoundingClientRect();
  return {x:or.left-sr.left,w:or.width};}
// sequence: 0->1->2->3->2->1->0  (slide across and back)
const SEQ=[0,1,2,3,2,1,0],SEG=SEQ.length-1;
let activeIdx=0;
function paint(x,w,fade,a,b){
  thumb.style.transform=`translateX(${x}px)`;
  thumb.style.width=w+'px';
  const cur=fade<0.5?a:b;activeIdx=cur;
  cap.textContent=LABELS[cur];
  opts.forEach((o,i)=>{
    let lit=0;
    if(i===a)lit=1-fade;else if(i===b)lit=fade;
    // label colour swaps: muted -> bright white as the thumb arrives under it
    o.style.color=`rgb(${lerp(143,255,lit)|0},${lerp(136,255,lit)|0},${lerp(173,255,lit)|0})`;
    o.style.textShadow=lit>0.55?'0 1px 6px rgba(139,92,255,.4)':'none';
    o.style.fontWeight=lit>0.55?'700':'600';
  });
}
function render(u){
  // offset so frame 0 sits mid-slide between segment 0 and 1
  const uu=(u + (0.42/SEG)) % 1;
  const f=uu*SEG;
  let s=Math.floor(f);if(s>=SEG)s=SEG-1;
  const local=f-s;
  const a=SEQ[s],b=SEQ[s+1];
  // glide for first ~0.6 of segment, dwell after
  const gp=clamp(local/0.6,0,1);
  const e=spring(gp);            // thumb position with subtle spring
  const fade=smooth(clamp(local/0.5,0,1));
  const ga=geom(a),gb=geom(b);
  // tiny squash: thumb compresses slightly as it launches, then settles
  const launch=Math.sin(clamp(gp,0,1)*Math.PI);
  const squash=launch*Math.min(Math.abs(gb.x-ga.x),120)*0.07;
  const x=lerp(ga.x,gb.x,e), w=lerp(ga.w,gb.w,e)+squash;
  paint(x-squash/2,w,fade,a,b);
}
function snapTo(i){const g=geom(i);thumb.style.transform=`translateX(${g.x}px)`;thumb.style.width=g.w+'px';
  cap.textContent=LABELS[i];activeIdx=i;
  opts.forEach((o,k)=>{const lit=k===i?1:0;o.style.color=`rgb(${lerp(143,255,lit)|0},${lerp(136,255,lit)|0},${lerp(173,255,lit)|0})`;o.style.textShadow=lit?'0 1px 6px rgba(139,92,255,.4)':'none';o.style.fontWeight=lit?'700':'600';});
}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){
  window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);
  window.__seek(0);
  window.__ready=true;
}else{
  let target=null,from=null,start=0,manualUntil=0;const DUR=460;
  opts.forEach((o,i)=>o.addEventListener('click',()=>{
    if(i===activeIdx)return;from=activeIdx;target=i;start=performance.now();manualUntil=performance.now()+DUR+1500;
  }));
  const s=performance.now();
  (function l(n){
    if(target!==null){
      const k=clamp((n-start)/DUR,0,1);
      if(k<1){const ga=geom(from),gb=geom(target);const e=spring(k),fade=smooth(k);
        const launch=Math.sin(k*Math.PI),squash=launch*Math.min(Math.abs(gb.x-ga.x),120)*0.07;
        const x=lerp(ga.x,gb.x,e),w=lerp(ga.w,gb.w,e)+squash;
        paint(x-squash/2,w,fade,from,target);
      }else{snapTo(target);target=null;}
    }else if(n>manualUntil){
      render((((n-s)%LOOP)+LOOP)%LOOP/LOOP);
    }
    requestAnimationFrame(l);
  })(performance.now());
}
</script></body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Neon Sign</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Neon Sign — "COSMOS" as glowing neon tubes that deterministically flicker, with halo + mirrored reflection. Pure Canvas2D, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=7000,TAU=6.28318530718,WORD="COSMOS";
let W,H,DPR,cx,cy,fs;
// seeded RNG (mulberry32) — used once at setup, never in frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
const COL=AC.map(c=>c); // one accent per letter
const K=64; let flick=[]; // deterministic flicker table (per letter), sampled by floor(u*K)
function build(){const r=mul(7);flick=[];for(let i=0;i<WORD.length;i++){const row=[];for(let k=0;k<K;k++){
  // mostly lit (~1), occasional brief dim dips -> seeded, deterministic
  const v=r();row.push(v<0.10?0.25+r()*0.35:(v<0.18?0.65:1.0));}flick.push(row);}}
build();
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H*0.42;
  fs=Math.min(W/(WORD.length*0.78),H*0.5);x.textAlign='center';x.textBaseline='middle';}
rs();addEventListener('resize',rs);
function font(){return '700 '+fs+'px Georgia,"Times New Roman",serif';}
function letterX(i){return cx+(i-(WORD.length-1)/2)*fs*0.74;}
function tube(ch,X,Y,col,lit,mirror){ // layered blurred strokes (halo) + bright core
  x.save();if(mirror){x.translate(0,Y*2);x.scale(1,-1);}
  x.font=font();const[r,g,b]=col;
  const halo=lit*(mirror?0.5:1);
  for(let p=0;p<3;p++){const bl=[34,18,7][p]*DPR,lw=[10,6,2.5][p]*DPR,a=[0.22,0.5,0.95][p]*halo;
    x.shadowColor=`rgba(${r},${g},${b},${a})`;x.shadowBlur=bl;
    x.lineWidth=lw;x.lineJoin='round';x.strokeStyle=`rgba(${r},${g},${b},${a})`;x.strokeText(ch,X,Y);}
  // hot white-ish core
  x.shadowBlur=6*DPR;x.shadowColor=`rgba(${r},${g},${b},${0.9*halo})`;
  x.fillStyle=`rgba(${Math.min(255,r+120)},${Math.min(255,g+120)},${Math.min(255,b+120)},${(mirror?0.35:0.95)*lit})`;
  x.fillText(ch,X,Y);x.restore();}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.shadowBlur=0;x.fillStyle='#05030d';x.fillRect(0,0,W,H); // full opaque repaint, pure of t
  x.globalCompositeOperation='lighter';
  // ambient sign glow behind text, breathing on integer harmonic
  const breath=0.5+0.5*Math.sin(TAU*u);
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,fs*3);
  cg.addColorStop(0,`rgba(139,92,255,${0.10+0.06*breath})`);cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);
  const ki=Math.floor(u*K)%K,kn=(ki+1)%K,fr=u*K-Math.floor(u*K);
  for(let i=0;i<WORD.length;i++){const col=COL[i%COL.length],X=letterX(i),Y=cy;
    // flicker: interpolate sampled table values -> deterministic, smooth, loops (kn wraps)
    let lit=flick[i][ki]*(1-fr)+flick[i][kn]*fr;
    // subtle global tube hum
    lit*=0.88+0.12*Math.sin(TAU*2*u+i);
    tube(WORD[i],X,Y,col,lit,false);
    tube(WORD[i],X,Y,col,lit*0.7,true); // mirrored reflection below baseline
  }
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

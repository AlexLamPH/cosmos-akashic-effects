<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos DNA Helix</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos DNA Helix — two glowing strands spiralling about the vertical axis with connecting rungs, 3D rotate + perspective. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.283185307,F=520;
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let W,H,DPR,cx,cy,jit;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;
  const r=mb(1337);jit=[];for(let i=0;i<400;i++)jit.push(r());}
rs();addEventListener('resize',rs);
function dot(px,py,z,rad,col,a){const s=F/(F+z);const X=cx+px*s,Y=cy+py*s,R=rad*s*DPR;
  const g=x.createRadialGradient(X,Y,0,X,Y,R*3);g.addColorStop(0,col);g.addColorStop(0.25,col);g.addColorStop(1,'rgba(0,0,0,0)');
  x.globalAlpha=a;x.fillStyle=g;x.beginPath();x.arc(X,Y,R*3,0,TAU);x.fill();x.globalAlpha=1;}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  const rot=TAU*u, RAD=Math.min(W,H)*0.20, span=Math.min(W,H)*0.84, M=46;
  const items=[];
  for(let i=0;i<=M;i++){
    const f=i/M; const yy=(f-0.5)*span;                       // vertical position
    const scroll=((f+u)%1);                                    // rungs scroll & wrap mod 1
    const ph=f*TAU*2.4+rot;                                    // helix twist + spin
    const ax=Math.cos(ph)*RAD, az=Math.sin(ph)*RAD;            // strand A
    const bx=Math.cos(ph+Math.PI)*RAD, bz=Math.sin(ph+Math.PI)*RAD; // strand B
    const cA=COL[i%3], cB=COL[3+i%3];
    items.push({px:ax,py:yy,z:az,r:5.5,col:cA,a:0.95});
    items.push({px:bx,py:yy,z:bz,r:5.5,col:cB,a:0.95});
    // rung: dashed dots between strands, brightness pulses with scroll
    const rc=COL[(i+ (scroll>0.5?1:0))%6], pulse=0.35+0.55*(0.5+0.5*Math.cos(TAU*scroll));
    for(let k=1;k<8;k++){const tt=k/8;items.push({px:ax+(bx-ax)*tt,py:yy,z:az+(bz-az)*tt,r:2.4,col:rc,a:pulse});}
  }
  items.sort((p,q)=>q.z-p.z);
  for(const it of items){const depth=(it.z+RAD)/(2*RAD);const a=it.a*(0.45+0.55*(1-depth));dot(it.px,it.py,it.z,it.r,it.col,Math.min(1,a));}
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

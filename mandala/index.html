<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Mandala</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Mandala — one animated wedge mirrored+rotated into radial symmetry, spinning + breathing. Pure Canvas 2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000,TAU=6.28318;
let W,H,DPR,R;
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';R=Math.min(W,H)*0.46;}
rs();addEventListener('resize',rs);
function wedge(u){
  // draw a slim wedge of petals/arcs/dots along the +X axis; symmetry handles the rest
  const rings=7;
  for(let i=1;i<=rings;i++){
    const r=R*i/rings, c=AC[i%AC.length];
    const sw=0.22*(1-i/rings)+0.05, ang=sw*Math.sin(TAU*u*2 + i)*1.6;   // petal half-spread, oscillates
    // petal: an arc pair forming a leaf along this ring
    x.strokeStyle=`rgba(${c[0]+40},${c[1]+40},${c[2]+40},0.5)`; x.lineWidth=1.4*DPR;
    x.beginPath();
    x.moveTo(R*(i-1)/rings,0);
    x.quadraticCurveTo(r*0.9, Math.sin(ang)*r*0.4, r, 0);
    x.quadraticCurveTo(r*0.9,-Math.sin(ang)*r*0.4, R*(i-1)/rings,0);
    x.stroke();
    // glowing node dot at ring
    const ds=(2.2+1.6*Math.sin(TAU*u*3+i))*DPR;
    const g=x.createRadialGradient(r,0,0,r,0,ds*3); g.addColorStop(0,`rgba(${c[0]+60},${c[1]+60},${c[2]+60},0.95)`); g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    x.fillStyle=g; x.beginPath(); x.arc(r,0,ds*3,0,TAU); x.fill();
  }
}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#070514';x.fillRect(0,0,W,H);
  const bg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,R*1.1); bg.addColorStop(0,'rgba(60,40,120,0.25)'); bg.addColorStop(1,'rgba(7,5,20,0)'); x.fillStyle=bg; x.fillRect(0,0,W,H);
  const S=14, breathe=1+0.05*Math.sin(TAU*u), rot=TAU*u;
  x.save(); x.translate(W/2,H/2); x.scale(breathe,breathe); x.rotate(rot);
  x.globalCompositeOperation='lighter';
  for(let s=0;s<S;s++){ x.save(); x.rotate(s*TAU/S); wedge(u); x.scale(1,-1); wedge(u); x.restore(); }   // rotate + mirror = dihedral symmetry
  // central bloom
  const cg=x.createRadialGradient(0,0,0,0,0,R*0.16); cg.addColorStop(0,'rgba(255,240,200,0.9)'); cg.addColorStop(0.4,'rgba(255,120,210,0.5)'); cg.addColorStop(1,'rgba(255,120,210,0)');
  x.fillStyle=cg; x.beginPath(); x.arc(0,0,R*0.16,0,TAU); x.fill();
  x.restore();}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

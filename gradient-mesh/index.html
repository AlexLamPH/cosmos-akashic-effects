<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Gradient Mesh</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Gradient Mesh — big soft colour orbs drifting on sine paths and blending into a living mesh gradient; pure function of time, seamless loop.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=9000,TAU=6.28318530718;
let W,H,DPR,orbs=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rnd(20);orbs=[];const n=6;
  for(let i=0;i<n;i++)orbs.push({c:AC[i%AC.length],bx:0.2+r()*0.6,by:0.2+r()*0.6,ax:0.16+r()*0.2,ay:0.16+r()*0.2,kx:1+(r()*2|0),ky:1+(r()*2|0),phx:r(),phy:r(),rad:0.42+r()*0.38,pr:r()});}
rs();addEventListener('resize',()=>{rs();if(window.__ready)frame(0);});
function frame(t){const u=(((t%LOOP)+LOOP)%LOOP)/LOOP;
  x.setTransform(1,0,0,1,0,0);x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';const D=Math.max(W,H);
  for(const o of orbs){
    const px=(o.bx+o.ax*Math.sin(TAU*(u*o.kx+o.phx)))*W;
    const py=(o.by+o.ay*Math.cos(TAU*(u*o.ky+o.phy)))*H;
    const rad=o.rad*D*(0.85+0.15*Math.sin(TAU*(u*2+o.pr)));const c=o.c;
    const g=x.createRadialGradient(px,py,0,px,py,rad);
    g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0.32)`);
    g.addColorStop(0.4,`rgba(${c[0]},${c[1]},${c[2]},0.13)`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.beginPath();x.arc(px,py,rad,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';
  const v=x.createRadialGradient(W/2,H/2,D*0.28,W/2,H/2,D*0.72);
  v.addColorStop(0,'rgba(5,3,13,0)');v.addColorStop(1,'rgba(5,3,13,0.5)');
  x.fillStyle=v;x.fillRect(0,0,W,H);}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

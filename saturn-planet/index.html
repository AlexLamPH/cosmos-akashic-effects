<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Saturn Planet</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Saturn Planet — a shaded, slowly rotating banded sphere wrapped by a tilted elliptical ring system that passes both in front of and behind it, with a soft accent glow. Deterministic, seamless, pure Canvas 2D.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718;
let W,H,DPR,cx,cy,R,bands=[],ringPts=[],stars=[];const N=100;
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[224,178,74],[255,106,61],[139,92,255],[70,180,255]];
const TILT=-0.42,ct=Math.cos(TILT),st=Math.sin(TILT);          // ring plane tilt
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;R=Math.min(W,H)*0.20;
  const r=mul(7);bands=[];                                     // horizontal cloud bands across the sphere
  for(let i=0;i<14;i++){const c=AC[i%AC.length];bands.push({y:-1+r()*2,h:0.10+r()*0.18,a:0.10+r()*0.22,c,ph:r()});}
  ringPts=[];for(let i=0;i<260;i++){const a=i/260;ringPts.push({a,                 // ring particles by angle around plane
    rr:1.35+ (Math.sin(a*TAU*7+a*3)*0.5+0.5)*0.62, c:AC[(i*3)%AC.length],
    br:0.5+0.5*((Math.sin(a*40)*0.5+0.5)) });}
  stars=[];const s2=mul(55);for(let i=0;i<120;i++)stars.push({x:s2()*W,y:s2()*H,r:s2()*1.3*DPR+0.3*DPR,a:0.25+s2()*0.5});
}
rs();addEventListener('resize',rs);
// a ring point at plane-angle a (0..1), spin u; returns screen pos + depth z (>0 = in front of planet)
function ringPos(a,rmul,u){const th=(a+u)*TAU;const px=Math.cos(th)*rmul,pz=Math.sin(th)*rmul;
  const sx=cx+px*R, sy=cy+ (pz*R)*st, depth=pz*ct;            // tilt: y squashed, depth from same pz
  return[sx,sy,depth];}
function drawRing(front,u){for(const p of ringPts){const q=ringPos(p.a,p.rr,u);
    if((q[2]>0)!==front)continue;                              // front/back split around the sphere
    const c=`${p.c[0]},${p.c[1]},${p.c[2]}`;const sz=(1.0+p.br*1.6)*DPR;
    x.fillStyle=`rgba(${c},${0.30+0.45*p.br})`;x.beginPath();x.arc(q[0],q[1],sz,0,TAU);x.fill();}}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  for(const s of stars){x.fillStyle=`rgba(200,210,255,${s.a})`;x.beginPath();x.arc(s.x,s.y,s.r,0,TAU);x.fill();}
  // planet glow halo
  const g=x.createRadialGradient(cx,cy,R*0.6,cx,cy,R*2.4);
  g.addColorStop(0,'rgba(224,178,74,0.20)');g.addColorStop(1,'rgba(224,178,74,0)');
  x.fillStyle=g;x.beginPath();x.arc(cx,cy,R*2.4,0,TAU);x.fill();
  drawRing(false,u);                                           // ring BEHIND the planet first
  // planet body: base disc + lit gradient
  x.save();x.beginPath();x.arc(cx,cy,R,0,TAU);x.clip();
  const bg=x.createRadialGradient(cx-R*0.4,cy-R*0.4,R*0.1,cx,cy,R*1.25);
  bg.addColorStop(0,'rgba(120,96,40,1)');bg.addColorStop(0.55,'rgba(70,52,22,1)');bg.addColorStop(1,'rgba(20,14,8,1)');
  x.globalCompositeOperation='source-over';x.fillStyle=bg;x.fillRect(cx-R,cy-R,R*2,R*2);
  x.globalCompositeOperation='lighter';                       // banding, drifting horizontally with spin
  for(const b of bands){const yy=cy+b.y*R;const off=((b.ph+u)%1);
    const grd=x.createLinearGradient(0,yy-b.h*R,0,yy+b.h*R);const c=`${b.c[0]},${b.c[1]},${b.c[2]}`;
    grd.addColorStop(0,`rgba(${c},0)`);grd.addColorStop(0.5,`rgba(${c},${b.a*(0.6+0.4*Math.sin((off)*TAU))})`);grd.addColorStop(1,`rgba(${c},0)`);
    x.fillStyle=grd;x.fillRect(cx-R,yy-b.h*R,R*2,b.h*R*2);}
  x.fillStyle='rgba(255,240,210,0.18)';x.beginPath();x.arc(cx-R*0.38,cy-R*0.40,R*0.55,0,TAU);x.fill(); // sheen
  x.restore();
  // terminator shadow on the unlit side
  x.globalCompositeOperation='source-over';x.save();x.beginPath();x.arc(cx,cy,R,0,TAU);x.clip();
  const sh=x.createRadialGradient(cx-R*0.5,cy-R*0.5,R*0.2,cx+R*0.5,cy+R*0.5,R*1.6);
  sh.addColorStop(0,'rgba(5,3,13,0)');sh.addColorStop(1,'rgba(5,3,13,0.85)');
  x.fillStyle=sh;x.fillRect(cx-R,cy-R,R*2,R*2);x.restore();
  x.globalCompositeOperation='lighter';
  drawRing(true,u);                                            // ring IN FRONT of the planet
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

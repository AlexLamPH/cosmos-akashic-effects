<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Clouds Raymarch</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Clouds Raymarch — volumetric fbm nebula raymarched and lit by a single light, real WebGL GLSL fragment shader. Deterministic, seamless (uT loops 0..1).
const cv=document.getElementById('c');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000;
const gl=cv.getContext('webgl',{antialias:false,depth:false,preserveDrawingBuffer:true});
const VERT='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG=`precision highp float; uniform vec2 uRes; uniform float uT;
#define TAU 6.28318530718
float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float noise(vec3 x){vec3 i=floor(x),f=fract(x);f=f*f*(3.0-2.0*f);
 return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
            mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
float fbm(vec3 p){float s=0.,a=.5;for(int i=0;i<5;i++){s+=a*noise(p);p=p*2.03+1.6;a*=.5;}return s;}
// cloud density: fbm slab carved out, with looping drift baked into the sample point
float density(vec3 p,vec3 drift){
 float d=fbm(p*1.1+drift)-0.50;        // threshold -> mostly empty space
 d-=abs(p.y)*0.55;                     // fade top & bottom into a horizontal slab
 return clamp(d,0.0,1.0);}
vec3 shade(vec2 uv,float t){
 float ph=t*TAU;
 vec3 ro=vec3(0.0,0.0,-2.6);
 vec3 rd=normalize(vec3(uv,1.4));
 // seamless evolution: drift the noise field on a circle of t
 vec3 drift=vec3(cos(ph),sin(ph)*0.5,sin(ph))*0.9 + vec3(0.0,0.0,0.0);
 vec3 lightDir=normalize(vec3(0.6,0.7,-0.4));
 const int STEPS=46;
 float stepLen=0.11;
 float tCur=0.6;
 vec3 col=vec3(0.0);
 float trans=1.0;                       // transmittance
 for(int i=0;i<STEPS;i++){
  if(trans<0.02) break;                 // early-out when opaque
  vec3 p=ro+rd*tCur;
  float dens=density(p,drift);
  if(dens>0.001){
   // one-tap light sample toward the light for cheap self-shadow
   float dl=density(p+lightDir*0.3,drift);
   float lit=clamp(dens-dl,0.0,1.0)*1.6+0.12;
   // accent tint shifts violet -> nebula-pink up the frame
   vec3 violet=vec3(0.545,0.36,1.0), nebula=vec3(1.0,0.36,0.76), cosmic=vec3(0.27,0.71,1.0);
   vec3 tint=mix(violet,nebula,clamp(p.y*0.5+0.5,0.0,1.0));
   tint=mix(tint,cosmic,0.25);
   float a=dens*0.42;                   // per-step opacity
   col+=trans*a*tint*lit*1.7;
   trans*=1.0-a;
  }
  tCur+=stepLen;
 }
 col+=vec3(0.010,0.007,0.022)*trans;    // dark deep-space backdrop
 col=col/(1.0+col*0.5);                 // gentle tonemap, keep darks dark
 return col;}
void main(){ vec2 uv=(gl_FragCoord.xy*2.0-uRes)/min(uRes.x,uRes.y); vec3 col=shade(uv,uT);
 col=pow(clamp(col,0.,1.),vec3(0.4545)); gl_FragColor=vec4(col,1.0);}`;
function sh(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);
 if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'uRes'),uT=gl.getUniformLocation(prog,'uT');
let DPR;function rs(){DPR=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';gl.viewport(0,0,cv.width,cv.height);}
rs();addEventListener('resize',rs);
function render(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uT,u);gl.drawArrays(gl.TRIANGLES,0,3);}
if(AUTO){window.__seek=t=>render(t);render(0);window.__ready=true;}else{const s=performance.now();(function l(n){render(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

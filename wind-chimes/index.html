<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Wind Chimes</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}
canvas{display:block;position:fixed;inset:0;cursor:pointer}
#h{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);font:12px/1 system-ui,sans-serif;color:#cbb9ff;opacity:.6;letter-spacing:.5px;pointer-events:none;transition:opacity .6s}</style></head>
<body><canvas id="c"></canvas><div id="h">▶ click / drag the chimes to hear them</div><script>
// Cosmos Wind Chimes — generative pentatonic chimes; a breeze sways hanging tubes that strike soft bell tones.
// LIVE: real Web Audio bells (sine + harmonics, long decay) on click/drag + ambient breeze. AUTO: seeded silent sway+glow loop.
const cv=document.getElementById('c'),x=cv.getContext('2d'),hint=document.getElementById('h');
const AUTO=new URLSearchParams(location.search).has('auto');
const LOOP=7200,TAU=6.283185307;
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a','#b98bff','#5cc6ff'];
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
// pentatonic (A minor pentatonic) across two octaves, low→high
const SEMI=[0,3,5,7,10,12,15,17],BASE=220; // A3 base
const NC=SEMI.length; // 8 chimes
let W,H,DPR,topY,cx,chimes,seed;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  cx=W/2;topY=H*0.16;const r=mb(2026);seed=r;chimes=[];
  const spread=Math.min(W,H)*0.62,gap=spread/(NC-1);
  for(let i=0;i<NC;i++){const len=Math.min(W,H)*(0.50-i*0.040); // longer tube = lower note
    chimes.push({i,freq:BASE*Math.pow(2,SEMI[i]/12),x0:cx-spread/2+i*gap,len,col:COL[i%COL.length],
      ph:r()*TAU,sw:0.7+0.6*r(),glow:0,vel:0,ang:0});}}
rs();addEventListener('resize',rs);
// ---- AUDIO (live only) ----
let actx,master;
function audio(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.2;
  const comp=actx.createDynamicsCompressor();comp.threshold.value=-18;comp.ratio.value=4;master.connect(comp);comp.connect(actx.destination);}
  if(actx.state==='suspended')actx.resume();return actx;}
function strike(freq,vel){if(AUTO)return;const a=audio(),t=a.currentTime,g=a.createGain();g.connect(master);
  const harm=[[1,1],[2.76,0.5],[5.4,0.28],[8.93,0.12]],amp=Math.min(1,vel)*0.9;
  harm.forEach(([m,h],k)=>{const o=a.createOscillator();o.type='sine';o.frequency.value=freq*m;
    const og=a.createGain();og.gain.value=h;o.connect(og);og.connect(g);o.start(t);o.stop(t+3.6);
    o.frequency.setValueAtTime(freq*m,t);o.frequency.exponentialRampToValueAtTime(freq*m*0.997,t+3.4);});
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(amp,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,t+3.4+1.4*amp);}
// ---- visual state from u (deterministic in AUTO; advanced live for idle attract) ----
// seeded breeze: smooth multi-sine gust that loops
function breeze(u){return Math.sin(TAU*u)*0.6+Math.sin(TAU*2*u+1.3)*0.3+Math.sin(TAU*3*u+2.1)*0.18;}
// scripted strike schedule (seeded), fractional times in [0,1)
let schedule=null;
function buildSchedule(){const r=mb(99);schedule=[];for(let k=0;k<14;k++){schedule.push({u:r(),i:(r()*NC)|0,v:0.45+0.5*r()});}schedule.sort((a,b)=>a.u-b.u);}
buildSchedule();
let lastU=0;
// frame-0 richness: seed a glowing chime and offset breeze so t=0 is mid-sway, not blank
if(AUTO){chimes[2].glow=1;chimes[2].vel=0.8;chimes[5].glow=0.45;}
function render(u){
  const bz=breeze(u);
  // background
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // soft vignette glow
  const bg=x.createRadialGradient(cx,topY,0,cx,topY,Math.max(W,H)*0.7);bg.addColorStop(0,'rgba(40,28,70,0.5)');bg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=bg;x.fillRect(0,0,W,H);
  // trigger AUTO strikes (glow only — silent); detect schedule crossings within this loop
  if(AUTO){for(const s of schedule){const cr=(lastU<=s.u&&u>s.u)||(lastU>u&&(s.u>lastU||s.u<=u));if(cr){chimes[s.i].glow=1;chimes[s.i].vel=s.v;}}}
  lastU=u;
  // support beam
  const beamW=Math.min(W,H)*0.66;
  x.strokeStyle='#3a2f5e';x.lineWidth=4*DPR;x.beginPath();x.moveTo(cx-beamW/2,topY);x.lineTo(cx+beamW/2,topY);x.stroke();
  x.globalCompositeOperation='lighter';
  for(const c of chimes){
    // sway angle: breeze + per-chime phase, decays glow
    const sway=(bz*c.sw+0.25*Math.sin(TAU*(2*u)+c.ph))*0.26; // radians
    c.ang=sway;c.glow*=0.94;
    const ax=c.x0,ay=topY,ex=ax+Math.sin(sway)*c.len,ey=ay+Math.cos(sway)*c.len;
    // string
    x.globalAlpha=0.5;x.strokeStyle='#6a5a9a';x.lineWidth=1.4*DPR;x.beginPath();x.moveTo(ax,ay);x.lineTo(ex,ey);x.stroke();
    // glow ripple on strike
    if(c.glow>0.02){const rr=(1-c.glow)*c.len*0.7+8*DPR;x.globalAlpha=c.glow*0.5;x.strokeStyle=c.col;x.lineWidth=2*DPR;
      x.beginPath();x.arc(ex,ey,rr,0,TAU);x.stroke();}
    // tube (rounded thick line)
    const glowAmt=c.glow;
    x.globalAlpha=0.85+0.15*glowAmt;x.lineCap='round';
    x.lineWidth=(7+9*(1-c.i/NC))*DPR;x.strokeStyle=c.col;
    x.shadowColor=c.col;x.shadowBlur=(6+34*glowAmt)*DPR;
    x.beginPath();x.moveTo(ax+Math.sin(sway)*c.len*0.18,ay+Math.cos(sway)*c.len*0.18);x.lineTo(ex,ey);x.stroke();
    x.shadowBlur=0;
    // clapper/bead at bottom
    x.globalAlpha=0.95;x.fillStyle=glowAmt>0.1?'#ffffff':c.col;x.beginPath();x.arc(ex,ey,(4+5*glowAmt)*DPR,0,TAU);x.fill();
  }
  // central clapper ring (the wind catcher) drifting with breeze
  const ringY=topY+Math.min(W,H)*0.30,ringX=cx+bz*Math.min(W,H)*0.10;
  x.globalAlpha=0.5;x.strokeStyle='#e0b24a';x.lineWidth=2*DPR;x.beginPath();x.arc(ringX,ringY,Math.min(W,H)*0.05,0,TAU);x.stroke();
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}
// ---- live interaction ----
function pick(px,py){let best=-1,bd=1e9;for(const c of chimes){const ex=c.x0+Math.sin(c.ang)*c.len,ey=topY+Math.cos(c.ang)*c.len;
  const d=Math.hypot(px-ex,py-ey)+Math.abs(px-c.x0)*0.3;if(d<bd){bd=d;best=c.i;}}return chimes[best];}
let downK=false;
function hit(px,py,vel){const c=pick(px,py);c.glow=1;c.vel=vel;strike(c.freq,vel);}
if(!AUTO){
  const evt=e=>{const r=cv.getBoundingClientRect();return[(e.clientX-r.left)*DPR,(e.clientY-r.top)*DPR];}
  cv.addEventListener('pointerdown',e=>{audio();downK=true;hint.style.opacity=0;const[px,py]=evt(e);hit(px,py,0.9);});
  cv.addEventListener('pointermove',e=>{if(!downK)return;if(Math.random()<0.18){const[px,py]=evt(e);hit(px,py,0.45);}});
  addEventListener('pointerup',()=>downK=false);
  addEventListener('keydown',e=>{audio();hint.style.opacity=0;const c=chimes[(e.key.charCodeAt(0))%NC];c.glow=1;strike(c.freq,0.8);});
  // ambient breeze: occasionally chime on gusts
  setInterval(()=>{if(!actx)return;const u=performance.now()%LOOP/LOOP;if(Math.abs(breeze(u))>0.78&&Math.random()<0.5){const i=(Math.random()*NC)|0;chimes[i].glow=1;strike(chimes[i].freq,0.4);}},620);
}
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);window.__seek(0);window.__ready=true;}
else{const s=performance.now();(function l(n){render((((n-s)%LOOP)+LOOP)%LOOP/LOOP);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

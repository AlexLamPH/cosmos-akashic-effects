<!-- Cosmos Cube Wave: isometric grid of hand-projected 3D cubes whose heights ripple in a travelling wave (a "city of light" bouncing). Drawn back-to-front, accent-tinted. Pure Canvas 2D, seamless loop. -->
<!doctype html><meta charset="utf-8"><title>Cosmos Cube Wave</title>
<style>html,body{margin:0;height:100%;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0;width:100%;height:100%}</style>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const LOOP=6000,TAU=Math.PI*2,GRID=12,TW=30,TH=15;
const AC=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
let W,H,DPR,cx,cy,tints;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function setup(){
  DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  cx=W/2;cy=H/2-60;
  const rng=mulberry32(0xc17ed);tints=[];
  for(let i=0;i<GRID*GRID;i++)tints.push((rng()*AC.length)|0);
}
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function sh(c,f){const[r,g,b]=hex(c);return`rgb(${r*f|0},${g*f|0},${b*f|0})`;}
// iso projection: grid (i,j) base, with height (lift). returns screen point.
function iso(i,j,z){return[cx+(i-j)*TW,cy+(i+j)*TH-z];}
function quad(p0,p1,p2,p3,fill){ctx.fillStyle=fill;ctx.beginPath();ctx.moveTo(p0[0],p0[1]);ctx.lineTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.lineTo(p3[0],p3[1]);ctx.closePath();ctx.fill();}
function cube(i,j,h,col){
  const c=AC[col];
  // top face corners at height h
  const t0=iso(i,j,h),t1=iso(i+1,j,h),t2=iso(i+1,j+1,h),t3=iso(i,j+1,h);
  // base corners at z=0 for the visible front edges
  const b1=iso(i+1,j,0),b2=iso(i+1,j+1,0),b3=iso(i,j+1,0);
  quad(t3,t2,b2,b3,sh(c,0.42));      // left face (toward viewer-left)
  quad(t2,t1,b1,b2,sh(c,0.62));      // right face
  // bright top with subtle glow
  ctx.shadowColor=c;ctx.shadowBlur=10;
  quad(t0,t1,t2,t3,sh(c,1.15));
  ctx.shadowBlur=0;
  ctx.strokeStyle=sh(c,1.4);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(t0[0],t0[1]);ctx.lineTo(t1[0],t1[1]);ctx.lineTo(t2[0],t2[1]);ctx.lineTo(t3[0],t3[1]);ctx.closePath();ctx.stroke();
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ctx.globalCompositeOperation='source-over';ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  const mid=(GRID-1)/2,base=18,amp=42,freq=0.55,k=2;
  // draw back-to-front: smaller (i+j) is further back
  for(let s=0;s<=2*(GRID-1);s++){
    for(let i=0;i<GRID;i++){const j=s-i;if(j<0||j>=GRID)continue;
      const dx=i-mid,dy=j-mid,dist=Math.sqrt(dx*dx+dy*dy);
      const z=base+amp*(0.5+0.5*Math.sin(TAU*u*k-dist*freq));
      cube(i,j,z,tints[i*GRID+j]);
    }
  }
  // vignette/ambient glow over scene
  ctx.globalCompositeOperation='lighter';
  const g=ctx.createRadialGradient(cx,cy+40,0,cx,cy+40,Math.max(W,H)*0.5);
  g.addColorStop(0,'rgba(70,180,255,0.10)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
addEventListener('resize',setup);setup();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

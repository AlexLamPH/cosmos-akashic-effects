<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Heart Burst</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Heart Burst — a like-heart scales up with a pop and emits a ring of sparkles outward, then settles; ping-pong loop with nebula/solaris glow. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=7000,TAU=6.28318530718;
let W,H,DPR,cx,cy,S,parts=[];
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;S=Math.min(W,H)*0.30;
  const r=mul(2024);parts=[];const n=22;
  for(let i=0;i<n;i++){const a=i/n*TAU+r()*0.18;parts.push({a:a,d:0.9+r()*0.7,sz:1.4+r()*2.6,col:AC[(r()*AC.length)|0],sp:(r()<0.5?1:-1)});}}
rs();addEventListener('resize',rs);
function heartPt(th,s){// parametric heart, returns canvas coords centred at cx,cy, scale s
  const hx=16*Math.pow(Math.sin(th),3);
  const hy=13*Math.cos(th)-5*Math.cos(2*th)-2*Math.cos(3*th)-Math.cos(4*th);
  return [cx+hx*s,cy-hy*s];}
function heartPath(s){x.beginPath();for(let i=0;i<=60;i++){const th=i/60*TAU;const p=heartPt(th,s);i?x.lineTo(p[0],p[1]):x.moveTo(p[0],p[1]);}x.closePath();}
function frame(t){let u=((t%LOOP)+LOOP)%LOOP/LOOP;
  // ping-pong 0..1..0 so frame(0)==frame(LOOP); start mid-pop so frame0 is rich
  const pp=0.5-0.5*Math.cos(TAU*u);              // 0->1->0 smooth
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // pop scale: overshoot then settle, driven by pp
  const pop=0.62+0.5*pp+0.12*Math.sin(TAU*u*2)*pp; const sc=S/16*pop;
  const beat=1+0.05*Math.sin(TAU*u*3)*pp;        // subtle beat
  // glow halo behind heart (nebula -> solaris)
  const hg=x.createRadialGradient(cx,cy,0,cx,cy,S*1.5*(0.6+0.5*pp));
  hg.addColorStop(0,`rgba(255,92,194,${0.34*(0.4+0.6*pp)})`);
  hg.addColorStop(0.45,`rgba(255,106,61,${0.16*(0.4+0.6*pp)})`);
  hg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=hg;x.beginPath();x.arc(cx,cy,S*1.5*(0.6+0.5*pp),0,TAU);x.fill();
  // sparkle ring bursting outward then returning (pp drives radius)
  const ringR=S*(0.55+1.6*pp);
  parts.forEach(p=>{const R=ringR*p.d;const px=cx+Math.cos(p.a)*R,py=cy+Math.sin(p.a)*R;
    const al=Math.min(1,pp*1.4)*(0.9-0.35*pp);
    const sz=(p.sz*(0.5+pp))*DPR;
    x.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${al})`;
    // four-point sparkle
    x.save();x.translate(px,py);x.rotate(p.a+p.sp*TAU*u);
    x.beginPath();for(let s=0;s<4;s++){const a2=s/4*TAU;x.lineTo(Math.cos(a2)*sz,Math.sin(a2)*sz);const a3=(s+0.5)/4*TAU;x.lineTo(Math.cos(a3)*sz*0.32,Math.sin(a3)*sz*0.32);}x.closePath();x.fill();x.restore();});
  // the heart: filled gradient + bright stroke
  heartPath(sc*beat);
  const fg=x.createRadialGradient(cx,cy-S*0.2,0,cx,cy,S*1.3);
  fg.addColorStop(0,`rgba(255,150,210,${0.55+0.4*pp})`);
  fg.addColorStop(0.6,`rgba(255,92,194,${0.45+0.4*pp})`);
  fg.addColorStop(1,`rgba(139,92,255,${0.3+0.3*pp})`);
  x.fillStyle=fg;x.fill();
  x.lineJoin='round';x.lineWidth=(2+2*pp)*DPR;x.strokeStyle=`rgba(255,180,225,${0.6+0.4*pp})`;
  heartPath(sc*beat);x.stroke();
  // tiny inner shine
  const sg=x.createRadialGradient(cx-S*0.18,cy-S*0.22,0,cx-S*0.18,cy-S*0.22,S*0.5);
  sg.addColorStop(0,`rgba(255,255,255,${0.5*pp+0.18})`);sg.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=sg;x.beginPath();x.arc(cx-S*0.18,cy-S*0.22,S*0.5,0,TAU);x.fill();
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

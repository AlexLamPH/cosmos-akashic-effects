<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Wavy Text</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Wavy Text — "COSMOS" letters bob on a travelling sine wave with additive glow. Pure Canvas2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=7000,TAU=6.28318530718,WORD="COSMOS";
const ACC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]]; // violet cosmic nebula aurora solaris sacred
let W,H,DPR,cx,cy,fs,gap,amp;
// seeded mulberry32 — once at setup, never Math.random in frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let twk=[]; const r=mul(7); for(let i=0;i<WORD.length;i++)twk.push(0.85+r()*0.3); // per-letter glow twinkle factor
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;
  fs=Math.min(W/(WORD.length*0.82),H*0.5);gap=fs*0.7;amp=fs*0.28;}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP; // u in [0,1), drives everything via integer harmonics
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.font='700 '+fs+'px Georgia,"Times New Roman",serif';x.textAlign='center';x.textBaseline='middle';
  const total=(WORD.length-1)*gap, x0=cx-total/2;
  x.globalCompositeOperation='lighter';
  for(let i=0;i<WORD.length;i++){const lx=x0+i*gap;
    // travelling sine wave: phase = 2PI*(2u - i/WORD) so wave moves across letters; k=2 integer -> seamless
    const ph=TAU*(2*u - i/WORD.length);
    const dy=amp*Math.sin(ph);
    const ly=cy+dy;
    const c=ACC[i%ACC.length];
    const glow=(0.55+0.45*Math.sin(ph))*twk[i]; // brighter at wave crest
    x.shadowColor=`rgba(${c[0]},${c[1]},${c[2]},0.95)`;x.shadowBlur=fs*(0.18+0.32*glow); // additive halo
    x.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.45+0.45*glow})`;
    x.fillText(WORD[i],lx,ly);
    x.shadowBlur=fs*0.05;x.fillStyle=`rgba(240,244,255,${0.5+0.4*glow})`; // bright core
    x.fillText(WORD[i],lx,ly);}
  x.shadowBlur=0;x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

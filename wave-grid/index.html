<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Wave Grid</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Wave Grid — 3D perspective wireframe terrain whose heights ripple as a travelling wave, rows receding. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=7000,TAU=6.283185307,F=620;
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let W,H,DPR,cx,cy,amp;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H*0.40;
  const r=mb(7);amp=[];for(let i=0;i<64;i++)amp.push(0.7+0.6*r());}
rs();addEventListener('resize',rs);
const NX=24,NZ=22;
function proj(wx,wy,wz){const s=F/(F+wz);return[cx+wx*s,cy+wy*s,s];}
function height(gx,gz,u){const SP=Math.min(W,H)*0.030;
  // travelling wave: integer-k phases mod 1 → seamless
  return Math.sin(TAU*(gz*0.16-2*u))*SP*1.3 + Math.cos(TAU*(gx*0.11+gz*0.05-1*u))*SP*0.8;}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  const SX=Math.min(W,H)*0.052, base=Math.min(W,H)*0.10;
  const P=[];                                   // project every vertex once
  for(let zi=0;zi<NZ;zi++){P[zi]=[];
    for(let xi=0;xi<NX;xi++){
      const gx=xi-(NX-1)/2, gz=zi;
      const wx=gx*SX, wz=base+gz*SX*1.15;
      const wy=base*1.3 - height(gx,gz,u)*amp[(xi*3+zi)%64];
      P[zi][xi]=proj(wx,wy,wz);}}
  // draw far rows first so nearer rows overlay (and are brighter/thicker)
  for(let zi=NZ-1;zi>=0;zi--){const depth=zi/(NZ-1);const near=1-depth;
    const col=COL[zi%6];const a=0.22+0.75*near;x.strokeStyle=col;x.globalAlpha=a;x.lineWidth=(0.5+near*2.1)*DPR;
    x.beginPath();for(let xi=0;xi<NX;xi++){const p=P[zi][xi];if(xi===0)x.moveTo(p[0],p[1]);else x.lineTo(p[0],p[1]);}x.stroke();
    if(zi<NZ-1){x.beginPath();for(let xi=0;xi<NX;xi++){const p=P[zi][xi],q=P[zi+1][xi];x.moveTo(p[0],p[1]);x.lineTo(q[0],q[1]);}x.stroke();}
  }
  x.globalAlpha=1;x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

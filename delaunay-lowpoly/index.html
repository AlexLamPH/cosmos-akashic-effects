<!-- Cosmos Delaunay Lowpoly — drifting seeded points form a shimmering triangulated facet mesh -->
<!doctype html><meta charset=utf-8><title>Delaunay Lowpoly</title>
<style>html,body{margin:0;height:100%;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const LOOP=8000, ACCENT=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
let W,H,DPR,pts=[],tris=[];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
// Bowyer-Watson triangulation on base point positions (computed once)
function triangulate(P){
  const big=1e5, st=[{x:-big,y:-big},{x:big,y:-big},{x:0,y:big}];
  const all=P.concat(st);let T=[[P.length,P.length+1,P.length+2]];
  function circ(a,b,cc,p){const ax=all[a].x,ay=all[a].y,bx=all[b].x,by=all[b].y,cx2=all[cc].x,cy=all[cc].y;
    const d=2*(ax*(by-cy)+bx*(cy-ay)+cx2*(ay-by));if(Math.abs(d)<1e-9)return false;
    const ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx2*cx2+cy*cy)*(ay-by))/d;
    const uy=((ax*ax+ay*ay)*(cx2-bx)+(bx*bx+by*by)*(ax-cx2)+(cx2*cx2+cy*cy)*(bx-ax))/d;
    const dx=all[p].x-ux,dy=all[p].y-uy,r2=(ax-ux)*(ax-ux)+(ay-uy)*(ay-uy);return dx*dx+dy*dy<=r2;}
  for(let i=0;i<P.length;i++){const bad=[],edges=[];
    for(const t of T)if(circ(t[0],t[1],t[2],i))bad.push(t);
    for(const t of bad){const e=[[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]];
      for(const ed of e){let shared=false;for(const o of bad){if(o===t)continue;
        for(const f of [[o[0],o[1]],[o[1],o[2]],[o[2],o[0]]])
          if((f[0]===ed[0]&&f[1]===ed[1])||(f[0]===ed[1]&&f[1]===ed[0]))shared=true;}
        if(!shared)edges.push(ed);}}
    T=T.filter(t=>!bad.includes(t));
    for(const ed of edges)T.push([ed[0],ed[1],i]);}
  return T.filter(t=>t[0]<P.length&&t[1]<P.length&&t[2]<P.length);
}
function setup(){
  DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;
  c.width=W*DPR;c.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);
  const r=mulberry32(7771234);const cols=7,rows=6;pts=[];
  for(let j=0;j<=rows;j++)for(let i=0;i<=cols;i++){
    const bx=(i/cols)*W, by=(j/rows)*H;
    pts.push({bx,by, ax:14+r()*30,ay:12+r()*26, kx:1+((r()*3)|0),ky:1+((r()*3)|0),
      px:r(),py:r(), col:hex(ACCENT[(r()*ACCENT.length)|0]), edge:i===0||j===0||i===cols||j===rows});
  }
  // triangulate on base positions (a fixed triangulation of the moving points)
  tris=triangulate(pts.map(p=>({x:p.bx,y:p.by})));
}
function posOf(p,u){const TAU=Math.PI*2;
  return [p.edge?p.bx:p.bx+p.ax*Math.cos(TAU*p.kx*u+p.px*TAU),
          p.edge?p.by:p.by+p.ay*Math.sin(TAU*p.ky*u+p.py*TAU)];}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP, TAU=Math.PI*2;
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const pos=pts.map(p=>posOf(p,u));
  // fill facets (additive flat accent gradients)
  x.globalCompositeOperation='lighter';
  for(let ti=0;ti<tris.length;ti++){const tr=tris[ti];
    const a=pos[tr[0]],b=pos[tr[1]],cc=pos[tr[2]];
    const sh=0.5+0.5*Math.sin(TAU*((ti%4)+1)*u+ti*0.7); // shimmer per facet, integer harmonic
    const[R,G,B]=pts[tr[0]].col;const al=0.10+0.30*sh;
    const mx=(a[0]+b[0]+cc[0])/3,my=(a[1]+b[1]+cc[1])/3;
    const rad=Math.hypot(a[0]-mx,a[1]-my)+1;
    const g=x.createRadialGradient(mx,my,0,mx,my,rad*1.6);
    g.addColorStop(0,`rgba(${R},${G},${B},${al})`);
    g.addColorStop(1,`rgba(${R},${G},${B},${al*0.15})`);
    x.fillStyle=g;
    x.beginPath();x.moveTo(a[0],a[1]);x.lineTo(b[0],b[1]);x.lineTo(cc[0],cc[1]);x.closePath();x.fill();
  }
  // glowing edges
  x.lineJoin='round';
  for(let ti=0;ti<tris.length;ti++){const tr=tris[ti];
    const a=pos[tr[0]],b=pos[tr[1]],cc=pos[tr[2]];
    const sh=0.5+0.5*Math.sin(TAU*((ti%3)+1)*u+ti*1.3);
    const[R,G,B]=pts[tr[1]].col;
    x.strokeStyle=`rgba(${R},${G},${B},${0.25+0.55*sh})`;x.lineWidth=1.1+1.4*sh;
    x.beginPath();x.moveTo(a[0],a[1]);x.lineTo(b[0],b[1]);x.lineTo(cc[0],cc[1]);x.closePath();x.stroke();
  }
  // vertex glints
  for(let i=0;i<pos.length;i++){const p=pos[i];const[R,G,B]=pts[i].col;
    const b=0.4+0.6*Math.sin(TAU*((i%4)+1)*u+i);
    x.fillStyle=`rgba(${R},${G},${B},${0.5*b})`;
    x.beginPath();x.arc(p[0],p[1],1.6+1.6*b,0,TAU);x.fill();}
}
addEventListener('resize',setup);setup();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

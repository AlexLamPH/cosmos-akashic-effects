<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Infinity Flow</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Infinity Flow — glowing particles streaming along a lemniscate (∞). Pure Canvas 2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=6000,TAU=6.28318;
let W,H,DPR,A;
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';A=Math.min(W*0.34,H*0.7);}
rs();addEventListener('resize',rs);
function lem(th){const s=Math.sin(th),c=Math.cos(th),d=1+s*s;return [W/2+A*c/d, H/2+A*s*c/d];}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // faint path
  x.strokeStyle='rgba(120,100,220,0.18)';x.lineWidth=1.2*DPR;x.beginPath();
  for(let i=0;i<=200;i++){const p=lem(i/200*TAU);if(i)x.lineTo(p[0],p[1]);else x.moveTo(p[0],p[1]);}x.stroke();
  // particles
  const N=120;for(let i=0;i<N;i++){const ph=i/N;const p=((u+ph)%1);const th=p*TAU;const pos=lem(th);
    const c=AC[i%AC.length];const tw=0.5+0.5*Math.sin(TAU*(p*3));const a=(0.4+0.6*tw);
    const r=(1.4+1.4*tw)*DPR;
    const g=x.createRadialGradient(pos[0],pos[1],0,pos[0],pos[1],r*3);
    g.addColorStop(0,`rgba(${c[0]+50},${c[1]+50},${c[2]+50},${a})`);g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    x.fillStyle=g;x.beginPath();x.arc(pos[0],pos[1],r*3,0,TAU);x.fill();}
  // center glow
  const cg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,A*0.3);cg.addColorStop(0,'rgba(150,120,255,0.3)');cg.addColorStop(1,'rgba(150,120,255,0)');
  x.fillStyle=cg;x.beginPath();x.arc(W/2,H/2,A*0.3,0,TAU);x.fill();
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

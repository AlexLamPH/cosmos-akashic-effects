<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Wave Interference</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Wave Interference — 3 oscillating point sources emit circular waves that interfere into shifting bands, computed per-pixel.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rnd=mulberry32(0x51A7);
// build a smooth 256-stop looping LUT through the accents (computed once)
const LUT=new Uint8Array(256*3);
(function(){const n=AC.length;for(let i=0;i<256;i++){const f=i/256*n,j=f|0,t=f-j,a=AC[j%n],b=AC[(j+1)%n];
  LUT[i*3]=a[0]+(b[0]-a[0])*t;LUT[i*3+1]=a[1]+(b[1]-a[1])*t;LUT[i*3+2]=a[2]+(b[2]-a[2])*t;}})();
// 3 sources: each orbits a base point on an integer-harmonic loop -> seamless
const SRC=[]; for(let i=0;i<3;i++){SRC.push({bx:0.3+0.4*rnd(),by:0.3+0.4*rnd(),ox:0.06+0.06*rnd(),oy:0.06+0.06*rnd(),ph:rnd()*TAU,k:1+(i%2),freq:26+14*rnd()});}
const RW=200; let RH=156, off, octx, img, W,H,DPR;
off=document.createElement('canvas');octx=off.getContext('2d');
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  RH=Math.max(100,Math.round(RW*innerHeight/innerWidth));off.width=RW;off.height=RH;img=octx.createImageData(RW,RH);
  x.imageSmoothingEnabled=true;}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP, ph=u*TAU;
  // resolve source positions (each orbit term uses integer harmonics of ph)
  const S=SRC.map(s=>({px:s.bx+s.ox*Math.cos(ph+s.ph),py:s.by+s.oy*Math.sin(ph*2+s.ph),f:s.freq,k:s.k}));
  const ar=RW/RH, d=img.data;
  for(let py=0;py<RH;py++){const fy=py/RH;
    for(let px=0;px<RW;px++){const fx=px/RW;
      let sum=0;
      for(let i=0;i<S.length;i++){const s=S[i];const dx=(fx-s.px)*ar,dy=fy-s.py;
        const r=Math.sqrt(dx*dx+dy*dy);
        // wave phase: spatial term minus 2PI*u*k (integer k) so the ripple loops exactly
        sum+=Math.sin(r*s.f - TAU*u*s.k);}
      // sum in [-3,3] -> normalized brightness; map magnitude to LUT, brighten antinodes
      const nv=sum/3, mag=Math.abs(nv);
      let idx=((nv*0.5+0.5)*256 + u*256)|0; idx=((idx%256)+256)%256;
      const g=0.18+0.82*mag*mag, li=idx*3, di=(py*RW+px)*4;
      d[di]=LUT[li]*g;d[di+1]=LUT[li+1]*g;d[di+2]=LUT[li+2]*g;d[di+3]=255;
    }}
  octx.putImageData(img,0,0);
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  x.drawImage(off,0,0,W,H);
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

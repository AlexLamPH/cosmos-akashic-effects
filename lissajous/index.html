<!doctype html><html><head><meta charset="utf-8"><title>Cosmos Lissajous</title>
<style>html,body{margin:0;height:100%;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
</head><body><canvas id="c"></canvas><script>
// Cosmos Lissajous — glowing closed curve x=sin(aφ+δ), y=sin(bφ); δ advances 2π over the loop, a:b steps through small integer ratios so it morphs and returns.
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const ACC=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const LOOP=8000;
const RATIOS=[[3,2],[3,4],[5,4],[4,5],[5,6],[2,3]]; // small integer ratios; cycles back to start
let W,H,DPR,RX,RY,CX,CY;
function mul32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rnd=mul32(70707); const stars=[];
function setup(){DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  RX=Math.min(W,H)*0.40;RY=Math.min(W,H)*0.40;CX=W/2;CY=H/2;
  stars.length=0;for(let i=0;i<120;i++)stars.push({x:rnd()*W,y:rnd()*H,r:rnd()*1.2+0.2,p:rnd(),s:1+((rnd()*3)|0)});}
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerpC(a,b,k){const A=hex(a),B=hex(b);return'rgb('+((A[0]+(B[0]-A[0])*k)|0)+','+((A[1]+(B[1]-A[1])*k)|0)+','+((A[2]+(B[2]-A[2])*k)|0)+')';}
function ratioAt(u){const n=RATIOS.length;const x=u*n;const i=Math.floor(x)%n;const f=x-Math.floor(x);
  // ease so the curve settles on each integer ratio then morphs; smoothstep blend between ratio[i] and ratio[i+1]
  const e=f*f*(3-2*f); const A=RATIOS[i],B=RATIOS[(i+1)%n];
  return[A[0]+(B[0]-A[0])*e, A[1]+(B[1]-A[1])*e];}
function curve(a,b,delta,rx,ry,col,alpha,lw){
  ctx.strokeStyle=col;ctx.globalAlpha=alpha;ctx.lineWidth=lw;ctx.beginPath();
  const STEPS=520;
  for(let i=0;i<=STEPS;i++){const ph=i/STEPS*Math.PI*2;
    const x=CX+Math.sin(a*ph+delta)*rx; const y=CY+Math.sin(b*ph)*ry;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.stroke();
}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ctx.globalCompositeOperation='source-over';ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  for(const s of stars){const tw=0.45+0.55*Math.sin(2*Math.PI*(u*s.s+s.p));ctx.fillStyle=lerpC('#46b4ff','#8b5cff',s.p);ctx.globalAlpha=tw*0.5;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();}
  ctx.globalAlpha=1;
  const r=ratioAt(u); const a=r[0], b=r[1];
  const delta=2*Math.PI*u; // phase advances one full turn -> seamless
  const hue=u;
  // layered accent traces: a few phase-shifted, scaled copies build the glow
  const cidx=Math.floor(hue*ACC.length); const k=hue*ACC.length-cidx;
  const baseCol=lerpC(ACC[cidx%ACC.length],ACC[(cidx+1)%ACC.length],k);
  const accCol=lerpC(ACC[(cidx+2)%ACC.length],ACC[(cidx+3)%ACC.length],k);
  curve(a,b,delta,RX*1.0,RY*1.0,baseCol,0.10,7);          // soft halo
  curve(a,b,delta,RX*1.0,RY*1.0,baseCol,0.22,3.2);        // mid body
  curve(a,b,delta+0.18,RX*0.96,RY*0.96,accCol,0.30,1.6);  // accent trace 1
  curve(a,b,delta-0.18,RX*1.04,RY*1.04,accCol,0.22,1.2);  // accent trace 2
  curve(a,b,delta,RX*1.0,RY*1.0,'#ffffff',0.55,1.0);      // bright core
  // travelling node along the curve
  const ph=2*Math.PI*((u*4)%1); const nx=CX+Math.sin(a*ph+delta)*RX, ny=CY+Math.sin(b*ph)*RY;
  ctx.fillStyle=lerpC('#e0b24a','#ff5cc2',hue);ctx.globalAlpha=0.9;ctx.beginPath();ctx.arc(nx,ny,3.2,0,7);ctx.fill();
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
addEventListener('resize',setup);setup();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

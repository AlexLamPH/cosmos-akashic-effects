<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Mic Tunnel</title><style>
*{margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}
canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:2;
  font:600 13px/1 system-ui,sans-serif;color:#cfc3ff;letter-spacing:.04em;
  padding:9px 16px;border:1px solid rgba(150,120,255,.35);border-radius:999px;
  background:rgba(20,12,40,.55);cursor:pointer;backdrop-filter:blur(4px);
  transition:opacity .8s;user-select:none}
</style></head>
<body><canvas id="c"></canvas><div id="hint">🎤 enable mic</div><script>
// Cosmos Mic Tunnel — particles & rings fly down a perspective tunnel; speed+twist ride level, ring radii ride the spectrum. Mic-reactive, synth fallback.
const cv=document.getElementById('c'), x=cv.getContext('2d'), hint=document.getElementById('hint');
const NBINS=64;
let W=0,H=0,CX=0,CY=0;
function resize(){
  W=innerWidth;H=innerHeight;
  cv.width=W;cv.height=H;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  CX=W/2;CY=H/2;
}
addEventListener('resize',resize);resize();

// ---- cosmos accents ----
const ACC=[[150,90,255],[90,170,255],[255,110,200],[120,255,220],[255,180,90]];
function acc(i){return ACC[((i%ACC.length)+ACC.length)%ACC.length];}

// ---- deterministic RNG ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x7A11E5);
// per-bin formant params for synth
const FB=[];for(let i=0;i<8;i++)FB.push({c:rnd(),w:0.06+rnd()*0.16,sp:0.5+rnd()*2.5,ph:rnd()*6.283,a:0.4+rnd()*0.6});

const LOOP=8500;
// deterministic synthetic spectrum + level, pure fn of u in [0,1)
function synthSpectrum(u){
  const ph=u*6.2831853;
  const spec=new Float32Array(NBINS);
  for(let i=0;i<NBINS;i++){
    const f=i/(NBINS-1);
    let v=0;
    for(const b of FB){
      const c=(b.c+0.12*Math.sin(ph*b.sp+b.ph))%1;
      const d=(f-c)/b.w;
      v+=b.a*Math.exp(-d*d);
    }
    // bass tilt + slight high sparkle
    v*=(1.0-0.45*f);
    v+=0.05*Math.max(0,Math.sin(ph*3+f*9));
    spec[i]=v;
  }
  // beat pulse: 4 kicks per loop
  const beat=Math.pow(0.5+0.5*Math.cos(ph*4),6);
  let level=0.18+0.72*beat;
  // low bins boom on the kick
  for(let i=0;i<10;i++)spec[i]+=beat*(1.1-i*0.08);
  // normalise to ~[0,1]
  let mx=0;for(let i=0;i<NBINS;i++)mx=Math.max(mx,spec[i]);
  if(mx>0)for(let i=0;i<NBINS;i++)spec[i]=Math.min(1,spec[i]/(mx*0.78));
  return {spec,level:Math.min(1,level)};
}

// ---- tunnel particles ----
const NP=150;
const P=[];
for(let i=0;i<NP;i++){
  const r=rnd();
  P.push({
    a:rnd()*6.2831853,          // angle around bore
    z:0.04+r*1.0,               // depth (0=far .. 1=near)
    rad:0.55+rnd()*0.55,        // radial offset factor
    col:(rnd()*ACC.length)|0,
    sz:0.6+rnd()*1.4
  });
}
// rings flying down the bore
const NR=16;
const RING=[];
for(let i=0;i<NR;i++)RING.push({z:i/NR, bin:(i*NBINS/NR)|0, col:(i)%ACC.length});

let twist=0, lastT=0;
function render(spec, level, t){
  const dt=Math.min(0.05, Math.max(0, t-lastT)); lastT=t;
  // fade trail (additive-friendly dark wash)
  x.globalCompositeOperation='source-over';
  x.fillStyle='rgba(5,3,13,0.28)';
  x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';

  const minDim=Math.min(W,H);
  const FL=minDim*0.9;                 // focal length
  const speed=0.10+level*0.85;         // tunnel fly speed rides level
  twist+=(0.25+level*2.4)*dt;          // twist rate rides level

  // background bore glow rings (vanishing point haze)
  const bg=x.createRadialGradient(CX,CY,0,CX,CY,minDim*0.62);
  bg.addColorStop(0,'rgba(40,22,70,0.55)');
  bg.addColorStop(0.5,'rgba(18,10,40,0.18)');
  bg.addColorStop(1,'rgba(5,3,13,0)');
  x.globalCompositeOperation='source-over';
  x.fillStyle=bg;x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';

  // ---- rings (radii ride spectrum) ----
  for(let i=0;i<NR;i++){
    const R=RING[i];
    R.z-=speed*dt*0.45;
    if(R.z<=0.02){R.z+=1;R.bin=(Math.random?((Math.random()*NBINS)|0):R.bin);}
    const z=R.z;
    const persp=FL/(z*minDim*2.2+FL*0.12);
    const binv=spec[R.bin%NBINS];
    // base bore radius grows toward viewer; modulated by its spectrum bin
    const rr=(0.10+binv*0.55)*minDim*persp*0.9;
    const seg=48;
    const c=acc(R.col);
    const alpha=Math.min(0.9, (1-z)*0.9+0.1)* (0.35+binv*0.9);
    x.beginPath();
    for(let s=0;s<=seg;s++){
      const ang=s/seg*6.2831853+twist*(1+i*0.05);
      // wobble radius by neighbouring spectrum for warp
      const wob=1+0.18*spec[(R.bin+s)%NBINS]*Math.sin(ang*3+twist);
      const rx=CX+Math.cos(ang)*rr*wob;
      const ry=CY+Math.sin(ang)*rr*wob;
      if(s===0)x.moveTo(rx,ry);else x.lineTo(rx,ry);
    }
    x.closePath();
    x.lineWidth=Math.max(1, persp*minDim*0.018*(0.6+binv));
    x.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
    x.stroke();
  }

  // ---- particles streaming down the bore ----
  for(let i=0;i<NP;i++){
    const p=P[i];
    p.z+=speed*dt*0.5;
    p.a+=(0.3+level*1.2)*dt*p.rad;     // swirl
    if(p.z>=1.05){p.z-=1.05;}
    const z=p.z;
    const persp=FL/((1.04-z)*minDim*1.8+1);
    const binv=spec[(i*NBINS/NP|0)%NBINS];
    const ringR=(0.30+p.rad*0.55+binv*0.35)*minDim*persp;
    const ang=p.a+twist;
    const px=CX+Math.cos(ang)*ringR;
    const py=CY+Math.sin(ang)*ringR;
    const sz=Math.max(0.6, p.sz*persp*minDim*0.020*(0.7+binv*1.4));
    const c=acc(p.col);
    const a=Math.min(0.95, z*z*(0.5+binv*0.8)+0.05);
    const g=x.createRadialGradient(px,py,0,px,py,sz);
    g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${a})`);
    g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    x.fillStyle=g;
    x.beginPath();x.arc(px,py,sz,0,6.2831853);x.fill();
  }

  // central core glow pulses with level
  const cr=minDim*(0.03+level*0.10);
  const cg=x.createRadialGradient(CX,CY,0,CX,CY,cr);
  cg.addColorStop(0,`rgba(220,200,255,${0.5+level*0.4})`);
  cg.addColorStop(0.5,`rgba(150,90,255,${0.25+level*0.3})`);
  cg.addColorStop(1,'rgba(90,40,150,0)');
  x.fillStyle=cg;x.beginPath();x.arc(CX,CY,cr,0,6.2831853);x.fill();
}

// ===================== SOURCE PLUMBING =====================
const AUTO=new URLSearchParams(location.search).has('auto');
let analyser=null, freq=null, useSynth=true, t0=0;

async function mic(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  const src=ctx.createMediaStreamSource(s);
  const an=ctx.createAnalyser(); an.fftSize=128; an.smoothingTimeConstant=0.78;
  src.connect(an);
  analyser=an; freq=new Uint8Array(an.frequencyBinCount); useSynth=false;
}
function liveSpectrum(){
  analyser.getByteFrequencyData(freq);
  const spec=new Float32Array(NBINS);
  const n=Math.min(NBINS,freq.length);
  let sum=0;
  for(let i=0;i<NBINS;i++){const v=(freq[i%n]||0)/255;spec[i]=v;sum+=v;}
  return {spec, level:Math.min(1,sum/NBINS*2.2)};
}
function startLiveLoop(){
  t0=performance.now();
  (function frame(now){
    const t=(now-t0)/1000;
    let s;
    if(!useSynth && analyser){ s=liveSpectrum(); }
    else { const u=((t*1000%LOOP)+LOOP)%LOOP/LOOP; s=synthSpectrum(u); }
    render(s.spec, s.level, t);
    requestAnimationFrame(frame);
  })(performance.now());
}

if(AUTO){
  if(hint)hint.style.display='none';
  window.__seek=t=>{const u=((t%LOOP)+LOOP)%LOOP/LOOP; const s=synthSpectrum(u); render(s.spec,s.level,u*LOOP/1000);};
  window.__seek(0); window.__ready=true;
} else {
  let triedMic=false;
  const tryMic=async()=>{
    if(triedMic)return; triedMic=true;
    try{ await mic(); hint.style.opacity='0'; setTimeout(()=>hint.style.display='none',900); }
    catch(e){ useSynth=true; hint.textContent='🎤 mic unavailable'; hint.style.opacity='0.0'; setTimeout(()=>{if(hint)hint.style.display='none';},1400); }
  };
  hint.addEventListener('pointerdown',tryMic);
  addEventListener('pointerdown',tryMic,{once:true});
  startLiveLoop();
}
</script></body></html>

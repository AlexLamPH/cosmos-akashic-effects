<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Voronoi Cells</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Voronoi Cells — drifting seed points form a shimmering mosaic whose glowing cell edges flare where two nearest seeds tie. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000,TAU=6.28318530718;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const COLS=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
const off=document.createElement('canvas'),ox=off.getContext('2d',{willReadFrequently:true});
const NS=16;let W,H,DPR,seeds,GW,GH;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const ar=innerWidth/innerHeight;GW=off.width=Math.min(108,Math.round(82*Math.sqrt(ar)));GH=off.height=Math.round(GW/ar);
  const r=mulberry32(7321);seeds=[];for(let i=0;i<NS;i++)seeds.push({c:COLS[i%COLS.length],cx:0.08+r()*0.84,cy:0.08+r()*0.84,ax:0.03+r()*0.07,ay:0.03+r()*0.07,kx:1+Math.floor(r()*3),ky:1+Math.floor(r()*3),px:r(),py:r()});}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  const px=new Float32Array(NS),py=new Float32Array(NS);
  for(let i=0;i<NS;i++){const s=seeds[i];px[i]=(s.cx+s.ax*Math.sin(TAU*(u*s.kx+s.px)))*GW;py[i]=(s.cy+s.ay*Math.cos(TAU*(u*s.ky+s.py)))*GH;}
  const img=ox.createImageData(GW,GH),d=img.data;
  for(let y=0;y<GH;y++)for(let xx=0;xx<GW;xx++){
    let d1=1e9,d2=1e9,n1=0;
    for(let i=0;i<NS;i++){const dx=xx-px[i],dy=y-py[i],dd=dx*dx+dy*dy;if(dd<d1){d2=d1;d1=dd;n1=i;}else if(dd<d2){d2=dd;}}
    const edge=Math.sqrt(d2)-Math.sqrt(d1);const c=seeds[n1].c;
    const fill=0.22+0.07*Math.sin(TAU*(u*2+n1*0.37));
    const EW=2.6;let e=edge<EW?(1-edge/EW):0;e=e*e*e;const eb=e*300;
    const o=(y*GW+xx)*4;
    d[o]=Math.min(255,c[0]*fill+eb*(c[0]/255)+eb*0.5);
    d[o+1]=Math.min(255,c[1]*fill+eb*(c[1]/255)+eb*0.5);
    d[o+2]=Math.min(255,c[2]*fill+eb*(c[2]/255)+eb*0.5);
    d[o+3]=255;}
  ox.putImageData(img,0,0);
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // blocky nearest-neighbor upscale: flat cells keep unique-color count (hence GIF) low;
  // edge bloom is baked per-pixel above, so no expensive smooth blur pass is needed.
  x.imageSmoothingEnabled=false;x.drawImage(off,0,0,W,H);
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

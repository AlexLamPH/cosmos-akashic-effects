<!-- Cosmos Liquid Fill: a circular container fills with a wobbling sine-wave liquid that rises then falls (ping-pong), glossy with a meniscus highlight; premium loader. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Liquid Fill</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
const cv=document.getElementById('c'),x=cv.getContext('2d'),TAU=Math.PI*2;
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0xA1B2C3);
// rising bubbles inside the liquid (seeded once)
const BUB=[];for(let i=0;i<16;i++)BUB.push({u0:rnd(),xr:(rnd()*2-1)*0.7,sp:1+(i%3),r:1.5+rnd()*3.2});
function frame(t){
  const LOOP=8000,u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.setTransform(DPR,0,0,DPR,0,0);x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.34;
  // backdrop glow
  x.globalCompositeOperation='lighter';
  let bg=x.createRadialGradient(cx,cy,0,cx,cy,R*2.4);
  bg.addColorStop(0,'rgba(70,180,255,0.20)');bg.addColorStop(0.55,'rgba(54,211,154,0.08)');bg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=bg;x.beginPath();x.arc(cx,cy,R*2.4,0,TAU);x.fill();
  x.globalCompositeOperation='source-over';
  // fill level: ping-pong via cosine -> rises to top then back. offset so t=0 is mid-action (half full, rising).
  const ping=0.5-0.5*Math.cos(TAU*u);     // 0..1..0 over the loop, equals at 0 and LOOP
  const margin=0.10;                       // never quite empty/full
  const level=margin+(1-2*margin)*ping;    // fraction of diameter filled (0=empty,1=full)
  const surfaceY=cy+R-2*R*level;           // y of mean liquid surface
  // wobble: travelling sine waves with INTEGER wavenumbers -> seamless
  const amp=R*0.06*(0.6+0.4*Math.sin(TAU*u*2));
  function waveY(px){const w=(px-(cx-R))/(2*R);
    return surfaceY + Math.sin(TAU*(w*2 - u*1))*amp*0.6 + Math.sin(TAU*(w*3 + u*2))*amp*0.4;}
  // ---- clip to circular container ----
  x.save();x.beginPath();x.arc(cx,cy,R,0,TAU);x.clip();
  // empty-glass tint
  x.fillStyle='rgba(20,18,40,0.55)';x.fillRect(cx-R,cy-R,2*R,2*R);
  // liquid body
  x.beginPath();x.moveTo(cx-R,cy+R+2);
  for(let px=cx-R;px<=cx+R;px+=4)x.lineTo(px,waveY(px));
  x.lineTo(cx+R,cy+R+2);x.closePath();
  const lg=x.createLinearGradient(0,surfaceY-amp,0,cy+R);
  lg.addColorStop(0,'#7be0ff');lg.addColorStop(0.35,'#46b4ff');lg.addColorStop(0.7,'#2f7fe0');lg.addColorStop(1,'#1b3aa0');
  x.fillStyle=lg;x.fill();
  // glossy accent sub-surface band (additive)
  x.globalCompositeOperation='lighter';
  x.beginPath();x.moveTo(cx-R,surfaceY+R*0.10);
  for(let px=cx-R;px<=cx+R;px+=4)x.lineTo(px,waveY(px)+R*0.05);
  for(let px=cx+R;px>=cx-R;px-=4)x.lineTo(px,waveY(px)+R*0.22);
  x.closePath();
  const ag=x.createLinearGradient(0,surfaceY,0,surfaceY+R*0.3);
  ag.addColorStop(0,'rgba(180,245,255,0.55)');ag.addColorStop(1,'rgba(54,211,154,0)');
  x.fillStyle=ag;x.fill();
  // rising bubbles
  for(const b of BUB){const bu=(b.u0+u*b.sp)%1; const by=cy+R-(2*R*level)*bu; const bx=cx+b.xr*R*0.8;
    if(by>waveY(bx)+2){x.globalAlpha=0.5*(1-bu);x.fillStyle='#cdefff';x.beginPath();x.arc(bx,by,b.r*(0.6+bu*0.6),0,TAU);x.fill();}}
  x.globalAlpha=1;
  // meniscus highlight: bright crest line along the surface
  x.beginPath();for(let px=cx-R;px<=cx+R;px+=3){const y=waveY(px);px===cx-R?x.moveTo(px,y):x.lineTo(px,y);}
  x.strokeStyle='rgba(220,250,255,0.9)';x.lineWidth=2.4;x.stroke();
  x.strokeStyle='rgba(255,255,255,0.35)';x.lineWidth=5;x.stroke();
  x.globalCompositeOperation='source-over';
  x.restore();
  // ---- glass shell: rim + specular highlight ----
  x.globalCompositeOperation='lighter';
  // left-top glass specular arc
  x.strokeStyle='rgba(255,255,255,0.5)';x.lineWidth=R*0.07;x.lineCap='round';
  x.beginPath();x.arc(cx,cy,R*0.9,TAU*0.58,TAU*0.74);x.stroke();
  x.lineWidth=R*0.03;x.beginPath();x.arc(cx,cy,R*0.78,TAU*0.55,TAU*0.66);x.stroke();
  // rim
  x.globalCompositeOperation='source-over';
  const rg=x.createLinearGradient(cx-R,cy-R,cx+R,cy+R);
  rg.addColorStop(0,'#bda6ff');rg.addColorStop(0.5,'#46b4ff');rg.addColorStop(1,'#8b5cff');
  x.strokeStyle=rg;x.lineWidth=Math.max(R*0.035,3);x.beginPath();x.arc(cx,cy,R,0,TAU);x.stroke();
  // outer rim glow
  x.globalCompositeOperation='lighter';
  x.strokeStyle='rgba(70,180,255,0.4)';x.lineWidth=R*0.02;x.beginPath();x.arc(cx,cy,R+R*0.03,0,TAU);x.stroke();
  x.globalCompositeOperation='source-over';x.globalAlpha=1;
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

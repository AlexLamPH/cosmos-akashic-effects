<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Wormhole</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Wormhole — concentric rings twist into a swirling vortex tunnel receding to a bright/dark centre, rings rushing inward (mod-1 phase) with a spiral rotation. Canvas 2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const TAU=Math.PI*2,LOOP=7000,N=34;
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mul(0x90b1e);
const COL=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[224,178,74]];
const ring=[];for(let i=0;i<N;i++)ring.push({c:COL[(rnd()*COL.length)|0],seg:9+((rnd()*6)|0),warp:0.7+rnd()*0.6});
let W,H,DPR,cx,cy,maxR;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;maxR=Math.hypot(W,H)*0.60;}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // far (small, near centre) rings first -> outer rings overdraw them
  for(let i=N-1;i>=0;i--){const r=ring[i];
    const d=((u+i/N)%1);                 // 0=at centre .. 1=outer edge, recycles -> rush inward
    const rad=maxR*Math.pow(d,1.9);      // perspective tunnel depth
    if(rad<2)continue;
    const fade=d<0.07?d/0.07:(d>0.9?(1-d)/0.1:1);
    const a=0.8*fade;
    // SPIRAL: rotation grows toward centre (twist) + whole vortex turns 1 integer turn/loop
    const swirl=(1-d)*r.warp*5.5 + u*TAU; // twist deepens at centre
    const seg=r.seg,gap=0.34,c=r.c;
    const lw=(0.6+d*5.5)*DPR;
    for(let pass=0;pass<2;pass++){
      const aa=pass?a:a*0.30;x.lineWidth=pass?lw:lw*2.8;
      const cc=pass?[Math.min(255,c[0]+40),Math.min(255,c[1]+40),Math.min(255,c[2]+40)]:c;
      x.strokeStyle=`rgba(${cc[0]},${cc[1]},${cc[2]},${aa})`;
      for(let s=0;s<seg;s++){const a0=swirl+s/seg*TAU,a1=a0+(1-gap)/seg*TAU;
        x.beginPath();x.arc(cx,cy,rad,a0,a1);x.stroke();}}
  }
  // bright hot vortex centre with dark rim
  const cr=maxR*0.16;
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,cr);
  cg.addColorStop(0,'rgba(255,255,255,0.95)');
  cg.addColorStop(0.3,'rgba(160,120,255,0.7)');
  cg.addColorStop(0.7,'rgba(70,180,255,0.25)');
  cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.beginPath();x.arc(cx,cy,cr,0,TAU);x.fill();
  // dark vanishing ring just outside the glow to read as a tunnel mouth
  x.globalCompositeOperation='source-over';
  const dg=x.createRadialGradient(cx,cy,cr*0.5,cx,cy,cr*1.4);
  dg.addColorStop(0,'rgba(5,3,13,0)');dg.addColorStop(0.55,'rgba(5,3,13,0.55)');dg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=dg;x.beginPath();x.arc(cx,cy,cr*1.4,0,TAU);x.fill();}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

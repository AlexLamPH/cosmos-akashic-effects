<!-- Cosmos Firefly Swarm — fireflies drift on looping paths, blinking on integer-harmonic phases -->
<!doctype html><meta charset=utf-8><title>Firefly Swarm</title>
<style>html,body{margin:0;height:100%;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const LOOP=8000, ACCENT=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const WARM=['#ffd27a','#ffe6a8','#ffbe6a','#fff0c0'];
let W,H,DPR,flies=[];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function setup(){
  DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;
  c.width=W*DPR;c.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);
  const r=mulberry32(20260614);const N=70;flies=[];
  for(let i=0;i<N;i++){
    const warm=r()<0.62;
    const col=warm?WARM[(r()*WARM.length)|0]:ACCENT[(r()*ACCENT.length)|0];
    flies.push({cx:r()*W,cy:r()*H,
      ax:18+r()*46,ay:14+r()*38, kx:1+((r()*3)|0),ky:1+((r()*3)|0),
      px:r(),py:r(), bk:1+((r()*5)|0), bp:r(), // blink integer harmonic + phase
      size:1.6+r()*2.8, glow:18+r()*34, rgb:hex(col)});
  }
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP, TAU=Math.PI*2;
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // faint nebular wash so frame 0 is rich
  x.globalCompositeOperation='lighter';
  for(let i=0;i<5;i++){const a=TAU*u+i*1.257;
    const gx=W*(0.5+0.4*Math.cos(a)),gy=H*(0.5+0.4*Math.sin(a*1));
    const g=x.createRadialGradient(gx,gy,0,gx,gy,Math.max(W,H)*0.4);
    const rc=hex(ACCENT[i%ACCENT.length]);
    g.addColorStop(0,`rgba(${rc[0]},${rc[1]},${rc[2]},0.05)`);g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.fillRect(0,0,W,H);}
  for(const f of flies){
    const px=f.cx+f.ax*Math.cos(TAU*f.kx*u+f.px*TAU)+0.4*f.ax*Math.sin(TAU*(f.kx+1)*u);
    const py=f.cy+f.ay*Math.sin(TAU*f.ky*u+f.py*TAU)+0.4*f.ay*Math.cos(TAU*(f.ky+1)*u);
    // blink: brightness pulse on per-firefly integer harmonic phase
    let b=0.5+0.5*Math.sin(TAU*f.bk*u+f.bp*TAU);b=Math.pow(b,2.2);
    const br=0.18+0.82*b;
    const[R,G,B]=f.rgb;
    const g=x.createRadialGradient(px,py,0,px,py,f.glow);
    g.addColorStop(0,`rgba(${R},${G},${B},${0.55*br})`);
    g.addColorStop(0.4,`rgba(${R},${G},${B},${0.18*br})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.beginPath();x.arc(px,py,f.glow,0,TAU);x.fill();
    // bright core
    x.fillStyle=`rgba(255,255,240,${0.85*br})`;
    x.beginPath();x.arc(px,py,f.size*(0.6+0.5*b),0,TAU);x.fill();
  }
}
addEventListener('resize',setup);setup();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

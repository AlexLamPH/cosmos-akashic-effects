<!-- Cosmos Chord Strummer: a row of chord buttons (I vi IV V) and a strum area of strings; pick a chord then drag across to rake its notes through plucky oscillators with a real strum stagger; strings light up across the sweep. LIVE: click a chord, drag to strum (REAL sound on first gesture). AUTO: seeded progression strums silently, looping; frame 0 mid-strum on a lit chord. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Chord Strummer</title><style>
*{margin:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#0a0816;font-family:-apple-system,"Segoe UI",system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
#wrap{width:660px}
.head{margin:0 4px 14px;color:#8a83b4;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.head b{display:block;color:#f2efff;font-size:21px;font-weight:700;letter-spacing:-.3px;text-transform:none;margin-top:5px}
#chords{display:flex;gap:10px;margin-bottom:14px}
.chip{flex:1;padding:13px 0;border-radius:12px;text-align:center;cursor:pointer;user-select:none;
  background:linear-gradient(160deg,rgba(30,24,56,.72),rgba(20,15,40,.82));
  border:1px solid rgba(255,255,255,.07);box-shadow:0 8px 24px -16px rgba(0,0,0,.7);
  transition:transform .12s,border-color .2s,box-shadow .2s}
.chip .rn{display:block;color:#b79bff;font-size:18px;font-weight:700;letter-spacing:.5px}
.chip .nm{display:block;color:#7d76a6;font-size:11px;font-weight:600;margin-top:3px}
.chip.on{border-color:rgba(139,92,255,.55);transform:translateY(-2px);
  box-shadow:0 14px 32px -12px rgba(139,92,255,.55),0 0 0 1px rgba(139,92,255,.12) inset}
.chip.on .rn{color:#e9defc}
#strum{position:relative;height:230px;border-radius:16px;cursor:crosshair;overflow:hidden;
  background:radial-gradient(120% 90% at 50% 0,rgba(40,30,70,.55),rgba(14,10,30,.9));
  border:1px solid rgba(255,255,255,.06);box-shadow:0 16px 44px -22px rgba(0,0,0,.8),0 0 0 1px rgba(139,92,255,.05) inset}
#strum canvas{display:block;width:100%;height:100%}
.hint{position:absolute;left:0;right:0;bottom:11px;text-align:center;color:#6f6896;font-size:11.5px;letter-spacing:.4px;pointer-events:none;transition:opacity .4s}
</style></head>
<body>
<div id="wrap">
  <div class="head">Autoharp<b>Chord Strummer</b></div>
  <div id="chords"></div>
  <div id="strum"><canvas id="c"></canvas><div class="hint" id="hint">▶ click a chord, then drag across to strum</div></div>
</div>
<script>
const AUTO=new URLSearchParams(location.search).has('auto');
const LOOP=6000;
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const clamp=(v,a,b)=>v<a?a:v>b?b:v, smooth=t=>{t=clamp(t,0,1);return t*t*(3-2*t);};
// --- chords: I vi IV V in C major, each as semitone offsets from C3 (base 130.81Hz), 5 strings spanning ~2 octaves ---
const BASE=130.81; // C3
const CHORDS=[
  {rn:'I',  nm:'C',  semis:[0,7,12,16,19]},   // C E G  voiced
  {rn:'vi', nm:'Am', semis:[-3,9,12,16,21]},  // A C E
  {rn:'IV', nm:'F',  semis:[-7,5,12,17,21]},  // F A C
  {rn:'V',  nm:'G',  semis:[-5,7,14,19,23]}   // G B D
];
const NS=5; // strings per chord
const COL=['#8b5cff','#46b4ff','#36d39a','#e0b24a','#ff5cc2'];
// --- DOM chord chips ---
const chordsEl=document.getElementById('chords');
const chips=CHORDS.map((c,i)=>{
  const el=document.createElement('div');el.className='chip';
  el.innerHTML=`<span class="rn">${c.rn}</span><span class="nm">${c.nm}</span>`;
  chordsEl.appendChild(el);return el;
});
function setChip(i,on){chips[i].classList.toggle('on',on);}
// --- canvas strum area ---
const cv=document.getElementById('c'),x=cv.getContext('2d'),hintEl=document.getElementById('hint');
let W,H,DPR;
function rs(){DPR=Math.min(devicePixelRatio||1,2);const r=cv.getBoundingClientRect();
  W=cv.width=Math.round(r.width*DPR);H=cv.height=Math.round(r.height*DPR);}
addEventListener('resize',rs);
// string vertical positions
function sy(s){return H*(0.16+0.68*(s/(NS-1)));}
// render the strum area: chordIdx active, sweep in [0,1) is the rake position across width,
// glow = brightness of the sweeping pluck, lit[s] = how lit each string is (0..1)
function drawStrum(chordIdx,sweep,glow,lit){
  x.clearRect(0,0,W,H);
  // ambient backdrop
  x.globalCompositeOperation='source-over';
  // sweeping glow column
  if(glow>0.01){
    const gx=W*clamp(sweep,0,1);
    const g=x.createLinearGradient(gx-W*0.18,0,gx+W*0.10,0);
    g.addColorStop(0,'rgba(139,92,255,0)');g.addColorStop(0.7,'rgba(139,92,255,'+(0.20*glow)+')');g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g;x.fillRect(0,0,W,H);
    // bright rake head
    x.globalCompositeOperation='lighter';
    const rg=x.createRadialGradient(gx,H/2,0,gx,H/2,H*0.55);
    rg.addColorStop(0,'rgba(220,205,255,'+(0.45*glow)+')');rg.addColorStop(1,'rgba(139,92,255,0)');
    x.fillStyle=rg;x.fillRect(0,0,W,H);
    x.globalCompositeOperation='source-over';
  }
  // strings
  const ci=((chordIdx%4)+4)%4;
  x.lineCap='round';
  for(let s=0;s<NS;s++){
    const y=sy(s),col=COL[s],L=lit?lit[s]:0;
    const amp=H*0.020*L; // vibration amplitude
    // pluck point follows sweep when struck
    const px=W*clamp(sweep,0,1);
    x.beginPath();
    for(let k=0;k<=40;k++){
      const t=k/40, xx=W*0.06+t*W*0.88;
      // standing-wave-ish wobble localised near the rake head, decaying with L
      const d=1-Math.min(1,Math.abs(xx-px)/(W*0.32));
      const wob=Math.sin(t*Math.PI)*Math.sin(t*9+L*14)*amp*d;
      k?x.lineTo(xx,y+wob):x.moveTo(xx,y+wob);
    }
    x.lineWidth=(1.1+1.7*L)*DPR;
    x.globalAlpha=0.30+0.65*L;
    x.strokeStyle=col;
    if(L>0.2){x.shadowColor=col;x.shadowBlur=14*L*DPR;} else x.shadowBlur=0;
    x.stroke();
    x.shadowBlur=0;
    // node dot at pluck head
    if(L>0.25){x.globalAlpha=L;x.globalCompositeOperation='lighter';
      x.beginPath();x.fillStyle='#fff';x.arc(px,y,(1.8+2.6*L)*DPR,0,6.2832);x.fill();
      x.globalCompositeOperation='source-over';}
  }
  x.globalAlpha=1;
}
// envelope of one string being lit during a strum: rises sharply as the rake passes it, then decays
function stringLit(sweep,s,head){
  // string s is "hit" when head reaches its x; strings rake from top(0) to bottom(NS-1)
  const hitAt=0.10+0.80*(s/(NS-1)); // fraction of sweep at which this string is struck
  const passed=head-hitAt;
  if(passed<0) return 0;
  return Math.exp(-passed*4.5)*smooth(passed/0.04);
}
// MAIN render(u): u in [0,1). seeded progression over the loop.
const rnd=mb(7);
const PROG=[]; // sequence of {chord, t0, t1} strum windows across the loop
(function build(){
  const order=[0,1,2,3,0,3]; // I vi IV V I V — pleasing seeded progression
  const n=order.length, span=1/n;
  for(let i=0;i<n;i++){PROG.push({chord:order[i],t0:i*span,t1:i*span+span*0.62});}
})();
let liveChord=-1; // currently selected chord in live mode
function render(u){
  // find active strum window
  let active=null, sel=-1;
  for(const p of PROG){ if(u>=p.t0 && u<p.t1){active=p;break;} }
  // selected chord glow on chips: the chord whose window we're in (or just held)
  let sweep=0,glow=0,lit=new Array(NS).fill(0),chordIdx=0;
  if(active){
    sel=active.chord;chordIdx=sel;
    const local=(u-active.t0)/(active.t1-active.t0); // 0..1 across the rake
    sweep=local;
    glow=smooth(local/0.12)*(1-smooth((local-0.7)/0.3));
    for(let s=0;s<NS;s++) lit[s]=stringLit(local,s,local);
  } else {
    // between strums: hold the most recent chord faintly
    let last=PROG[0].chord;for(const p of PROG){if(u>=p.t0)last=p.chord;}
    sel=last;chordIdx=last;
  }
  for(let i=0;i<4;i++) setChip(i, i===sel);
  drawStrum(chordIdx,sweep,glow,lit);
}
// ---- boilerplate ----
rs();
if(AUTO){
  window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);
  window.__seek(0);
  window.__ready=true;
}else{
  // REAL Web Audio, gated behind first gesture
  let actx,master;
  function audio(){ if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)();
      master=actx.createGain();master.gain.value=0.2;
      const comp=actx.createDynamicsCompressor();master.connect(comp);comp.connect(actx.destination);}
    if(actx.state==='suspended')actx.resume();return actx;}
  function pluck(freq,when,vel){
    const a=actx,o=a.createOscillator(),g=a.createGain(),f=a.createBiquadFilter();
    o.type='triangle';o.frequency.value=freq;
    f.type='lowpass';f.frequency.setValueAtTime(4200,when);f.frequency.exponentialRampToValueAtTime(900,when+0.5);
    const peak=0.22*vel;
    g.gain.setValueAtTime(0.0001,when);
    g.gain.exponentialRampToValueAtTime(peak,when+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,when+1.5);
    o.connect(f);f.connect(g);g.connect(master);
    o.start(when);o.stop(when+1.6);
  }
  function strumChord(ci,dir){
    const a=audio(),t0=a.currentTime+0.01;
    const c=CHORDS[((ci%4)+4)%4];
    for(let s=0;s<NS;s++){ const idx=dir<0?NS-1-s:s;
      const f=BASE*Math.pow(2,c.semis[idx]/12);
      pluck(f,t0+s*0.045,0.7+0.3*(1-s/NS)); } // stagger = real strum feel
  }
  // interaction
  let selected=0; liveChord=0;
  chips.forEach((el,i)=>el.addEventListener('pointerdown',e=>{selected=i;liveChord=i;manual=performance.now();
    for(let k=0;k<4;k++)setChip(k,k===i);hide();audio();}));
  const strumEl=document.getElementById('strum');
  let dragging=false,lastX=0,dir=1;
  let manual=0; // timestamp of last manual interaction; pauses attract loop
  function localX(e){const r=strumEl.getBoundingClientRect();return (e.clientX-r.left)/r.width;}
  strumEl.addEventListener('pointerdown',e=>{audio();hide();dragging=true;lastX=localX(e);manual=performance.now();
    runStrum(0);});
  strumEl.addEventListener('pointermove',e=>{ if(!dragging)return; const cx=localX(e);
    if(Math.abs(cx-lastX)>0.16){ dir=cx>lastX?1:-1; lastX=cx; strumChord(selected,dir); runStrum(performance.now()); manual=performance.now(); } });
  addEventListener('pointerup',()=>{dragging=false;});
  function hide(){hintEl.style.opacity='0';}
  // live attract render: a short manual-strum animation when user strums, else the attract loop
  let strumStart=-1;
  function runStrum(now){ strumStart=performance.now(); }
  const s=performance.now();
  (function l(n){
    if(performance.now()-manual<2600 && manual>0){
      // manual mode: animate a single rake of the selected chord
      const e=(performance.now()-strumStart)/520;
      if(strumStart>=0 && e<1.2){
        const local=clamp(e,0,1);
        const glow=smooth(local/0.12)*(1-smooth((local-0.7)/0.3));
        const lit=[];for(let i=0;i<NS;i++)lit[i]=stringLit(local,i,local);
        for(let k=0;k<4;k++)setChip(k,k===selected);
        drawStrum(selected,local,glow,lit);
      }else{
        for(let k=0;k<4;k++)setChip(k,k===selected);
        drawStrum(selected,0,0,new Array(NS).fill(0));
      }
    }else{
      render((((n-s)%LOOP)+LOOP)%LOOP/LOOP);
    }
    requestAnimationFrame(l);
  })(performance.now());
}
</script></body></html>

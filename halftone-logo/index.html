function buildSamples(){
  const o=document.createElement('canvas');o.width=SZ;o.height=SZ;
  const oc=o.getContext('2d');oc.clearRect(0,0,SZ,SZ);
  const s=Math.min(SZ/img.width,SZ/img.height)*0.92,iw=img.width*s,ih=img.height*s;
  oc.drawImage(img,(SZ-iw)/2,(SZ-ih)/2,iw,ih);
  samp={d:oc.getImageData(0,0,SZ,SZ).data}; ready=true;
}
function go(){buildSamples();}
if(img.decode){img.decode().then(go).catch(()=>{img.onload=go;});}else{img.onload=go;}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  if(!ready){return;}
  const side=Math.min(W,H)*0.86, ox=(W-side)/2, oy=(H-side)/2;
  const CELL=12, n=Math.floor(side/CELL), px=side/n;
  ctx.globalCompositeOperation='lighter';
  for(let gy=0;gy<n;gy++)for(let gx=0;gx<n;gx++){
    const sx=Math.min(SZ-1,Math.floor((gx+0.5)/n*SZ));
    const sy=Math.min(SZ-1,Math.floor((gy+0.5)/n*SZ));
    const i=(sy*SZ+sx)*4;
    const r=samp.d[i],g=samp.d[i+1],b=samp.d[i+2],a=samp.d[i+3]/255;
    const lum=(0.299*r+0.587*g+0.114*b)/255*a;
    if(lum<0.04)continue;
    const cx=ox+(gx+0.5)*px, cy=oy+(gy+0.5)*px;
    const phase=(gx*0.21+gy*0.17);
    const shim=1+0.15*Math.sin(2*Math.PI*u+phase);
    const wave=0.78+0.22*Math.sin(2*Math.PI*(2*u)-(gx+gy)*0.12);
    let rad=lum*px*0.62*shim*wave;
    rad=Math.min(rad,px*0.62);
    if(rad<0.3)continue;
    const ci=COLS[(gx*3+gy*5)%COLS.length];
    ctx.beginPath();ctx.arc(cx,cy,rad,0,6.2832);
    ctx.fillStyle='rgb('+(r*0.5+parseInt(ci.slice(1,3),16)*0.5|0)+','+(g*0.5+parseInt(ci.slice(3,5),16)*0.5|0)+','+(b*0.5+parseInt(ci.slice(5,7),16)*0.5|0)+')';
    ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,rad*0.45,0,6.2832);

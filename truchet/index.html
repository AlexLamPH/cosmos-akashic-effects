<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Truchet</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Truchet — seeded grid of quarter-arc tiles; a glowing draw-phase wave flows diagonally so arcs connect into maze-like paths. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=7600,TAU=6.28318530718;
let W,H,DPR,grid=[],cols,rows,cell,ox,oy;
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  cell=Math.max(44*DPR,Math.min(W,H)/11);cols=Math.ceil(W/cell)+1;rows=Math.ceil(H/cell)+1;
  ox=(W-cols*cell)/2;oy=(H-rows*cell)/2;
  const r=mul(2026);grid=[];
  for(let j=0;j<rows;j++){const row=[];for(let i=0;i<cols;i++){
    row.push({o:r()<0.5?0:1,col:AC[(i*3+j*7)%AC.length]});}grid.push(row);}}
rs();addEventListener('resize',rs);
// draw a quarter arc inside a tile, with dash flow phase p (0..1) along arc length
function arc(cx,cy,rad,a0,a1,col,p,w,glow){
  const SEG=24,len=Math.abs(a1-a0)*rad;
  x.lineWidth=w;x.lineCap='round';
  x.beginPath();for(let s=0;s<=SEG;s++){const a=a0+(a1-a0)*s/SEG;const px=cx+Math.cos(a)*rad,py=cy+Math.sin(a)*rad;if(s===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${0.16})`;x.stroke();         // faint base track
  // bright travelling segment (a comet of phase p sweeping along arc)
  const SG=20;for(let s=0;s<SG;s++){const f=s/SG;let d=(f-p);d-=Math.floor(d);    // distance behind head, wraps
    const fall=Math.pow(1-d,3);if(fall<0.04)continue;
    const a=a0+(a1-a0)*f,px=cx+Math.cos(a)*rad,py=cy+Math.sin(a)*rad;
    const al=glow*fall;x.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${al})`;
    x.beginPath();x.arc(px,py,w*0.62,0,TAU);x.fill();}
}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  const w=Math.max(2,cell*0.07);
  for(let j=0;j<rows;j++)for(let i=0;i<cols;i++){
    const tl=grid[j][i],cx0=ox+i*cell,cy0=oy+j*cell,R=cell/2;
    // diagonal flow wave: phase advances by tile position so a wave sweeps across grid
    let p=u+(i+j)/(cols+rows);p-=Math.floor(p);
    const glow=0.34+0.3*Math.sin(TAU*(u+(i+j)/(cols+rows)*0.5));
    if(tl.o===0){ // arcs from top-left & bottom-right corners
      arc(cx0,cy0,R,0,Math.PI/2,tl.col,p,w,glow);
      arc(cx0+cell,cy0+cell,R,Math.PI,Math.PI*1.5,tl.col,p,w,glow);
    }else{        // arcs from top-right & bottom-left corners
      arc(cx0+cell,cy0,R,Math.PI/2,Math.PI,tl.col,p,w,glow);
      arc(cx0,cy0+cell,R,Math.PI*1.5,TAU,tl.col,p,w,glow);
    }
  }
  // soft vignette glow to enrich frame 0
  const cg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.6);
  cg.addColorStop(0,'rgba(70,180,255,0.05)');cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

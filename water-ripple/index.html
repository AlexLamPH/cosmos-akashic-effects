<!-- Cosmos Water Ripple — concentric ripples from a few sources interfering on a dark pond, glints on crests. -->
<!doctype html><meta charset="utf-8"><title>water-ripple</title>
<style>html,body{margin:0;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0;width:100%;height:100%}</style>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR|0;cv.height=H*DPR|0;x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x1cef00d);
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const LOOP=9000, K=10, TURNS=3;
const SRC=[];for(let i=0;i<3;i++)SRC.push({fx:.28+.44*rnd(),fy:.28+.44*rnd(),c:i===1?'#36d39a':i===2?'#ff5cc2':'#46b4ff',ph:rnd()});
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP, w=W||innerWidth, h=H||innerHeight;
  // pond base
  const g=x.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,Math.max(w,h)*.7);
  g.addColorStop(0,'#0a0820');g.addColorStop(1,'#05030d');
  x.setTransform(DPR,0,0,DPR,0,0);x.globalCompositeOperation='source-over';x.fillStyle=g;x.fillRect(0,0,w,h);
  x.globalCompositeOperation='lighter';
  const maxR=Math.hypot(w,h)*.6;
  for(const s of SRC){
    const cx=s.fx*w, cy=s.fy*h;
    for(let k=0;k<K;k++){
      const ph=((u*TURNS + k/K + s.ph)%1+1)%1;          // 0..1 expansion phase
      const r=ph*maxR; if(r<2)continue;
      const fade=(1-ph)*(1-ph);                          // brighter when small
      x.lineWidth=1.4+3.2*(1-ph);
      x.strokeStyle=s.c; x.globalAlpha=.05+.30*fade;
      x.beginPath();x.arc(cx,cy,r,0,7);x.stroke();
      // glints on the crest: a few sparkle dots riding the ring
      const gl=6+(k%3);
      for(let j=0;j<gl;j++){
        const a=(j/gl+ph*1.7+s.ph)*6.283, dx=cx+Math.cos(a)*r, dy=cy+Math.sin(a)*r;
        if(dx<-4||dy<-4||dx>w+4||dy>h+4)continue;
        const tw=.5+.5*Math.sin((u+s.ph)*6.283*2+j+k);
        x.globalAlpha=.08+.5*fade*tw; x.fillStyle='#e0b24a';
        x.beginPath();x.arc(dx,dy,.7+1.6*fade*tw,0,7);x.fill();
      }
    }
    // source highlight
    x.globalAlpha=.5+.4*Math.sin((u+s.ph)*6.283);x.fillStyle=s.c;
    x.beginPath();x.arc(cx,cy,2.4,0,7);x.fill();
  }
  // interference shimmer band sweeping (cosmic accent)
  x.globalAlpha=.10;x.strokeStyle='#8b5cff';x.lineWidth=1;
  for(let i=0;i<5;i++){const yy=(((u*1+i/5)%1)*h);x.beginPath();x.moveTo(0,yy);x.lineTo(w,yy);x.stroke();}
  x.globalAlpha=1;
}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

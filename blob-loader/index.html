<!-- Cosmos Blob Loader: a single gooey metaball-ish blob morphing its outline via summed sines, glowing; seamless loader. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Blob Loader</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
const cv=document.getElementById('c'),x=cv.getContext('2d'),TAU=Math.PI*2;
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x9ABCD3);
const WAVES=5,waves=[];
for(let i=0;i<WAVES;i++){
  waves.push({k:2+i,        // integer angular frequency
              amp:(0.05+rnd()*0.07)/(1+i*0.35),
              m:(i%2===0?1:-1)*(i+1), // integer time multiplier -> returns at u=1
              ph:rnd()*TAU});
}
function radius(th,u,R){
  let s=1;
  for(let i=0;i<WAVES;i++){const w=waves[i];s+=w.amp*Math.sin(w.k*th+TAU*u*w.m+w.ph);}
  return R*s;
}
function frame(t){
  const LOOP=3200,u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.setTransform(DPR,0,0,DPR,0,0);
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.24;
  const N=180;
  x.globalCompositeOperation='lighter';
  // outer halo
  let hg=x.createRadialGradient(cx,cy,R*0.4,cx,cy,R*2.1);
  hg.addColorStop(0,'rgba(139,92,255,0.30)');hg.addColorStop(0.5,'rgba(70,180,255,0.12)');hg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=hg;x.fillRect(0,0,W,H);
  // build blob path
  function path(scale){x.beginPath();for(let i=0;i<=N;i++){const th=i/N*TAU,r=radius(th,u,R)*scale,px=cx+Math.cos(th)*r,py=cy+Math.sin(th)*r;i?x.lineTo(px,py):x.moveTo(px,py);}x.closePath();}
  // glow layers (blurred-look via stacked strokes/fills)
  path(1.04);let og=x.createRadialGradient(cx,cy,0,cx,cy,R*1.3);
  og.addColorStop(0,'rgba(255,92,194,0.0)');og.addColorStop(0.7,'rgba(255,92,194,0.18)');og.addColorStop(1,'rgba(255,106,61,0.0)');
  x.fillStyle=og;x.fill();
  // main fill
  path(1);
  const hue=cx,offx=Math.cos(TAU*u*1)*R*0.10,offy=Math.sin(TAU*u*1)*R*0.10; // shifting highlight, returns at u=1
  let fg=x.createRadialGradient(cx+offx,cy+offy,R*0.05,cx,cy,R*1.15);
  fg.addColorStop(0,'rgba(255,255,255,0.95)');fg.addColorStop(0.22,'rgba(70,180,255,0.85)');
  fg.addColorStop(0.55,'rgba(139,92,255,0.75)');fg.addColorStop(0.85,'rgba(255,92,194,0.45)');
  fg.addColorStop(1,'rgba(54,211,154,0.10)');
  x.fillStyle=fg;x.fill();
  // crisp rim
  x.lineWidth=2.2;x.strokeStyle='rgba(224,178,74,0.55)';x.stroke();
  // inner bright core
  let ig=x.createRadialGradient(cx+offx,cy+offy,0,cx+offx,cy+offy,R*0.55);
  ig.addColorStop(0,'rgba(255,255,255,0.9)');ig.addColorStop(0.4,'rgba(139,92,255,0.35)');ig.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=ig;x.beginPath();x.arc(cx+offx,cy+offy,R*0.55,0,TAU);x.fill();
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

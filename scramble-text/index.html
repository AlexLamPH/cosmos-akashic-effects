<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Scramble Text</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Scramble Text — "COSMOS" decrypts out of seeded random glyphs, holds, then re-scrambles. Pure Canvas2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718,WORD="COSMOS";
const GLYPHS="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%@&*<>/\\=+";
const ACC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]]; // violet cosmic nebula aurora solaris sacred
let W,H,DPR,cx,cy,fs,gap;
// seeded mulberry32 — built once at setup, never Math.random in frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const STEPS=64; let pick=[]; // deterministic glyph table pick[step][letter] = scramble char
function build(){const r=mul(1337);pick=[];for(let s=0;s<STEPS;s++){const row=[];for(let i=0;i<WORD.length;i++)row.push(GLYPHS[(r()*GLYPHS.length)|0]);pick.push(row);}}
build();
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;
  fs=Math.min(W/(WORD.length*0.9),H*0.5);gap=fs*0.66;}
rs();addEventListener('resize',rs);
// per-letter lock progress as PURE function of u: resolve early, hold, re-scramble at the end -> p returns to scrambled at u=1
function lock(u,i){let v=u-i*0.05; v-=Math.floor(v); // staggered phase per letter, kept in [0,1)
  if(v<0.40) return Math.min(1,v/0.40);   // decrypt in first 40%
  if(v<0.80) return 1;                     // hold resolved
  return Math.max(0,1-(v-0.80)/0.20);}     // re-scramble at end -> 0
function frame(t){const u=(((t%LOOP)+LOOP)%LOOP/LOOP+0.18)%1; // +0.18 offset so frame 0 thumbnail is mostly-resolved
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.font='700 '+fs+'px "Courier New",monospace';x.textAlign='center';x.textBaseline='middle';
  const step=Math.floor(u*STEPS)%STEPS; // deterministic glyph index from u
  const total=(WORD.length-1)*gap, x0=cx-total/2;
  x.globalCompositeOperation='lighter';
  for(let i=0;i<WORD.length;i++){const p=lock(u,i),lx=x0+i*gap;
    const ch=p>=1?WORD[i]:pick[step][i]; const c=ACC[i%ACC.length];
    const jit=(1-p)*fs*0.06*Math.sin(TAU*(u*7+i)); // subtle vertical jitter while scrambling
    x.shadowColor=`rgba(${c[0]},${c[1]},${c[2]},0.9)`;x.shadowBlur=fs*(0.10+0.30*p); // additive glow halo
    x.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${0.32+0.55*p})`;
    x.fillText(ch,lx,cy+jit);
    x.shadowBlur=0;x.fillStyle=`rgba(235,240,255,${0.15+0.7*p*p})`; // bright white core grows as it locks
    x.fillText(ch,lx,cy+jit);}
  x.shadowBlur=0;x.globalCompositeOperation='source-over';
  x.globalAlpha=0.06;x.fillStyle='#000';for(let y=0;y<H;y+=3*DPR)x.fillRect(0,y,W,1*DPR);x.globalAlpha=1;}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmos Orb — particle sphere</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#04030c; cursor:default; }
  canvas { display:block; position:fixed; inset:0; }
  .tag { position:fixed; left:50%; bottom:6%; translate:-50%; text-align:center; pointer-events:none;
    font-family:-apple-system,system-ui,sans-serif; mix-blend-mode:screen; }
  .tag .a { font-size:11px; letter-spacing:.5em; text-transform:uppercase; color:#9ec9ff; font-weight:700; }
  .tag .b { margin-top:5px; font-size:20px; font-weight:800; letter-spacing:.06em; color:#fff; text-transform:uppercase; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="tag"><div class="a">Cosmos AI Lab</div><div class="b">Particle Orb</div></div>
<script>
// ============================================================================
//  Cosmos Orb — a sphere of glowing particles (Cosmic->Phantom->Nebula gradient)
//  with tilted orbit rings spinning around it, the whole scene rotating. Pure
//  Canvas 2D with a hand-rolled 3D projection; deterministic + seamless loop.
//  ?auto=1 + window.__seek(t) drives the GIF.
// ============================================================================
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const AUTO = new URLSearchParams(location.search).has('auto');
const LOOP = 8000, TAU = 6.28318;
let W, H, DPR, cx, cy, R, F;

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const lerp=(a,b,t)=>a+(b-a)*t;
// 3-stop gradient: Cosmic #46b4ff -> Phantom #8b5cff -> Nebula #ff5cc2
function grad3(t){ const A=[70,180,255],B=[139,92,255],C=[255,92,194];
  if(t<0.5){const u=t/0.5;return [lerp(A[0],B[0],u),lerp(A[1],B[1],u),lerp(A[2],B[2],u)];}
  const u=(t-0.5)/0.5;return [lerp(B[0],C[0],u),lerp(B[1],C[1],u),lerp(B[2],C[2],u)]; }

let sphere=[], rings=[];
function build(){
  const rnd=mulberry32(2026);
  // fibonacci sphere particles
  sphere=[]; const NP=2000, ga=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<NP;i++){ const y=1-(i+0.5)/NP*2, r=Math.sqrt(1-y*y), th=i*ga;
    const lat=(y+1)/2, col=grad3(1-lat);
    sphere.push({x:Math.cos(th)*r, y:y, z:Math.sin(th)*r, col, s:0.7+rnd()*0.8}); }
  // orbit rings: {rad, tiltX, tiltZ, turns, col, n}
  rings=[
    {rad:1.16, tiltX:1.15, tiltZ:0.25, turns:2,  col:[70,180,255],  n:140},
    {rad:1.34, tiltX:-0.7, tiltZ:1.05, turns:-3, col:[255,92,194],  n:160},
    {rad:1.52, tiltX:0.45, tiltZ:-0.9, turns:2,  col:[139,92,255],  n:170},
    {rad:1.12, tiltX:1.9,  tiltZ:0.6,  turns:-2, col:[224,178,74],  n:130},
  ];
}
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=canvas.width=innerWidth*DPR; H=canvas.height=innerHeight*DPR;
  canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
  cx=W/2; cy=H*0.46; R=Math.min(W,H)*0.23; F=R*3.0; build(); }
resize(); addEventListener('resize',resize);

// rotate (Y then X), returns rotated + projected
function project(x,y,z, sinY,cosY, sinX,cosX){
  let x1=x*cosY+z*sinY, z1=-x*sinY+z*cosY, y1=y;
  let y2=y1*cosX-z1*sinX, z2=y1*sinX+z1*cosX, x2=x1;
  const sc=F/(F+z2*R);
  return { sx:cx+x2*R*sc, sy:cy+y2*R*sc, z:z2, sc };
}
function dot(sx,sy,rad,r,g,b,a){
  ctx.globalAlpha=a*0.5; ctx.fillStyle=`rgb(${r|0},${g|0},${b|0})`;
  ctx.beginPath(); ctx.arc(sx,sy,rad*2.1,0,TAU); ctx.fill();
  ctx.globalAlpha=a; ctx.fillStyle=`rgb(${Math.min(255,r+70)|0},${Math.min(255,g+70)|0},${Math.min(255,b+70)|0})`;
  ctx.beginPath(); ctx.arc(sx,sy,rad*0.85,0,TAU); ctx.fill();
}

function frame(t){
  const tmod=((t%LOOP)+LOOP)%LOOP, u=tmod/LOOP;
  // bg
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#0c0a22'); bg.addColorStop(0.55,'#070514'); bg.addColorStop(1,'#04030c');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const ay=TAU*u, ax=0.45+0.15*Math.sin(TAU*u);
  const sinY=Math.sin(ay),cosY=Math.cos(ay), sinX=Math.sin(ax),cosX=Math.cos(ax);

  ctx.globalCompositeOperation='lighter';
  // core glow
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.9);
  cg.addColorStop(0,'rgba(150,130,255,0.5)'); cg.addColorStop(1,'rgba(150,130,255,0)');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,cy,R*0.9,0,TAU); ctx.fill();

  // sphere particles
  for(const p of sphere){ const pr=project(p.x,p.y,p.z, sinY,cosY, sinX,cosX);
    const a=0.18+0.82*Math.max(0,Math.min(1,(pr.z+1.3)/2.6));
    dot(pr.sx,pr.sy, p.s*1.4*DPR*pr.sc, p.col[0],p.col[1],p.col[2], a); }

  // orbit rings
  for(const ring of rings){ const ph=TAU*u*ring.turns;
    const sX=Math.sin(ring.tiltX),cX=Math.cos(ring.tiltX), sZ=Math.sin(ring.tiltZ),cZ=Math.cos(ring.tiltZ);
    for(let i=0;i<ring.n;i++){ const a=i/ring.n*TAU + ph;
      let x=Math.cos(a)*ring.rad, y=Math.sin(a)*ring.rad, z=0;
      // tilt: rotateX then rotateZ
      let y1=y*cX - z*sX, z1=y*sX + z*cX, x1=x;
      let x2=x1*cZ - y1*sZ, y2=x1*sZ + y1*cZ, z2=z1;
      const pr=project(x2,y2,z2, sinY,cosY, sinX,cosX);
      const al=0.16+0.84*Math.max(0,Math.min(1,(pr.z+1.4)/2.8));
      dot(pr.sx,pr.sy, 1.5*DPR*pr.sc, ring.col[0],ring.col[1],ring.col[2], al*0.9); }
  }
  ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
}

if(AUTO){ window.__seek=t=>frame(t); frame(0); window.__ready=true; }
else { const s=performance.now(); (function loop(now){ frame(now-s); requestAnimationFrame(loop); })(performance.now()); }
</script>
</body>
</html>

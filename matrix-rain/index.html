<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Matrix Rain</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#03050a}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Matrix Rain — falling glyph columns in Aurora green/Cosmos accents. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=6000;
let W,H,DPR,cell,cols,col=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const glyph=i=>String.fromCharCode(0x30A0 + (i%96));
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  cell=18*DPR;cols=Math.ceil(W/cell);const r=rnd(7);col=[];
  for(let c=0;c<cols;c++)col.push({turns:1+(r()*3|0),ph:r(),tail:8+(r()*12|0),seed:(r()*9999)|0,hue:r()<0.78?0:1+(r()*3|0)});}
rs();addEventListener('resize',rs);
const AC=[[80,255,170],[139,92,255],[70,180,255],[255,92,194]];
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#03050a';x.fillRect(0,0,W,H);x.font=`${cell*0.92}px monospace`;x.textAlign='center';
  const rows=Math.ceil(H/cell)+1;
  for(let c=0;c<cols;c++){const o=col[c];const head=((u*o.turns+o.ph)%1)*(rows+o.tail)-o.tail;const cx=c*cell+cell/2;const C=AC[o.hue];
    for(let k=0;k<=o.tail;k++){const row=Math.floor(head)-k;if(row<0||row>rows)continue;const f=1-k/o.tail;const cy=row*cell+cell*0.9;
      const ch=glyph(o.seed + row*7 + (Math.floor(u*o.turns*rows)+row));
      if(k===0){x.fillStyle='rgba(235,255,245,0.98)';}else{x.fillStyle=`rgba(${C[0]},${C[1]},${C[2]},${f*0.85})`;}
      x.fillText(ch,cx,cy);}}}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

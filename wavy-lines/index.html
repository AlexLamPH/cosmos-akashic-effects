<!doctype html><!-- Cosmos wavy-lines: seamless glowing sine ribbons, Canvas 2D, zero deps -->
<meta charset="utf-8"><title>wavy-lines</title>
<style>html,body{margin:0;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0;width:100vw;height:100vh}</style>
<canvas id="c"></canvas>
<script>
const LOOP=7000;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,dpr;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const PAL=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
const NL=32;let lines=[];
function build(){const r=mulberry32(7);lines=[];
  for(let i=0;i<NL;i++){const c=PAL[i%PAL.length];
    lines.push({
      a1:6+r()*18, a2:3+r()*10, a3:2+r()*6,
      k1:1+(r()*2|0), k2:2+(r()*3|0), k3:3+(r()*3|0),
      f1:0.004+r()*0.006, f2:0.008+r()*0.01, f3:0.012+r()*0.014,
      p1:r()*6.28, p2:r()*6.28, p3:r()*6.28,
      col:c});}}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP,T=2*Math.PI*u;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';ctx.lineCap='round';
  const step=W/120;
  for(let i=0;i<NL;i++){const L=lines[i],baseY=H*(i+1)/(NL+1),c=L.col;
    for(let pass=0;pass<2;pass++){
      ctx.beginPath();
      for(let x=0;x<=W;x+=step){
        const y=baseY
          +L.a1*Math.sin(x*L.f1+T*L.k1+L.p1)
          +L.a2*Math.sin(x*L.f2+T*L.k2+L.p2)
          +L.a3*Math.sin(x*L.f3+T*L.k3+L.p3);
        if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
      if(pass===0){ctx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.10)';ctx.lineWidth=7;}
      else{ctx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.85)';ctx.lineWidth=1.4;}
      ctx.stroke();}}
  ctx.globalCompositeOperation='source-over';}
function resize(){dpr=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);build();}
addEventListener('resize',resize);resize();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

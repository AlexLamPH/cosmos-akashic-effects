<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Pong</title>
<style>
  html,body{margin:0;height:100%;background:#0a0816;color:#e8e6f5;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-user-select:none;user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #frame{width:720px;height:520px;box-sizing:border-box;padding:16px;
    background:linear-gradient(160deg,#140f28,#0c0a1c);border:1px solid #241a44;border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.55),inset 0 0 0 1px rgba(70,180,255,.06);
    display:flex;flex-direction:column;gap:10px}
  #hud{display:flex;align-items:center;justify-content:center;gap:40px;height:46px}
  .name{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9a8fd0}
  .sc{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  #pYou{color:#46b4ff;text-shadow:0 0 16px rgba(70,180,255,.5)}
  #pCpu{color:#ff5cc2;text-shadow:0 0 16px rgba(255,92,194,.5)}
  .col{display:flex;flex-direction:column;align-items:center;gap:3px}
  #vs{color:#5b5288;font-size:13px;font-weight:700}
  canvas{border-radius:12px;background:#0b0a1a;display:block;
    box-shadow:inset 0 0 26px rgba(139,92,255,.07);touch-action:none}
  #foot{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#8f86bd}
  #foot b{color:#36d39a}
  #msg{position:absolute;font-size:30px;font-weight:800;color:#36d39a;
    text-shadow:0 0 18px rgba(54,211,154,.6);display:none}
</style></head><body>
<div id="wrap"><div id="frame">
  <div id="hud">
    <div class="col"><div class="name">You</div><div class="sc" id="pYou">0</div></div>
    <div id="vs">FIRST TO 7</div>
    <div class="col"><div class="name">CPU</div><div class="sc" id="pCpu">0</div></div>
  </div>
  <canvas id="c"></canvas>
  <div id="foot">
    <span>&uarr;/&darr; or drag to move your paddle</span>
    <span><b>R</b> restart</span>
  </div>
</div></div>
<div id="msg"></div>
<script>
const AUTO=new URLSearchParams(location.search).has('auto');
const cv=document.getElementById('c');
const W=688,H=380; cv.width=W;cv.height=H;
const g=cv.getContext('2d');
const VIOLET='139,92,255',COSMIC='70,180,255',NEBULA='255,92,194',AURORA='54,211,154',SOLARIS='255,106,61';
const PW=12,PH=72,PM=22;        // paddle width, height, margin from wall
const BR=8;                       // ball radius
const WIN=7;
// ---------- mulberry32 ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function newState(seed,auto){
  const rng=mulberry32(seed);
  const s={rng,you:H/2,cpu:H/2,bx:W/2,by:H/2,bvx:0,bvy:0,
    sYou:0,sCpu:0,over:false,winner:null,serveDir:1,flash:0,auto:!!auto};
  serve(s,1);
  return s;
}
function serve(s,dir){
  s.bx=W/2;s.by=H*(0.3+0.4*s.rng());
  const ang=(s.rng()*0.7-0.35);   // shallow angle
  const sp=4.6;
  s.bvx=dir*sp*Math.cos(ang); s.bvy=sp*Math.sin(ang);
  s.serveDir=dir;
  // re-roll seeded aim biases so each rally can end differently (deterministic).
  // ~1 in 4 serves gives a paddle a large enough bias to whiff -> a point is scored.
  s.youBias=(s.rng()<0.28)?(s.rng()-0.5)*150:(s.rng()-0.5)*36;
  s.cpuBias=(s.rng()<0.28)?(s.rng()-0.5)*150:(s.rng()-0.5)*36;
}
function clamp(v,a,b){return v<a?a:v>b?b:v;}

// deterministic CPU/AI paddle tracker (reused for both sides in AUTO)
function trackPaddle(cur,target,maxSpeed,reaction){
  // reaction: 0..1 how much it homes toward target this frame
  const desired=clamp(target,PH/2,H-PH/2);
  let d=(desired-cur)*reaction;
  d=clamp(d,-maxSpeed,maxSpeed);
  return clamp(cur+d,PH/2,H-PH/2);
}

function step(s,youInput){
  if(s.over) return;
  // move ball
  s.bx+=s.bvx; s.by+=s.bvy;
  // top/bottom walls
  if(s.by<BR){s.by=BR;s.bvy=Math.abs(s.bvy);s.flash=1;}
  if(s.by>H-BR){s.by=H-BR;s.bvy=-Math.abs(s.bvy);s.flash=1;}
  // left paddle (You). In AUTO youInput is null -> AI tracks ball with prediction
  if(s.auto){
    // predict where ball crosses left when heading left, else drift to center.
    // a seeded, slowly-varying aim bias makes the AI imperfect so rallies end and
    // points get scored — fully deterministic since it's driven only by s.rng().
    let tgt=H/2;
    if(s.bvx<0){ tgt=predictY(s,PM+PW)+s.youBias; }
    s.you=trackPaddle(s.you,tgt,5.0,0.13);
  } else if(youInput!=null){
    s.you=clamp(youInput,PH/2,H-PH/2);
  }
  // right paddle (CPU): always AI
  let ctgt=H/2;
  if(s.bvx>0){ ctgt=predictY(s,W-PM-PW)+ (s.auto? s.cpuBias : (s.rng()-0.5)*26); }
  s.cpu=trackPaddle(s.cpu,ctgt, s.auto?5.0:4.4, s.auto?0.13:0.11);
  // collisions with paddles
  // left
  if(s.bvx<0 && s.bx-BR<=PM+PW && s.bx-BR>=PM-4){
    if(s.by>s.you-PH/2-BR && s.by<s.you+PH/2+BR){
      s.bx=PM+PW+BR; bounce(s,s.you,1); }
  }
  // right
  if(s.bvx>0 && s.bx+BR>=W-PM-PW && s.bx+BR<=W-PM+4){
    if(s.by>s.cpu-PH/2-BR && s.by<s.cpu+PH/2+BR){
      s.bx=W-PM-PW-BR; bounce(s,s.cpu,-1); }
  }
  // scoring
  if(s.bx< -BR){ s.sCpu++; s.flash=2; checkWin(s); if(!s.over) serve(s,-1); }
  else if(s.bx>W+BR){ s.sYou++; s.flash=2; checkWin(s); if(!s.over) serve(s,1); }
  if(s.flash>0) s.flash-=0.08; if(s.flash<0)s.flash=0;
}
function bounce(s,paddleY,dir){
  const off=clamp((s.by-paddleY)/(PH/2),-1,1);
  const ang=off*0.9; // up to ~52deg
  const sp=Math.min(9.5, Math.hypot(s.bvx,s.bvy)*1.045+0.25);
  s.bvx=dir*sp*Math.cos(ang);
  s.bvy=sp*Math.sin(ang);
  s.flash=1;
}
function predictY(s,wallX){
  // simulate ball y when it reaches wallX, reflecting off top/bottom
  let x=s.bx,y=s.by,vx=s.bvx,vy=s.bvy,guard=0;
  if(vx===0) return y;
  while(((vx<0)?(x>wallX):(x<wallX)) && guard++<2000){
    x+=vx;y+=vy;
    if(y<BR){y=BR;vy=Math.abs(vy);}
    if(y>H-BR){y=H-BR;vy=-Math.abs(vy);}
  }
  return y;
}
function checkWin(s){ if(s.sYou>=WIN){s.over=true;s.winner='You';}
  else if(s.sCpu>=WIN){s.over=true;s.winner='CPU';} }

// ---------- AUTO simulation ----------
const SEED=70260615;
const DT_STEPS=1;          // one physics step per tick
const T_OFFSET=9000;       // start mid-rally with a score already up
const FRAME_MS=16;
function freshAuto(){ return newState(SEED,true); }
function simTo(ms){
  const s=freshAuto();
  const steps=Math.floor((ms+T_OFFSET)/FRAME_MS);
  for(let i=0;i<steps;i++){
    if(s.over){ // brief hold then reset for a clean loop
      s.holdT=(s.holdT||0)+1; if(s.holdT>40){ Object.assign(s,freshAuto()); s.holdT=0; }
    } else step(s,null);
  }
  return s;
}

// ---------- draw ----------
function paddle(x,y,col){
  g.save();g.shadowColor=`rgba(${col},.8)`;g.shadowBlur=16;
  g.fillStyle=`rgb(${col})`;
  rr(x-PW/2,y-PH/2,PW,PH,6);g.fill();g.restore();
}
function rr(x,y,w,h,r){g.beginPath();
  g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
function draw(s){
  g.clearRect(0,0,W,H);
  // center net
  g.strokeStyle='rgba(139,92,255,.22)';g.lineWidth=3;g.setLineDash([10,12]);
  g.beginPath();g.moveTo(W/2,0);g.lineTo(W/2,H);g.stroke();g.setLineDash([]);
  // border glow
  g.strokeStyle='rgba(70,180,255,.12)';g.lineWidth=2;g.strokeRect(1,1,W-2,H-2);
  // paddles
  paddle(PM+PW/2,s.you,COSMIC);
  paddle(W-PM-PW/2,s.cpu,NEBULA);
  // ball with trail
  for(let k=6;k>=0;k--){const tx=s.bx-s.bvx*k*0.9,ty=s.by-s.bvy*k*0.9;
    const a=(1-k/7)*0.5; g.fillStyle=`rgba(224,178,74,${a})`;
    g.beginPath();g.arc(tx,ty,BR*(1-k*0.06),0,7);g.fill();}
  g.save();g.shadowColor=`rgba(${SOLARIS},.9)`;g.shadowBlur=18;
  g.fillStyle='#fff7e6';g.beginPath();g.arc(s.bx,s.by,BR,0,7);g.fill();g.restore();
  // HUD
  document.getElementById('pYou').textContent=s.sYou;
  document.getElementById('pCpu').textContent=s.sCpu;
  const msg=document.getElementById('msg');
  if(s.over && !AUTO){ const r=cv.getBoundingClientRect();
    msg.style.display='block';
    msg.textContent=(s.winner==='You'?'YOU WIN!':'CPU WINS');
    msg.style.color=s.winner==='You'?'#46b4ff':'#ff5cc2';
    msg.style.left=(r.left+W/2-90)+'px';msg.style.top=(r.top+H/2-22)+'px';
  } else msg.style.display='none';
}
function drawAt(ms){ draw(simTo(ms)); }

const LOOP=11000;
// ---------- LIVE ----------
let S,youTarget;
function initGame(){
  S=newState((Date.now())>>>0,false); youTarget=H/2;
  let raf;
  function loop(){ if(!S.over) step(S,youTarget); draw(S); raf=requestAnimationFrame(loop); }
  raf=requestAnimationFrame(loop);
  // keyboard
  const held={up:false,down:false};
  window.addEventListener('keydown',e=>{
    if(S.over && (e.key==='r'||e.key==='R')){initGame();return;}
    if(e.key==='ArrowUp')held.up=true;
    if(e.key==='ArrowDown')held.down=true;
    if(e.key==='r'||e.key==='R')initGame();
    if(['ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  });
  window.addEventListener('keyup',e=>{
    if(e.key==='ArrowUp')held.up=false; if(e.key==='ArrowDown')held.down=false;});
  (function pk(){ if(held.up)youTarget=clamp(youTarget-6,PH/2,H-PH/2);
    if(held.down)youTarget=clamp(youTarget+6,PH/2,H-PH/2);
    requestAnimationFrame(pk);})();
  // drag / touch
  function ptr(e){ const r=cv.getBoundingClientRect();
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    youTarget=clamp(cy*(H/r.height),PH/2,H-PH/2);
    if(S.over)initGame(); }
  let dragging=false;
  cv.addEventListener('mousedown',e=>{dragging=true;ptr(e);});
  window.addEventListener('mousemove',e=>{if(dragging)ptr(e);});
  window.addEventListener('mouseup',()=>dragging=false);
  cv.addEventListener('touchstart',e=>{ptr(e);e.preventDefault();},{passive:false});
  cv.addEventListener('touchmove',e=>{ptr(e);e.preventDefault();},{passive:false});
}

if(AUTO){ window.__seek=t=>drawAt(((t%LOOP)+LOOP)%LOOP); window.__seek(0); window.__ready=true; }
else { initGame(); }
</script></body></html>

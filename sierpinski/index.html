<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Sierpinski</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Sierpinski — recursive triangle subdivision (depth 6) drawn as glowing accent outlines; slow breathing scale + integer rotation, plus a colour wave that sweeps by recursion depth. Pure Canvas 2D, recomputed each frame as a pure fn of t, seamless loop.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718;
let W,H,DPR;const DEPTH=6;
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function lerp(a,b,t){return a+(b-a)*t;}
// colour by depth, wave-swept through palette using fractional phase mod 1 (returns at u=1)
function depthCol(d,u){const ph=(d/DEPTH + u)%1; const f=ph*AC.length, i=Math.floor(f)%AC.length, j=(i+1)%AC.length, k=f-Math.floor(f);
  return [lerp(AC[i][0],AC[j][0],k),lerp(AC[i][1],AC[j][1],k),lerp(AC[i][2],AC[j][2],k)];}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
rs();addEventListener('resize',rs);
function tri(ax,ay,bx,by,cx,cy,d,u){
  if(d===0){
    const c=depthCol(d,u); const a=0.5;
    x.strokeStyle=`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
    x.lineWidth=1.2*DPR;
    x.beginPath();x.moveTo(ax,ay);x.lineTo(bx,by);x.lineTo(cx,cy);x.closePath();x.stroke();return;
  }
  // midpoints — the three corner sub-triangles (centre hole left empty = Sierpinski)
  const mx1=(ax+bx)/2,my1=(ay+by)/2, mx2=(bx+cx)/2,my2=(by+cy)/2, mx3=(cx+ax)/2,my3=(cy+ay)/2;
  // glowing outline of the empty centre triangle, colour set by this depth's wave phase
  const c=depthCol(d,u);
  const pulse=0.5+0.5*Math.sin(TAU*u + d*0.9);            // per-depth glow pulse (integer time freq)
  x.strokeStyle=`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${0.18+0.5*pulse})`;
  x.lineWidth=Math.max(1,(DEPTH-d)*0.9)*DPR;
  x.beginPath();x.moveTo(mx1,my1);x.lineTo(mx2,my2);x.lineTo(mx3,my3);x.closePath();x.stroke();
  tri(ax,ay,mx1,my1,mx3,my3,d-1,u);                       // bottom-left / top corner sub-triangles
  tri(mx1,my1,bx,by,mx2,my2,d-1,u);
  tri(mx3,my3,mx2,my2,cx,cy,d-1,u);
}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;      // 0..1 normalized loop time
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);             // full repaint each frame (pure fn of t)
  x.globalCompositeOperation='lighter';                  // additive glow
  x.lineJoin='round';
  const cxp=W/2, cyp=H/2;
  const breathe=1+0.10*Math.sin(TAU*u);                  // slow breathing scale, returns at u=1
  const rot=TAU*u + Math.PI/2*Math.sin(TAU*u)*0;         // base orientation
  const R=Math.min(W,H)*0.42*breathe;                    // circumradius of the big triangle
  const spin=TAU*u;                                      // one full rotation per loop (k=1)
  // equilateral triangle vertices around centre, rotating
  const v=[];for(let i=0;i<3;i++){const a=spin - Math.PI/2 + i*TAU/3; v.push([cxp+Math.cos(a)*R, cyp+Math.sin(a)*R]);}
  tri(v[0][0],v[0][1],v[1][0],v[1][1],v[2][0],v[2][1],DEPTH,u);
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!doctype html><meta charset=utf8><title>Cosmos Sine Choir</title>
<!-- Cosmos Sine Choir — vertical pitch field; click/drag to stack sustained pure-sine voices into shimmering chords with vibrato + detune (angelic Aaah pad) via real Web Audio; AUTO is a silent seeded chord that builds & releases. -->
<style>
html,body{margin:0;background:#05030d;overflow:hidden;font:12px/1.4 system-ui,sans-serif;color:#b9a8ff}
canvas{position:fixed;inset:0;touch-action:none}
#hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);padding:7px 14px;border:1px solid #46b4ff55;border-radius:20px;background:#0c1426cc;color:#bfe0ff;letter-spacing:.3px;pointer-events:none;transition:opacity .4s}
</style>
<canvas id=c></canvas>
<div id=hint>▶ click the field to add choir voices</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),hint=document.getElementById('hint');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=8000, TAU=Math.PI*2;
const PAL=['#46b4ff','#8b5cff','#36d39a','#ff5cc2','#e0b24a','#5cd0ff'];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
addEventListener('resize',resize);resize();

// ---- pitch scale: snap field-y to a pleasant major-ish stack so chords sound good ----
// MIDI notes available (C major / pentatonic-leaning) across the field, low at bottom.
const SCALE=[48,50,52,55,57,60,62,64,67,69,72,74,76,79]; // C3..G5
function yToNote(y01){ // y01: 0 bottom .. 1 top
  const i=Math.min(SCALE.length-1, Math.max(0, Math.round(y01*(SCALE.length-1))));
  return {midi:SCALE[i], idx:i};
}
function noteY(idx){ return 1 - idx/(SCALE.length-1); } // 0..1 (top=high)

// ---- voice model (shared for live + a parallel visual-only model for AUTO) ----
// live voice: {idx, level(0..1), audio nodes...}; visual line drawn per active voice.
const liveVoices=[]; // {idx, level, target, osc, vib, vibGain, gain, born}

// seeded AUTO: a chord builds (voices fade in stacked) then thins out, looping.
const rng=mulberry32(0x5C401);
const AUTO_CHORD=[0,2,4,6,8,5]; // scale indices forming a stacked shimmering chord (root,3rd,5th,7th,9th + a high)
function autoVoices(u){ // returns array of {idx, level} present at phase u
  const out=[]; const n=AUTO_CHORD.length;
  // build phase 0..0.5: voices fade in one by one; hold; release 0.8..1
  for(let k=0;k<n;k++){
    const inT=0.04+0.07*k;            // staggered entrance
    const outT=0.78+0.03*k;           // staggered exit
    let lvl;
    if(u<inT) lvl=0;
    else if(u<inT+0.10) lvl=(u-inT)/0.10;          // fade in
    else if(u<outT) lvl=1;                           // sustain
    else if(u<outT+0.16) lvl=1-(u-outT)/0.16;        // fade out
    else lvl=0;
    if(lvl>0.001) out.push({idx:AUTO_CHORD[k], level:Math.max(0,Math.min(1,lvl))});
  }
  return out;
}

function render(u){
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  const pad=10*DPR, gx=pad,gy=pad+22*DPR,gw=W-pad*2,gh=H-pad*2-22*DPR;

  // faint pitch-field guide lines
  ctx.globalCompositeOperation='source-over';
  for(let i=0;i<SCALE.length;i++){ const yy=gy+noteY(i)*gh; ctx.globalAlpha=0.06+(i%7===0?0.06:0);
    ctx.strokeStyle='#2a2550';ctx.lineWidth=1*DPR;ctx.beginPath();ctx.moveTo(gx,yy);ctx.lineTo(gx+gw,yy);ctx.stroke(); }

  // which voices to draw
  let vlist;
  if(typeof window!=='undefined' && window.__driveAuto){ vlist=autoVoices(u); }
  else { vlist=liveVoices.filter(v=>v.level>0.003).map(v=>({idx:v.idx,level:v.level})); }

  // title + voice count readout
  ctx.globalAlpha=0.9;ctx.fillStyle='#7fc4ff';ctx.font='600 '+(15*DPR)+'px system-ui';ctx.textBaseline='top';
  ctx.fillText('SINE CHOIR', 16*DPR, 10*DPR);
  ctx.textAlign='right';ctx.globalAlpha=0.85;ctx.fillStyle='#fff';ctx.font='700 '+(15*DPR)+'px system-ui';
  ctx.fillText(vlist.length+' voice'+(vlist.length===1?'':'s'), W-16*DPR, 11*DPR);
  ctx.textAlign='left';

  ctx.globalCompositeOperation='lighter';
  for(const v of vlist){
    const col=PAL[v.idx%PAL.length];
    const breathe=0.5+0.5*Math.sin(u*TAU*1.5 + v.idx*0.9);          // slow breathing
    const vib=Math.sin(u*TAU*5 + v.idx*1.7)*0.012;                  // vibrato wobble on the line
    const yc=gy+(noteY(v.idx)+vib)*gh;
    const amp=v.level*(0.55+0.45*breathe);
    const lineH=(2+10*amp)*DPR;
    // glowing horizontal line/orb
    let g=ctx.createLinearGradient(gx,0,gx+gw,0);
    g.addColorStop(0,col+'00');g.addColorStop(0.5,col+hex(0.85*amp));g.addColorStop(1,col+'00');
    ctx.globalAlpha=0.9;ctx.fillStyle=g;
    // wavy shimmering band
    ctx.beginPath();
    const SEG=80;
    for(let i=0;i<=SEG;i++){ const t=i/SEG, xx=gx+t*gw;
      const wob=Math.sin(t*TAU*3 + u*TAU*2 + v.idx)*lineH*0.6;
      ctx.lineTo(xx, yc - lineH - wob);
    }
    for(let i=SEG;i>=0;i--){ const t=i/SEG, xx=gx+t*gw;
      const wob=Math.sin(t*TAU*3 + u*TAU*2 + v.idx)*lineH*0.6;
      ctx.lineTo(xx, yc + lineH + wob);
    }
    ctx.closePath();ctx.fill();
    // central orb that breathes
    const ox=gx+gw*(0.5+0.18*Math.sin(u*TAU+v.idx)), or=(7+14*amp)*DPR;
    let og=ctx.createRadialGradient(ox,yc,0,ox,yc,or);
    og.addColorStop(0,'#ffffff'+hex(0.5*amp));og.addColorStop(0.3,col+hex(0.8*amp));og.addColorStop(1,col+'00');
    ctx.globalAlpha=1;ctx.fillStyle=og;ctx.beginPath();ctx.arc(ox,yc,or,0,TAU);ctx.fill();
    // shimmer sparkles along the line
    for(let s=0;s<4;s++){ const sx=gx+gw*((s*0.27 + u*0.5 + v.idx*0.13)%1);
      const sr=(1.5+2.5*amp)*DPR; ctx.globalAlpha=amp*(0.4+0.4*Math.sin(u*TAU*6+s+v.idx));
      ctx.fillStyle=col;ctx.beginPath();ctx.arc(sx,yc,sr,0,TAU);ctx.fill(); }
  }
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
function hex(a){ a=Math.max(0,Math.min(1,a)); return Math.round(a*255).toString(16).padStart(2,'0'); }

// ================= LIVE AUDIO (gated, gesture-created) =================
const AUTO=new URLSearchParams(location.search).has('auto');
let actx, master, comp;
function audio(){ if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();} if(actx.state==='suspended')actx.resume(); return actx; }
function ensureMaster(){ const a=audio(); if(master)return a;
  master=a.createGain();master.gain.value=0.2;
  comp=a.createDynamicsCompressor();comp.threshold.value=-16;comp.ratio.value=4;
  master.connect(comp);comp.connect(a.destination); return a; }
function midiFreq(m){ return 440*Math.pow(2,(m-69)/12); }
function addVoice(idx){
  // limit polyphony / avoid duplicate same-pitch stacking too hard
  const existing=liveVoices.find(v=>v.idx===idx && v.target>0.5);
  const a=ensureMaster(); const f=midiFreq(SCALE[idx]); const t=a.currentTime;
  const osc=a.createOscillator();osc.type='sine';osc.frequency.value=f;
  osc.detune.value=(Math.random()*2-1)*7; // slight detune for chorused shimmer
  const gain=a.createGain();gain.gain.value=0.0001;
  // slow vibrato LFO
  const vib=a.createOscillator();vib.type='sine';vib.frequency.value=4.5+Math.random()*1.5;
  const vibGain=a.createGain();vibGain.gain.value=f*0.006; // gentle pitch vibrato
  vib.connect(vibGain);vibGain.connect(osc.frequency);
  osc.connect(gain);gain.connect(master);
  osc.start();vib.start();
  const lvl=0.9/Math.max(1,Math.sqrt(liveVoices.length+1));
  gain.gain.cancelScheduledValues(t);
  gain.gain.setValueAtTime(0.0001,t);
  gain.gain.exponentialRampToValueAtTime(lvl,t+1.2); // slow angelic swell
  const v={idx, level:0.0001, target:1, osc, vib, vibGain, gain, born:performance.now()};
  liveVoices.push(v);
  // visual level easing loop
  ease();
  return v;
}
let easing=false;
function ease(){ if(easing)return; easing=true;
  (function loop(){ let any=false;
    for(const v of liveVoices){ v.level += (v.target - v.level)*0.04; if(Math.abs(v.target-v.level)>0.002||v.target>0)any=true; }
    if(any)requestAnimationFrame(loop); else easing=false; })();
}
function releaseAll(){ if(!actx)return; const t=actx.currentTime;
  for(const v of liveVoices){ v.target=0;
    v.gain.gain.cancelScheduledValues(t);v.gain.gain.setValueAtTime(v.gain.gain.value,t);
    v.gain.gain.exponentialRampToValueAtTime(0.0001,t+1.4);
    const o=v.osc,b=v.vib; setTimeout(()=>{try{o.stop();}catch(e){}try{b.stop();}catch(e){}},1600);
  }
  setTimeout(()=>{ liveVoices.length=0; },1700);
  ease();
}

function yFromEvent(e){ const pad=10, gy=pad+22, gh=innerHeight-pad*2-22;
  return 1-Math.min(1,Math.max(0,(e.clientY-gy)/gh)); }

if(AUTO){
  window.__driveAuto=true;
  window.__seek=t=>{ const u=((t%LOOP)+LOOP)%LOOP/LOOP; render(u); };
  window.__seek(0); window.__ready=true;
} else {
  window.__driveAuto=true; // attract loop runs seeded chord build/release until touched
  let dragging=false, lastIdx=-1;
  cv.addEventListener('pointerdown',e=>{ cv.setPointerCapture(e.pointerId);
    window.__driveAuto=false; hint.style.opacity='0'; dragging=true;
    const {idx}=yToNote(yFromEvent(e)); lastIdx=idx; addVoice(idx); });
  cv.addEventListener('pointermove',e=>{ if(!dragging)return;
    const {idx}=yToNote(yFromEvent(e)); if(idx!==lastIdx){ lastIdx=idx; addVoice(idx); } }); // drag stacks/bends new voices
  const up=()=>{ dragging=false; };
  cv.addEventListener('pointerup',up); cv.addEventListener('pointercancel',up);
  // double-click clears the choir
  cv.addEventListener('dblclick',()=>{ releaseAll(); setTimeout(()=>{window.__driveAuto=true;},1800); });
  // in live mode render() reads liveVoices directly when not driving auto; the u just animates shimmer/vibrato.
  const s=performance.now();
  (function l(n){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l); })(performance.now());
}
</script>

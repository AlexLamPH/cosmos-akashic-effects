<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Audio Bars</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Audio Bars — music-style frequency-bar visualizer; bars bounce to a fake-but-musical harmonic spectrum with a mirrored under-reflection. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=6400,TAU=6.283185307;
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const N=56;
let W,H,DPR,cx,cy,seed;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H*0.50;
  const r=mb(1337);seed=[];for(let i=0;i<N;i++)seed.push({ph:r()*TAU,a:0.6+0.7*r(),b:0.4+0.6*r(),c:0.3+0.5*r(),tilt:r()*TAU});}
rs();addEventListener('resize',rs);
// fake-but-musical: sum of integer-harmonic sines of 2*pi*u → bounces rhythmically, returns at u=1
function level(i,u){const s=seed[i];const lo=1-Math.abs(i-(N-1)/2)/((N-1)/2);
  let v=Math.sin(TAU*(2*u)+s.ph)*s.a + Math.sin(TAU*(4*u)+i*0.32)*s.b*0.7 + Math.sin(TAU*(6*u)+s.tilt)*s.c*0.5 + Math.sin(TAU*(3*u)-i*0.18)*0.5;
  v=v*0.5+0.5;                                  // → 0..1
  return Math.max(0.04,(0.30+0.70*lo)*v*v);     // bass-heavy weighting, never zero
}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const padL=W*0.06, padR=W*0.06, gap=W*0.004;
  const slot=(W-padL-padR)/N, bw=slot-gap;
  const maxH=H*0.40;
  x.globalCompositeOperation='lighter';
  for(let i=0;i<N;i++){
    const h=level(i,u)*maxH;const bx=padL+i*slot;const col=COL[i%6];
    // bar (up) with vertical gradient
    let g=x.createLinearGradient(0,cy-h,0,cy);g.addColorStop(0,col);g.addColorStop(1,'#0a0618');
    x.fillStyle=g;x.globalAlpha=0.95;x.fillRect(bx,cy-h,bw,h);
    // glow cap
    x.globalAlpha=0.9;x.fillStyle=col;x.fillRect(bx,cy-h,bw,Math.max(2*DPR,h*0.06));
    // mirrored reflection (under, fading)
    let gr=x.createLinearGradient(0,cy,0,cy+h*0.7);gr.addColorStop(0,col);gr.addColorStop(1,'#05030d');
    x.fillStyle=gr;x.globalAlpha=0.30;x.fillRect(bx,cy,bw,h*0.7);
  }
  // baseline shimmer
  x.globalAlpha=0.5;x.fillStyle='#46b4ff';x.fillRect(padL,cy-DPR,W-padL-padR,2*DPR);
  x.globalAlpha=1;x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

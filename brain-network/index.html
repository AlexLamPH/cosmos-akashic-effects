<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Brain Network</title><style>*{margin:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Brain Network — seeded neuron graph; light pulses travel synapses on integer-harmonic phases, nodes flare on arrival. Canvas 2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718;
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
let W,H,DPR,nodes=[],edges=[];
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=mul(424242);nodes=[];edges=[];const N=46,mn=Math.min(W,H);
  for(let i=0;i<N;i++)nodes.push({bx:(0.08+r()*0.84)*W,by:(0.1+r()*0.8)*H,
    ax:(6+r()*16)*DPR,ay:(6+r()*16)*DPR,p1:r()*TAU,p2:r()*TAU,k1:1+(r()*2|0),k2:1+(r()*2|0),
    c:AC[r()*AC.length|0],s:(1.6+r()*2.2)*DPR});
  // connect each node to its 2-3 nearest neighbours -> synapse graph
  for(let i=0;i<N;i++){const d=[];for(let j=0;j<N;j++)if(j!==i)d.push([Math.hypot(nodes[i].bx-nodes[j].bx,nodes[i].by-nodes[j].by),j]);
    d.sort((a,b)=>a[0]-b[0]);const deg=2+(r()*2|0);
    for(let m=0;m<deg;m++){const j=d[m][1];if(j>i)edges.push({a:i,b:j,k:1+(r()*3|0),ph:r(),speed:1+(r()*2|0)});}}
}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  const bg=x.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,Math.max(W,H)*0.75);bg.addColorStop(0,'#0e0a24');bg.addColorStop(1,'#05030d');x.fillStyle=bg;x.fillRect(0,0,W,H);
  // live node positions (periodic drift)
  const P=nodes.map(n=>({x:n.bx+n.ax*Math.sin(TAU*u*n.k1+n.p1),y:n.by+n.ay*Math.sin(TAU*u*n.k2+n.p2),c:n.c,s:n.s,flare:0}));
  x.globalCompositeOperation='lighter';
  // synapse lines + travelling pulses
  for(const e of edges){const A=P[e.a],B=P[e.b],c=A.c;
    x.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},0.16)`;x.lineWidth=1*DPR;x.beginPath();x.moveTo(A.x,A.y);x.lineTo(B.x,B.y);x.stroke();
    let f=(u*e.k+e.ph)%1;f=(f+1)%1;             // pulse param 0..1 along the edge, integer k -> loops
    const px=A.x+(B.x-A.x)*f,py=A.y+(B.y-A.y)*f;
    const pg=x.createRadialGradient(px,py,0,px,py,5*DPR);pg.addColorStop(0,`rgba(${c[0]+60},${c[1]+60},${c[2]+60},0.95)`);pg.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    x.fillStyle=pg;x.beginPath();x.arc(px,py,5*DPR,0,TAU);x.fill();
    // flare the destination node as the pulse approaches its end
    if(f>0.82)P[e.b].flare=Math.max(P[e.b].flare,(f-0.82)/0.18);
    if(f<0.18)P[e.a].flare=Math.max(P[e.a].flare,(0.18-f)/0.18);}
  // nodes (soft glow, brighter on flare)
  for(const p of P){const c=p.c,R=p.s*(3+p.flare*4);
    const rg=x.createRadialGradient(p.x,p.y,0,p.x,p.y,R);
    rg.addColorStop(0,`rgba(${Math.min(255,c[0]+70)},${Math.min(255,c[1]+70)},${Math.min(255,c[2]+70)},${0.85+p.flare*0.15})`);
    rg.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);x.fillStyle=rg;x.beginPath();x.arc(p.x,p.y,R,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

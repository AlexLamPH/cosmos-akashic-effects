<!-- Cosmos Synth Keyboard: a playable 2-octave piano/synth. LIVE: click keys or press z,x,c.../q,w,e... to play real notes through oscillators with an ADSR gain envelope + lowpass filter; keys depress + glow, a level meter reacts. AUTO: a seeded pentatonic melody "plays" silently — keys light/depress in sequence, meter bars driven by sum-of-sines — looping seamlessly. Frame 0 mid-phrase with 2 keys down. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Synth Keyboard</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.panel{--acc:#8b5cff;width:716px;padding:18px;border-radius:20px;
  background:linear-gradient(165deg,rgba(28,24,46,.96),rgba(15,12,26,.97));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 30px 70px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.2)}
.top{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding:0 4px}
.title{font-size:14px;font-weight:680;color:#f2f0fa;letter-spacing:.4px;flex:0 0 auto}
.dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc)}
.meter{flex:1;height:30px;display:flex;align-items:flex-end;gap:3px;
  padding:5px 8px;border-radius:9px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
.meter i{flex:1;border-radius:2px;background:linear-gradient(180deg,#fff,var(--acc));opacity:.85;
  box-shadow:0 0 8px color-mix(in srgb,var(--acc) 55%,transparent)}
.hint{font-size:11.5px;color:#8e89ad;flex:0 0 auto;transition:opacity .3s}
.keys{position:relative;height:200px;border-radius:12px;overflow:hidden;
  background:linear-gradient(180deg,#16121f,#0c0915);border:1px solid rgba(255,255,255,.07);
  box-shadow:inset 0 6px 18px rgba(0,0,0,.5)}
.wk{position:absolute;top:0;bottom:0;border-radius:0 0 7px 7px;cursor:pointer;
  background:linear-gradient(180deg,#efeaf7,#cdc6dc 78%,#b3acc6);border:1px solid #1c1726;
  box-shadow:inset 0 -8px 14px rgba(0,0,0,.18);transition:transform .04s,filter .06s}
.wk .lab{position:absolute;bottom:9px;left:0;right:0;text-align:center;font-size:10px;color:#6a6480;font-weight:600}
.bk{position:absolute;top:0;z-index:3;border-radius:0 0 5px 5px;cursor:pointer;
  background:linear-gradient(180deg,#3a3450,#16121f 80%);border:1px solid #000;
  box-shadow:inset 0 -6px 10px rgba(0,0,0,.5),0 4px 8px rgba(0,0,0,.5);transition:transform .04s,filter .06s}
.bk .lab{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:8.5px;color:#9c95b6;font-weight:600}
.wk.on{transform:translateY(3px);filter:brightness(.97);
  background:linear-gradient(180deg,#d8ccff,#b9a8ef 80%);box-shadow:inset 0 0 16px rgba(139,92,255,.55),inset 0 -6px 12px rgba(0,0,0,.2)}
.bk.on{transform:translateY(2px);
  background:linear-gradient(180deg,#7a5cff,#4a37b0 85%);box-shadow:inset 0 0 14px rgba(170,140,255,.7),0 2px 6px rgba(0,0,0,.5)}
</style></head>
<body><div id="stage">
  <div class="panel" id="panel">
    <div class="top">
      <span class="dot"></span><span class="title">SYNTH</span>
      <div class="meter" id="meter"></div>
      <span class="hint" id="hint">▶ click / press a key</span>
    </div>
    <div class="keys" id="keys"></div>
  </div>
</div>
<script>
const LOOP=6000, NW=14, NBARS=22;
// 2 octaves of C major white keys, semitone offsets from C3 (base 130.81Hz)
const WHITE=[0,2,4,5,7,9,11,12,14,16,17,19,21,23];          // semitones
const WLAB=['Z','X','C','V','B','N','M','Q','W','E','R','T','Y','U'];
// black keys: position (white index it sits after) + semitone
const BLACKS=[{w:0,s:1,l:'S'},{w:1,s:3,l:'D'},{w:3,s:6,l:'G'},{w:4,s:8,l:'H'},{w:5,s:10,l:'J'},
  {w:7,s:13,l:'2'},{w:8,s:15,l:'3'},{w:10,s:18,l:'5'},{w:11,s:20,l:'6'},{w:12,s:22,l:'7'}];
const BASE=130.81; // C3
const keysE=document.getElementById('keys'),meterE=document.getElementById('meter'),hintE=document.getElementById('hint');
const KW=716-36-2, ww=KW/NW;                                // white key width
const whiteEls=[],blackEls=[];
for(let i=0;i<NW;i++){const d=document.createElement('div');d.className='wk';
  d.style.left=(i*ww)+'px';d.style.width=(ww-1)+'px';
  d.innerHTML='<span class="lab">'+WLAB[i]+'</span>';keysE.appendChild(d);whiteEls.push(d);}
for(const b of BLACKS){const d=document.createElement('div');d.className='bk';
  const bw=ww*0.62;d.style.left=((b.w+1)*ww-bw/2)+'px';d.style.width=bw+'px';d.style.height='124px';
  d.innerHTML='<span class="lab">'+b.l+'</span>';keysE.appendChild(d);blackEls.push(d);}
const bars=[];for(let i=0;i<NBARS;i++){const b=document.createElement('i');meterE.appendChild(b);bars.push(b);}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(7);
const TAU=Math.PI*2;
// seeded pentatonic phrase (indices into a white-key pentatonic-ish subset) over the loop
const PENT=[0,2,4,7,9,11,7,4];                              // white-key indices
const STEPS=16, SEQ=[], DUR=[];
for(let i=0;i<STEPS;i++){SEQ.push(PENT[Math.floor(rnd()*PENT.length)]);DUR.push(0.6+rnd()*0.4);}
// occasional black-key sparkle
const BSEQ=[];for(let i=0;i<STEPS;i++)BSEQ.push(rnd()<0.28?Math.floor(rnd()*BLACKS.length):-1);
const PHASE=[],FREQ=[],AMP=[];
for(let i=0;i<NBARS;i++){PHASE.push(rnd()*TAU);FREQ.push(1.6+rnd()*3.4);AMP.push(.55+rnd()*.45);}
function semitone(white){return WHITE[white];}

function render(u){
  // step through the phrase; offset so frame 0 sits mid-phrase in the key-overlap (2 keys down)
  const p=(u+0.1845)%1, fpos=p*STEPS, step=Math.floor(fpos), frac=fpos-step;
  const cur=SEQ[step%STEPS], nxt=SEQ[(step+1)%STEPS];
  const curB=BSEQ[step%STEPS];
  // envelope of current note: bright at attack, fading over the step
  let env=Math.exp(-frac*2.4);
  // clear
  for(let i=0;i<NW;i++)whiteEls[i].classList.remove('on');
  for(let i=0;i<BLACKS.length;i++)blackEls[i].classList.remove('on');
  // light current white key; also light the just-released previous one faintly via overlap near step edge
  whiteEls[cur].classList.add('on');
  if(frac<0.25){whiteEls[SEQ[(step-1+STEPS)%STEPS]].classList.add('on');}  // overlap → 2 keys down
  if(curB>=0)blackEls[curB].classList.add('on');
  // meter: sum-of-sines, scaled by the note envelope so it pulses on each step
  const ph=u*TAU;
  for(let i=0;i<NBARS;i++){
    const a=0.5+0.5*Math.sin(ph*FREQ[i]+PHASE[i]);
    const b=0.5+0.5*Math.sin(ph*FREQ[i]*0.5+PHASE[i]*1.7);
    const h=(0.12+0.88*Math.pow(a*0.65+b*0.35,1.3))*AMP[i]*(0.45+0.55*env);
    bars[i].style.height=(8+h*20).toFixed(1)+'%';
    bars[i].style.opacity=(0.5+0.45*h).toFixed(2);
  }
}

// ---- LIVE audio (synthesis) ----
let actx,master;
function audio(){if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain();master.gain.value=0.22;
  const comp=actx.createDynamicsCompressor();master.connect(comp);comp.connect(actx.destination);}
  if(actx.state==='suspended')actx.resume();return actx;}
function play(st){const a=audio();const f=BASE*Math.pow(2,st/12);
  const o=a.createOscillator(),o2=a.createOscillator(),g=a.createGain(),lp=a.createBiquadFilter();
  o.type='sawtooth';o2.type='triangle';o.frequency.value=f;o2.frequency.value=f*2.005;
  lp.type='lowpass';lp.frequency.value=f*6+400;lp.Q.value=0.8;
  const t=a.currentTime;g.gain.setValueAtTime(0,t);                     // ADSR
  g.gain.linearRampToValueAtTime(0.9,t+0.012);                          // attack
  g.gain.linearRampToValueAtTime(0.55,t+0.12);                          // decay→sustain
  g.gain.setTargetAtTime(0,t+0.18,0.34);                                // release
  lp.frequency.setTargetAtTime(f*2.4+300,t+0.02,0.25);
  o.connect(lp);o2.connect(lp);lp.connect(g);g.connect(master);
  o.start(t);o2.start(t);o.stop(t+1.6);o2.stop(t+1.6);}
function flash(el){if(!el)return;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),150);}
// click handlers
whiteEls.forEach((el,i)=>el.addEventListener('pointerdown',e=>{e.preventDefault();play(semitone(i));flash(el);hideHint();}));
blackEls.forEach((el,i)=>el.addEventListener('pointerdown',e=>{e.preventDefault();play(BLACKS[i].s);flash(el);hideHint();}));
const KEYMAP={};WLAB.forEach((k,i)=>KEYMAP[k.toLowerCase()]={st:semitone(i),el:whiteEls[i]});
BLACKS.forEach((b,i)=>KEYMAP[b.l.toLowerCase()]={st:b.s,el:blackEls[i]});
const held={};
function hideHint(){hintE.style.opacity='0';}

const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else{
  window.addEventListener('keydown',e=>{const m=KEYMAP[e.key.toLowerCase()];
    if(m&&!held[e.key]){held[e.key]=1;play(m.st);m.el.classList.add('on');hideHint();}});
  window.addEventListener('keyup',e=>{const m=KEYMAP[e.key.toLowerCase()];
    if(m){held[e.key]=0;m.el.classList.remove('on');}});
  const s=performance.now();
  (function l(n){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l);})(performance.now());
}
</script></body></html>

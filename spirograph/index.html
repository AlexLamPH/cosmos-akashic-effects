<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Spirograph</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Spirograph — layered hypotrochoid curves being traced and slowly rotating, glowing additively. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
let W,H,DPR,cx,cy,scale,curves=[];
// seeded RNG (mulberry32)
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function gcd(a,b){return b?gcd(b,a%b):a;}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;scale=Math.min(W,H)*0.46;
  const r=mul(13);curves=[];
  for(let i=0;i<6;i++){
    const R=3+(r()*5|0);              // fixed circle radius (integer)
    let rr=1+(r()*4|0); if(rr>=R)rr=R-1; if(rr<1)rr=1; // rolling circle radius
    const d=0.6+r()*1.1;              // pen offset factor -> petal shape
    // period in revolutions so the curve closes: petals = R/gcd(R,rr)
    const reps=R/gcd(R,rr);
    const col=AC[i%AC.length];
    const sz=(0.55-i*0.05);          // outer rings larger
    curves.push({R,rr,d,reps,col,sz:0.55+i*0.06,phase:r(),dir:i%2?1:-1});
  }}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);                 // full repaint each frame (pure of t)
  x.globalCompositeOperation='lighter';
  // soft central glow
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,scale*0.9);
  cg.addColorStop(0,'rgba(139,92,255,0.18)');cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);
  curves.forEach((c,ci)=>{
    const spin=c.dir*u*TAU + c.phase*TAU;                    // one full rotation per loop -> seamless
    const k=(c.R-c.rr)/c.rr, ringR=scale*(0.92-ci*0.12);     // concentric layers
    const SEG=900, span=c.reps*TAU;
    // pen tip traces along the curve, returning to start at u=1 (closed)
    const tip=u*c.reps;                                       // revolutions completed = integer at u=1
    const col=c.col;
    x.lineWidth=Math.max(1,c.sz*DPR);
    for(let pass=0;pass<1;pass++){
      x.beginPath();
      for(let s=0;s<=SEG;s++){
        const th=s/SEG*span;
        const a1=th, a2=k*th;
        let px=(c.R-c.rr)*Math.cos(a1)+c.rr*c.d*Math.cos(a2);
        let py=(c.R-c.rr)*Math.sin(a1)-c.rr*c.d*Math.sin(a2);
        const sc=ringR/(c.R*(1+c.d));
        const rx=px*sc, ry=py*sc;
        const cos=Math.cos(spin),sin=Math.sin(spin);
        const X=cx+rx*cos-ry*sin, Y=cy+rx*sin+ry*cos;
        if(s===0)x.moveTo(X,Y);else x.lineTo(X,Y);
      }
      // colour shifts hue brightness with u for life
      const a=0.45+0.3*Math.sin(TAU*(u+ci/6));
      x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${a})`;
      x.stroke();
    }
    // glowing pen head at the live trace point
    const th=tip*TAU, a2=k*th;
    let px=(c.R-c.rr)*Math.cos(th)+c.rr*c.d*Math.cos(a2);
    let py=(c.R-c.rr)*Math.sin(th)-c.rr*c.d*Math.sin(a2);
    const sc=ringR/(c.R*(1+c.d));
    const rx=px*sc, ry=py*sc, cos=Math.cos(spin),sin=Math.sin(spin);
    const X=cx+rx*cos-ry*sin, Y=cy+rx*sin+ry*cos;
    x.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},0.9)`;
    x.beginPath();x.arc(X,Y,3.2*DPR,0,TAU);x.fill();
  });
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

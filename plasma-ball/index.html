<!doctype html><meta charset=utf8><title>Cosmos Plasma Ball</title>
<!-- Cosmos Plasma Ball — seeded crackling filaments writhe from a bright core to the glass sphere, strobing on integer harmonics, deterministic & seamless. -->
<style>html,body{margin:0;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H,CX,CY,R;
const LOOP=8000, TWO=Math.PI*2;
const PAL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let fils=[];
function build(){
  R=Math.min(W,H)*0.40; CX=W/2; CY=H/2; fils=[];
  const NF=14;                                   // electric filaments reaching to glass edge
  for(let f=0;f<NF;f++){
    const rnd=mulberry32(2025+f*733);
    const baseAng=(f/NF)*TWO + (rnd()-0.5)*0.5;
    const col=PAL[f%3];                            // violet/cosmic/nebula bias
    const harm=1+(f%4);                            // integer flickers per loop
    const phase=rnd();
    const swirl=(0.6+rnd()*1.2)*(rnd()<0.5?-1:1);  // angular writhe amplitude
    const wk=1+Math.floor(rnd()*3);                // integer writhe harmonic
    // jagged branching path in normalized radius [0..1], stored as polar offsets
    const node=[],branch=[];
    function jag(r0,a0,r1,a1,disp,depth,out){
      if(depth<=0){out.push([r0,a0,r1,a1]);return;}
      const rm=(r0+r1)/2, am=(a0+a1)/2+(rnd()-0.5)*disp;
      jag(r0,a0,rm,am,disp*0.6,depth-1,out);
      jag(rm,am,r1,a1,disp*0.6,depth-1,out);
      if(depth===3&&rnd()<0.55){const bl=[],ea=am+(rnd()-0.5)*0.8,er=Math.min(1,rm+0.2+rnd()*0.25);jag(rm,am,er,ea,disp*0.8,2,bl);branch.push(bl);}
    }
    jag(0.06,baseAng,1.0,baseAng+(rnd()-0.5)*0.7,0.55,4,node);
    fils.push({col,harm,phase,swirl,wk,node,branch});
  }
}
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;build();}
addEventListener('resize',resize);resize();
function P(r,a){return [CX+Math.cos(a)*r*R, CY+Math.sin(a)*r*R];}
function drawFil(segs,wob,w,col,alpha){
  ctx.strokeStyle=col;ctx.globalAlpha=alpha;ctx.lineWidth=w;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){const a0=s[1]+wob*Math.sin(s[0]*5),a1=s[3]+wob*Math.sin(s[2]*5);
    const p0=P(s[0],a0),p1=P(s[2],a1);ctx.moveTo(p0[0],p0[1]);ctx.lineTo(p1[0],p1[1]);}
  ctx.stroke();
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  // glass sphere ambient bulb glow
  let g=ctx.createRadialGradient(CX,CY,0,CX,CY,R*1.12);
  g.addColorStop(0,'rgba(139,92,255,0.22)');g.addColorStop(0.55,'rgba(70,180,255,0.12)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha=1;ctx.fillStyle=g;ctx.beginPath();ctx.arc(CX,CY,R*1.12,0,7);ctx.fill();
  // filaments
  for(const fl of fils){
    const ph=((u*fl.harm)+fl.phase)%1;
    const flash=0.4+0.6*(Math.exp(-ph*5)+0.4*Math.exp(-((ph-0.5)**2)*30));
    const wob=fl.swirl*0.10*Math.sin(TWO*u*fl.wk);          // seamless writhe
    drawFil(fl.node,wob,7*DPR,fl.col,flash*0.18);
    drawFil(fl.node,wob,3*DPR,fl.col,Math.min(1,flash*0.55));
    drawFil(fl.node,wob,1.3*DPR,'#ffffff',Math.min(1,flash*0.7));
    for(const br of fl.branch){drawFil(br,wob,2.2*DPR,fl.col,flash*0.5);drawFil(br,wob,0.9*DPR,'#ffffff',flash*0.45);}
  }
  // bright pulsing core
  const cp=0.85+0.15*Math.sin(TWO*u*2);
  let cg=ctx.createRadialGradient(CX,CY,0,CX,CY,R*0.34);
  cg.addColorStop(0,'rgba(255,255,255,'+(0.95*cp)+')');cg.addColorStop(0.3,'rgba(180,150,255,'+(0.7*cp)+')');
  cg.addColorStop(0.7,'rgba(139,92,255,0.35)');cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha=1;ctx.fillStyle=cg;ctx.beginPath();ctx.arc(CX,CY,R*0.34,0,7);ctx.fill();
  // glass rim highlight
  ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.5;ctx.lineWidth=2*DPR;
  ctx.strokeStyle='rgba(120,180,255,0.5)';ctx.beginPath();ctx.arc(CX,CY,R,0,7);ctx.stroke();
  ctx.globalAlpha=0.3;ctx.strokeStyle='#ffffff';ctx.lineWidth=1.2*DPR;
  ctx.beginPath();ctx.arc(CX-R*0.25,CY-R*0.28,R*0.55,-2.4,-1.2);ctx.stroke();
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Dropdown Menu</title><style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center}
#scrim{position:fixed;inset:0;background:radial-gradient(120% 90% at 50% 12%,rgba(139,92,255,.10),transparent 60%)}
.wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:14px}
.trigger{position:relative;display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:12px;
  font-size:14.5px;font-weight:600;color:#e7e3f4;cursor:pointer;user-select:none;
  background:linear-gradient(180deg,rgba(40,33,62,.9),rgba(26,21,42,.92));
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 10px 30px -10px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06)}
.trigger.open{border-color:rgba(139,92,255,.45);box-shadow:0 10px 30px -8px rgba(139,92,255,.4),inset 0 1px 0 rgba(255,255,255,.08)}
.trigger .av{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;flex:none;
  background:linear-gradient(135deg,#8b5cff,#46b4ff);color:#fff;font-size:12px;font-weight:800}
.trigger .chev{width:16px;height:16px;color:#9a93ba;transition:transform .25s}
.menu{position:absolute;top:54px;left:50%;width:248px;transform-origin:top center;
  border-radius:14px;padding:7px;overflow:hidden;
  background:linear-gradient(180deg,rgba(30,25,49,.86),rgba(19,15,33,.9));
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 30px 70px -18px rgba(0,0,0,.72),0 0 0 1px rgba(139,92,255,.07),inset 0 1px 0 rgba(255,255,255,.06)}
.glow{position:absolute;left:7px;right:7px;height:40px;top:0;border-radius:10px;pointer-events:none;
  background:linear-gradient(90deg,rgba(139,92,255,.22),rgba(139,92,255,.09));
  border:1px solid rgba(139,92,255,.42);
  box-shadow:0 0 22px -4px rgba(139,92,255,.5),inset 0 1px 0 rgba(255,255,255,.07)}
.item{position:relative;display:flex;align-items:center;gap:12px;height:40px;padding:0 11px;border-radius:10px;
  cursor:pointer;z-index:1}
.item .ico{width:18px;height:18px;flex:none;color:#b3acce}
.item .lbl{flex:1;font-size:14px;font-weight:500;color:#d7d2ea}
.item .sc{font-size:11px;color:#7d769c;font-weight:600;letter-spacing:.5px}
.item.hot .lbl{color:#fff}.item.hot .ico{color:#c6b8ff}
.item.danger .ico,.item.danger .lbl{color:#ff8a78}
.item.danger.hot .lbl{color:#ff9d8c}.item.danger.hot .ico{color:#ff9d8c}
.sep{height:1px;margin:6px 9px;background:rgba(255,255,255,.08)}
.glow.danger{background:linear-gradient(90deg,rgba(255,106,61,.20),rgba(255,90,90,.08));
  border-color:rgba(255,106,61,.4);box-shadow:0 0 22px -4px rgba(255,106,61,.45),inset 0 1px 0 rgba(255,255,255,.06)}
.hint{font-size:11px;color:#5f5980;letter-spacing:.3px}
</style></head>
<body><div id="scrim"></div>
<div class="wrap">
  <div class="trigger" id="trigger">
    <span class="av">AC</span>
    <span>Account</span>
    <svg class="chev" id="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
  </div>
  <div class="menu" id="menu">
    <div class="glow" id="glow"></div>
    <div id="items"></div>
  </div>
  <div class="hint">Hover · click an item · destructive action in red</div>
</div>
<script>
const I={
 user:'<circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/>',
 settings:'<circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.3l2-1.5-2-3.4-2.4 1a7 7 0 0 0-2.2-1.3L14 2h-4l-.3 2.5a7 7 0 0 0-2.2 1.3l-2.4-1-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .9.1 1.3l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 2.2 1.3L10 22h4l.3-2.5a7 7 0 0 0 2.2-1.3l2.4 1 2-3.4-2-1.5c.1-.4.1-.9.1-1.3z"/>',
 card:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>',
 bell:'<path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>',
 logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/>'
};
const ITEMS=[
 {ic:'user',l:'Profile',sc:'⌘P'},
 {ic:'settings',l:'Settings',sc:'⌘,'},
 {ic:'card',l:'Billing',sc:''},
 {ic:'bell',l:'Notifications',sc:''},
 {sep:true},
 {ic:'logout',l:'Sign out',sc:'⇧⌘Q',danger:true}
];
const menu=document.getElementById('menu'),itemsEl=document.getElementById('items'),
      glow=document.getElementById('glow'),trigger=document.getElementById('trigger'),
      chev=document.getElementById('chev');
function svg(n){return '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+I[n]+'</svg>';}
// build rows once
const rowEls=[]; // index in ITEMS -> element (null for sep)
let html='';
ITEMS.forEach((it,i)=>{ if(it.sep){html+='<div class="sep"></div>';}
  else html+='<div class="item'+(it.danger?' danger':'')+'" data-i="'+i+'">'+svg(it.ic)+'<span class="lbl">'+it.l+'</span><span class="sc">'+it.sc+'</span></div>';});
itemsEl.innerHTML=html;
ITEMS.forEach((it,i)=>{ rowEls[i]= it.sep?null:itemsEl.querySelector('[data-i="'+i+'"]'); });
// selectable item indices (non-sep)
const SEL=ITEMS.map((it,i)=>it.sep?-1:i).filter(i=>i>=0);

function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function lerp(a,b,t){return a+(b-a)*t;}

function render(u){
  // phases: openMenu(stagger) -> hover walk down -> hold last -> close -> pause
  // returns visual state purely from u
  let openP, hover; // openP 0..1 menu visibility, hover = fractional position over SEL (or -1)
  if(u<0.16){ openP=ease(u/0.16); hover=-1; }
  else if(u<0.30){ openP=1; hover=-1; }            // open, no hover yet
  else if(u<0.74){ openP=1;                          // walk hover down list
     const p=(u-0.30)/0.44; hover=p*(SEL.length-0.001); }
  else if(u<0.84){ openP=1; hover=SEL.length-1; }   // hold on destructive
  else if(u<0.93){ openP=1-ease((u-0.84)/0.09); hover=-1; } // close
  else { openP=0; hover=-1; }                        // pause closed

  // menu container: scale + fade + slight rise
  menu.style.opacity = openP.toFixed(3);
  const sc=lerp(0.92,1,openP), ty=lerp(-8,0,openP);
  menu.style.transform='translateX(-50%) translateY('+ty.toFixed(2)+'px) scale('+sc.toFixed(3)+')';
  menu.style.pointerEvents = openP>0.5?'auto':'none';
  trigger.classList.toggle('open', openP>0.5);
  chev.style.transform='rotate('+(openP*180).toFixed(1)+'deg)';

  // staggered per-item entrance: each item fades/slides based on openP vs its rank
  let rank=0;
  ITEMS.forEach((it,i)=>{ const el=rowEls[i]; if(!el)return;
    const start=rank*0.13, span=0.5; rank++;
    const ip=Math.max(0,Math.min(1,(openP-start)/span));
    const e=ease(ip);
    el.style.opacity=e.toFixed(3);
    el.style.transform='translateY('+lerp(8,0,e).toFixed(2)+'px)';
  });

  // hover highlight glides between item rows (geometry-based)
  if(hover>=0 && openP>0.6){
    const idx=Math.max(0,Math.min(SEL.length-1,Math.round(hover)));
    // glide position: interpolate top between adjacent rows
    const lo=Math.floor(hover), hi=Math.min(SEL.length-1,lo+1), f=hover-lo;
    const elLo=rowEls[SEL[Math.min(lo,SEL.length-1)]], elHi=rowEls[SEL[hi]];
    const topLo=elLo.offsetTop, topHi=elHi.offsetTop, hLo=elLo.offsetHeight, hHi=elHi.offsetHeight;
    const top=lerp(topLo,topHi,f), h=lerp(hLo,hHi,f);
    glow.style.opacity='1';
    glow.style.top=top.toFixed(1)+'px';
    glow.style.height=h.toFixed(1)+'px';
    glow.classList.toggle('danger', ITEMS[SEL[idx]].danger===true);
    // mark hot row
    ITEMS.forEach((it,i)=>{ const el=rowEls[i]; if(el) el.classList.toggle('hot', i===SEL[idx]); });
  } else {
    glow.style.opacity='0';
    ITEMS.forEach((it,i)=>{ const el=rowEls[i]; if(el) el.classList.remove('hot'); });
  }
}

const LOOP=6400, OFF=0.50;  // frame-0: menu open, hover mid-list
function frame(u){render(((u+OFF)%1+1)%1);}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>frame(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else { const s=performance.now(); (function l(n){ frame((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l);})(performance.now()); }
</script></body></html>

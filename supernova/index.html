<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Supernova</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Supernova — bright core flashes, then an expanding shockwave ring + radial debris streaks blast outward and fade, looping cleanly. Canvas 2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const TAU=Math.PI*2,LOOP=7000;
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mul(0x5197a);
const COL=[[255,255,255],[224,178,74],[255,106,61],[255,92,194],[139,92,255],[70,180,255]];
let W,H,DPR,cx,cy,maxR,deb=[];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;maxR=Math.hypot(W,H)*0.5;
  const r=mul(0x5197a);deb=[];const M=120;
  for(let i=0;i<M;i++)deb.push({a:i/M*TAU+(r()-0.5)*0.25,sp:0.55+r()*0.45,len:0.04+r()*0.10,w:0.6+r()*1.6,c:COL[(r()*COL.length)|0],ph:r()*0.18});}
rs();addEventListener('resize',rs);
// ease helpers
function smooth(e){return e<0?0:e>1?1:e*e*(3-2*e);}
function frame(t){let u=((t%LOOP)+LOOP)%LOOP/LOOP;
  // offset so t=0 is mid-blast (rich frame 0): shift the burst phase
  const p=(u+0.32)%1;                       // p: 0=detonation .. 1=faded back to calm
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // ---- expanding shockwave ring ----
  const expo=smooth(Math.pow(p,0.6));        // fast then slowing expansion
  const rad=maxR*expo;
  const ringFade=(1-p)*(1-p);                // fades as it grows
  if(rad>2&&ringFade>0.003){
    for(let pass=0;pass<2;pass++){
      const lw=(pass?5:16)*DPR*(0.3+0.7*ringFade);
      x.lineWidth=lw;x.strokeStyle=`rgba(${pass?255:255},${pass?245:150},${pass?210:90},${(pass?0.85:0.4)*ringFade})`;
      x.beginPath();x.arc(cx,cy,rad,0,TAU);x.stroke();}
    // inner secondary thin ring
    x.lineWidth=2*DPR;x.strokeStyle=`rgba(139,92,255,${0.5*ringFade})`;
    x.beginPath();x.arc(cx,cy,rad*0.82,0,TAU);x.stroke();
  }
  // ---- radial debris streaks ----
  for(const d of deb){const dp=Math.max(0,p-d.ph);
    const reach=smooth(Math.pow(dp,0.55))*d.sp;     // streak head distance (frac of maxR)
    if(reach<=0.001)continue;
    const r1=reach*maxR, r0=Math.max(0,r1-d.len*maxR*(0.5+reach));
    const fade=(1-p)*(1-p)*Math.min(1,reach*4);
    const c=d.c,ca=Math.cos(d.a),sa=Math.sin(d.a);
    const lg=x.createLinearGradient(cx+ca*r0,cy+sa*r0,cx+ca*r1,cy+sa*r1);
    lg.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    lg.addColorStop(1,`rgba(${Math.min(255,c[0]+40)},${Math.min(255,c[1]+40)},${Math.min(255,c[2]+40)},${0.85*fade})`);
    x.strokeStyle=lg;x.lineWidth=d.w*DPR;x.lineCap='round';
    x.beginPath();x.moveTo(cx+ca*r0,cy+sa*r0);x.lineTo(cx+ca*r1,cy+sa*r1);x.stroke();}
  // ---- core flash ----
  const flash=Math.pow(1-Math.min(1,p/0.45),2);     // brilliant at detonation, decays
  const glow=0.18+0.55*flash;                        // residual afterglow always present
  const cr=maxR*(0.10+0.34*flash);
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,cr);
  cg.addColorStop(0,`rgba(255,255,255,${0.6+0.4*flash})`);
  cg.addColorStop(0.25,`rgba(255,235,170,${0.5*glow+0.3*flash})`);
  cg.addColorStop(0.55,`rgba(255,106,61,${0.4*glow})`);
  cg.addColorStop(0.8,`rgba(139,92,255,${0.25*glow})`);
  cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.beginPath();x.arc(cx,cy,cr,0,TAU);x.fill();
  // white-hot core dot
  x.fillStyle=`rgba(255,255,255,${0.5+0.5*flash})`;
  x.beginPath();x.arc(cx,cy,maxR*0.02*(0.6+flash),0,TAU);x.fill();
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

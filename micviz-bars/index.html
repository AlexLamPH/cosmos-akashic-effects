<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Mic Bars</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}
canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:2;
font:600 13px/1 system-ui,sans-serif;color:#cbd5ff;background:rgba(20,12,40,.55);
border:1px solid rgba(120,90,255,.5);border-radius:20px;padding:9px 16px;letter-spacing:.4px;
cursor:pointer;backdrop-filter:blur(6px);transition:opacity .6s;user-select:none}
</style></head>
<body><canvas id="c"></canvas><div id="hint">🎤 enable mic</div><script>
// Cosmos Mic Bars — classic spectrum bar visualizer: ~48 vertical bars with mirrored reflection,
// per-bar Cosmos gradient, peak-hold caps, and a level-driven glow. Reacts to the live microphone;
// gracefully falls back to a deterministic synthetic spectrum when the mic is unavailable/denied or in AUTO.
const cv=document.getElementById('c'),x=cv.getContext('2d'),hint=document.getElementById('hint');
const LOOP=8400,TAU=6.283185307;
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const BINS=64, BARS=48;
// ---- deterministic seeded RNG (mulberry32, seeded ONCE) ----
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rnd=mb(0x51A11);
const formant=[];for(let k=0;k<5;k++)formant.push({c:0.10+0.78*rnd(),w:0.06+0.16*rnd(),sp:1+((rnd()*4)|0),ph:rnd()*TAU,a:0.5+0.6*rnd()});
// ---- synthSpectrum(u): pure deterministic function of u in [0,1) → {spec[64],level} ----
function synthSpectrum(u){
  const spec=new Float32Array(BINS);
  // beat kick: sharp attack + decay, 4 beats per loop
  const bp=(u*4)%1; const kick=Math.pow(1-bp,2.4);
  let sum=0;
  for(let b=0;b<BINS;b++){
    const f=b/(BINS-1);
    let v=0;
    for(const fo of formant){
      const c=(fo.c+0.05*Math.sin(TAU*fo.sp*u+fo.ph)); // moving formant center
      const d=(f-c)/fo.w;
      v+=fo.a*Math.exp(-d*d);
    }
    // bass emphasis + per-bin shimmer that returns at u=1
    v*=(1.0-0.55*f);
    v+=0.12*(0.5+0.5*Math.sin(TAU*(3*u)+b*0.5));
    v+=kick*(0.9*Math.exp(-f*5.0));      // kick lives in the low bins
    v=Math.max(0,v);
    spec[b]=v;
  }
  // normalise to ~0..1 and compute level
  let mx=0.0001;for(let b=0;b<BINS;b++)mx=Math.max(mx,spec[b]);
  for(let b=0;b<BINS;b++){spec[b]=Math.min(1,spec[b]/(mx*0.95));sum+=spec[b];}
  const level=Math.min(1,(sum/BINS)*1.4+kick*0.25);
  return {spec,level};
}
// ---- canvas + state ----
let W,H,DPR,base,maxH; const peaks=new Float32Array(BARS);
function rs(){DPR=Math.min(devicePixelRatio||1,2);
  W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  base=H*0.62;maxH=H*0.46;}
rs();addEventListener('resize',rs);
// sample BARS heights from BINS spectrum
function binAt(spec,bi){const f=bi/(BARS-1)*(BINS-1);const i=f|0;const fr=f-i;const a=spec[i]||0,b=spec[Math.min(BINS-1,i+1)]||0;return a+(b-a)*fr;}
// ---- render(spec,level,t): draws the scene from an abstract spectrum ----
function render(spec,level,t){
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const padL=W*0.05,padR=W*0.05,gap=W*0.004;
  const slot=(W-padL-padR)/BARS,bw=slot-gap;
  const glow=0.5+level*0.9;
  x.globalCompositeOperation='lighter';
  for(let i=0;i<BARS;i++){
    let v=binAt(spec,i);v=Math.max(0.03,v);
    const h=v*maxH;const bx=padL+i*slot;const col=COL[i%6];
    // peak-hold cap
    if(h>peaks[i])peaks[i]=h;else peaks[i]=Math.max(h,peaks[i]-maxH*0.012);
    // bar (up) Cosmos gradient
    let g=x.createLinearGradient(0,base-h,0,base);
    g.addColorStop(0,col);g.addColorStop(0.6,col);g.addColorStop(1,'#0a0618');
    x.fillStyle=g;x.globalAlpha=0.92;x.fillRect(bx,base-h,bw,h);
    // glow cap (brightens with level)
    x.globalAlpha=Math.min(1,0.6*glow);x.fillStyle=col;
    x.fillRect(bx,base-h,bw,Math.max(2*DPR,h*0.07));
    // peak-hold cap marker
    x.globalAlpha=0.85;x.fillStyle='#eef3ff';
    x.fillRect(bx,base-peaks[i]-3*DPR,bw,3*DPR);
    // mirrored reflection (under, fading)
    let gr=x.createLinearGradient(0,base,0,base+h*0.65);
    gr.addColorStop(0,col);gr.addColorStop(1,'#05030d');
    x.fillStyle=gr;x.globalAlpha=0.26+level*0.12;x.fillRect(bx,base,bw,h*0.65);
  }
  // baseline shimmer (glow scales with level)
  x.globalAlpha=0.35+level*0.4;x.fillStyle='#46b4ff';
  x.fillRect(padL,base-DPR,W-padL-padR,2*DPR);
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}
// ---- live microphone path (LIVE only; NEVER in AUTO) ----
let useSynth=true, analyser=null, freq=null;
async function mic(){
  const AC=window.AudioContext||window.webkitAudioContext;
  const ctx=new AC();
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  const src=ctx.createMediaStreamSource(s);
  const an=ctx.createAnalyser();an.fftSize=128;an.smoothingTimeConstant=0.8;
  src.connect(an);analyser=an;freq=new Uint8Array(an.frequencyBinCount);
  useSynth=false;
}
function liveSpectrum(){
  // pull from analyser → spec[64] + level (RMS)
  analyser.getByteFrequencyData(freq);
  const spec=new Float32Array(BINS);let sum=0,sq=0;
  for(let b=0;b<BINS;b++){const v=(freq[b]||0)/255;spec[b]=v;sum+=v;sq+=v*v;}
  const level=Math.min(1,Math.sqrt(sq/BINS)*1.6);
  return {spec,level};
}
function startLiveLoop(){
  const s=performance.now();
  (function loop(now){
    const t=now-s;
    if(useSynth){const u=((t%LOOP)+LOOP)%LOOP/LOOP;const g=synthSpectrum(u);render(g.spec,g.level,u);}
    else{const g=liveSpectrum();render(g.spec,g.level,(t%LOOP)/LOOP);}
    requestAnimationFrame(loop);
  })(performance.now());
}
function armMic(){
  mic().then(()=>{hint.textContent='🎤 listening';setTimeout(()=>hint.style.opacity='0',1400);})
       .catch(()=>{useSynth=true;hint.style.opacity='0';});
}
hint.addEventListener('pointerdown',armMic);
// ---- mode switch (EXACT ending per spec) ----
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){ window.__seek=t=>{const u=((t%LOOP)+LOOP)%LOOP/LOOP; const s=synthSpectrum(u); render(s.spec,s.level,u);}; window.__seek(0); window.__ready=true; } else { let useSynthLocal=true; /* attract loop uses synth; on first gesture try mic()->on success drive from analyser, on failure keep synth */ startLiveLoop(); }
</script></body></html>

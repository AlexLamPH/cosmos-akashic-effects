<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Synthwave Grid</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#0a0420}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Synthwave Grid — neon perspective grid scrolling toward the viewer + a slit sun. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=6000,TAU=6.28318;
let W,H,DPR,hz;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';hz=H*0.52;}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  // sky
  const sky=x.createLinearGradient(0,0,0,hz);sky.addColorStop(0,'#160a33');sky.addColorStop(1,'#3a1152');x.fillStyle=sky;x.fillRect(0,0,W,hz);
  // sun
  const cx=W/2,sy=hz-H*0.13,sr=Math.min(W,H)*0.16;
  const sg=x.createRadialGradient(cx,sy,0,cx,sy,sr*1.4);sg.addColorStop(0,'#ffe17a');sg.addColorStop(0.5,'#ff8ad0');sg.addColorStop(1,'rgba(255,90,194,0)');
  x.fillStyle=sg;x.beginPath();x.arc(cx,sy,sr*1.4,0,TAU);x.fill();
  x.save();x.beginPath();x.arc(cx,sy,sr,0,TAU);x.clip();const sun=x.createLinearGradient(0,sy-sr,0,sy+sr);sun.addColorStop(0,'#ffe892');sun.addColorStop(1,'#ff4fb0');x.fillStyle=sun;x.fillRect(cx-sr,sy-sr,sr*2,sr*2);
  x.globalCompositeOperation='destination-out';x.fillStyle='#000';for(let i=0;i<7;i++){const yy=sy+sr*0.15+i*sr*0.16;x.fillRect(cx-sr,yy,sr*2,sr*0.05+i*sr*0.012);}x.restore();
  // ground
  x.fillStyle='#0a0420';x.fillRect(0,hz,W,H-hz);
  x.globalCompositeOperation='lighter';
  // vertical converging lines
  const van=cx;x.strokeStyle='rgba(120,80,255,0.5)';x.lineWidth=1.3*DPR;
  for(let i=-10;i<=10;i++){const bx=van+i*(W*0.13);x.beginPath();x.moveTo(van,hz);x.lineTo(bx,H);x.stroke();}
  // horizontal lines scrolling toward viewer (perspective)
  const K=14;for(let k=0;k<K;k++){const p=((u+k/K)%1);const d=p*p;const y=hz+(H-hz)*d;const a=0.15+0.7*p;
    x.strokeStyle=`rgba(255,90,194,${a})`;x.lineWidth=(0.6+p*2)*DPR;x.beginPath();x.moveTo(0,y);x.lineTo(W,y);x.stroke();}
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

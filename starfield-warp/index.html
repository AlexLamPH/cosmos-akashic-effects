<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Starfield Warp</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#04030c}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Starfield Warp — hyperspace star streaks accelerating outward. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=5000,TAU=6.28318;
let W,H,DPR,cx,cy,maxR,stars=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[210,225,255],[160,140,255],[120,200,255],[255,150,220]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  cx=W/2;cy=H/2;maxR=Math.hypot(W,H)*0.6;const r=rnd(3);stars=[];
  for(let i=0;i<260;i++)stars.push({a:r()*TAU,ph:r(),c:AC[r()*AC.length|0],w:0.6+r()*1.6});}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#04030c';x.fillRect(0,0,W,H);x.globalCompositeOperation='lighter';x.lineCap='round';
  for(const s of stars){const p=((u+s.ph)%1);const r1=p*p*maxR, r0=Math.max(0,(p-0.06))*Math.max(0,(p-0.06))*maxR;
    const ca=Math.cos(s.a),sa=Math.sin(s.a);const x1=cx+ca*r1,y1=cy+sa*r1,x0=cx+ca*r0,y0=cy+sa*r0;
    const a=Math.min(1,p*1.4)*0.9;x.strokeStyle=`rgba(${s.c[0]},${s.c[1]},${s.c[2]},${a})`;x.lineWidth=s.w*(0.6+p*2.2)*DPR;
    x.beginPath();x.moveTo(x0,y0);x.lineTo(x1,y1);x.stroke();}
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,maxR*0.25);cg.addColorStop(0,'rgba(150,130,255,0.35)');cg.addColorStop(1,'rgba(150,130,255,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

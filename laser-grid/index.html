<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Laser Grid</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Laser Grid — crossing neon beams pulsing in brightness over Phantom dark, bright nodes flaring at intersections in sequence. Integer-harmonic phases, deterministic & seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto');const LOOP=8000,TAU=6.28318;
const COLS=['#8b5cff','#ff5cc2','#46b4ff'];
function rng(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let W,H,DPR,V,Hb;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rng(70707);const NV=6,NH=5;V=[];Hb=[];
  for(let i=0;i<NV;i++)V.push({p:(i+0.5)/NV+(r()-0.5)*0.04,k:1+(i%3),ph:r(),c:COLS[i%3]});
  for(let j=0;j<NH;j++)Hb.push({p:(j+0.5)/NH+(r()-0.5)*0.04,k:1+(j%3),ph:r(),c:COLS[(j+1)%3]});}
rs();addEventListener('resize',rs);
function hex(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // vertical beams
  for(const b of V){const a=0.18+0.5*(0.5+0.5*Math.sin(TAU*(u*b.k+b.ph)));const c=hex(b.c);const X=b.p*W;
    x.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${a})`;x.lineWidth=(1+2.5*a)*DPR;x.beginPath();x.moveTo(X,0);x.lineTo(X,H);x.stroke();
    x.strokeStyle=`rgba(255,255,255,${a*0.4})`;x.lineWidth=0.8*DPR;x.beginPath();x.moveTo(X,0);x.lineTo(X,H);x.stroke();}
  // horizontal beams
  for(const b of Hb){const a=0.18+0.5*(0.5+0.5*Math.sin(TAU*(u*b.k+b.ph)));const c=hex(b.c);const Y=b.p*H;
    x.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${a})`;x.lineWidth=(1+2.5*a)*DPR;x.beginPath();x.moveTo(0,Y);x.lineTo(W,Y);x.stroke();
    x.strokeStyle=`rgba(255,255,255,${a*0.4})`;x.lineWidth=0.8*DPR;x.beginPath();x.moveTo(0,Y);x.lineTo(W,Y);x.stroke();}
  // intersection nodes flaring in sequence
  let idx=0;const tot=V.length*Hb.length;
  for(let i=0;i<V.length;i++)for(let j=0;j<Hb.length;j++){
    const X=V[i].p*W,Y=Hb[j].p*H;
    // sequence phase: each node peaks at a staggered moment around the loop
    const seq=0.5+0.5*Math.sin(TAU*(u-idx/tot));const fl=Math.pow(seq,6);
    const c=hex(V[i].c);const R=(4+26*fl)*DPR;
    const g=x.createRadialGradient(X,Y,0,X,Y,R);
    g.addColorStop(0,`rgba(255,255,255,${0.5+0.45*fl})`);
    g.addColorStop(0.4,`rgba(${c[0]},${c[1]},${c[2]},${0.5*fl})`);
    g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    x.fillStyle=g;x.beginPath();x.arc(X,Y,R,0,TAU);x.fill();
    idx++;}
  // ambient nebula vignette
  const vg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(70,40,120,0.12)');vg.addColorStop(1,'rgba(139,92,255,0)');x.fillStyle=vg;x.fillRect(0,0,W,H);
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!-- Cosmos Pluck Sequencer: a 16-step lane of pitched notes on a pentatonic scale with a sweeping playhead and a piano-roll grid you can paint. LIVE: click cells to set/clear a note, drag vertically to change a step's pitch, press space to start; each step plucks its note (Karplus-style filtered noise burst into a tuned feedback comb) as the playhead crosses it, with the painted cell flashing and a string wobble. AUTO: a seeded pentatonic melody loops silently — the playhead sweeps, active notes pluck-flash and the strings wobble — seamlessly. Frame 0 has the playhead mid-sequence with notes flashing. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Pluck Sequencer</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.panel{--acc:#36d39a;width:680px;padding:20px 22px;border-radius:20px;
  background:linear-gradient(165deg,rgba(26,22,42,.96),rgba(13,10,22,.97));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 30px 70px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.2)}
.top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc)}
.title{font-size:14px;font-weight:680;color:#f2f0fa;letter-spacing:.4px}
.meta{margin-left:auto;font-size:11.5px;color:#8e89ad;font-variant-numeric:tabular-nums}
.hint{font-size:11.5px;color:#8e89ad;transition:opacity .3s}
canvas{display:block;border-radius:12px;background:rgba(0,0,0,.22)}
</style></head>
<body><div id="stage">
  <div class="panel">
    <div class="top"><span class="dot"></span><span class="title">PLUCK SEQUENCER</span>
      <span class="meta">PENTATONIC · 16 STEPS</span>
      <span class="hint" id="hint">▶ press space / click cells</span></div>
    <canvas id="c"></canvas>
  </div>
</div>
<script>
const STEPS=16, ROWS=8, CW=632, CH=300, LOOP=6000, TAU=Math.PI*2;
const cv=document.getElementById('c'),hintE=document.getElementById('hint');
cv.width=CW;cv.height=CH;const g=cv.getContext('2d');
const ACC='#36d39a', ACC2='#46b4ff';
// pentatonic (minor) scale degrees over rows, low (bottom) -> high (top). A minor pentatonic.
// semitone offsets from A2 base, 8 rows ascending
const SEMI=[0,3,5,7,10,12,15,17];           // A C D E G A C D
const BASE=110;                              // A2
function freqOf(row){return BASE*Math.pow(2,SEMI[row]/12);}
// grid[step] = row index or -1 (no note). seeded pentatonic melody.
const grid=new Array(STEPS).fill(-1);
const SEED=[0,-1,2,4,-1,3,1,2, 5,-1,4,2,-1,1,3,0];   // a gentle rising-falling line
for(let i=0;i<STEPS;i++)grid[i]=SEED[i];
function hexA(h,a){const n=parseInt(h.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
const cellW=CW/STEPS, cellH=CH/ROWS;

function render(u){
  g.clearRect(0,0,CW,CH);
  // faint grid
  g.lineWidth=1;
  for(let s=0;s<=STEPS;s++){g.beginPath();g.moveTo(s*cellW,0);g.lineTo(s*cellW,CH);
    g.strokeStyle=(s%4===0)?'rgba(255,255,255,0.10)':'rgba(255,255,255,0.04)';g.stroke();}
  for(let r=0;r<=ROWS;r++){g.beginPath();g.moveTo(0,r*cellH);g.lineTo(CW,r*cellH);
    g.strokeStyle='rgba(255,255,255,0.035)';g.stroke();}
  // playhead position; +0.28 offset so frame 0 is mid-sequence
  const p=(u+0.28)%1, fpos=p*STEPS, step=Math.floor(fpos)%STEPS, frac=fpos-Math.floor(fpos);
  // notes
  for(let s=0;s<STEPS;s++){const row=grid[s];if(row<0)continue;
    const x=s*cellW, y=(ROWS-1-row)*cellH;        // row 0 at bottom
    const crossing=(s===step && frac<0.5);
    // string wobble: a recently-plucked note wobbles as a small sine displacement
    let wob=0,glow=0.55;
    // forward distance from this step to playhead, for decaying wobble after the pluck
    let d=((u+0.28)%1)-(s/STEPS);d=((d%1)+1)%1;
    if(d<0.10){const t=d/0.10;wob=Math.sin(t*TAU*3)*(1-t)*6;glow=0.55+(1-t)*0.45;}
    // note pill
    const pad=3, rr=7;
    const yy=y+pad+wob;
    g.beginPath();
    const xa=x+pad,xb=x+cellW-pad,ya=yy,yb=y+cellH-pad+wob;
    roundRect(xa,ya,xb-xa,yb-ya,rr);
    const grd=g.createLinearGradient(xa,ya,xa,yb);
    grd.addColorStop(0,hexA(ACC,glow));grd.addColorStop(1,hexA(ACC2,glow*0.6));
    g.fillStyle=grd;g.fill();
    if(d<0.10){g.shadowColor=ACC;g.shadowBlur=18*(1-d/0.10);
      g.fillStyle=hexA('#ffffff',(1-d/0.10)*0.5);g.fill();g.shadowBlur=0;}
    // string line through the pill (vibrating)
    g.beginPath();const my=(ya+yb)/2;
    g.moveTo(xa+2,my);
    for(let i=0;i<=10;i++){const fx=xa+2+(xb-xa-4)*i/10;
      const vib=(d<0.12)?Math.sin(i/10*Math.PI)*Math.sin(d*60)*(1-d/0.12)*4:0;
      g.lineTo(fx,my+vib);}
    g.strokeStyle=hexA('#ffffff',d<0.12?0.6:0.22);g.lineWidth=1.2;g.stroke();
  }
  // playhead column
  const hx=step*cellW + frac*cellW;
  g.fillStyle='rgba(255,255,255,0.06)';g.fillRect(step*cellW,0,cellW,CH);
  g.beginPath();g.moveTo(hx,0);g.lineTo(hx,CH);g.strokeStyle='rgba(255,255,255,0.6)';
  g.shadowColor='rgba(255,255,255,0.7)';g.shadowBlur=12;g.lineWidth=2;g.stroke();g.shadowBlur=0;
}
function roundRect(x,y,w,h,r){r=Math.min(r,w/2,h/2);g.beginPath();
  g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}

// ---- LIVE audio: Karplus-Strong-ish pluck (noise burst into a tuned delay feedback comb) ----
let actx,master;
function audio(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain();master.gain.value=0.22;
  const comp=actx.createDynamicsCompressor();master.connect(comp);comp.connect(actx.destination);}
  if(actx.state==='suspended')actx.resume();return actx;}
function pluck(freq){const a=audio(),t=a.currentTime;
  // short filtered noise excitation
  const n=Math.floor(a.sampleRate*0.04);const buf=a.createBuffer(1,n,a.sampleRate);
  const dd=buf.getChannelData(0);for(let i=0;i<n;i++)dd[i]=(Math.random()*2-1)*(1-i/n);
  const src=a.createBufferSource();src.buffer=buf;
  // tuned feedback delay = the string
  const dly=a.createDelay(0.05);dly.delayTime.value=1/freq;
  const fb=a.createGain();fb.gain.value=0.93;             // decay/sustain of the string
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=Math.min(freq*6,7000);
  const out=a.createGain();out.gain.setValueAtTime(0.0001,t);
  out.gain.exponentialRampToValueAtTime(0.8,t+0.004);
  out.gain.exponentialRampToValueAtTime(0.001,t+1.1);
  src.connect(dly);dly.connect(lp);lp.connect(fb);fb.connect(dly);   // feedback comb
  dly.connect(out);out.connect(master);
  src.start(t);src.stop(t+0.05);
}

// ---- LIVE interaction ----
function cellAt(mx,my){const s=Math.floor(mx/cellW),row=ROWS-1-Math.floor(my/cellH);
  return{s:Math.max(0,Math.min(STEPS-1,s)),row:Math.max(0,Math.min(ROWS-1,row))};}
let dragS=-1,dragStartY=0,dragStartRow=0;
cv.addEventListener('pointerdown',e=>{audio();const b=cv.getBoundingClientRect();
  const mx=(e.clientX-b.left)*(CW/b.width),my=(e.clientY-b.top)*(CH/b.height);
  const{s,row}=cellAt(mx,my);
  if(grid[s]===row){grid[s]=-1;}            // toggle off if clicking the same note
  else{grid[s]=row;pluck(freqOf(row));}     // set + preview pluck
  dragS=s;dragStartY=e.clientY;dragStartRow=grid[s]<0?row:grid[s];
  hintE.style.opacity='0';});
window.addEventListener('pointermove',e=>{if(dragS<0)return;
  const dy=dragStartY-e.clientY;const nr=Math.max(0,Math.min(ROWS-1,dragStartRow+Math.round(dy/22)));
  if(grid[dragS]!==nr){grid[dragS]=nr;}});
window.addEventListener('pointerup',()=>dragS=-1);

const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);window.__seek(0);window.__ready=true;}
else{
  let playing=false,start=0,lastStep=-1;
  function tick(n){
    if(playing){const u=(((n-start)%LOOP)+LOOP)%LOOP/LOOP;
      const step=Math.floor(u*STEPS)%STEPS;
      if(step!==lastStep){lastStep=step;if(grid[step]>=0)pluck(freqOf(grid[step]));}
      render(((u-0.28+1)%1));                 // undo frame-0 offset for live sync
    } else { render((((n)%LOOP)+LOOP)%LOOP/LOOP); }
    requestAnimationFrame(tick);
  }
  window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();
    audio();playing=!playing;if(playing){start=performance.now();lastStep=-1;}hintE.style.opacity='0';}});
  requestAnimationFrame(tick);
}
</script></body></html>

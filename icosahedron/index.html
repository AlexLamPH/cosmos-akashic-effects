<!-- Cosmos Icosahedron: a wireframe d20 (12 vertices, 30 glowing edges) rotates one full turn per LOOP about a tilted axis; near edges/vertices brighter via hand-rolled perspective depth. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Icosahedron</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
const cv=document.getElementById('c'),x=cv.getContext('2d'),TAU=Math.PI*2;
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0xD20FACE);
// 12 icosahedron vertices: cyclic perms of (0,±1,±phi), normalized to unit sphere.
const PH=(1+Math.sqrt(5))/2, NF=1/Math.hypot(1,PH);
const V=[[0,1,PH],[0,1,-PH],[0,-1,PH],[0,-1,-PH],[1,PH,0],[1,-PH,0],[-1,PH,0],[-1,-PH,0],[PH,0,1],[PH,0,-1],[-PH,0,1],[-PH,0,-1]].map(p=>[p[0]*NF,p[1]*NF,p[2]*NF]);
// 30 edges = vertex pairs at the minimum distance (edge length 2*NF).
const E=[],eps=0.05,el=2*NF;
for(let i=0;i<12;i++)for(let j=i+1;j<12;j++){const d=Math.hypot(V[i][0]-V[j][0],V[i][1]-V[j][1],V[i][2]-V[j][2]);if(Math.abs(d-el)<eps)E.push([i,j]);}
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#e0b24a'];
const ECOL=E.map((_,i)=>COL[i%COL.length]);
// background sparkle field (computed once)
const STARS=[];for(let i=0;i<70;i++)STARS.push({a:rnd()*TAU,d:0.4+rnd()*0.8,s:0.5+rnd()*1.5,c:COL[i%5],ph:rnd()});
const F=2.6; // perspective focal distance (object centered at z=0, scaled by F/(F+z))
function frame(t){
  const LOOP=7600,u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.setTransform(DPR,0,0,DPR,0,0);x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.33;
  // ambient backdrop glow + sparkle field (additive)
  x.globalCompositeOperation='lighter';
  let bg=x.createRadialGradient(cx,cy,0,cx,cy,R*2.4);
  bg.addColorStop(0,'rgba(139,92,255,0.22)');bg.addColorStop(0.5,'rgba(70,180,255,0.08)');bg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=bg;x.beginPath();x.arc(cx,cy,R*2.4,0,TAU);x.fill();
  for(const s of STARS){const rad=R*(1.25+s.d*0.9),px=cx+Math.cos(s.a)*rad,py=cy+Math.sin(s.a)*rad*0.92;
    const tw=0.4+0.6*Math.sin(TAU*(u+s.ph));x.globalAlpha=0.2+0.4*tw;x.fillStyle=s.c;
    x.beginPath();x.arc(px,py,s.s*(0.7+tw),0,TAU);x.fill();}
  x.globalAlpha=1;
  // rotation: one full turn per loop (phi=2*pi*u) about a fixed tilted axis.
  const phi=TAU*u, cf=Math.cos(phi), sf=Math.sin(phi);
  const tilt=0.46, ct=Math.cos(tilt), st=Math.sin(tilt); // fixed tilt of the whole shape
  // project each vertex: spin about Y, tilt about X, perspective scale = F/(F+z)
  const P=V.map(v=>{
    let X=v[0]*cf+v[2]*sf, Z=-v[0]*sf+v[2]*cf, Y=v[1];      // spin (Y axis)
    const Y2=Y*ct-Z*st, Z2=Y*st+Z*ct;                        // tilt (X axis)
    const sc=F/(F+Z2);                                       // perspective
    return [cx+X*R*sc, cy+Y2*R*sc, Z2, sc];
  });
  // depth helper: near (z<0 toward camera, larger sc) => brighter
  const zmin=Math.min(...P.map(p=>p[2])),zmax=Math.max(...P.map(p=>p[2])),zr=(zmax-zmin)||1;
  const dep=z=>1-(z-zmin)/zr; // 1=nearest .. 0=farthest
  // draw faint accent halo behind the solid
  let hg=x.createRadialGradient(cx,cy,R*0.2,cx,cy,R*1.15);
  hg.addColorStop(0,'rgba(70,180,255,0.10)');hg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=hg;x.beginPath();x.arc(cx,cy,R*1.15,0,TAU);x.fill();
  // edges (additive glow), depth-sorted back-to-front so near edges sit on top
  const order=E.map((e,i)=>i).sort((a,b)=>(P[E[b][0]][2]+P[E[b][1]][2])-(P[E[a][0]][2]+P[E[a][1]][2]));
  for(const i of order){const a=P[E[i][0]],b=P[E[i][1]];
    const dd=(dep(a[2])+dep(b[2]))/2;            // 0..1 nearness of this edge
    const w=1.1+dd*3.4, al=0.22+dd*0.78;
    x.strokeStyle=ECOL[i];x.globalAlpha=al;x.lineWidth=w;x.lineCap='round';
    x.beginPath();x.moveTo(a[0],a[1]);x.lineTo(b[0],b[1]);x.stroke();
    // bright core line for nearer edges
    if(dd>0.45){x.strokeStyle='rgba(255,255,255,'+((dd-0.45)*0.9)+')';x.lineWidth=w*0.35;
      x.beginPath();x.moveTo(a[0],a[1]);x.lineTo(b[0],b[1]);x.stroke();}}
  // vertices as glowing nodes, brighter & larger when nearer
  const VC=[[160,200,255],[139,92,255],[70,180,255],[255,92,194],[54,211,154],[224,178,74]];
  for(let i=0;i<12;i++){const p=P[i],dd=dep(p[2]),rr=(1.6+dd*4.2)*p[3],c=VC[i%6];
    let g=x.createRadialGradient(p[0],p[1],0,p[0],p[1],rr*3);
    g.addColorStop(0,'rgba(255,255,255,'+(0.55+dd*0.45)+')');
    g.addColorStop(0.45,'rgba('+c[0]+','+c[1]+','+c[2]+','+(0.35+dd*0.4)+')');
    g.addColorStop(1,'rgba(5,3,13,0)');
    x.globalAlpha=1;x.fillStyle=g;x.beginPath();x.arc(p[0],p[1],rr*3,0,TAU);x.fill();
    x.fillStyle='rgba(255,255,255,'+(0.6+dd*0.4)+')';x.beginPath();x.arc(p[0],p[1],rr*0.7,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';x.globalAlpha=1;
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Galaxy Spiral</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Galaxy Spiral — rotating spiral galaxy of glowing particles, arms sweeping. Deterministic, seamless, pure Canvas 2D.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
let W,H,DPR,cx,cy,scale,pts=[];
// seeded RNG (mulberry32) — called only at setup/resize, never inside frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;scale=Math.min(W,H)*0.46;
  const r=mul(7);pts=[];const ARMS=4;
  for(let i=0;i<2600;i++){
    const arm=i%ARMS;                                   // which spiral arm
    const rad=Math.pow(r(),0.62);                       // 0..1, denser toward centre
    const jit=(r()-0.5)*0.34*(1-rad*0.5);               // angular scatter, tighter outward
    const base=arm/ARMS*TAU + rad*3.4 + jit;            // log-ish spiral winding
    const c=AC[(r()*AC.length|0)];                      // particle colour from Cosmos accents
    const sz=(0.5+r()*1.4)*(1-rad*0.4);
    pts.push({rad,base,c,sz,tw:r()*TAU,bri:0.4+r()*0.6});
  }}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;    // 0..1 normalized loop time
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);           // full repaint each frame (pure fn of t)
  const spin=u*TAU;                                    // exactly one rotation per loop -> seamless
  // central bulge glow
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,scale*0.45);
  cg.addColorStop(0,'rgba(224,178,74,0.55)');cg.addColorStop(0.4,'rgba(255,106,61,0.18)');cg.addColorStop(1,'rgba(139,92,255,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';                // additive glow
  for(const p of pts){
    // differential rotation: inner particles sweep faster — integer-period in u so it returns
    const ang=p.base + spin*(2 + (1-p.rad));
    const rr=p.rad*scale;
    const px=cx+Math.cos(ang)*rr, py=cy+Math.sin(ang)*rr*0.66; // slight inclination (flatten disc)
    const tw=0.6+0.4*Math.sin(p.tw+spin*3);            // twinkle: integer harmonic of u
    const a=p.bri*tw*(0.9-p.rad*0.3);
    const s=p.sz*(1+(1-p.rad)*0.8)*DPR*1.3;
    x.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a})`;
    x.beginPath();x.arc(px,py,s,0,TAU);x.fill();
    if(p.sz>1.1){x.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a*0.3})`;x.beginPath();x.arc(px,py,s*3,0,TAU);x.fill();}
  }
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!doctype html><meta charset=utf8><title>Cosmos Cassette Tape</title>
<!-- Cosmos Cassette Tape — two reels wind tape back & forth, spokes spin, glowing label; deterministic & seamless. -->
<style>html,body{margin:0;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
<canvas id=c></canvas>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=7600;
const PAL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const TAU=Math.PI*2;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let body,dust=[];
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;const S=Math.min(W,H)/600;const r=mulberry32(7);
  const bw=Math.min(W*0.86,520*DPR),bh=bw*0.62; body={x:W/2,y:H/2,w:bw,h:bh,S};
  dust=[];for(let i=0;i<40;i++)dust.push({x:r(),y:r(),ph:r(),sp:1+((r()*3)|0)});
}
addEventListener('resize',resize);resize();
function roundRect(x,y,w,h,rad){ctx.beginPath();ctx.moveTo(x+rad,y);ctx.arcTo(x+w,y,x+w,y+h,rad);ctx.arcTo(x+w,y+h,x,y+h,rad);ctx.arcTo(x,y+h,x,y,rad);ctx.arcTo(x,y,x+w,y,rad);ctx.closePath();}
function reel(cx,cy,fill,rot,col){
  // fill in [0..1] = how full the reel is -> wound radius
  const Rmax=body.w*0.165,Rmin=Rmax*0.42,Rwound=Rmin+(Rmax-Rmin)*fill;
  ctx.globalCompositeOperation='lighter';
  // wound tape disc (glow)
  let g=ctx.createRadialGradient(cx,cy,Rmin*0.6,cx,cy,Rwound);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.55,col+'22');g.addColorStop(1,col);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,Rwound,0,TAU);ctx.fill();
  // wound tape rings
  ctx.strokeStyle=col;
  for(let i=0;i<5;i++){const rr=Rmin+(Rwound-Rmin)*(i+1)/5;ctx.globalAlpha=0.28;ctx.lineWidth=1.1*body.S;ctx.beginPath();ctx.arc(cx,cy,rr,0,TAU);ctx.stroke();}
  // hub + spokes (rotating)
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
  ctx.globalAlpha=0.5;ctx.lineWidth=2.4*body.S;ctx.strokeStyle='#fff';
  ctx.beginPath();ctx.arc(0,0,Rmin*0.5,0,TAU);ctx.stroke();
  for(let s=0;s<6;s++){const a=s/6*TAU;ctx.globalAlpha=0.7;ctx.lineWidth=2.6*body.S;ctx.strokeStyle=col;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*Rmin*0.5,Math.sin(a)*Rmin*0.5);ctx.lineTo(Math.cos(a)*Rmin*0.95,Math.sin(a)*Rmin*0.95);ctx.stroke();
    // teeth tips
    ctx.globalAlpha=0.9;ctx.fillStyle=col;ctx.beginPath();ctx.arc(Math.cos(a)*Rmin*0.95,Math.sin(a)*Rmin*0.95,2.2*body.S,0,TAU);ctx.fill();}
  ctx.globalAlpha=0.9;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,3*body.S,0,TAU);ctx.fill();
  ctx.restore();
  return Rwound;
}
function frame(t){
  const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  const{x,y,w,h,S}=body;
  // winding: tape moves L->R then R->L over one loop. fillL high when fillR low.
  const wind=(1-Math.cos(u*TAU))/2;           // 0..1..0
  const fillL=0.85-0.6*wind, fillR=0.25+0.6*wind;
  // spokes spin: integer turns/loop, direction = playback dir (flip at u=0.5)
  const turns=6, dir=Math.cos(u*TAU)>=0?1:-1;
  const rot=dir*Math.sin(u*TAU)*TAU*turns;     // seamless: =0 at u=0 and u=1
  // shell body
  ctx.globalCompositeOperation='lighter';
  let bg=ctx.createLinearGradient(x-w/2,y-h/2,x+w/2,y+h/2);bg.addColorStop(0,PAL[0]+'33');bg.addColorStop(1,PAL[1]+'22');
  ctx.fillStyle=bg;roundRect(x-w/2,y-h/2,w,h,18*S);ctx.fill();
  ctx.globalAlpha=0.9;ctx.lineWidth=2.6*S;ctx.strokeStyle=PAL[0];roundRect(x-w/2,y-h/2,w,h,18*S);ctx.stroke();
  ctx.globalAlpha=0.5;ctx.lineWidth=1.4*S;ctx.strokeStyle=PAL[1];roundRect(x-w/2+8*S,y-h/2+8*S,w-16*S,h-16*S,14*S);ctx.stroke();
  // label band (glowing accent)
  const ly=y-h*0.30;
  let lg=ctx.createLinearGradient(x-w*0.36,0,x+w*0.36,0);lg.addColorStop(0,PAL[2]);lg.addColorStop(0.5,PAL[4]);lg.addColorStop(1,PAL[5]);
  ctx.globalAlpha=0.85;ctx.fillStyle=lg;roundRect(x-w*0.36,ly-h*0.13,w*0.72,h*0.26,8*S);ctx.fill();
  ctx.globalAlpha=0.5;ctx.strokeStyle='#fff';ctx.lineWidth=1.2*S;for(let i=0;i<3;i++){const yy=ly-h*0.06+i*h*0.06;ctx.beginPath();ctx.moveTo(x-w*0.30,yy);ctx.lineTo(x+w*0.30,yy);ctx.stroke();}
  // reels
  const sep=w*0.245, ry=y+h*0.07;
  const RL=reel(x-sep,ry,fillL,rot,PAL[1]);
  const RR=reel(x+sep,ry,fillR,rot,PAL[3]);
  // tape path between reels (slight sag over the head window)
  ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.8;ctx.strokeStyle=PAL[5];ctx.lineWidth=2.4*S;
  const yb=y+h*0.40;
  ctx.beginPath();ctx.moveTo(x-sep,ry+RL);ctx.quadraticCurveTo(x-w*0.16,yb,x-w*0.12,yb);ctx.lineTo(x+w*0.12,yb);ctx.quadraticCurveTo(x+w*0.16,yb,x+sep,ry+RR);ctx.stroke();
  // tape window glow
  ctx.globalAlpha=0.35;let wg=ctx.createLinearGradient(0,yb-h*0.05,0,yb+h*0.05);wg.addColorStop(0,PAL[5]);wg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=wg;roundRect(x-w*0.14,yb-h*0.04,w*0.28,h*0.10,4*S);ctx.fill();
  // capstan pins
  ctx.globalAlpha=0.7;ctx.fillStyle='#fff';for(const px of[-w*0.13,w*0.13]){ctx.beginPath();ctx.arc(x+px,yb,3*S,0,TAU);ctx.fill();}
  // drifting dust sparkles
  for(const d of dust){const dx=x-w/2+((d.x+u*d.sp)%1)*w, dy=y-h/2+d.y*h; const tw=0.3+0.5*(0.5+0.5*Math.sin((u*d.sp+d.ph)*TAU));
    ctx.globalAlpha=tw*0.4;ctx.fillStyle=PAL[(d.sp)%PAL.length];ctx.beginPath();ctx.arc(dx,dy,1.4*S,0,TAU);ctx.fill();}
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Cosmic Snow</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Cosmic Snow — drifting falling glints in accent colours with 3-layer depth parallax. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000,TAU=6.28318;
let W,H,DPR,flk=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
const LAY=[{n:60,sz:0.5,br:0.45,sp:0.45},{n:46,sz:1.0,br:0.75,sp:0.75},{n:30,sz:1.8,br:1.0,sp:1.15}];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rnd(11);flk=[];
  for(let L=0;L<3;L++){const ly=LAY[L];for(let i=0;i<ly.n;i++)
    flk.push({bx:r(),ph:r(),c:AC[r()*AC.length|0],rad:(1+r()*4)*ly.sz*DPR,amp:(8+r()*30)*DPR,hz:1+(r()*3|0),br:ly.br*(0.6+r()*0.5),sp:ly.sp*(0.85+r()*0.3),tw:r()});}}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);x.globalCompositeOperation='lighter';
  for(const f of flk){const p=((u*f.sp+f.ph)%1);
    const y=-f.rad + p*(H+f.rad*2);
    const cx=f.bx*W + Math.sin((p*f.hz+f.tw)*TAU)*f.amp;
    const tw=0.65+0.35*Math.sin((u+f.tw)*TAU*2);
    const a=f.br*tw, R=f.rad;
    const g=x.createRadialGradient(cx,y,0,cx,y,R*4);
    g.addColorStop(0,`rgba(${f.c[0]},${f.c[1]},${f.c[2]},${a})`);
    g.addColorStop(0.4,`rgba(${f.c[0]},${f.c[1]},${f.c[2]},${a*0.4})`);
    g.addColorStop(1,`rgba(${f.c[0]},${f.c[1]},${f.c[2]},0)`);
    x.fillStyle=g;x.beginPath();x.arc(cx,y,R*4,0,TAU);x.fill();
    x.fillStyle=`rgba(255,255,255,${a*0.9})`;x.beginPath();x.arc(cx,y,R*0.55,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

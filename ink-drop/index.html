<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Ink Drop</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Ink Drop — a glowing ink drop blooms into water then settles: irregular blob radius(θ)=R*d*(1+Σ amp sin(kθ+phase)). Pure Canvas 2D, deterministic & seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=7000,TAU=6.28318530718;
// Cosmos accents — ink colour drifts violet -> cosmic -> nebula across the bloom
const AC=[[139,92,255],[70,180,255],[255,92,194]];
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let W,H,DPR,cx,cy,R,LOBES; const rnd=mul(20260614);
// seeded irregular-blob harmonics, computed ONCE (never random inside frame)
LOBES=[]; for(let i=0;i<6;i++)LOBES.push({k:2+i,amp:(0.18-i*0.018)*(0.6+rnd()*0.8),ph:rnd()*TAU});
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;R=Math.min(W,H)*0.16;}
rs();addEventListener('resize',rs);
// bloom amount d: ping-pong small->large->small so frame(0)==frame(LOOP)
function radius(th,d,sw){let r=1; for(const L of LOBES)r+=L.amp*Math.sin(L.k*th+L.ph+sw); return R*d*r;}
function blob(d,sw,scale,col,alpha){
  x.beginPath();
  for(let i=0;i<=160;i++){const th=i/160*TAU, r=radius(th,d,sw)*scale, px=cx+Math.cos(th)*r, py=cy+Math.sin(th)*r;
    i?x.lineTo(px,py):x.moveTo(px,py);}
  x.closePath();
  const g=x.createRadialGradient(cx,cy,R*d*0.1,cx,cy,R*d*1.25*scale);
  g.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${alpha})`);
  g.addColorStop(0.6,`rgba(${col[0]},${col[1]},${col[2]},${alpha*0.45})`);
  g.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
  x.fillStyle=g;x.fill();}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  // ping-pong of u (0->1->0): small->large->small bloom, exact return at u=1
  const pp=1-Math.abs(2*u-1), d=0.45+0.85*pp;          // bloom amount
  const sw=Math.sin(TAU*u)*0.6;                          // gentle swirl, integer harmonic -> seamless
  // ink colour blends across accents on integer harmonic of u
  const cp=u*3%3, ci=cp|0, ct=cp-ci, A=AC[ci%3], B=AC[(ci+1)%3];
  const col=[A[0]+(B[0]-A[0])*ct,A[1]+(B[1]-A[1])*ct,A[2]+(B[2]-A[2])*ct];
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);  // full repaint
  x.globalCompositeOperation='lighter';                                                 // additive glow
  // diffusion glow: concentric soft blob layers, outer faint tendrils to inner core
  blob(d,sw,1.55,col,0.05);
  blob(d,sw*0.7,1.25,col,0.08);
  blob(d,sw*0.5,1.0,col,0.16);
  blob(d,sw*0.3,0.72,col,0.26);
  blob(d,0,0.42,[255,235,255],0.30);                    // bright settling core
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

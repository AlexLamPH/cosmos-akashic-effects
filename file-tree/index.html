<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos File Tree</title><style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center}
#scrim{position:fixed;inset:0;background:radial-gradient(120% 90% at 30% 8%,rgba(139,92,255,.10),transparent 60%)}
.panel{position:relative;width:380px;border-radius:16px;padding:10px 8px;
  background:linear-gradient(180deg,rgba(28,23,46,.78),rgba(17,13,30,.84));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 30px 70px -22px rgba(0,0,0,.72),inset 0 1px 0 rgba(255,255,255,.06)}
.phead{display:flex;align-items:center;gap:8px;padding:6px 10px 11px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:6px}
.phead .ex{font-size:11px;font-weight:700;letter-spacing:.6px;color:#9a93ba;text-transform:uppercase}
.phead .ex svg{width:14px;height:14px;vertical-align:-2px;margin-right:6px;color:#8b5cff}
.tree{position:relative}
.rows{position:relative}
.row{position:relative;display:flex;align-items:center;height:30px;border-radius:8px;cursor:pointer;
  overflow:hidden;will-change:height,opacity}
.row .pad{flex:none}
.guide{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.07)}
.chev{width:14px;height:14px;flex:none;color:#7d769c;margin-right:3px;transition:transform .2s}
.chev.leaf{visibility:hidden}
.ico{width:16px;height:16px;flex:none;margin-right:8px}
.ico.folder{color:#8b5cff}.ico.file{color:#7e8aa8}
.ico.js{color:#e0b24a}.ico.css{color:#46b4ff}.ico.img{color:#36d39a}.ico.md{color:#ff5cc2}
.nm{font-size:13px;color:#cfcae3;white-space:nowrap;font-weight:500}
.row.sel{background:linear-gradient(90deg,rgba(139,92,255,.26),rgba(139,92,255,.08))}
.row.sel:before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:2.5px;border-radius:2px;background:#8b5cff;box-shadow:0 0 10px rgba(139,92,255,.7)}
.row.sel .nm{color:#fff}
.row.dir .nm{font-weight:600;color:#e3def2}
.hint{position:absolute;bottom:-30px;left:0;right:0;text-align:center;font-size:11px;color:#5f5980;letter-spacing:.3px}
</style></head>
<body><div id="scrim"></div>
<div class="panel">
  <div class="phead"><span class="ex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>EXPLORER</span></div>
  <div class="tree"><div class="rows" id="rows"></div></div>
</div>
<div class="hint">Folders expand · children stagger in · selection walks the rows</div>
<script>
// icon paths (lucide-ish)
const IC={
 folder:'<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>',
 file:'<path d="M14 3v5h5"/><path d="M6 3h8l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>',
 js:'<rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9v5.5a1.5 1.5 0 0 1-3 0M13 15a1.6 1.6 0 0 0 3 0c0-2-3-1.4-3-3.2a1.5 1.5 0 0 1 2.8-.5"/>',
 css:'<rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 8h8M8 8l.5 8 3.5 1 3.5-1L16 8"/>',
 img:'<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9" r="1.6"/><path d="M21 16l-5-5L5 20"/>',
 md:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 15V9l2.5 3L12 9v6M16 9v6M16 15l2-2.2M16 15l-2-2.2"/>'
};
const chevP='<path d="M9 6l6 6-6 6"/>';
function svg(name,cls){return '<svg class="ico '+cls+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+IC[name]+'</svg>';}

// tree definition: dirs have children; the two animated dirs are 'src' and 'comps'
const TREE=[
 {id:'src',name:'src',dir:true,depth:0,open:true,parent:null,children:['comps','utils','main.js']},
   {id:'comps',name:'components',dir:true,depth:1,open:false,parent:'src',children:['card','button.css','icon.svg']},
     {id:'card',name:'Card.js',ic:'js',depth:2,parent:'comps'},
     {id:'button.css',name:'Button.css',ic:'css',depth:2,parent:'comps'},
     {id:'icon.svg',name:'icon.svg',ic:'img',depth:2,parent:'comps'},
   {id:'utils',name:'utils',dir:true,depth:1,open:true,parent:'src',children:['format.js','dom.js']},
     {id:'format.js',name:'format.js',ic:'js',depth:2,parent:'utils'},
     {id:'dom.js',name:'dom.js',ic:'js',depth:2,parent:'utils'},
   {id:'main.js',name:'main.js',ic:'js',depth:1,parent:'src'},
 {id:'readme',name:'README.md',ic:'md',depth:0,parent:null}
];
const byId={}; TREE.forEach(n=>byId[n.id]=n);

const rowsEl=document.getElementById('rows');
const ROW_H=30, GAP=2, INDENT=20, BASEPAD=8;
// build all rows once (every node gets a row element)
const rowEls={};
TREE.forEach(n=>{
 const r=document.createElement('div'); r.className='row'+(n.dir?' dir':'');
 r.dataset.id=n.id;
 // indentation guides (one vertical line per ancestor level)
 let guides='';
 for(let d=0; d<n.depth; d++){ guides+='<span class="guide" style="left:'+(BASEPAD+d*INDENT+7)+'px"></span>'; }
 const pad='<span class="pad" style="width:'+(BASEPAD+n.depth*INDENT)+'px"></span>';
 const chev='<svg class="chev'+(n.dir?'':' leaf')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">'+chevP+'</svg>';
 const icon = n.dir? svg('folder','folder') : svg(n.ic||'file', (n.ic||'file'));
 r.innerHTML=guides+pad+chev+icon+'<span class="nm">'+n.name+'</span>';
 rowsEl.appendChild(r); rowEls[n.id]=r;
});

function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function clamp(v,a,b){return v<a?a:v>b?b:v;}

// visible order = depth-first; a node is visible iff all ancestor dirs are open(>thresh)
function isVisible(n, openAmt){
 let p=n.parent;
 while(p){ if((openAmt[p]||0) < 0.001) return false; p=byId[p].parent; }
 return true;
}
// "selection list": the leaf/visible rows we walk the violet highlight across
const WALK=['src','utils','format.js','dom.js','main.js']; // walks down the always-or-soon-visible spine

function render(u){
 // open amounts per animated dir (0..1). 'src' & 'utils' start open; 'comps' animates.
 const openAmt={src:1, utils:1, comps:0};
 // selection fractional index into WALK (or -1)
 let selF=-1;

 // PHASES:
 //  A expand 'comps' (children stagger in)
 //  B selection walks down WALK
 //  C collapse 'utils' then re-open (a second folder toggling)
 //  D collapse 'comps' back -> reset
 if(u<0.20){ openAmt.comps=ease(u/0.20); selF=-1; openAmt.utils=1; }
 else if(u<0.30){ openAmt.comps=1; selF=-1; openAmt.utils=1; }
 else if(u<0.60){ openAmt.comps=1; openAmt.utils=1; selF=ease((u-0.30)/0.30)*(WALK.length-0.001); }
 else if(u<0.70){ openAmt.comps=1; openAmt.utils=1; selF=WALK.length-1; }
 else if(u<0.80){ // collapse utils
   openAmt.comps=1; openAmt.utils=1-ease((u-0.70)/0.10); selF=WALK.length-1; }
 else if(u<0.88){ openAmt.comps=1; openAmt.utils=0; selF=clamp(WALK.length-1-((u-0.80)/0.08)*2,0,WALK.length-1); }
 else { // collapse comps + reopen utils to reset to start
   const p=ease((u-0.88)/0.12); openAmt.comps=1-p; openAmt.utils=p; selF=-1; }

 // lay out rows: y position accumulates only over visible (& opening) rows
 let y=0;
 const selId = selF>=0 ? WALK[clamp(Math.round(selF),0,WALK.length-1)] : null;
 TREE.forEach(n=>{
  const r=rowEls[n.id];
  // a row's "presence" = product chain of its ancestor dirs' open amounts (so children fade with parent)
  let pres=1, p=n.parent;
  while(p){ pres*= (openAmt[p]!==undefined?openAmt[p]:1); p=byId[p].parent; }
  // stagger: children of an opening dir come in slightly after — approximate via sibling index easing baked into pres
  const e=ease(clamp(pres,0,1));
  if(e<=0.001){ r.style.height='0px'; r.style.opacity='0'; r.style.marginTop='0'; }
  else{
   const h=ROW_H*e;
   r.style.height=h.toFixed(2)+'px';
   r.style.opacity=e.toFixed(3);
   r.style.marginTop=(y>0?GAP*e:0).toFixed(2)+'px';
   y+=h+(y>0?GAP*e:0);
  }
  // chevron rotation for dirs
  if(n.dir){ const o=openAmt[n.id]!==undefined?openAmt[n.id]:1;
   r.querySelector('.chev').style.transform='rotate('+(o*90).toFixed(1)+'deg)'; }
  // selection highlight
  r.classList.toggle('sel', n.id===selId && e>0.6);
 });
}

const LOOP=7000, OFF=0.42;  // frame-0: comps expanded, selection mid-walk on a row
function frame(u){render(((u+OFF)%1+1)%1);}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>frame(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else { const s=performance.now(); (function l(n){ frame((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l);})(performance.now()); }
</script></body></html>

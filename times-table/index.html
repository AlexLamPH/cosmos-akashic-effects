<!doctype html><html><head><meta charset="utf-8"><title>Cosmos Times Table</title>
<style>html,body{margin:0;height:100%;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0}</style>
</head><body><canvas id="c"></canvas><script>
// Cosmos Times Table — modular multiplication chords on a circle, envelope morphs through cardioid/nephroid/star as m sweeps.
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const ACC=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const LOOP=8000, N=240, MROUNDS=6; // m sweeps over MROUNDS integer cycles -> seamless
let W,H,DPR,R,CX,CY;
function mul32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rnd=mul32(20260614); const stars=[];
function setup(){DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  R=Math.min(W,H)*0.40;CX=W/2;CY=H/2;
  stars.length=0;for(let i=0;i<140;i++)stars.push({x:rnd()*W,y:rnd()*H,r:rnd()*1.2+0.2,p:rnd(),s:1+((rnd()*3)|0)});}
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerpC(a,b,k){const A=hex(a),B=hex(b);return'rgb('+((A[0]+(B[0]-A[0])*k)|0)+','+((A[1]+(B[1]-A[1])*k)|0)+','+((A[2]+(B[2]-A[2])*k)|0)+')';}
function pt(i){const a=-Math.PI/2 + i/N*Math.PI*2;return[CX+Math.cos(a)*R, CY+Math.sin(a)*R];}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  ctx.globalCompositeOperation='source-over';ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  // starfield
  ctx.globalCompositeOperation='lighter';
  for(const s of stars){const tw=0.45+0.55*Math.sin(2*Math.PI*(u*s.s+s.p));ctx.fillStyle=lerpC('#46b4ff','#8b5cff',s.p);ctx.globalAlpha=tw*0.5;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();}
  ctx.globalAlpha=1;
  // ring
  ctx.strokeStyle='rgba(139,92,255,0.18)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(CX,CY,R,0,7);ctx.stroke();
  // multiplier sweeps MROUNDS full integer turns over the loop -> returns to start. Base offset keeps frame0 rich.
  const m = 2 + ((1-Math.cos(2*Math.PI*u))*0.5)*48 + u*MROUNDS*0; // primary morph
  // use a smooth periodic sweep: m goes 2 -> 50 -> 2 across the loop (returns)
  const mm = 2 + (1-Math.cos(2*Math.PI*u))*0.5*48;
  const hueShift=u; // rotate palette through the loop
  ctx.lineWidth=1;
  for(let i=0;i<N;i++){
    const j=(i*mm)%N; const ji=Math.floor(j); const f=j-ji;
    const A=pt(i); const P0=pt(ji), P1=pt((ji+1)%N);
    const Bx=P0[0]+(P1[0]-P0[0])*f, By=P0[1]+(P1[1]-P0[1])*f;
    const ca=(i/N + hueShift)%1; const seg=ca*ACC.length; const ci=Math.floor(seg); const k=seg-ci;
    ctx.strokeStyle=lerpC(ACC[ci%ACC.length],ACC[(ci+1)%ACC.length],k);
    ctx.globalAlpha=0.28;
    ctx.beginPath();ctx.moveTo(A[0],A[1]);ctx.lineTo(Bx,By);ctx.stroke();
  }
  // bright node dots
  for(let i=0;i<N;i+=4){const P=pt(i);ctx.globalAlpha=0.6;ctx.fillStyle=lerpC('#e0b24a','#ff5cc2',(i/N+hueShift)%1);ctx.beginPath();ctx.arc(P[0],P[1],1.1,0,7);ctx.fill();}
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}
addEventListener('resize',setup);setup();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

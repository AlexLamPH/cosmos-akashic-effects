<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Waveform Scope</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Waveform Scope — glowing oscilloscope traces (scrolling wave + Lissajous) on a faint phosphor grid. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const TAU=Math.PI*2,LOOP=7000;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x5ca1e);
const harm=[];for(let i=0;i<5;i++)harm.push({k:i+1,a:0.5/(i+1)*(0.7+rnd()*0.6),ph:rnd()*TAU});
let W,H,DPR;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // faint grid
  x.globalCompositeOperation='lighter';x.lineWidth=1*DPR;
  x.strokeStyle='rgba(54,211,154,0.10)';
  for(let i=0;i<=16;i++){const gx=W*i/16;x.beginPath();x.moveTo(gx,0);x.lineTo(gx,H);x.stroke();}
  for(let j=0;j<=10;j++){const gy=H*j/10;x.beginPath();x.moveTo(0,gy);x.lineTo(W,gy);x.stroke();}
  // centre axes brighter
  x.strokeStyle='rgba(70,180,255,0.18)';x.lineWidth=1.5*DPR;
  x.beginPath();x.moveTo(0,H/2);x.lineTo(W,H/2);x.stroke();
  x.beginPath();x.moveTo(W/2,0);x.lineTo(W/2,H);x.stroke();
  // scrolling waveform trace (sum of sines, phase 2π*u*k)
  const amp=H*0.20,baseY=H*0.30;
  function trace(col,off,sc){for(let pass=0;pass<2;pass++){x.strokeStyle=col;x.lineWidth=(pass?1.4:4.0)*DPR;x.globalAlpha=pass?0.95:0.35;x.beginPath();
    for(let px=0;px<=W;px+=2*DPR){const tx=px/W;let y=0;for(const h of harm)y+=h.a*Math.sin(TAU*(h.k*tx*sc+u*h.k)+h.ph+off);
      const yy=baseY+y*amp;if(px===0)x.moveTo(px,yy);else x.lineTo(px,yy);}x.stroke();}}
  trace('rgba(54,211,154,1)',0,3);
  trace('rgba(70,180,255,1)',1.7,2);
  x.globalAlpha=1;
  // Lissajous figure (lower band)
  const lcx=W/2,lcy=H*0.74,lr=Math.min(W,H)*0.20,a=3,b=2,ph=TAU*u;
  for(let pass=0;pass<2;pass++){x.strokeStyle='rgba(139,92,255,1)';x.lineWidth=(pass?1.5:5)*DPR;x.globalAlpha=pass?0.95:0.3;x.beginPath();
    for(let i=0;i<=240;i++){const s=i/240*TAU;const px=lcx+Math.sin(a*s+ph)*lr*1.4;const py=lcy+Math.sin(b*s)*lr;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}x.stroke();}
  // moving phosphor dot on the wave
  x.globalAlpha=1;const dx=u*W,dt=u;let dy=0;for(const h of harm)dy+=h.a*Math.sin(TAU*(h.k*dt*3+u*h.k)+h.ph);
  x.fillStyle='rgba(224,178,74,1)';x.beginPath();x.arc(dx,baseY+dy*amp,4*DPR,0,TAU);x.fill();
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!-- Cosmos Empty State: centred glassy placeholder — a floating cosmic illustration (orbiting planet in an open box) with a soft glow pulse sweep, a "No projects yet" heading, supportive subtext, a shimmering primary CTA, and drifting sparkle particles. Deterministic render(u); seamless loop; frame 0 mid-float with glow visible. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Empty State</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.card{position:relative;width:430px;padding:46px 40px 42px;border-radius:24px;text-align:center;
  background:linear-gradient(165deg,rgba(255,255,255,.05),rgba(255,255,255,.014));
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 40px 90px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.03) inset;
  backdrop-filter:blur(8px);overflow:hidden}
.illo{position:relative;width:150px;height:130px;margin:0 auto 26px;will-change:transform}
.glow{position:absolute;left:50%;top:48%;width:190px;height:190px;border-radius:50%;
  transform:translate(-50%,-50%);pointer-events:none;
  background:radial-gradient(circle,rgba(139,92,255,.55),rgba(139,92,255,.10) 45%,transparent 70%);
  filter:blur(6px)}
.illo svg{position:relative;width:100%;height:100%;overflow:visible}
h2{color:#f3eefe;font-size:21px;font-weight:700;letter-spacing:.2px;margin-bottom:10px}
p{color:#9b93b4;font-size:14px;line-height:1.55;max-width:300px;margin:0 auto 26px}
.cta{position:relative;display:inline-flex;align-items:center;gap:9px;
  height:48px;padding:0 26px;border:none;border-radius:13px;cursor:pointer;overflow:hidden;
  color:#fff;font-size:15px;font-weight:650;letter-spacing:.2px;
  background:linear-gradient(160deg,#9a6bff,#7a3df0);
  box-shadow:0 12px 32px rgba(139,92,255,.45),0 0 0 1px rgba(255,255,255,.08) inset;
  will-change:transform,box-shadow}
.cta svg{width:17px;height:17px}
.shimmer{position:absolute;top:0;bottom:0;width:80px;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.45),transparent);
  transform:skewX(-18deg);pointer-events:none}
.spark{position:absolute;border-radius:50%;background:#cdb6ff;pointer-events:none;
  box-shadow:0 0 6px rgba(170,140,255,.9)}
</style></head>
<body><div id="stage">
  <div class="card">
    <div class="illo" id="illo">
      <div class="glow" id="glow"></div>
      <svg viewBox="0 0 150 130">
        <!-- open box -->
        <g stroke="rgba(190,170,255,.55)" stroke-width="2.4" fill="none" stroke-linejoin="round">
          <path d="M30 70 L75 92 L120 70 L75 50 Z" fill="rgba(139,92,255,.10)"/>
          <path d="M30 70 L30 100 L75 122 L75 92 Z" fill="rgba(139,92,255,.05)"/>
          <path d="M120 70 L120 100 L75 122 L75 92 Z" fill="rgba(70,180,255,.06)"/>
          <!-- open flaps -->
          <path d="M30 70 L52 56 L97 78"/>
          <path d="M120 70 L98 56 L53 78"/>
        </g>
        <!-- orbit ellipse + planet -->
        <ellipse id="orbit" cx="75" cy="52" rx="46" ry="17" fill="none"
          stroke="rgba(70,180,255,.30)" stroke-width="1.6" stroke-dasharray="3 5"/>
        <circle id="planet" r="7" fill="#46b4ff"/>
        <circle id="planetGlow" r="11" fill="rgba(70,180,255,.30)"/>
        <circle cx="75" cy="40" r="3.2" fill="#ff5cc2" opacity=".85"/>
      </svg>
    </div>
    <h2>No projects yet</h2>
    <p>Your cosmos is empty. Create your first project to start charting new worlds.</p>
    <button class="cta" id="cta">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      New project
      <span class="shimmer" id="shimmer"></span>
    </button>
  </div>
</div>
<script>
const illo=document.getElementById('illo'), glow=document.getElementById('glow'),
  planet=document.getElementById('planet'), planetGlow=document.getElementById('planetGlow'),
  cta=document.getElementById('cta'), shimmer=document.getElementById('shimmer'),
  card=document.querySelector('.card');
const TAU=Math.PI*2, clamp=t=>t<0?0:t>1?1:t;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
// pre-seed sparkle particles
const rnd=mulberry32(20260615), N_SP=9, sparks=[];
for(let i=0;i<N_SP;i++){
  const el=document.createElement('span'); el.className='spark';
  const sz=1.5+rnd()*2.5; el.style.width=sz+'px'; el.style.height=sz+'px';
  card.appendChild(el);
  sparks.push({el, x:18+rnd()*394, baseY:30+rnd()*150, drift:22+rnd()*40,
    ph:rnd(), spd:0.6+rnd()*0.8, sway:8+rnd()*16});
}
const LOOP=6000;
function render(u){
  // offset so frame 0 lands mid-float with glow near peak
  const g=(u+0.30)%1;
  // gentle float: continuous sine
  const floatY=Math.sin(g*TAU)*7;
  const floatR=Math.sin(g*TAU+0.6)*2.2;
  illo.style.transform=`translateY(${floatY.toFixed(2)}px) rotate(${floatR.toFixed(2)}deg)`;
  // soft glow pulse sweep (period 1 with extra ripple)
  const pulse=0.5+0.5*Math.sin(g*TAU);
  const ripple=0.5+0.5*Math.sin(g*TAU*2+1.0);
  glow.style.opacity=(0.45+0.4*pulse).toFixed(3);
  glow.style.transform=`translate(-50%,-50%) scale(${(0.85+0.28*pulse+0.05*ripple).toFixed(3)})`;
  // orbiting planet around ellipse cx75 cy52 rx46 ry17
  const a=g*TAU;
  const px=75+Math.cos(a)*46, py=52+Math.sin(a)*17;
  const depth=(Math.sin(a)+1)/2; // 0 front-low .. 1 back-high? use for size/opacity
  planet.setAttribute('cx',px.toFixed(1)); planet.setAttribute('cy',py.toFixed(1));
  planetGlow.setAttribute('cx',px.toFixed(1)); planetGlow.setAttribute('cy',py.toFixed(1));
  const sc=0.78+0.32*(1-depth); // larger at front
  planet.setAttribute('r',(7*sc).toFixed(2)); planetGlow.setAttribute('r',(11*sc).toFixed(2));
  planet.setAttribute('opacity',(0.7+0.3*(1-depth)).toFixed(3));
  // CTA shimmer sweep + subtle breathing scale & glow
  const sw=(g*1.0)%1; // shimmer crosses once per loop
  shimmer.style.left=(-90+sw*(cta?cta.offsetWidth+90:220)).toFixed(1)+'px';
  shimmer.style.opacity=(sw<0.92?1:0).toFixed(2);
  const breathe=0.5+0.5*Math.sin(g*TAU);
  cta.style.transform=`translateY(${(-1.5*breathe).toFixed(2)}px)`;
  cta.style.boxShadow=`0 ${(12+4*breathe).toFixed(1)}px ${(32+8*breathe).toFixed(1)}px rgba(139,92,255,${(0.42+0.18*breathe).toFixed(3)}),0 0 0 1px rgba(255,255,255,.08) inset`;
  // drifting sparkle particles: rise + sway + twinkle, looped via fractional phase
  for(const s of sparks){
    const t=(g*s.spd+s.ph)%1;
    const y=s.baseY - t*s.drift;
    const x=s.x + Math.sin((t+s.ph)*TAU)*s.sway;
    const tw=Math.sin(t*Math.PI); // fade in/out across its travel
    s.el.style.transform=`translate(${x.toFixed(1)}px,${y.toFixed(1)}px)`;
    s.el.style.opacity=(tw*0.85).toFixed(3);
  }
}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else{
  // live: hover lifts the CTA; click pops it. Autoplay drives the ambient float/shimmer demo.
  cta.addEventListener('pointerenter',()=>cta.style.filter='brightness(1.08)');
  cta.addEventListener('pointerleave',()=>cta.style.filter='');
  cta.addEventListener('pointerdown',()=>{cta.style.transform+=' scale(.96)';});
  const s=performance.now();
  (function l(n){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l); })(performance.now());
}
</script></body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Fourier Epicycles</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Fourier Epicycles — a chain of rotating circles (integer-frequency Fourier terms) whose tip draws a glowing closed shape. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
let W,H,DPR,cx,cy,scale,terms=[],PATH=[];
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
// target closed shape: a 5-point star (sampled as a periodic complex signal)
function shape(p){ // p in [0,1) -> complex [re,im]
  const pts=5, ang=p*TAU; const k=pts; // star via radius modulation
  const rad=0.62+0.42*Math.cos(k*ang); // spiky 5-fold
  return [rad*Math.cos(ang), rad*Math.sin(ang)];
}
// Discrete Fourier transform of N samples -> terms with INTEGER frequencies
function dft(N){const out=[];
  for(let f=0;f<N;f++){let re=0,im=0;
    for(let n=0;n<N;n++){const p=n/N,[sx,sy]=shape(p);
      const a=TAU*f*n/N, c=Math.cos(a), s=Math.sin(a);
      re+=sx*c+sy*s; im+=-sx*s+sy*c;}
    re/=N;im/=N;
    // map frequency to signed integer (so high indices become small negative freqs)
    let freq=f; if(f>N/2)freq=f-N;
    out.push({freq,amp:Math.hypot(re,im),phase:Math.atan2(im,re)});
  }
  out.sort((a,b)=>b.amp-a.amp); return out;
}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W*0.5;cy=H*0.5;scale=Math.min(W,H)*0.30;
  const N=64; terms=dft(N).slice(0,28);   // keep strongest 28 integer-frequency terms
  // precompute the full traced path (closed) at high resolution
  PATH=[]; const M=720;
  for(let i=0;i<=M;i++){const u=i/M; PATH.push(tip(u));}
}
// tip position at parameter u (one period) — sum of rotating vectors, integer freqs => closed & seamless
function tip(u){let re=0,im=0;
  for(const T of terms){const a=TAU*T.freq*u+T.phase; re+=T.amp*Math.cos(a); im+=T.amp*Math.sin(a);}
  return [re,im];
}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);                  // full repaint each frame (pure of t)
  x.globalCompositeOperation='lighter';
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,scale*1.7);
  cg.addColorStop(0,'rgba(70,180,255,0.14)');cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);
  // draw the glowing traced shape (always the complete closed path)
  x.lineWidth=Math.max(1,2.0*DPR);
  x.beginPath();
  for(let i=0;i<PATH.length;i++){const[px,py]=PATH[i];const X=cx+px*scale,Y=cy+py*scale;if(i===0)x.moveTo(X,Y);else x.lineTo(X,Y);}
  const sa=0.55+0.25*Math.sin(TAU*u);
  x.strokeStyle=`rgba(255,92,194,${sa})`;x.stroke();
  // walk the rotating circle chain to the current tip
  let px=0,py=0;
  for(let i=0;i<terms.length;i++){const T=terms[i];
    const ppx=px,ppy=py; const a=TAU*T.freq*u+T.phase;
    px+=T.amp*Math.cos(a); py+=T.amp*Math.sin(a);
    const r=T.amp*scale; if(r<0.6)continue;
    const X0=cx+ppx*scale,Y0=cy+ppy*scale,X1=cx+px*scale,Y1=cy+py*scale;
    const col=AC[i%AC.length];
    // faint circle for this Fourier term
    x.lineWidth=Math.max(1,0.7*DPR);
    x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${0.10+0.14*(1-i/terms.length)})`;
    x.beginPath();x.arc(X0,Y0,r,0,TAU);x.stroke();
    // radius arm
    x.lineWidth=Math.max(1,1.0*DPR);
    x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},0.35)`;
    x.beginPath();x.moveTo(X0,Y0);x.lineTo(X1,Y1);x.stroke();
  }
  // glowing pen head at the chain tip
  const TX=cx+px*scale,TY=cy+py*scale;
  const g=x.createRadialGradient(TX,TY,0,TX,TY,9*DPR);
  g.addColorStop(0,'rgba(224,178,74,0.98)');g.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=g;x.beginPath();x.arc(TX,TY,9*DPR,0,TAU);x.fill();
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

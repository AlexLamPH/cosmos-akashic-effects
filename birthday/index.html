<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmos Birthday — song card</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#06040f; cursor:pointer;
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif; }
  canvas { display:block; position:fixed; inset:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================================
//  Cosmos Birthday — a greeting card whose "Happy Birthday" melody is generated
//  in code (Web Audio oscillators, no audio file). Geometric confetti drifts,
//  the lyric lines appear in time, musical notes rise, and a progress bar fills.
//  Click to play the tune (live). ?auto=1 + window.__seek(t) drives a seamless GIF.
// ============================================================================
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const AUTO = new URLSearchParams(location.search).has('auto');
const LOOP = 8400;
let W, H, DPR;

const logo = new Image(); let logoOK=false; logo.onload=()=>logoOK=true; logo.src='./cosmos-logo.png';

// 6 Cosmos accents
const ACC = ['#8b5cff','#ff6a3d','#e0b24a','#36d39a','#46b4ff','#ff5cc2'];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ---- confetti (geometric, outlined) + stars, deterministic ----
let stars=[], confetti=[];
function resize(){
  DPR=Math.min(devicePixelRatio||1,2); W=canvas.width=innerWidth*DPR; H=canvas.height=innerHeight*DPR;
  canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
  let r=mulberry32(42); stars=[];
  for(let i=0;i<110;i++) stars.push({x:r()*W,y:r()*H,rad:(r()*1.2+0.3)*DPR,tw:r()*6.28,sp:0.4+r()*1.2});
  r=mulberry32(7); confetti=[];
  const types=['tri','sq','dia','circ','plus'];
  for(let i=0;i<30;i++) confetti.push({ bx:r()*W, by:r()*H, size:(10+r()*16)*DPR,
    type:types[(r()*types.length)|0], col:ACC[(r()*ACC.length)|0], fill:r()<0.4,
    ax:(20+r()*40)*DPR, ay:(16+r()*36)*DPR, ph:r()*6.28, spin:(r()<0.5?1:-1)*(1+(r()*2|0)) });
}
resize(); addEventListener('resize',resize);

function drawShape(s, t){
  const u=t/LOOP, TAU=6.283;
  const x=s.bx + s.ax*Math.sin(TAU*u + s.ph), y=s.by + s.ay*Math.sin(TAU*u*1.3 + s.ph*1.7) - (u*0)*0;
  const rot=s.ph + TAU*u*s.spin;
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  ctx.strokeStyle=s.col; ctx.lineWidth=1.6*DPR; ctx.globalAlpha=0.85;
  ctx.fillStyle=s.col;
  const z=s.size;
  ctx.beginPath();
  if(s.type==='tri'){ ctx.moveTo(0,-z*0.6); ctx.lineTo(z*0.55,z*0.5); ctx.lineTo(-z*0.55,z*0.5); ctx.closePath(); }
  else if(s.type==='sq'){ ctx.rect(-z*0.45,-z*0.45,z*0.9,z*0.9); }
  else if(s.type==='dia'){ ctx.moveTo(0,-z*0.6); ctx.lineTo(z*0.5,0); ctx.lineTo(0,z*0.6); ctx.lineTo(-z*0.5,0); ctx.closePath(); }
  else if(s.type==='circ'){ ctx.arc(0,0,z*0.5,0,6.283); }
  else { ctx.moveTo(-z*0.5,0); ctx.lineTo(z*0.5,0); ctx.moveTo(0,-z*0.5); ctx.lineTo(0,z*0.5); }
  if(s.fill && s.type!=='plus'){ ctx.globalAlpha=0.18; ctx.fill(); ctx.globalAlpha=0.85; }
  ctx.stroke(); ctx.restore();
}

function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

const LYRICS = ['Happy Birthday to You','Happy Birthday to You','Happy Birthday dear Cosmos','Happy Birthday to You'];
const easeOut = x => 1-Math.pow(1-x,3);

function frame(t){
  const tmod = ((t%LOOP)+LOOP)%LOOP;
  // bg
  const g=ctx.createRadialGradient(W*0.5,H*0.42,0,W*0.5,H*0.42,Math.max(W,H)*0.75);
  g.addColorStop(0,'#161031'); g.addColorStop(0.6,'#0a0720'); g.addColorStop(1,'#05030d');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const s of stars){ ctx.globalAlpha=0.4+0.6*Math.abs(Math.sin(t*0.001*s.sp+s.tw));
    ctx.fillStyle='#cdd6ff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.rad,0,6.283); ctx.fill(); }
  ctx.globalAlpha=1;
  for(const s of confetti) drawShape(s, t);

  // ---- card panel ----
  const cw=Math.min(W*0.62,430*DPR), ch=cw*0.72, cx=W/2-cw/2, cy=H*0.42-ch/2;
  ctx.save();
  ctx.shadowColor='rgba(120,80,220,0.5)'; ctx.shadowBlur=40*DPR;
  roundRect(cx,cy,cw,ch,22*DPR); ctx.fillStyle='rgba(18,14,38,0.82)'; ctx.fill();
  ctx.restore();
  roundRect(cx,cy,cw,ch,22*DPR); ctx.lineWidth=1.4*DPR; ctx.strokeStyle='rgba(180,160,235,0.35)'; ctx.stroke();
  ctx.save(); ctx.clip();
  // logo
  if(logoOK){ const ls=ch*0.34; ctx.globalAlpha=0.95; ctx.drawImage(logo, W/2-ls/2, cy+ch*0.10, ls,ls); ctx.globalAlpha=1; }
  // title
  ctx.textAlign='center'; ctx.fillStyle='#f3eeff';
  ctx.font=`800 ${Math.round(cw*0.085)}px -apple-system,system-ui,sans-serif`;
  ctx.fillText('✦ HAPPY BIRTHDAY ✦', W/2, cy+ch*0.56);
  // lyric lines appear in time
  ctx.font=`600 ${Math.round(cw*0.052)}px -apple-system,system-ui,sans-serif`;
  const t0=500, step=1600, fadeOut = tmod>7200 ? Math.max(0,1-(tmod-7200)/1000) : 1;
  for(let i=0;i<4;i++){
    const ap=easeOut(Math.min(1,Math.max(0,(tmod-(t0+i*step))/450)));
    if(ap<=0.01) continue;
    const cur = tmod>=t0+i*step && tmod<t0+(i+1)*step;
    ctx.globalAlpha=ap*fadeOut*(cur?1:0.62);
    ctx.fillStyle=cur?ACC[i+1]:'#cfc7e8';
    ctx.fillText(LYRICS[i], W/2, cy+ch*0.66 + i*(ch*0.075));
  }
  ctx.globalAlpha=1;
  // progress bar
  const bx=cx+cw*0.14, bw=cw*0.72, by=cy+ch*0.93, prog=Math.min(1,tmod/7200)*fadeOut;
  roundRect(bx,by,bw,4*DPR,2*DPR); ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fill();
  roundRect(bx,by,bw*prog,4*DPR,2*DPR); ctx.fillStyle=ACC[4]; ctx.fill();
  ctx.beginPath(); ctx.arc(bx+bw*prog,by+2*DPR,5*DPR,0,6.283); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();

  // ---- rising musical notes (emitted while playing) ----
  if(tmod<7300){
    const rnd=mulberry32(123);
    for(let i=0;i<16;i++){
      const birth=(rnd()*7200), life=2200, age=((tmod-birth)%LOOP);
      if(age<0||age>life) { rnd();rnd();rnd(); continue; }
      const lp=age/life, side=rnd()<0.5?-1:1;
      const sx=W/2 + side*(cw*0.3)*rnd(), sy=cy+ch*0.5;
      const x=sx + Math.sin(age*0.004 + i)*22*DPR, y=sy - lp*ch*0.9;
      ctx.globalAlpha=(1-lp)*0.9; ctx.fillStyle=ACC[i%ACC.length];
      ctx.font=`${(14+rnd()*10)*DPR}px serif`; ctx.fillText(i%2?'♪':'♫', x, y);
    }
    ctx.globalAlpha=1;
  }
}

// ---- driver ----
if(AUTO){
  window.__seek=t=>frame(t);
  const boot=()=>{ if(logoOK){ frame(0); window.__ready=true; } else requestAnimationFrame(boot); };
  boot();
} else {
  // Web Audio: generate the Happy Birthday melody on click
  let actx=null, started=false;
  const C4=261.63,D4=293.66,E4=329.63,F4=349.23,G4=392.0,A4=440.0,Bb4=466.16,C5=523.25;
  const MEL=[ [C4,.75],[C4,.25],[D4,1],[C4,1],[F4,1],[E4,2],
              [C4,.75],[C4,.25],[D4,1],[C4,1],[G4,1],[F4,2],
              [C4,.75],[C4,.25],[C5,1],[A4,1],[F4,1],[E4,1],[D4,2],
              [Bb4,.75],[Bb4,.25],[A4,1],[F4,1],[G4,1],[F4,2] ];
  function play(){ if(started)return; started=true;
    actx=new (window.AudioContext||window.webkitAudioContext)();
    const beat=0.42; let t=actx.currentTime+0.1;
    for(const [f,d] of MEL){ const o=actx.createOscillator(),g=actx.createGain();
      o.type='triangle'; o.frequency.value=f; o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.22,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.0001,t+d*beat*0.95); o.start(t); o.stop(t+d*beat); t+=d*beat; }
  }
  canvas.addEventListener('click', play);
  const start=performance.now();
  (function loop(now){ frame(now-start); requestAnimationFrame(loop); })(performance.now());
}
</script>
</body>
</html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Tone Matrix</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}
canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);color:#bfa9ff;font:13px/1.4 system-ui,sans-serif;
opacity:.7;letter-spacing:.04em;pointer-events:none;text-shadow:0 0 8px rgba(139,92,255,.6)}</style></head>
<body><canvas id="c"></canvas><div id="hint">▶ click cells to toggle — click to HEAR</div><script>
// Cosmos Tone Matrix — a 16x16 Tenori-on grid; a playhead column sweeps left→right looping and rings a soft sine/triangle
// bell for each lit cell (row=pitch on a minor-pentatonic scale). LIVE: click cells, real Web Audio. AUTO: silent seeded pattern.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto');
const LOOP=8000,TAU=6.28318530718,GRID=16;
const PENT=[0,3,5,7,10],BASE=146.83; // D3 minor pentatonic ladder
function semi(row){const r=GRID-1-row;return PENT[r%PENT.length]+12*Math.floor(r/PENT.length);}
function freq(row){return BASE*Math.pow(2,semi(row)/12);}
function rng(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const cells=[];for(let c=0;c<GRID;c++)cells.push(new Array(GRID).fill(false));
(function seed(){const r=rng(13377);
  for(let c=0;c<GRID;c++){
    const m=GRID-1-Math.round((GRID-1)*(0.5+0.42*Math.sin(TAU*c/GRID+0.6)));
    cells[c][m]=true;
    if(r()<0.45){const m2=Math.max(0,Math.min(GRID-1,m+(r()<0.5?3:-4)));cells[c][m2]=true;}
  }
})();
let W,H,DPR,M,gx,gy,cell;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  M=Math.min(W,H);const pad=M*0.05;cell=(M-2*pad)/GRID;gx=(W-cell*GRID)/2;gy=(H-cell*GRID)/2;}
rs();addEventListener('resize',rs);
// live blooms (user clicks). AUTO blooms are computed deterministically from u in render().
let liveBlooms=[];
// ---- audio (live only) ----
let actx,master;
function audio(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();
  master.gain.value=0.2;const comp=actx.createDynamicsCompressor();master.connect(comp);comp.connect(actx.destination);}
  if(actx.state==='suspended')actx.resume();return actx;}
function bell(f){const a=audio(),t=a.currentTime;
  const o1=a.createOscillator(),o2=a.createOscillator(),g=a.createGain(),g2=a.createGain();
  o1.type='sine';o2.type='triangle';o1.frequency.value=f;o2.frequency.value=f*2.001;g2.gain.value=0.35;o2.connect(g2);
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=f*6+1200;
  o1.connect(g);g2.connect(g);g.connect(lp);lp.connect(master);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.9,t+0.008);g.gain.exponentialRampToValueAtTime(0.0008,t+1.1);
  o1.start(t);o2.start(t);o1.stop(t+1.15);o2.stop(t+1.15);}
let lastCol=-1;
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
const ACC=hex('#8b5cff'),HOT=hex('#46b4ff'),WARM=hex('#ff5cc2');
const BLOOM_MS=750;
// bloom intensity for a given cell at fractional column position phf (continuous playhead, in cells).
// A cell blooms when the playhead last crossed its column. Returns 0..1 (fades over BLOOM_MS).
function bloomK(col,phf){
  // distance behind the playhead in columns (wrapping), converted to ms
  let d=phf-col;while(d<0)d+=GRID;            // columns since playhead struck this column
  const ms=d*(LOOP/GRID);
  if(ms>BLOOM_MS)return 0;return 1-ms/BLOOM_MS;
}
function render(u){
  const tNow=u*LOOP;
  const phf=u*GRID;const col=((Math.floor(phf)%GRID)+GRID)%GRID;
  if(col!==lastCol){lastCol=col;if(!AUTO){for(let row=0;row<GRID;row++)if(cells[col][row])bell(freq(row));}}
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const vg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(70,40,120,0.14)');vg.addColorStop(1,'rgba(139,92,255,0)');x.fillStyle=vg;x.fillRect(0,0,W,H);
  // active column highlight band
  const ax=gx+col*cell;const bg=x.createLinearGradient(ax,0,ax+cell,0);
  bg.addColorStop(0,'rgba(70,180,255,0)');bg.addColorStop(0.5,'rgba(70,180,255,0.16)');bg.addColorStop(1,'rgba(70,180,255,0)');
  x.fillStyle=bg;x.fillRect(ax,gy,cell,cell*GRID);
  x.globalCompositeOperation='lighter';
  for(let c=0;c<GRID;c++)for(let row=0;row<GRID;row++){
    const px=gx+c*cell,py=gy+row*cell,cx=px+cell/2,cy=py+cell/2,r=cell*0.34;
    if(cells[c][row]){
      const isCol=(c===col),f=isCol?1:0,col3=isCol?HOT:ACC;const R=r*(1.7+f*0.8);
      const gr=x.createRadialGradient(cx,cy,0,cx,cy,R);
      gr.addColorStop(0,'rgba(255,255,255,0.85)');
      gr.addColorStop(0.35,`rgba(${col3[0]},${col3[1]},${col3[2]},0.85)`);
      gr.addColorStop(1,`rgba(${col3[0]},${col3[1]},${col3[2]},0)`);
      x.fillStyle=gr;x.beginPath();x.arc(cx,cy,R,0,TAU);x.fill();
      // deterministic struck-bloom (the column the playhead recently passed)
      const k=bloomK(c,phf);
      if(k>0){const R2=cell*(0.34+(1-k)*1.4),a=k*0.7,c3=WARM;
        const gr2=x.createRadialGradient(cx,cy,0,cx,cy,R2);
        gr2.addColorStop(0,`rgba(255,255,255,${a*0.9})`);
        gr2.addColorStop(0.5,`rgba(${c3[0]},${c3[1]},${c3[2]},${a*0.6})`);
        gr2.addColorStop(1,`rgba(${c3[0]},${c3[1]},${c3[2]},0)`);
        x.fillStyle=gr2;x.beginPath();x.arc(cx,cy,R2,0,TAU);x.fill();}
    }else{x.fillStyle='rgba(139,92,255,0.10)';x.beginPath();x.arc(cx,cy,r*0.34,0,TAU);x.fill();}
  }
  // live click blooms
  liveBlooms=liveBlooms.filter(b=>{let age=tNow-b.t0;if(age<0)age+=LOOP;const k=age/BLOOM_MS;if(k>1)return false;
    const cx=gx+b.c*cell+cell/2,cy=gy+b.row*cell+cell/2,R=cell*(0.34+k*1.4),a=(1-k)*0.7,c3=WARM;
    const gr=x.createRadialGradient(cx,cy,0,cx,cy,R);gr.addColorStop(0,`rgba(255,255,255,${a*0.9})`);
    gr.addColorStop(0.5,`rgba(${c3[0]},${c3[1]},${c3[2]},${a*0.6})`);gr.addColorStop(1,`rgba(${c3[0]},${c3[1]},${c3[2]},0)`);
    x.fillStyle=gr;x.beginPath();x.arc(cx,cy,R,0,TAU);x.fill();return true;});
  x.globalCompositeOperation='source-over';
  // playhead line (sub-cell precision)
  const phx=gx+(phf%GRID)*cell;const lg=x.createLinearGradient(phx-cell*0.3,0,phx+cell*0.3,0);
  lg.addColorStop(0,'rgba(70,180,255,0)');lg.addColorStop(0.5,'rgba(120,210,255,0.55)');lg.addColorStop(1,'rgba(70,180,255,0)');
  x.fillStyle=lg;x.fillRect(phx-cell*0.3,gy,cell*0.6,cell*GRID);
  x.strokeStyle='rgba(139,92,255,0.18)';x.lineWidth=DPR;x.strokeRect(gx,gy,cell*GRID,cell*GRID);
}
if(!AUTO){
  function cellAt(ev){const rect=cv.getBoundingClientRect();const mx=(ev.clientX-rect.left)*DPR,my=(ev.clientY-rect.top)*DPR;
    const c=Math.floor((mx-gx)/cell),row=Math.floor((my-gy)/cell);
    if(c<0||c>=GRID||row<0||row>=GRID)return null;return{c,row};}
  cv.addEventListener('pointerdown',ev=>{audio();const h=cellAt(ev);if(h){cells[h.c][h.row]=!cells[h.c][h.row];
    if(cells[h.c][h.row]){bell(freq(h.row));liveBlooms.push({c:h.c,row:h.row,t0:(performance.now()%LOOP)});}}
    document.getElementById('hint').style.opacity=0;});
}
if(AUTO){
  // offset so t=0 shows the playhead mid-grid with cells already blooming behind it
  const OFF=LOOP*0.5;
  window.__seek=t=>render(((((t+OFF)%LOOP)+LOOP)%LOOP)/LOOP);
  window.__seek(0);window.__ready=true;
}else{
  const s=performance.now();
  (function l(n){render((((n-s)%LOOP)+LOOP)%LOOP/LOOP);requestAnimationFrame(l);})(performance.now());
}
</script></body></html>

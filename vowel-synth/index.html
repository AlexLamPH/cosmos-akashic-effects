<!doctype html><meta charset=utf8><title>Cosmos Vowel Synth</title>
<!-- Cosmos Vowel Synth — sawtooth glottal buzz through 3 parallel bandpass formant filters (F1/F2/F3) sings vowels A-E-I-O-U. XY pad morphs vowel (X axis) and pitch (Y axis). Glowing mouth shape + spectrum peaks animate. LIVE: click/drag to hear real sung tones; AUTO: silent seeded melody loops. -->
<style>
html,body{margin:0;background:#05030d;overflow:hidden;font-family:ui-monospace,Menlo,monospace}
canvas{position:fixed;inset:0;display:block}
#hint{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);color:#8b5cff;
  font-size:13px;letter-spacing:.5px;opacity:.85;pointer-events:none;
  text-shadow:0 0 14px #8b5cff99;transition:opacity .6s}
</style>
<canvas id=c></canvas>
<div id=hint>▶ click / drag to sing</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),hintEl=document.getElementById('hint');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=6000, TAU=Math.PI*2;
const ACC='#8b5cff';

// ---- mulberry32 seeded PRNG ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rng=mulberry32(20260615);

// ---- Vowel formant presets (standard IPA formant values, Hz) ----
// A       E       I       O       U
const VOWELS=['A','E','I','O','U'];
const F1=[730,530,270,570,300];
const F2=[1090,1840,2290,840,870];
const F3=[2440,2480,3010,2410,2240];

// ---- Pitch scale: minor pentatonic, A2 base, ~2.5 octaves ----
const BASE=110; // A2
const SCALE_SEMI=[0,3,5,7,10,12,15,17,19,22];
function semiToFreq(s){return BASE*Math.pow(2,s/12);}

// ---- Canvas resize ----
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
addEventListener('resize',resize);resize();

// ---- Helpers ----
function lerp(a,b,t){return a+(b-a)*t;}
function smooth(t){return t*t*(3-2*t);}

// ---- Seeded AUTO melody: NWP waypoints (vowelPos 0..4, pitchNorm 0..1) ----
const NWP=10;
const WP_V=[],WP_P=[];
for(let i=0;i<NWP;i++){
  WP_V.push(rng()*4);            // continuous vowel 0..4
  WP_P.push(0.12+rng()*0.76);    // pitch norm 0..1
}
// Phase offset: frame 0 is mid-morph (between waypoints), mouth open
const OFFSET=0.13;

function autoPath(u){
  const uo=((u+OFFSET)%1+1)%1;
  const n=NWP, s=uo*n, i=Math.floor(s)%n, f=smooth(s-Math.floor(s));
  return{
    vx:lerp(WP_V[i],WP_V[(i+1)%n],f),
    py:lerp(WP_P[i],WP_P[(i+1)%n],f)
  };
}

// ---- Interpolate formant freqs from continuous vowel pos (0..4) ----
function getFormants(vx){
  vx=Math.max(0,Math.min(3.9999,vx));
  const i=Math.min(Math.floor(vx),3), f=vx-i;
  return{
    f1:lerp(F1[i],F1[i+1],f),
    f2:lerp(F2[i],F2[i+1],f),
    f3:lerp(F3[i],F3[i+1],f)
  };
}
function nearestVowel(vx){return VOWELS[Math.round(Math.max(0,Math.min(4,vx)))];}

// ---- Live state ----
let liveVx=2, livePy=0.5, useLive=false;

// ---- render(u) — pure function; in AUTO mode, u drives everything ----
function render(u){
  let vx,py;
  if(useLive){vx=liveVx;py=livePy;}
  else{const ap=autoPath(u);vx=ap.vx;py=ap.py;}

  const fm=getFormants(vx);
  const pitchIdx=Math.round(py*(SCALE_SEMI.length-1));
  const pitchFreq=semiToFreq(SCALE_SEMI[Math.max(0,Math.min(SCALE_SEMI.length-1,pitchIdx))]);
  const vowelLabel=nearestVowel(vx);
  const vxFrac=vx-Math.floor(vx);
  const morphFrac=Math.min(vxFrac,1-vxFrac)*2; // 0 on vowel, 1 between vowels

  // ---- Background ----
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  const bg=ctx.createRadialGradient(W*0.5,H*0.46,0,W*0.5,H*0.46,Math.max(W,H)*0.72);
  bg.addColorStop(0,'#120b22');bg.addColorStop(1,'#05030d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // ---- Spectrum panel (left side) ----
  const specX=W*0.03, specY=H*0.12, specW=W*0.44, specH=H*0.50;
  ctx.globalAlpha=0.12;ctx.fillStyle=ACC;
  ctx.beginPath();ctx.roundRect(specX,specY,specW,specH,10*DPR);ctx.fill();
  ctx.globalAlpha=0.28;ctx.strokeStyle=ACC;ctx.lineWidth=1.2*DPR;
  ctx.beginPath();ctx.roundRect(specX,specY,specW,specH,10*DPR);ctx.stroke();

  // Freq axis: 200..3400 Hz, log scale
  const FMIN=200,FMAX=3400;
  function freqToX(f){return specX+specW*(Math.log(f/FMIN)/Math.log(FMAX/FMIN));}

  // Grid lines + labels
  const TICKS=[300,500,1000,2000,3000];
  for(const f of TICKS){
    const tx=freqToX(f);
    if(tx<specX||tx>specX+specW)continue;
    ctx.globalAlpha=0.18;ctx.strokeStyle=ACC;ctx.lineWidth=0.8*DPR;
    ctx.beginPath();ctx.moveTo(tx,specY);ctx.lineTo(tx,specY+specH);ctx.stroke();
    ctx.globalAlpha=0.38;ctx.fillStyle=ACC;ctx.font=(8.5*DPR)+'px ui-monospace,monospace';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(f>=1000?(f/1000)+'k':f,tx,specY-2*DPR);
  }

  // Noise floor baseline
  ctx.globalAlpha=0.12;ctx.strokeStyle=ACC;ctx.lineWidth=1.2*DPR;
  ctx.beginPath();
  for(let i=0;i<=80;i++){
    const t=i/80,x=specX+t*specW;
    const y=specY+specH*0.93-Math.sin(t*TAU*2+u*TAU*1.8)*specH*0.025;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
  ctx.stroke();

  // ---- Formant peaks ----
  const FCOLORS=['#8b5cff','#46b4ff','#36d39a'];
  const FFREQS=[fm.f1,fm.f2,fm.f3];
  const FAMPS=[1.0,0.82,0.65];
  const FLABS=['F1','F2','F3'];
  for(let fi=0;fi<3;fi++){
    const fx=freqToX(FFREQS[fi]);
    if(fx<specX||fx>specX+specW)continue;
    const col=FCOLORS[fi],amp=FAMPS[fi];
    // Glow blob (wide gradient)
    const bw=specW*0.12;
    const grd=ctx.createLinearGradient(fx-bw,0,fx+bw,0);
    grd.addColorStop(0,'rgba(0,0,0,0)');
    // parse color hex to rgb
    const rc=parseInt(col.slice(1,3),16),gc=parseInt(col.slice(3,5),16),bc=parseInt(col.slice(5,7),16);
    grd.addColorStop(0.5,`rgba(${rc},${gc},${bc},${0.6*amp})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=0.85;ctx.fillStyle=grd;
    ctx.fillRect(fx-bw,specY+specH*0.05,bw*2,specH*0.9);
    // Vertical spike
    ctx.globalAlpha=0.9*amp;ctx.strokeStyle=col;ctx.lineWidth=2.5*DPR;
    ctx.shadowBlur=16*DPR;ctx.shadowColor=col;
    ctx.beginPath();ctx.moveTo(fx,specY+specH*0.85);ctx.lineTo(fx,specY+specH*0.05);ctx.stroke();
    ctx.shadowBlur=0;
    // Labels above panel
    ctx.globalAlpha=0.85*amp;ctx.fillStyle=col;
    ctx.font=(9.5*DPR)+'px ui-monospace,monospace';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(FLABS[fi],fx,specY+specH+6*DPR);
    ctx.globalAlpha=0.65*amp;ctx.font=(8.5*DPR)+'px ui-monospace,monospace';
    ctx.fillText(FFREQS[fi].toFixed(0),fx,specY+specH+17*DPR);
  }

  // ---- Mouth shape (below spectrum) ----
  const mCX=specX+specW*0.5, mCY=H*0.79;
  // F1 controls opening: A=730 (wide open), I=270 (nearly closed)
  const f1norm=(fm.f1-270)/(730-270); // 0=closed, 1=wide open
  // F2 controls width: high F2 (I/E) = spread/wide, low F2 (O/U) = rounded/narrow
  const f2norm=(fm.f2-840)/(2290-840); // 0=round/narrow, 1=spread/wide
  const mW=DPR*(44+f2norm*38);   // 44..82 px * DPR (width half)
  const mH=DPR*(5+f1norm*26);    // 5..31 px * DPR (height half)

  // Outer glow ring
  ctx.globalAlpha=0.15;ctx.strokeStyle=ACC;ctx.lineWidth=10*DPR;
  ctx.shadowBlur=20*DPR;ctx.shadowColor=ACC;
  ctx.beginPath();ctx.ellipse(mCX,mCY,mW*1.2,mH*1.4+12*DPR,0,0,TAU);ctx.stroke();
  ctx.shadowBlur=0;

  // Face/jaw ellipse subtle
  ctx.globalAlpha=0.1;ctx.fillStyle=ACC;
  ctx.beginPath();ctx.ellipse(mCX,mCY,mW*1.5,mH*2.0+18*DPR,0,0,TAU);ctx.fill();

  // Mouth interior glow
  const mg=ctx.createRadialGradient(mCX,mCY,0,mCX,mCY,mW*1.05);
  mg.addColorStop(0,'rgba(200,160,255,0.60)');
  mg.addColorStop(0.55,'rgba(139,92,255,0.28)');
  mg.addColorStop(1,'rgba(139,92,255,0)');
  ctx.globalAlpha=0.8+morphFrac*0.18;ctx.fillStyle=mg;
  ctx.beginPath();ctx.ellipse(mCX,mCY,mW,mH+2*DPR,0,0,TAU);ctx.fill();

  // Lip outline
  ctx.globalAlpha=0.75;ctx.strokeStyle='#c49aff';ctx.lineWidth=2.2*DPR;
  ctx.shadowBlur=10*DPR;ctx.shadowColor=ACC;
  ctx.beginPath();ctx.ellipse(mCX,mCY,mW,mH,0,0,TAU);ctx.stroke();
  ctx.shadowBlur=0;

  // ---- Big vowel label ----
  const labelX=specX+specW*0.5, labelY=H*0.655;
  // Ghost backdrop
  ctx.globalAlpha=0.07+morphFrac*0.04;ctx.fillStyle=ACC;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold '+(108*DPR)+'px ui-monospace,monospace';
  ctx.fillText(vowelLabel,labelX,labelY);
  // Foreground label
  ctx.globalAlpha=0.92;ctx.fillStyle=ACC;
  ctx.shadowBlur=24*DPR;ctx.shadowColor=ACC;
  ctx.font='bold '+(52*DPR)+'px ui-monospace,monospace';
  ctx.fillText(vowelLabel,labelX,labelY);
  ctx.shadowBlur=0;

  // Readout
  ctx.globalAlpha=0.72;ctx.fillStyle=ACC;
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.font=(11*DPR)+'px ui-monospace,monospace';
  ctx.fillText('PITCH '+pitchFreq.toFixed(1)+' Hz',specX+4*DPR,specY-20*DPR);
  ctx.globalAlpha=0.45;ctx.font=(9.5*DPR)+'px ui-monospace,monospace';
  ctx.fillText('F1 '+fm.f1.toFixed(0)+'  F2 '+fm.f2.toFixed(0)+'  F3 '+fm.f3.toFixed(0),specX+4*DPR,specY-9*DPR);

  // ---- XY pad (right side) ----
  const padX=W*0.53, padY=H*0.12, padW=W*0.43, padH=H*0.76;
  ctx.globalAlpha=0.15;ctx.fillStyle=ACC;
  ctx.beginPath();ctx.roundRect(padX,padY,padW,padH,12*DPR);ctx.fill();
  ctx.globalAlpha=0.32;ctx.strokeStyle=ACC;ctx.lineWidth=1.3*DPR;
  ctx.beginPath();ctx.roundRect(padX,padY,padW,padH,12*DPR);ctx.stroke();

  // Vowel labels along X axis (top of pad)
  for(let i=0;i<VOWELS.length;i++){
    const lx=padX+(i/4)*padW;
    const isNear=nearestVowel(vx)===VOWELS[i];
    ctx.globalAlpha=isNear?0.95:0.38;
    ctx.fillStyle=isNear?'#c49aff':ACC;
    ctx.font=(isNear?13:10)*DPR+'px ui-monospace,monospace';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    if(isNear){ctx.shadowBlur=10*DPR;ctx.shadowColor=ACC;}
    ctx.fillText(VOWELS[i],lx,padY-7*DPR);
    ctx.shadowBlur=0;
  }
  // Vertical divider ticks
  for(let i=1;i<4;i++){
    const tx=padX+(i/4)*padW;
    ctx.globalAlpha=0.12;ctx.strokeStyle=ACC;ctx.lineWidth=0.8*DPR;
    ctx.beginPath();ctx.moveTo(tx,padY+4*DPR);ctx.lineTo(tx,padY+padH-4*DPR);ctx.stroke();
  }
  // Axis labels
  ctx.globalAlpha=0.35;ctx.fillStyle=ACC;ctx.font=(9*DPR)+'px ui-monospace,monospace';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('HIGH PITCH',padX+padW/2,padY+4*DPR);
  ctx.textBaseline='bottom';
  ctx.fillText('LOW PITCH',padX+padW/2,padY+padH-4*DPR);
  ctx.save();ctx.translate(padX-13*DPR,padY+padH/2);ctx.rotate(-Math.PI/2);
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('PITCH',0,0);ctx.restore();

  // Cursor in XY pad
  const curX=padX+(vx/4)*padW;
  const curY=padY+(1-py)*padH;
  // Crosshair
  ctx.globalAlpha=0.13;ctx.strokeStyle=ACC;ctx.lineWidth=1*DPR;
  ctx.beginPath();ctx.moveTo(curX,padY+2);ctx.lineTo(curX,padY+padH-2);
  ctx.moveTo(padX+2,curY);ctx.lineTo(padX+padW-2,curY);ctx.stroke();
  // Halo
  const hg=ctx.createRadialGradient(curX,curY,0,curX,curY,32*DPR);
  hg.addColorStop(0,'rgba(200,170,255,.95)');hg.addColorStop(0.35,ACC);hg.addColorStop(1,'rgba(139,92,255,0)');
  ctx.globalAlpha=0.65;ctx.fillStyle=hg;
  ctx.beginPath();ctx.arc(curX,curY,32*DPR,0,TAU);ctx.fill();
  // Dot
  ctx.globalAlpha=1;ctx.fillStyle='#fff';
  ctx.shadowBlur=10*DPR;ctx.shadowColor='#fff';
  ctx.beginPath();ctx.arc(curX,curY,5*DPR,0,TAU);ctx.fill();
  ctx.shadowBlur=0;

  // Footer
  ctx.globalAlpha=0.3;ctx.font=(9*DPR)+'px ui-monospace,monospace';
  ctx.textAlign='left';ctx.textBaseline='bottom';ctx.fillStyle=ACC;
  ctx.fillText('VOWEL SYNTH',W*0.03,H*0.97);
  ctx.textAlign='right';
  ctx.fillText('X: VOWEL  Y: PITCH',W*0.97,H*0.97);
}

// ================= BOOT =================
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){
  window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);
  window.__seek(0); window.__ready=true;
} else {
  // ---- LIVE: wire audio on first gesture ----
  let actx,osc,vca,masterGain,comp;
  let filt=[],filtG=[];
  let audioReady=false,pointerDown=false,singing=false;

  function initAudio(){
    if(audioReady)return; audioReady=true;
    actx=new(window.AudioContext||window.webkitAudioContext)();
    // Master chain
    masterGain=actx.createGain(); masterGain.gain.value=0.18;
    comp=actx.createDynamicsCompressor();
    comp.threshold.value=-18;comp.knee.value=8;comp.ratio.value=4;
    comp.attack.value=0.003;comp.release.value=0.1;
    masterGain.connect(comp);comp.connect(actx.destination);
    // VCA (output envelope, starts silent)
    vca=actx.createGain();vca.gain.value=0.0001;
    vca.connect(masterGain);
    // 3 parallel bandpass formant filters
    const Qs=[8,10,12];
    for(let i=0;i<3;i++){
      const f=actx.createBiquadFilter();f.type='bandpass';
      f.frequency.value=[730,1090,2440][i];f.Q.value=Qs[i];
      const g=actx.createGain();g.gain.value=[1.2,0.9,0.6][i];
      f.connect(g);g.connect(vca);
      filt.push(f);filtG.push(g);
    }
    // Sawtooth oscillator — glottal buzz source
    osc=actx.createOscillator();osc.type='sawtooth';
    osc.frequency.value=110;
    for(let i=0;i<3;i++)osc.connect(filt[i]);
    osc.start();
  }

  function resumeCtx(){if(actx&&actx.state==='suspended')actx.resume();}

  function startSing(){
    if(!audioReady)return;
    resumeCtx();
    if(!singing){singing=true;
      vca.gain.cancelScheduledValues(actx.currentTime);
      vca.gain.setTargetAtTime(0.9,actx.currentTime,0.05);}
  }
  function stopSing(){
    if(!actx||!singing)return;
    singing=false;
    vca.gain.cancelScheduledValues(actx.currentTime);
    vca.gain.setTargetAtTime(0.0001,actx.currentTime,0.09);
  }
  function updateAudio(){
    if(!actx||!singing)return;
    const fm=getFormants(liveVx);
    const pitchIdx=Math.round(livePy*(SCALE_SEMI.length-1));
    const pf=semiToFreq(SCALE_SEMI[Math.max(0,Math.min(SCALE_SEMI.length-1,pitchIdx))]);
    const t=actx.currentTime;
    osc.frequency.setTargetAtTime(pf,t,0.03);
    filt[0].frequency.setTargetAtTime(fm.f1,t,0.05);
    filt[1].frequency.setTargetAtTime(fm.f2,t,0.05);
    filt[2].frequency.setTargetAtTime(fm.f3,t,0.05);
  }

  function getPad(e){
    const r=cv.getBoundingClientRect();
    const padXn=0.53,padYn=0.12,padWn=0.43,padHn=0.76;
    const nx=(e.clientX-r.left)/r.width, ny=(e.clientY-r.top)/r.height;
    return{
      vx:Math.max(0,Math.min(4,(nx-padXn)/padWn*4)),
      py:1-Math.max(0,Math.min(1,(ny-padYn)/padHn))
    };
  }

  cv.addEventListener('pointerdown',e=>{
    e.preventDefault();
    initAudio();
    const p=getPad(e);liveVx=p.vx;livePy=p.py;
    pointerDown=true;useLive=true;
    startSing();updateAudio();
    hintEl.style.opacity='0';
    cv.setPointerCapture(e.pointerId);
  });
  cv.addEventListener('pointermove',e=>{
    if(!pointerDown)return;
    e.preventDefault();
    const p=getPad(e);liveVx=p.vx;livePy=p.py;
    updateAudio();
  });
  cv.addEventListener('pointerup',()=>{pointerDown=false;stopSing();});
  cv.addEventListener('pointercancel',()=>{pointerDown=false;stopSing();});

  // Attract + live render loop
  const s=performance.now();
  (function l(n){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l);})(performance.now());
}
</script>

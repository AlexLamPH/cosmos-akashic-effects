<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Voronoi</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Voronoi — animated cellular noise: feature points drift on looping orbits, glowing F2-F1 cell edges over accent-tinted cells, real WebGL GLSL fragment shader. Deterministic, seamless (uT loops 0..1).
const cv=document.getElementById('c');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000;
const gl=cv.getContext('webgl',{antialias:false,depth:false,preserveDrawingBuffer:true});
const VERT='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG=`precision highp float; uniform vec2 uRes; uniform float uT;
#define TAU 6.28318530718
float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
vec2 hash2(vec2 p){return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
 float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
 return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
// animated voronoi: each cell's feature point orbits on a looping circle -> seamless
// returns F1, F2, and the closest cell id hash in .z
vec3 voronoi(vec2 x,float ph,out float cid){
 vec2 n=floor(x), f=fract(x);
 float F1=8.0, F2=8.0; cid=0.0;
 for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){
  vec2 g=vec2(float(i),float(j));
  vec2 o=hash2(n+g);
  float seed=hash(n+g)*TAU;
  // point drifts around its base on a circle of radius from its hash -> periodic in ph
  vec2 pt=g + 0.5 + 0.42*vec2(cos(ph+seed), sin(ph+seed)) - f;
  float d=dot(pt,pt);
  if(d<F1){F2=F1;F1=d;cid=hash(n+g);} else if(d<F2){F2=d;}
 }
 return vec3(sqrt(F1),sqrt(F2),0.0);
}
vec3 shade(vec2 uv,float t){
 float ph=t*TAU;
 vec2 p=uv*3.2;
 // slow looping pan of the whole field
 p+=0.6*vec2(cos(ph),sin(ph));
 float cid;
 vec3 v=voronoi(p,ph,cid);
 float F1=v.x, F2=v.y;
 float edge=F2-F1;                          // small near cell borders
 // accent palette per cell id
 vec3 violet=vec3(0.545,0.36,1.0), cosmic=vec3(0.27,0.71,1.0), nebula=vec3(1.0,0.36,0.76), aurora=vec3(0.21,0.83,0.60), solaris=vec3(1.0,0.42,0.24);
 vec3 ca = mix(violet,cosmic,fract(cid*3.13));
 vec3 cb = mix(nebula,aurora,fract(cid*7.71));
 vec3 cellCol = mix(ca,cb,fract(cid*11.7));
 vec3 base=vec3(0.018,0.012,0.045);
 // dim cell fill: brighter toward cell center (small F1)
 float fill=smoothstep(0.9,0.0,F1);
 vec3 col=base;
 col=mix(col, cellCol*0.35, fill*0.7);
 // glowing edges: narrow bright bands where F2-F1 is tiny
 float glow=smoothstep(0.10,0.0,edge);
 float core=smoothstep(0.035,0.0,edge);
 vec3 edgeCol = mix(cosmic,solaris,0.5+0.5*sin(cid*20.0+ph));
 col += edgeCol*glow*0.9;
 col += vec3(0.9,0.95,1.0)*core*0.8;        // hot white edge core
 // shimmer over time
 float shimmer=0.7+0.3*sin(ph*2.0 + cid*30.0);
 col*=shimmer;
 col+=cellCol*fill*0.12;
 return col;}
void main(){ vec2 uv=(gl_FragCoord.xy*2.0-uRes)/min(uRes.x,uRes.y); vec3 col=shade(uv,uT);
 col=pow(clamp(col,0.,1.),vec3(0.4545)); gl_FragColor=vec4(col,1.0);}`;
function sh(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);
 if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'uRes'),uT=gl.getUniformLocation(prog,'uT');
let DPR;function rs(){DPR=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';gl.viewport(0,0,cv.width,cv.height);}
rs();addEventListener('resize',rs);
function render(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uT,u);gl.drawArrays(gl.TRIANGLES,0,3);}
if(AUTO){window.__seek=t=>render(t);render(0);window.__ready=true;}else{const s=performance.now();(function l(n){render(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

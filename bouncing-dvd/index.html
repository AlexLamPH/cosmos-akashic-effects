  const mix=0.55+0.25*corner;
  tg.addColorStop(0,'rgba('+c0[0]+','+c0[1]+','+c0[2]+','+mix+')');
  tg.addColorStop(1,'rgba('+c1[0]+','+c1[1]+','+c1[2]+','+mix+')');
  ctx.fillStyle=tg;ctx.fillRect(x,y,lw,lh);
  ctx.restore();
  // bright additive rim of logo on corner hits
  if(corner>0.02){
    ctx.globalCompositeOperation='lighter';ctx.globalAlpha=corner;
    ctx.drawImage(samp,0,0,SZ,SZ,x,y,lw,lh);ctx.globalAlpha=1;
  }
  ctx.globalCompositeOperation='source-over';
}
if(AUTO){buildSamples();/* readiness set inside buildSamples once logo is sampled */}
else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

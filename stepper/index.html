<!-- Cosmos Stepper: a 4-step progress wizard (icons + labels + connecting progress bar). The active step pulses, completed steps flip to a checkmark, the connector fills with accent. Real-click live; deterministic looping auto-demo via render(u)/__seek that steps forward then resets. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Stepper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.card{width:640px;background:linear-gradient(160deg,#15112a,#0e0b1f);
  border:1px solid rgba(139,92,255,.18);border-radius:22px;
  box-shadow:0 26px 64px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.02) inset;
  padding:40px 46px 34px}
.cap{font-size:12px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;
  color:#8b5cff;text-align:center;margin-bottom:4px}
.h{font-size:18px;font-weight:700;color:#f0eeff;text-align:center;margin-bottom:34px;letter-spacing:.2px}
.steps{position:relative;display:flex;justify-content:space-between;padding:0 6px}
/* track + fill sit behind the nodes, centred on the circle row */
.track{position:absolute;left:34px;right:34px;top:23px;height:4px;border-radius:4px;
  background:rgba(255,255,255,.08);overflow:hidden}
.fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;width:0;
  background:linear-gradient(90deg,#8b5cff,#46b4ff);
  box-shadow:0 0 14px rgba(139,92,255,.6)}
.step{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:48px}
.node{position:relative;width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#1a1531;border:2px solid rgba(255,255,255,.12);
  color:#7d789c;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.node svg{width:22px;height:22px;display:block}
.node .ico{position:absolute;transition:none}
.node .chk{position:absolute}
.ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid #8b5cff;opacity:0}
.lbl{margin-top:13px;font-size:12.5px;font-weight:600;color:#7d789c;text-align:center;white-space:nowrap}
.sub{margin-top:2px;font-size:10.5px;color:#56516f;text-align:center}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:36px}
.pct{font-size:12px;color:#9a96ba}
.pct b{color:#eceaff;font-weight:700}
.btn{font-size:13px;font-weight:600;color:#fff;padding:9px 20px;border-radius:11px;border:none;
  background:linear-gradient(135deg,#8b5cff,#6a3ff0);cursor:pointer;
  box-shadow:0 8px 20px -6px rgba(139,92,255,.7)}
.btn.ghost{background:transparent;color:#9a96ba;box-shadow:none;border:1px solid rgba(255,255,255,.1)}
</style></head>
<body><div id="wrap">
  <div class="card">
    <div class="cap">Account Setup</div>
    <div class="h">Create your Cosmos workspace</div>
    <div class="steps" id="steps">
      <div class="track"><div class="fill" id="fill"></div></div>
    </div>
    <div class="foot">
      <button class="btn ghost">Back</button>
      <div class="pct"><b id="pct">25%</b> complete</div>
      <button class="btn" id="next">Continue</button>
    </div>
  </div>
</div>
<script>
const STEPS=[
  {l:'Profile', s:'Your details',
   ico:'<path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4 0-7 2-7 5v1h14v-1c0-3-3-5-7-5z"/>'},
  {l:'Workspace', s:'Team & name',
   ico:'<path d="M4 7h16v3H4zM4 12h7v8H4zM13 12h7v8h-7z"/>'},
  {l:'Billing', s:'Choose a plan',
   ico:'<path d="M3 6h18v4H3zM3 12h18v6a1 1 0 01-1 1H4a1 1 0 01-1-1zM6 16h5v2H6z"/>'},
  {l:'Done', s:'All set',
   ico:'<path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 15.3 7.2 17.7l.9-5.4L4.2 8.5l5.4-.8z"/>'}
];
const CHK='<path d="M5 12.5l4.2 4.2L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>';
const N=STEPS.length;
const stepsEl=document.getElementById('steps'),fill=document.getElementById('fill'),pct=document.getElementById('pct');
const nodes=[];
STEPS.forEach(s=>{
  const d=document.createElement('div');d.className='step';
  d.innerHTML='<div class="node"><div class="ring"></div>'
    +'<svg class="ico" viewBox="0 0 24 24" fill="currentColor">'+s.ico+'</svg>'
    +'<svg class="chk" viewBox="0 0 24 24">'+CHK+'</svg></div>'
    +'<div class="lbl">'+s.l+'</div><div class="sub">'+s.s+'</div>';
  stepsEl.appendChild(d);
  nodes.push({el:d,node:d.querySelector('.node'),ico:d.querySelector('.ico'),
    chk:d.querySelector('.chk'),ring:d.querySelector('.ring'),
    lbl:d.querySelector('.lbl'),sub:d.querySelector('.sub')});
});

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t;
const easeIO=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const VIOLET=[139,92,255],COSMIC=[70,180,255],IDLE=[26,21,49],BORD_OFF='rgba(255,255,255,.12)';
const rgb=c=>'rgb('+c[0]+','+c[1]+','+c[2]+')';

// active: continuous step pointer in [0, N-1]. completed if i < floor(active) (rounded by progress)
function render(u){
  // 6 phases: start at step1 active, then 3 advances, then a settle, then reset sweep back.
  // map u -> continuous progress p in [0, N-1]
  const segs=N-1;            // 3 advance transitions
  let p;
  const holdReset=0.16;      // tail: collapse back to start
  if(u<1-holdReset){
    const uu=u/(1-holdReset);              // 0..1 across the forward journey
    const f=uu*segs;                       // 0..3
    const i=Math.floor(clamp(f,0,segs-0.0001));
    const fr=easeIO(clamp(f-i,0,1));       // eased transition within a segment
    p=i+fr;
  }else{
    const uu=(u-(1-holdReset))/holdReset;  // 0..1 reset
    p=lerp(segs,0,easeIO(uu));             // glide all the way back to step 1
  }

  // progress fill width: fraction of full track
  const frac=clamp(p/segs,0,1);
  fill.style.width=(frac*100).toFixed(2)+'%';
  pct.textContent=Math.round(lerp(25,100,frac))+'%';

  for(let i=0;i<N;i++){
    const nd=nodes[i];
    // how "reached" is this node by the moving head p: 1 when head at/after it
    const reach=clamp(p-i+1,0,1);          // becomes 1 once p>=i
    const completed=clamp(p-i,0,1);        // 1 once head has fully passed this node
    const active=clamp(1-Math.abs(p-i),0,1); // peaks when head sits on node i

    // node fill / border colour blends idle -> accent as it's reached
    const col=reach>0.5?
      [Math.round(lerp(VIOLET[0],COSMIC[0],i/(N-1))),
       Math.round(lerp(VIOLET[1],COSMIC[1],i/(N-1))),
       Math.round(lerp(VIOLET[2],COSMIC[2],i/(N-1)))]:IDLE;
    const isOn=reach>0.5;
    nd.node.style.background=isOn?rgb(col):rgb(IDLE);
    nd.node.style.borderColor=isOn?rgb(col):BORD_OFF;
    nd.node.style.color=isOn?'#fff':'#7d789c';
    // active glow + scale pop
    const sc=1+0.12*active;
    nd.node.style.transform='scale('+sc.toFixed(3)+')';
    nd.node.style.boxShadow=isOn
      ?'0 6px 22px -4px rgba(139,92,255,'+(0.5+0.4*active).toFixed(2)+')'
      :'0 4px 14px rgba(0,0,0,.4)';
    // pulsing ring on the active node
    nd.ring.style.opacity=(active*0.9).toFixed(2);
    nd.ring.style.transform='scale('+(1+active*0.18).toFixed(3)+')';

    // icon <-> checkmark crossfade: show check once completed past ~0.5
    const checked=completed>0.55;
    nd.chk.style.opacity=checked?1:0;
    nd.ico.style.opacity=checked?0:1;
    nd.ico.style.transform='scale('+(checked?0.6:1).toFixed(2)+')';
    nd.chk.style.transform='scale('+(checked?1:0.6).toFixed(2)+')';

    // label brightens as reached / active
    const lbU=Math.max(reach,active);
    nd.lbl.style.color=lbU>0.5?'#eceaff':'#7d789c';
    nd.sub.style.color=lbU>0.5?'#9a96ba':'#56516f';
  }
}
// smooth icon/check swaps in LIVE only
nodes.forEach(n=>{n.ico.style.transition='opacity .25s,transform .25s';
  n.chk.style.transition='opacity .25s,transform .25s';
  n.node.style.transition='background .3s,border-color .3s,box-shadow .3s,transform .3s,color .3s';
  n.ring.style.transition='opacity .3s,transform .3s';});

const LOOP=6800, OFF=0.30; // OFF: frame 0 lands mid-advance (step 2 lighting up) — rich, not at start
const seek=u=>render(((u+OFF)%1+1)%1);
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){
  nodes.forEach(n=>{n.ico.style.transition='none';n.chk.style.transition='none';
    n.node.style.transition='none';n.ring.style.transition='none';});
  window.__seek=t=>seek(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;
}else{ const s=performance.now(); (function l(n){ seek((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l);})(performance.now()); }
</script></body></html>

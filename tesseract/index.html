<!-- Cosmos Tesseract: a 4D hypercube (16 vertices, 32 glowing edges) rotates in the XW & YZ planes, projects 4D->3D->2D by hand; depth-based brightness makes a mesmerizing nested-cube morph. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Tesseract</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
const cv=document.getElementById('c'),x=cv.getContext('2d'),TAU=Math.PI*2;
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x7E55EAC7);
// 16 vertices: all (±1,±1,±1,±1). Edge iff two vertices differ in exactly one coordinate -> 32 edges.
const V4=[];for(let i=0;i<16;i++)V4.push([(i&1?1:-1),(i&2?1:-1),(i&4?1:-1),(i&8?1:-1)]);
const E=[];for(let i=0;i<16;i++)for(let j=i+1;j<16;j++){let d=0;for(let k=0;k<4;k++)if(V4[i][k]!==V4[j][k])d++;if(d===1)E.push([i,j]);}
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#e0b24a','#ff6a3d'];
const ECOL=E.map((_,i)=>COL[i%COL.length]);
const STARS=[];for(let i=0;i<80;i++)STARS.push({a:rnd()*TAU,d:0.4+rnd()*0.85,s:0.5+rnd()*1.5,c:COL[i%6],ph:rnd()});
const F4=3.2; // 4D->3D perspective distance (camera along +w)
const F3=3.4; // 3D->2D perspective distance (camera along +z)
function frame(t){
  const LOOP=7800,u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.setTransform(DPR,0,0,DPR,0,0);x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.30;
  x.globalCompositeOperation='lighter';
  let bg=x.createRadialGradient(cx,cy,0,cx,cy,R*2.6);
  bg.addColorStop(0,'rgba(139,92,255,0.20)');bg.addColorStop(0.5,'rgba(70,180,255,0.07)');bg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=bg;x.beginPath();x.arc(cx,cy,R*2.6,0,TAU);x.fill();
  for(const s of STARS){const rad=R*(1.35+s.d*1.0),px=cx+Math.cos(s.a)*rad,py=cy+Math.sin(s.a)*rad*0.92;
    const tw=0.4+0.6*Math.sin(TAU*(u+s.ph));x.globalAlpha=0.18+0.4*tw;x.fillStyle=s.c;
    x.beginPath();x.arc(px,py,s.s*(0.7+tw),0,TAU);x.fill();}
  x.globalAlpha=1;
  // 4D rotation: XW plane by a=2*pi*u, YZ plane by b=2*pi*u (both integer k -> seamless).
  const a=TAU*u, ca=Math.cos(a), sa=Math.sin(a);
  const b=TAU*u, cb=Math.cos(b), sb=Math.sin(b);
  const tilt=0.5, ct=Math.cos(tilt), st=Math.sin(tilt); // fixed 3D tilt for readability
  const P=V4.map(v=>{
    let X=v[0],Y=v[1],Z=v[2],Wc=v[3];
    let X2=X*ca - Wc*sa, W2=X*sa + Wc*ca;            // XW-plane rotation
    let Y2=Y*cb - Z*sb,  Z2=Y*sb + Z*cb;             // YZ-plane rotation
    const s4=F4/(F4 - W2);                            // 4D->3D perspective (smaller w => deeper)
    let x3=X2*s4, y3=Y2*s4, z3=Z2*s4;
    const y3t=y3*ct - z3*st, z3t=y3*st + z3*ct;       // tilt about X (3D)
    const s3=F3/(F3 + z3t);                           // 3D->2D perspective
    return [cx+x3*R*s3, cy+y3t*R*s3, z3t, s3, s4];
  });
  const zmin=Math.min(...P.map(p=>p[2])),zmax=Math.max(...P.map(p=>p[2])),zr=(zmax-zmin)||1;
  const dep=z=>1-(z-zmin)/zr; // 1=nearest .. 0=farthest
  let hg=x.createRadialGradient(cx,cy,R*0.2,cx,cy,R*1.25);
  hg.addColorStop(0,'rgba(70,180,255,0.10)');hg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=hg;x.beginPath();x.arc(cx,cy,R*1.25,0,TAU);x.fill();
  const order=E.map((e,i)=>i).sort((p,q)=>(P[E[q][0]][2]+P[E[q][1]][2])-(P[E[p][0]][2]+P[E[p][1]][2]));
  for(const i of order){const A=P[E[i][0]],B=P[E[i][1]];
    const dd=(dep(A[2])+dep(B[2]))/2;
    const w=1.0+dd*3.6, al=0.20+dd*0.80;
    x.strokeStyle=ECOL[i];x.globalAlpha=al;x.lineWidth=w;x.lineCap='round';
    x.beginPath();x.moveTo(A[0],A[1]);x.lineTo(B[0],B[1]);x.stroke();
    if(dd>0.5){x.strokeStyle='rgba(255,255,255,'+((dd-0.5)*0.9)+')';x.lineWidth=w*0.35;
      x.beginPath();x.moveTo(A[0],A[1]);x.lineTo(B[0],B[1]);x.stroke();}}
  const VC=[[160,200,255],[139,92,255],[70,180,255],[255,92,194],[54,211,154],[224,178,74]];
  for(let i=0;i<16;i++){const p=P[i],dd=dep(p[2]),rr=(1.4+dd*3.6)*p[3],c=VC[i%6];
    let g=x.createRadialGradient(p[0],p[1],0,p[0],p[1],rr*3);
    g.addColorStop(0,'rgba(255,255,255,'+(0.5+dd*0.45)+')');
    g.addColorStop(0.45,'rgba('+c[0]+','+c[1]+','+c[2]+','+(0.3+dd*0.4)+')');
    g.addColorStop(1,'rgba(5,3,13,0)');
    x.globalAlpha=1;x.fillStyle=g;x.beginPath();x.arc(p[0],p[1],rr*3,0,TAU);x.fill();
    x.fillStyle='rgba(255,255,255,'+(0.55+dd*0.4)+')';x.beginPath();x.arc(p[0],p[1],rr*0.7,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';x.globalAlpha=1;
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

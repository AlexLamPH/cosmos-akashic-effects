<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Hamburger Menu</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Hamburger Menu — three accent strokes morph from a menu icon into an X and back: top/bottom lines rotate+translate to the cross while the middle fades, smooth ping-pong loop with glow. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=6500,TAU=6.28318530718;
let W,H,DPR,cx,cy,S,sparks=[];
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;S=Math.min(W,H)*0.22;
  const r=mul(1357);sparks=[];for(let i=0;i<14;i++){sparks.push({a:r()*TAU,d:0.8+r()*0.9,sz:1+r()*2,col:AC[(r()*AC.length)|0]});}}
rs();addEventListener('resize',rs);
function bar(yoff,ang,al,col,len){// draw a glowing rounded stroke centred at (cx,cy+yoff*S) rotated by ang, length len*S
  if(al<=0.001)return;const hl=len*S*0.92;
  const dx=Math.cos(ang)*hl,dy=Math.sin(ang)*hl;
  const ox=cx,oy=cy+yoff*S;
  x.lineCap='round';
  x.lineWidth=(S*0.22+4)*DPR;x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${al*0.28})`;
  x.beginPath();x.moveTo(ox-dx,oy-dy);x.lineTo(ox+dx,oy+dy);x.stroke();      // soft glow underlay
  x.lineWidth=S*0.13*DPR;x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${al})`;
  x.beginPath();x.moveTo(ox-dx,oy-dy);x.lineTo(ox+dx,oy+dy);x.stroke();      // crisp core
  x.lineWidth=S*0.05*DPR;x.strokeStyle=`rgba(255,255,255,${al*0.7})`;
  x.beginPath();x.moveTo(ox-dx,oy-dy);x.lineTo(ox+dx,oy+dy);x.stroke();}     // bright centerline
function frame(t){let u=((t%LOOP)+LOOP)%LOOP/LOOP;
  // ping-pong morph m: 0=menu(≡) -> 1=X -> 0; ease for snappiness
  const pp=0.5-0.5*Math.cos(TAU*u);
  const m=pp*pp*(3-2*pp);                         // smoothstep ease
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // ambient ring glow that brightens as it reaches the X
  const rg=x.createRadialGradient(cx,cy,0,cx,cy,S*2.4);
  rg.addColorStop(0,`rgba(70,180,255,${0.10+0.16*m})`);
  rg.addColorStop(0.5,`rgba(139,92,255,${0.06+0.10*m})`);
  rg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=rg;x.beginPath();x.arc(cx,cy,S*2.4,0,TAU);x.fill();
  // sparkles flare at the moment of the X (m near 1)
  const flare=Math.max(0,m-0.45)/0.55;
  sparks.forEach(p=>{if(flare<=0.01)return;const R=S*(0.8+1.5*flare)*p.d;
    const px=cx+Math.cos(p.a)*R,py=cy+Math.sin(p.a)*R;const al=flare*(1-0.4*flare);
    const sz=p.sz*(0.6+flare)*DPR;
    x.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${al})`;
    x.beginPath();x.arc(px,py,sz,0,TAU);x.fill();});
  // top line: menu y=-0.55,ang=0 -> X centre y=0,ang=+45deg
  const aX=Math.PI/4;
  const cTop=[139,92,255], cMid=[70,180,255], cBot=[255,92,194];
  bar(-0.55*(1-m), aX*m, 1, lerpC(cTop,[255,106,61],m), 1.0+0.06*m);
  // middle line: present at menu, fades & shrinks as it becomes X
  bar(0, 0, 1-m, cMid, 1.0-0.6*m);
  // bottom line: menu y=+0.55,ang=0 -> X centre y=0,ang=-45deg
  bar(0.55*(1-m), -aX*m, 1, lerpC(cBot,[224,178,74],m), 1.0+0.06*m);
  x.globalCompositeOperation='source-over';}
function lerpC(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

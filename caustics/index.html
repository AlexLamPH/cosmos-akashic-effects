<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Caustics</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Caustics — underwater pool-floor light caustics: a shifting bright web computed from summed sine warps on a small offscreen, upscaled, in cosmic/aurora blues; loops via integer-harmonic phases.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
// Cosmos accents (caustic web mapped through cool blues -> aurora -> violet highlight)
const AC=[[12,28,64],[36,90,170],[70,180,255],[54,211,154],[139,92,255]];
// build a smooth 256-stop palette LUT: deep blue -> cosmic -> aurora -> violet highlight (computed once)
const LUT=new Uint8Array(256*3);
(function(){const n=AC.length;for(let i=0;i<256;i++){const f=i/(256-1)*(n-1),j=Math.min(f|0,n-2),t=f-j,a=AC[j],b=AC[j+1];
  LUT[i*3]=a[0]+(b[0]-a[0])*t;LUT[i*3+1]=a[1]+(b[1]-a[1])*t;LUT[i*3+2]=a[2]+(b[2]-a[2])*t;}})();
// internal low-res buffer scaled up for speed / GIF-friendliness
const RW=200; let RH=150, off, octx, img, W,H,DPR;
off=document.createElement('canvas');octx=off.getContext('2d');
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  RH=Math.max(80,Math.round(RW*innerHeight/innerWidth));off.width=RW;off.height=RH;img=octx.createImageData(RW,RH);
  x.imageSmoothingEnabled=true;}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP, ph=u*TAU; // all time-terms are integer multiples of ph -> seamless
  const d=img.data;
  for(let py=0;py<RH;py++){const fy=py/RH*TAU;
    for(let px=0;px<RW;px++){const fx=px/RW*TAU;
      // warp the sampling coords with drifting sine waves (the "wobbling water surface")
      const wx=fx + 0.55*Math.sin(fy*1.0 + ph) + 0.35*Math.cos(fy*2.0 - ph*2);
      const wy=fy + 0.55*Math.cos(fx*1.0 - ph) + 0.35*Math.sin(fx*2.0 + ph*3);
      // two crossing wave fields; their product/abs builds the bright caustic web (thin lines where waves crest)
      let a = Math.sin(wx*2.0 + ph) + Math.sin(wy*2.0 - ph) + Math.sin((wx+wy)*1.5 + ph*2);
      let b = Math.sin(wx*3.0 - ph*2) + Math.sin(wy*3.0 + ph) ;
      // sharpen: caustics are bright where the field crosses zero -> use (1 - |sum|) raised to a power
      let s=(a*0.5 + b*0.5)/2.5;                 // ~[-1,1]
      let bright=Math.pow(Math.max(0,1.0-Math.abs(s)),3.0); // thin bright web lines
      // a faint base shimmer so dark areas keep the cosmic blue, not pure black
      let base=0.18+0.16*Math.sin(wx*1.0+wy*1.0+ph);
      let val=Math.min(1, base + bright);
      let idx=(val*255)|0; if(idx<0)idx=0; else if(idx>255)idx=255;
      const li=idx*3, di=(py*RW+px)*4;
      d[di]=LUT[li];d[di+1]=LUT[li+1];d[di+2]=LUT[li+2];d[di+3]=255;
    }}
  octx.putImageData(img,0,0);
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);            // full repaint (pure function of t)
  x.globalCompositeOperation='lighter';                 // additive glow over Phantom dark
  x.drawImage(off,0,0,W,H);
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

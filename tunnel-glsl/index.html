<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Tunnel</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Tunnel — an infinite polar tunnel flythrough with striped walls and centre fog, real WebGL GLSL fragment shader. Deterministic, seamless (uT loops 0..1).
const cv=document.getElementById('c');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=9000;
const gl=cv.getContext('webgl',{antialias:false,depth:false,preserveDrawingBuffer:true});
const VERT='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG=`precision highp float; uniform vec2 uRes; uniform float uT;
#define TAU 6.28318530718
float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
// Cosmos accent palette
vec3 ACC1=vec3(0.545,0.36,1.0);   // violet
vec3 ACC2=vec3(0.27,0.71,1.0);    // cosmic
vec3 ACC3=vec3(1.0,0.36,0.76);    // nebula
vec3 shade(vec2 uv,float t){
 // Polar map: angle around the tube, and 1/radius as forward depth.
 float ang=atan(uv.y,uv.x);
 float rad=max(length(uv),1e-3);
 float depth=1.0/rad;                 // -> infinity at the centre vanishing point
 // Scroll forward; loop is seamless because all depth patterns use period 1.
 float z=depth + t*4.0;               // 4 full ring periods per loop
 // Ring banding along depth (rings rush toward the eye).
 float ringRaw=z*2.0;
 float ring=fract(ringRaw);
 float ringLine=smoothstep(0.0,0.06,ring)*smoothstep(0.0,0.06,1.0-ring); // bright seams
 ringLine=1.0-ringLine;
 // Longitudinal flutes around the tube (12 ribs) with a depth twist.
 float ribs=0.5+0.5*sin(ang*12.0 + ringRaw*1.6);
 // Accent stripe pattern: travelling sine along depth, periodic in z.
 float stripe=0.5+0.5*sin(TAU*(z*3.0) + ang*3.0);
 stripe=pow(stripe,3.0);
 // Subtle texture from hashed ring cells (still period-1 in z).
 float cell=hash(vec2(floor(z*2.0), floor(ang*6.0/3.14159)));
 // Build colour: dark base, glowing accents on the walls.
 vec3 col=vec3(0.02,0.012,0.05);
 col+=ACC1*ringLine*1.4;                       // glowing rings
 col+=ACC2*stripe*(0.5+0.5*ribs)*0.9;          // travelling stripes on ribs
 col=mix(col,ACC3, stripe*ribs*0.4*cell);      // nebula flecks
 col*=0.55+0.65*ribs;                          // rib shading for depth
 // Fog to the centre: deep tunnel fades to dark (vanishing point glow).
 float fog=smoothstep(0.0,0.75,rad);           // near walls bright, far centre dark
 col*=0.15+0.95*fog;
 col+=ACC2*0.18*(1.0-fog)*(1.0-fog);           // faint glow at the vanishing point
 return col;}
void main(){ vec2 uv=(gl_FragCoord.xy*2.0-uRes)/min(uRes.x,uRes.y); vec3 col=shade(uv,uT);
 col=pow(clamp(col,0.,1.),vec3(0.4545)); gl_FragColor=vec4(col,1.0);}`;
function sh(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);
 if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'uRes'),uT=gl.getUniformLocation(prog,'uT');
let DPR;function rs(){DPR=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';gl.viewport(0,0,cv.width,cv.height);}
rs();addEventListener('resize',rs);
function render(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uT,u);gl.drawArrays(gl.TRIANGLES,0,3);}
if(AUTO){window.__seek=t=>render(t);render(0);window.__ready=true;}else{const s=performance.now();(function l(n){render(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

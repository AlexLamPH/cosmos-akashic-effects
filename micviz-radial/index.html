<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Mic Radial</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}
canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:2;
font:600 13px/1 system-ui,sans-serif;color:#cbd5ff;background:rgba(20,12,40,.55);
border:1px solid rgba(120,90,255,.5);border-radius:20px;padding:9px 16px;letter-spacing:.4px;
cursor:pointer;backdrop-filter:blur(6px);transition:opacity .6s;user-select:none}
</style></head>
<body><canvas id="c"></canvas><div id="hint">🎤 enable mic</div><script>
// Cosmos Mic Radial — circular spectrum visualizer: bars radiate outward around a glowing ring from a
// center pulse, bins wrapped around 360°, the ring radius breathing with overall level. Reacts to the live
// microphone; gracefully falls back to a deterministic synthetic spectrum when the mic is unavailable/denied or in AUTO.
const cv=document.getElementById('c'),x=cv.getContext('2d'),hint=document.getElementById('hint');
const LOOP=9000,TAU=6.283185307;
const COL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
const BINS=64, SPOKES=96;
// ---- deterministic seeded RNG (mulberry32, seeded ONCE) ----
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rnd=mb(0xC05A0D);
const formant=[];for(let k=0;k<5;k++)formant.push({c:0.10+0.78*rnd(),w:0.07+0.18*rnd(),sp:1+((rnd()*4)|0),ph:rnd()*TAU,a:0.5+0.6*rnd()});
// ---- synthSpectrum(u): pure deterministic function of u in [0,1) → {spec[64],level} ----
function synthSpectrum(u){
  const spec=new Float32Array(BINS);
  const bp=(u*4)%1; const kick=Math.pow(1-bp,2.4);
  let sum=0;
  for(let b=0;b<BINS;b++){
    const f=b/(BINS-1);
    let v=0;
    for(const fo of formant){
      const c=(fo.c+0.05*Math.sin(TAU*fo.sp*u+fo.ph));
      const d=(f-c)/fo.w;
      v+=fo.a*Math.exp(-d*d);
    }
    v*=(1.0-0.5*f);
    v+=0.12*(0.5+0.5*Math.sin(TAU*(3*u)+b*0.55));
    v+=kick*(0.9*Math.exp(-f*5.0));
    v=Math.max(0,v);
    spec[b]=v;
  }
  let mx=0.0001;for(let b=0;b<BINS;b++)mx=Math.max(mx,spec[b]);
  for(let b=0;b<BINS;b++){spec[b]=Math.min(1,spec[b]/(mx*0.95));sum+=spec[b];}
  const level=Math.min(1,(sum/BINS)*1.4+kick*0.25);
  return {spec,level};
}
// ---- canvas + state ----
let W,H,DPR,cx,cy,R0;
function rs(){DPR=Math.min(devicePixelRatio||1,2);
  W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  cx=W/2;cy=H/2;R0=Math.min(W,H)*0.17;}
rs();addEventListener('resize',rs);
// wrap spectrum bins around 360° using a symmetric fold so it joins seamlessly at 0/2pi
function specAtSpoke(spec,si){
  const a=si/SPOKES;                 // 0..1 around circle
  const fold=1-Math.abs(a*2-1);      // 0..1..0 → mirror so wrap is continuous
  const f=fold*(BINS-1);const i=f|0;const fr=f-i;
  const lo=spec[i]||0,hi=spec[Math.min(BINS-1,i+1)]||0;
  return lo+(hi-lo)*fr;
}
// ---- render(spec,level,t): circular spectrum ----
function render(spec,level,t){
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  const u=((t%1)+1)%1;
  const ring=R0*(1+level*0.55);          // ring radius breathes with level
  const barMax=Math.min(W,H)*0.30;
  const rot=u*TAU*0.25;                   // slow rotation for life
  x.globalCompositeOperation='lighter';
  // center pulse glow
  const pr=ring*(0.55+level*0.6);
  let cg=x.createRadialGradient(cx,cy,0,cx,cy,pr);
  cg.addColorStop(0,'rgba(140,92,255,'+(0.55+level*0.4).toFixed(3)+')');
  cg.addColorStop(0.5,'rgba(70,180,255,'+(0.18+level*0.2).toFixed(3)+')');
  cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.beginPath();x.arc(cx,cy,pr,0,TAU);x.fill();
  // glowing ring
  x.lineWidth=Math.max(2*DPR,(2+level*5)*DPR);
  x.strokeStyle='rgba(120,90,255,'+(0.5+level*0.45).toFixed(3)+')';
  x.beginPath();x.arc(cx,cy,ring,0,TAU);x.stroke();
  // radiating bars
  for(let i=0;i<SPOKES;i++){
    let v=specAtSpoke(spec,i);v=Math.max(0.03,v);
    const ang=rot+i/SPOKES*TAU;
    const len=v*barMax;
    const r1=ring, r2=ring+len;
    const ca=Math.cos(ang),sa=Math.sin(ang);
    const col=COL[i%6];
    x.lineWidth=Math.max(1.5*DPR,(Math.min(W,H)/SPOKES)*0.55);
    let g=x.createLinearGradient(cx+ca*r1,cy+sa*r1,cx+ca*r2,cy+sa*r2);
    g.addColorStop(0,col);g.addColorStop(1,'rgba(5,3,13,0)');
    x.strokeStyle=g;x.globalAlpha=0.9;
    x.beginPath();x.moveTo(cx+ca*r1,cy+sa*r1);x.lineTo(cx+ca*r2,cy+sa*r2);x.stroke();
    // bright tip cap (glow brightens with level)
    x.globalAlpha=Math.min(1,0.5+level*0.5);x.fillStyle=col;
    const cap=2*DPR+level*2*DPR;
    x.beginPath();x.arc(cx+ca*r2,cy+sa*r2,cap,0,TAU);x.fill();
  }
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}
// ---- live microphone path (LIVE only; NEVER in AUTO) ----
let useSynth=true, analyser=null, freq=null;
async function mic(){
  const AC=window.AudioContext||window.webkitAudioContext;
  const ctx=new AC();
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  const src=ctx.createMediaStreamSource(s);
  const an=ctx.createAnalyser();an.fftSize=128;an.smoothingTimeConstant=0.8;
  src.connect(an);analyser=an;freq=new Uint8Array(an.frequencyBinCount);
  useSynth=false;
}
function liveSpectrum(){
  analyser.getByteFrequencyData(freq);
  const spec=new Float32Array(BINS);let sq=0;
  for(let b=0;b<BINS;b++){const v=(freq[b]||0)/255;spec[b]=v;sq+=v*v;}
  const level=Math.min(1,Math.sqrt(sq/BINS)*1.6);
  return {spec,level};
}
function startLiveLoop(){
  const s=performance.now();
  (function loop(now){
    const t=now-s;
    if(useSynth){const u=((t%LOOP)+LOOP)%LOOP/LOOP;const g=synthSpectrum(u);render(g.spec,g.level,u);}
    else{const g=liveSpectrum();render(g.spec,g.level,(t%LOOP)/LOOP);}
    requestAnimationFrame(loop);
  })(performance.now());
}
function armMic(){
  mic().then(()=>{hint.textContent='🎤 listening';setTimeout(()=>hint.style.opacity='0',1400);})
       .catch(()=>{useSynth=true;hint.style.opacity='0';});
}
hint.addEventListener('pointerdown',armMic);
// ---- mode switch (EXACT ending per spec) ----
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){ window.__seek=t=>{const u=((t%LOOP)+LOOP)%LOOP/LOOP; const s=synthSpectrum(u); render(s.spec,s.level,u);}; window.__seek(0); window.__ready=true; } else { let useSynthLocal=true; /* attract loop uses synth; on first gesture try mic()->on success drive from analyser, on failure keep synth */ startLiveLoop(); }
</script></body></html>

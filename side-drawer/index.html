<!-- Cosmos Side Drawer: a hamburger toggles a left slide-out nav drawer over a dimmed backdrop; nav items stagger in, active item highlighted; deterministic open->hover items->close->pause loop. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Side Drawer</title><style>
*{margin:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#0a0816;font-family:-apple-system,"Segoe UI",system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
/* app frame the drawer lives inside */
#app{position:relative;width:680px;height:440px;border-radius:18px;overflow:hidden;
  background:linear-gradient(160deg,#13102a,#0d0a20);border:1px solid #221c40;
  box-shadow:0 30px 80px -24px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.03) inset}
/* top bar */
#bar{position:absolute;top:0;left:0;right:0;height:58px;display:flex;align-items:center;gap:14px;padding:0 20px;
  background:linear-gradient(180deg,rgba(26,21,51,.9),rgba(20,16,40,.7));border-bottom:1px solid #221c40;z-index:4}
#burger{width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:background .15s,border-color .15s}
#burger:hover{background:rgba(255,255,255,.08);border-color:rgba(139,92,255,.4)}
#burger span{display:block;width:18px;height:2px;border-radius:2px;background:#cfc7ee;transition:transform .25s,opacity .2s}
#bar .ttl{color:#e9e4ff;font-size:16px;font-weight:650;letter-spacing:-.3px}
#bar .grow{flex:1}
#bar .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#8b5cff,#46b4ff)}
/* faux page body */
#body{position:absolute;top:58px;left:0;right:0;bottom:0;padding:26px 28px;user-select:none}
#body h2{color:#4a4470;font-size:20px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}
#body .row{height:12px;border-radius:6px;background:linear-gradient(90deg,#1d1838,#161230);margin:11px 0}
#body .row:nth-child(2){width:88%}#body .row:nth-child(3){width:72%}#body .row:nth-child(4){width:80%}#body .row:nth-child(5){width:55%}
#body .card{margin-top:20px;height:96px;border-radius:14px;background:linear-gradient(135deg,#191433,#12102a);border:1px solid #221c40}
/* backdrop */
#backdrop{position:absolute;inset:0;background:rgba(5,3,14,.6);z-index:5;will-change:opacity;pointer-events:none}
/* drawer */
#drawer{position:absolute;top:0;left:0;bottom:0;width:248px;z-index:6;padding:22px 14px;
  background:linear-gradient(165deg,rgba(32,26,60,.98),rgba(18,14,38,.99));
  border-right:1px solid rgba(139,92,255,.28);
  box-shadow:24px 0 60px -20px rgba(0,0,0,.85),0 0 50px -20px rgba(139,92,255,.5) inset;
  will-change:transform}
#drawer .brand{display:flex;align-items:center;gap:11px;padding:6px 12px 20px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:14px}
#drawer .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#8b5cff,#7a45ff);display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px -6px rgba(139,92,255,.9)}
#drawer .logo svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none}
#drawer .brand b{color:#f3f0ff;font-size:15px;font-weight:650;letter-spacing:-.2px}
#drawer nav{display:flex;flex-direction:column;gap:4px}
.item{display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:11px;cursor:pointer;
  color:#a9a2cc;font-size:14px;font-weight:550;position:relative;will-change:transform,opacity;
  transition:background .15s,color .15s}
.item svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.9;fill:none;flex-shrink:0}
.item:hover{background:rgba(255,255,255,.06);color:#e3ddff}
.item.active{color:#fff;background:linear-gradient(100deg,rgba(139,92,255,.32),rgba(139,92,255,.10))}
.item.active::before{content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:4px;height:60%;border-radius:0 4px 4px 0;background:#8b5cff;box-shadow:0 0 12px 1px rgba(139,92,255,.8)}
.item .dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:#36d39a;box-shadow:0 0 8px 1px rgba(54,211,154,.8)}
</style></head>
<body>
<div id="app">
  <div id="bar">
    <button id="burger"><span></span><span></span><span></span></button>
    <div class="ttl">Dashboard</div><div class="grow"></div><div class="av"></div>
  </div>
  <div id="body">
    <h2>Overview</h2>
    <div class="row"></div><div class="row"></div><div class="row"></div><div class="row"></div>
    <div class="card"></div>
  </div>
  <div id="backdrop"></div>
  <div id="drawer">
    <div class="brand"><div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5M2 12l10 5 10-5"/></svg></div><b>Nebula</b></div>
    <nav>
      <div class="item active"><svg viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5Z"/><path d="M9 22V12h6v10"/></svg>Home</div>
      <div class="item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Projects</div>
      <div class="item"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Activity<span class="dot"></span></div>
      <div class="item"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg>Team</div>
      <div class="item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>Settings</div>
    </nav>
  </div>
</div>
<script>
const drawer=document.getElementById('drawer'),backdrop=document.getElementById('backdrop'),burger=document.getElementById('burger');
const items=[...document.querySelectorAll('.item')];
const W=248; // drawer width
const LOOP=7000;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const smooth=t=>{t=clamp(t,0,1);return t*t*(3-2*t);};
function outCubic(t){t=clamp(t,0,1);const x=1-t;return 1-x*x*x;}
// open: 0=closed (off-screen), 1=fully open. hov: index of hovered item (-1 none)
function setState(open,hov){
  drawer.style.transform=`translateX(${(-(1-open)*(W+30)).toFixed(2)}px)`;
  backdrop.style.opacity=(open*0.92).toFixed(4);
  // burger -> X morph follows open
  const bs=burger.children;
  bs[0].style.transform=`translateY(${(open*7).toFixed(2)}px) rotate(${(open*45).toFixed(2)}deg)`;
  bs[1].style.opacity=(1-open).toFixed(3);
  bs[2].style.transform=`translateY(${(-open*7).toFixed(2)}px) rotate(${(-open*45).toFixed(2)}deg)`;
  // staggered item entrance + hover lift
  items.forEach((it,i)=>{
    const local=clamp((open-0.18-i*0.10)/0.42,0,1);
    const e=outCubic(local);
    const lift=(i===hov)?-2:0;
    it.style.opacity=e.toFixed(3);
    it.style.transform=`translateX(${((1-e)*-22).toFixed(2)}px) translateY(${lift}px)`;
    it.classList.toggle('hovered',i===hov);
    if(i===hov){it.style.background='rgba(255,255,255,.06)';it.style.color='#e3ddff';}
    else if(!it.classList.contains('active')){it.style.background='';it.style.color='';}
  });
}
// phases over u: open(0-.16) settle(.16-.26) hover item walk(.26-.66) close(.66-.78) pause(.78-1)
function render(u){
  let open,hov=-1;
  if(u<0.16){open=smooth(u/0.16);}
  else if(u<0.66){open=1;
    if(u>=0.30){const p=(u-0.30)/0.34;const idx=Math.floor(p*items.length*0.9);hov=clamp(idx,0,items.length-1);}
  }
  else if(u<0.78){open=1-smooth((u-0.66)/0.12);}
  else {open=0;}
  setState(open,hov);
}
const OFF=0.40; // frame-0: drawer fully open, backdrop dimmed, items visible mid hover-walk
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render((((t/LOOP+OFF)%1)+1)%1);window.__seek(0);window.__ready=true;}
else{
  let manual=null,closing=false;
  function open(){manual=performance.now();closing=false;}
  function close(){manual=null;closing=true;closeStart=performance.now();}
  let closeStart=0;
  burger.addEventListener('click',()=>{ if(manual!==null)close(); else open(); });
  backdrop.addEventListener('click',close);
  backdrop.style.pointerEvents='auto';
  items.forEach((it,i)=>{
    it.addEventListener('mouseenter',()=>{liveHov=i;});
    it.addEventListener('mouseleave',()=>{if(liveHov===i)liveHov=-1;});
    it.addEventListener('click',()=>{items.forEach(x=>x.classList.remove('active'));it.classList.add('active');});
  });
  let liveHov=-1;
  const s=performance.now();
  (function l(n){
    if(manual!==null){
      const e=clamp((n-manual)/360,0,1);setState(smooth(e),liveHov);
    } else if(closing){
      const e=clamp((n-closeStart)/300,0,1);setState(1-smooth(e),-1);if(e>=1)closing=false;
    } else {
      render((((n-s)/LOOP+OFF)%1+1)%1);
    }
    requestAnimationFrame(l);
  })(performance.now());
}
</script></body></html>

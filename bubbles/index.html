<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Bubbles</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Bubbles — translucent bubbles rising and wobbling with rim light + specular highlight. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318;
let W,H,DPR,bub=[];
function rnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[224,178,74]];
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  const r=rnd(7);bub=[];
  for(let i=0;i<34;i++)bub.push({bx:r(),ph:r(),c:AC[r()*AC.length|0],rad:(10+r()*34)*DPR,amp:(14+r()*44)*DPR,hz:1+(r()*3|0),sp:0.5+r()*0.6});}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  for(const b of bub){const p=((u*b.sp+b.ph)%1);
    const y=H+b.rad - p*(H+b.rad*2);
    const cx=b.bx*W + Math.sin((p*b.hz)*TAU)*b.amp;
    const sc=0.55+p*0.55, R=b.rad*sc;
    const fade=Math.min(1,p*5)*Math.min(1,(1-p)*4);
    if(fade<=0)continue;
    x.globalCompositeOperation='lighter';
    const g=x.createRadialGradient(cx-R*0.3,y-R*0.3,R*0.1,cx,y,R);
    g.addColorStop(0,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${0.10*fade})`);
    g.addColorStop(0.7,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${0.04*fade})`);
    g.addColorStop(1,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0)`);
    x.fillStyle=g;x.beginPath();x.arc(cx,y,R,0,TAU);x.fill();
    x.lineWidth=1.4*DPR;x.strokeStyle=`rgba(${b.c[0]},${b.c[1]},${b.c[2]},${0.55*fade})`;
    x.beginPath();x.arc(cx,y,R,0,TAU);x.stroke();
    x.strokeStyle=`rgba(255,255,255,${0.30*fade})`;x.lineWidth=0.9*DPR;
    x.beginPath();x.arc(cx,y,R*0.96,TAU*0.55,TAU*0.85);x.stroke();
    const hg=x.createRadialGradient(cx-R*0.4,y-R*0.42,0,cx-R*0.4,y-R*0.42,R*0.4);
    hg.addColorStop(0,`rgba(255,255,255,${0.85*fade})`);hg.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=hg;x.beginPath();x.arc(cx-R*0.4,y-R*0.42,R*0.4,0,TAU);x.fill();}
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

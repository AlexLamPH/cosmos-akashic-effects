<!-- Cosmos Toggle Switch: a sleek UI toggle flicking ON<->OFF, knob slides with overshoot bounce, track colour transitions grey->accent glow; ping-pong loop. -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Toggle Switch</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
const cv=document.getElementById('c'),x=cv.getContext('2d'),TAU=Math.PI*2;
const ACC=[139,92,255],ACC2=[70,180,255]; // violet -> cosmic
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(0x70661E);
// sparks that puff out when toggled on (seeded once)
const SP=18,sp=[];for(let i=0;i<SP;i++){sp.push({a:rnd()*TAU,sp:0.6+rnd()*0.9,sz:1.2+rnd()*1.8,ph:rnd()});}
const lerp=(a,b,t)=>a+(b-a)*t;
function smooth(t){return t*t*(3-2*t);}
function frame(t){
  const LOOP=3000,u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.setTransform(DPR,0,0,DPR,0,0);
  x.globalCompositeOperation='source-over';x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  // ping-pong 0..1..0 via sin so frame(0)==frame(LOOP); raised cosine = dwell at ends
  const tri=0.5-0.5*Math.cos(TAU*u); // 0->1->0, smooth, integer k=1
  // overshoot: spring-like easing on the travel
  const os=Math.sin(tri*Math.PI)*0.085*Math.sin(TAU*tri*3); // settles to 0 at tri=0/1
  let p=smooth(tri)+os; p=Math.max(-0.04,Math.min(1.04,p)); // knob pos with bounce
  const on=Math.max(0,Math.min(1,smooth(tri))); // colour fill 0..1
  const cx=W/2,cy=H/2;
  const tw=Math.min(W*0.42,360),th=tw*0.46,r=th/2; // track size
  const lx=cx-tw/2+r,rx=cx+tw/2-r; // knob centre travel range
  const kx=lerp(lx,rx,p),ky=cy;
  // --- track base (rounded rect) ---
  function rr(px,py,w,h,rad){x.beginPath();x.moveTo(px+rad,py);x.arcTo(px+w,py,px+w,py+h,rad);x.arcTo(px+w,py+h,px,py+h,rad);x.arcTo(px,py+h,px,py,rad);x.arcTo(px,py,px+w,py,rad);x.closePath();}
  const tx=cx-tw/2,ty=cy-th/2;
  // grey off-track
  x.globalCompositeOperation='source-over';
  rr(tx,ty,tw,th,r);
  let gg=x.createLinearGradient(tx,ty,tx,ty+th);
  gg.addColorStop(0,'#2a2740');gg.addColorStop(1,'#16142a');
  x.fillStyle=gg;x.fill();
  // accent fill overlay (alpha = on) with glow gradient
  const C=[Math.round(lerp(ACC[0],ACC2[0],0.35)),Math.round(lerp(ACC[1],ACC2[1],0.35)),Math.round(lerp(ACC[2],ACC2[2],0.35))];
  x.save();rr(tx,ty,tw,th,r);x.clip();
  x.globalAlpha=on;
  let ag=x.createLinearGradient(tx,ty,tx+tw,ty);
  ag.addColorStop(0,`rgb(${ACC[0]},${ACC[1]},${ACC[2]})`);ag.addColorStop(1,`rgb(${ACC2[0]},${ACC2[1]},${ACC2[2]})`);
  x.fillStyle=ag;x.fillRect(tx,ty,tw,th);
  x.restore();x.globalAlpha=1;
  // inner shadow ring
  rr(tx,ty,tw,th,r);x.lineWidth=1.5;x.strokeStyle='rgba(0,0,0,0.45)';x.stroke();
  // --- outer accent glow when on (additive) ---
  if(on>0.02){
    x.globalCompositeOperation='lighter';
    let og=x.createRadialGradient(cx,cy,r*0.4,cx,cy,tw*0.85);
    og.addColorStop(0,`rgba(${C[0]},${C[1]},${C[2]},${0.32*on})`);
    og.addColorStop(1,'rgba(5,3,13,0)');
    x.fillStyle=og;x.beginPath();x.arc(cx,cy,tw*0.85,0,TAU);x.fill();
    // sparks puff from knob at the moment it lands ON
    const puff=Math.max(0,Math.sin(tri*Math.PI))*on;
    for(let i=0;i<SP;i++){const s=sp[i];const rr2=r*(0.9+s.sp*1.7*puff);const px=kx+Math.cos(s.a)*rr2,py=ky+Math.sin(s.a)*rr2;
      x.globalAlpha=(1-puff)*0.0+puff*0.7;x.fillStyle=`rgba(${ACC2[0]},${ACC2[1]},${ACC2[2]},1)`;
      x.beginPath();x.arc(px,py,s.sz*(0.4+puff),0,TAU);x.fill();}
    x.globalAlpha=1;x.globalCompositeOperation='source-over';
  }
  // --- knob ---
  x.globalCompositeOperation='lighter';
  let kg=x.createRadialGradient(kx,ky,0,kx,ky,r*2.0);
  const gi=on*0.9;
  kg.addColorStop(0,`rgba(255,255,255,${0.5+0.4*on})`);
  kg.addColorStop(0.4,`rgba(${C[0]},${C[1]},${C[2]},${0.35*gi})`);
  kg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=kg;x.beginPath();x.arc(kx,ky,r*2.0,0,TAU);x.fill();
  x.globalCompositeOperation='source-over';
  const kr=r*0.74;
  let kf=x.createRadialGradient(kx-kr*0.35,ky-kr*0.4,kr*0.1,kx,ky,kr);
  kf.addColorStop(0,'#ffffff');kf.addColorStop(0.7,'#eef0ff');kf.addColorStop(1,'#c7c9e0');
  x.fillStyle=kf;x.beginPath();x.arc(kx,ky,kr,0,TAU);x.fill();
  x.lineWidth=1.2;x.strokeStyle='rgba(0,0,0,0.18)';x.stroke();
  // ON/OFF text labels inside track
  x.globalCompositeOperation='lighter';
  x.font=`600 ${Math.round(th*0.3)}px system-ui,sans-serif`;x.textBaseline='middle';
  x.textAlign='left';x.fillStyle=`rgba(255,255,255,${0.7*on})`;x.fillText('ON',tx+r*0.7,cy);
  x.textAlign='right';x.fillStyle=`rgba(200,205,235,${0.5*(1-on)})`;x.fillText('OFF',tx+tw-r*0.7,cy);
  x.globalCompositeOperation='source-over';x.globalAlpha=1;
}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Harmonograph</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Harmonograph — luminous Lissajous/harmonograph curves with integer frequency ratios; phases advance 2π·u so the figure slowly rotates and morphs, returning at u=1. Seamless, deterministic, additive glow.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718;
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]]; // violet cosmic nebula aurora solaris sacred
let W,H,DPR,cx,cy,scale,figs=[];
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;scale=Math.min(W,H)*0.40;
  const r=mul(29);figs=[];
  for(let i=0;i<5;i++){
    // x = Σ A·sin(f·φ + p) ; y = Σ A·sin(f·φ + p) — INTEGER frequencies so the closed path returns.
    const terms=[];
    const nt=2+(r()*2|0);
    for(let j=0;j<nt;j++){
      const fx=1+(r()*5|0), fy=1+(r()*5|0);                 // integer frequency ratios
      const px0=r()*TAU, py0=r()*TAU;                       // base phases
      const ax=(0.4+r()*0.6)/nt, ay=(0.4+r()*0.6)/nt;       // amplitudes (normalized, sum≈1)
      // integer multiples of u·2π applied per term so the whole figure rotates/morphs and closes at u=1
      const dx=(j%2?1:-1)*(1+(r()*2|0)), dy=(j%2?-1:1)*(1+(r()*2|0));
      terms.push({fx,fy,px0,py0,ax,ay,dx,dy});
    }
    figs.push({terms,col:AC[i%AC.length],sz:(0.55+i*0.12),spin:(i%2?1:-1)*(1+(r()*2|0)),rad:0.96-i*0.13,ph:r()});
  }}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  // soft central nebula glow so frame is never dark
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,scale*1.4);
  cg.addColorStop(0,'rgba(70,90,200,0.16)');cg.addColorStop(0.5,'rgba(139,92,255,0.07)');cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);
  const SEG=1400, span=TAU;                                  // φ over one full period -> closed curve
  figs.forEach((fg,fi)=>{
    const spin=fg.spin*u*TAU + fg.ph*TAU;                    // integer-rotation per loop -> seamless
    const cos=Math.cos(spin),sin=Math.sin(spin);
    const ringR=scale*fg.rad;
    const col=fg.col;
    // layered accent strokes: wide dim halo first, then bright thin core
    for(let pass=0;pass<2;pass++){
      x.beginPath();
      for(let s=0;s<=SEG;s++){
        const phi=s/SEG*span;
        let px=0,py=0;
        for(const tm of fg.terms){
          px+=tm.ax*Math.sin(tm.fx*phi + tm.px0 + tm.dx*u*TAU); // phase advances 2π·u (integer dx)
          py+=tm.ay*Math.sin(tm.fy*phi + tm.py0 + tm.dy*u*TAU);
        }
        const rx=px*ringR, ry=py*ringR;
        const X=cx+rx*cos-ry*sin, Y=cy+rx*sin+ry*cos;
        if(s===0)x.moveTo(X,Y);else x.lineTo(X,Y);
      }
      const pulse=0.5+0.4*Math.sin(TAU*(u*2+fi/5));
      if(pass===0){ x.lineWidth=Math.max(2,fg.sz*5*DPR); x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${0.10+0.10*pulse})`; }
      else        { x.lineWidth=Math.max(1,fg.sz*1.2*DPR); x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${0.5+0.4*pulse})`; }
      x.stroke();
    }
    // glowing accent node where φ=0 (the live seam point), pulsing with u
    let px=0,py=0;
    for(const tm of fg.terms){ px+=tm.ax*Math.sin(tm.px0+tm.dx*u*TAU); py+=tm.ay*Math.sin(tm.py0+tm.dy*u*TAU); }
    const X=cx+(px*ringR)*cos-(py*ringR)*sin, Y=cy+(px*ringR)*sin+(py*ringR)*cos;
    x.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},0.9)`;
    x.beginPath();x.arc(X,Y,3*DPR,0,TAU);x.fill();
    x.fillStyle='rgba(240,244,255,0.8)';
    x.beginPath();x.arc(X,Y,1.4*DPR,0,TAU);x.fill();
  });
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

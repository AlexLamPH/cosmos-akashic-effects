<!doctype html><!-- Cosmos noise-clouds: seamless seeded value-noise nebula, Canvas 2D, zero deps -->
<meta charset="utf-8"><title>noise-clouds</title>
<style>html,body{margin:0;background:#05030d;overflow:hidden}canvas{position:fixed;inset:0;width:100vw;height:100vh}</style>
<canvas id="c"></canvas>
<script>
const LOOP=6000;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const OW=150,OH=Math.round(150*540/760);
const off=document.createElement('canvas');off.width=OW;off.height=OH;
const octx=off.getContext('2d'),img=octx.createImageData(OW,OH);
let W,H,dpr;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const GS=64,grid=new Float32Array(GS*GS);
function seed(){const r=mulberry32(1337);for(let i=0;i<grid.length;i++)grid[i]=r();}
function sm(t){return t*t*(3-2*t);}
function noise(x,y){x=((x%GS)+GS)%GS;y=((y%GS)+GS)%GS;const xi=x|0,yi=y|0,xf=x-xi,yf=y-yi;
  const a=grid[(yi%GS)*GS+xi%GS],b=grid[(yi%GS)*GS+(xi+1)%GS],c=grid[((yi+1)%GS)*GS+xi%GS],d=grid[((yi+1)%GS)*GS+(xi+1)%GS];
  const u=sm(xf),v=sm(yf);return (a*(1-u)+b*u)*(1-v)+(c*(1-u)+d*u)*v;}
function fbm(x,y){let s=0,amp=0.55,f=1;for(let o=0;o<4;o++){s+=amp*noise(x*f,y*f);f*=2;amp*=0.5;}return s;}
const PAL=[[5,3,13],[40,20,80],[139,92,255],[70,180,255],[255,92,194],[255,235,245]];
function lerp(a,b,t){return a+(b-a)*t;}
function cmap(v){v=Math.max(0,Math.min(0.999,v));const s=v*(PAL.length-1),i=s|0,f=s-i,A=PAL[i],B=PAL[i+1];
  return [lerp(A[0],B[0],f),lerp(A[1],B[1],f),lerp(A[2],B[2],f)];}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP,ang=2*Math.PI*u,A=1.6,ox=Math.cos(ang)*A,oy=Math.sin(ang)*A;
  const d=img.data,fr=0.09;
  for(let y=0;y<OH;y++)for(let x=0;x<OW;x++){
    const nx=x*fr,ny=y*fr;
    const warp=fbm(nx+ox+5.2,ny+oy);
    let v=fbm(nx+ox+warp*1.3,ny+oy+warp*1.3+2.1);
    v=Math.pow(Math.max(0,v*1.15-0.08),1.6);
    const col=cmap(v),i=(y*OW+x)*4;d[i]=col[0];d[i+1]=col[1];d[i+2]=col[2];d[i+3]=255;}
  octx.putImageData(img,0,0);
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  ctx.globalCompositeOperation='source-over';ctx.drawImage(off,0,0,W,H);
  ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.25;ctx.drawImage(off,0,0,W,H);
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';}
function resize(){dpr=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);seed();}
addEventListener('resize',resize);resize();
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script>

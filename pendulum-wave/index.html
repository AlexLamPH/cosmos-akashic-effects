<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Pendulum Wave</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Pendulum Wave — a row of pendulums of incrementing length; differing integer periods make travelling waves that realign each loop. Deterministic, seamless, pure Canvas 2D.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const LOOP=8000,TAU=6.28318530718;
let W,H,DPR,cx,cy,bars=[];const N=22,BASE=8;
// seeded RNG (mulberry32) — called only at setup/resize, never inside frame()
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function lerpC(p){p=Math.max(0,Math.min(0.9999,p))*(AC.length-1);const i=p|0,f=p-i,a=AC[i],b=AC[i+1];return[a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f];}
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H*0.16;
  const r=mul(11);bars=[];const span=Math.min(W*0.86,H*0.9),lenMax=H*0.74,lenMin=H*0.30;
  for(let i=0;i<N;i++){
    const fx=N>1?i/(N-1):0;                              // 0..1 across the row
    const px=cx-span/2+fx*span;                          // pivot x on the top bar
    const len=lenMax-(lenMax-lenMin)*fx;                 // incrementing length (longer left, shorter right)
    const swings=BASE+i;                                 // INTEGER swings per LOOP -> realigns -> seamless
    const c=lerpC(fx);                                   // colour across the row
    const sz=(5.5+r()*1.5)*DPR;
    bars.push({px,len,swings,c,sz});
  }}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;     // 0..1 normalized loop time
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);            // full repaint each frame (pure fn of t)
  // top support bar
  x.strokeStyle='rgba(160,150,200,0.5)';x.lineWidth=3*DPR;
  x.beginPath();x.moveTo(cx-Math.min(W*0.86,H*0.9)/2-12*DPR,cy);x.lineTo(cx+Math.min(W*0.86,H*0.9)/2+12*DPR,cy);x.stroke();
  x.globalCompositeOperation='lighter';                 // additive glow
  const A=1.05;                                          // max swing amplitude (rad)
  for(const b of bars){
    const ang=A*Math.cos(TAU*u*b.swings);               // integer swings -> frame(0)==frame(LOOP)
    const bx=b.px+Math.sin(ang)*b.len, by=cy+Math.cos(ang)*b.len;
    // faint string
    x.strokeStyle=`rgba(${b.c[0]|0},${b.c[1]|0},${b.c[2]|0},0.22)`;x.lineWidth=1.3*DPR;
    x.beginPath();x.moveTo(b.px,cy);x.lineTo(bx,by);x.stroke();
    // glowing bob: halo + core
    const col=`${b.c[0]|0},${b.c[1]|0},${b.c[2]|0}`;
    x.fillStyle=`rgba(${col},0.16)`;x.beginPath();x.arc(bx,by,b.sz*3.2,0,TAU);x.fill();
    x.fillStyle=`rgba(${col},0.4)`;x.beginPath();x.arc(bx,by,b.sz*1.7,0,TAU);x.fill();
    x.fillStyle=`rgba(${col},0.95)`;x.beginPath();x.arc(bx,by,b.sz,0,TAU);x.fill();
    x.fillStyle='rgba(255,255,255,0.85)';x.beginPath();x.arc(bx,by,b.sz*0.4,0,TAU);x.fill();
  }
  x.globalCompositeOperation='source-over';}
const AUTO=new URLSearchParams(location.search).has('auto'); if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;} else {const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

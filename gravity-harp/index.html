<!doctype html><meta charset=utf8><title>Cosmos Gravity Harp</title>
<!-- Cosmos Gravity Harp — balls drop under gravity and pluck horizontal pentatonic string-lines on every bounce; real Web Audio on click, AUTO is a silent seeded looping shower of bouncing balls. -->
<style>
html,body{margin:0;background:#05030d;overflow:hidden;font:12px/1.4 system-ui,sans-serif;color:#b9a8ff}
canvas{position:fixed;inset:0;touch-action:none;cursor:crosshair}
#hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);padding:7px 14px;border:1px solid #8b5cff55;border-radius:20px;background:#120b26cc;color:#c3b3ff;letter-spacing:.3px;pointer-events:none;transition:opacity .4s}
</style>
<canvas id=c></canvas>
<div id=hint>▶ click to drop a ball · drag to aim · gravity does the rest</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),hint=document.getElementById('hint');
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
const LOOP=8000, TAU=Math.PI*2;
const PAL=['#8b5cff','#46b4ff','#ff5cc2','#36d39a','#ff6a3d','#e0b24a'];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
addEventListener('resize',resize);resize();

// ---- strings: horizontal lines tuned to a minor-pentatonic scale (low at bottom) ----
const SCALE=[0,3,5,7,10,12,15,17,19,22]; // 2 octaves of minor pentatonic, ascending
const BASE=220;                          // A3 base, lines go up in pitch toward top
const NL=SCALE.length;
function lineY(i){ return 0.16 + 0.74*(1-i/(NL-1)); } // normalized y per string (0 top)
function lineFreq(i){ return BASE*Math.pow(2,SCALE[i]/12); }
// per-string ring state for visuals: amplitude + time of last pluck, keyed analytically in AUTO
let rings=new Array(NL).fill(0);          // live-mode decay buffer

// ---- AUTO seeded balls: each ball is a pure periodic function of u ----
// A ball is launched upward at the top, arcs DOWN under gravity to the floor, bounces back up
// (lossless, so the trajectory is exactly periodic) and PLUCKS every string it crosses in either
// direction. The full vertical sweep means each ball plays many strings -> rich evolving melody.
// One local parabola period maps to b.period of LOOP, an exact divisor -> seamless loop.
const G=4.0;                              // gravity strength (sets arc depth)
const FLOOR=0.965, CEIL=0.10;
let balls=[];
(function(){ const r=mulberry32(20260615);
  const NB=6;
  for(let b=0;b<NB;b++){
    const period=1/(b%3===0?2:3);        // 1/2 or 1/3 of LOOP -> exact divisor, seamless
    const phase=r();
    const x0=0.10+0.80*r();
    const vx=(r()-0.5)*0.55;             // horizontal drift, wraps
    const hue=PAL[(r()*PAL.length)|0];
    balls.push({period,phase,x0,vx,hue});
  }
})();
// vertical position over local phase lp in [0,1): a symmetric parabola — ball arcs from CEIL
// down to FLOOR at lp=0.5 and back, a single bounce per period, exactly periodic.
function ballState(b,u){
  const lp=(((u/b.period)+b.phase)%1+1)%1;
  const q=2*lp-1;                         // -1..1
  const y=CEIL+(FLOOR-CEIL)*(1-q*q);      // down then up, exact periodic
  const dydlp=(FLOOR-CEIL)*(-2*q)*2;      // d y/d lp ; >0 falling
  let x=(b.x0+b.vx*lp); x=((x%1)+1)%1;
  // detect string crossing between previous sampled phase and now
  const dlp=0.006; const q0=2*((lp-dlp+1)%1)-1; const yprev=CEIL+(FLOOR-CEIL)*(1-q0*q0);
  let pl=-1, pstr=0;
  for(let i=0;i<NL;i++){ const ly=lineY(i);
    if((yprev< ly && y>=ly) || (yprev>ly && y<=ly)){ pl=i; pstr=Math.min(1,Math.abs(dydlp)*0.45); break; }
  }
  return {x,y,vy:dydlp,pluck:pl,strength:pstr};
}

// trail: sample the ball at a few earlier sub-phases
function ballTrail(b,u){
  const pts=[]; for(let k=0;k<10;k++){ const uu=(u - k*0.004 + 1)%1; const st=ballState(b,uu); pts.push(st); }
  return pts;
}

// for AUTO ring glow: accumulate plucks across all balls at this u into per-string amplitude
function autoRings(u){
  const out=new Array(NL).fill(0);
  for(const b of balls){
    // look back over a window and add decaying pluck energy (recent pluck = bright flash)
    for(let k=0;k<40;k++){ const dk=k*0.0014; const uu=(u-dk+1)%1; const st=ballState(b,uu);
      if(st.pluck>=0){ out[st.pluck]=Math.max(out[st.pluck], Math.min(1,0.55+st.strength)*Math.exp(-k*0.085)); }
    }
  }
  return out;
}

function render(u){
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  // vignette
  let vg=ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,Math.max(W,H)*0.7);
  vg.addColorStop(0,'#0c0820');vg.addColorStop(1,'#05030d');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  const rng = AUTO ? autoRings(u) : rings;

  // ---- strings ----
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<NL;i++){ const ly=lineY(i)*H; const amp=rng[i]||0;
    const col=PAL[i%PAL.length];
    // base string
    ctx.globalAlpha=0.18+0.5*amp;ctx.strokeStyle=col;ctx.lineWidth=(1.1+amp*2.4)*DPR;
    ctx.beginPath();
    const wob=amp*9*DPR;
    for(let xx=0;xx<=W;xx+=12*DPR){ const yy=ly+Math.sin(xx/W*Math.PI)*wob*Math.sin(u*TAU*6+i); if(xx===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy); }
    ctx.stroke();
    // flash glow on pluck
    if(amp>0.02){ ctx.globalAlpha=amp*0.5; ctx.lineWidth=(amp*7)*DPR; ctx.strokeStyle='#fff';
      ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke(); }
  }

  // ---- balls + trails ----
  for(const b of balls){
    const tr=ballTrail(b,u);
    // trail
    ctx.globalCompositeOperation='lighter';
    for(let k=tr.length-1;k>=0;k--){ const st=tr[k]; const a=(1-k/tr.length)*0.5;
      ctx.globalAlpha=a;ctx.fillStyle=b.hue;ctx.beginPath();
      ctx.arc(st.x*W,st.y*H,(5-k*0.35)*DPR,0,TAU);ctx.fill(); }
    // ball head with glow
    const st=tr[0];
    let bg=ctx.createRadialGradient(st.x*W,st.y*H,0,st.x*W,st.y*H,16*DPR);
    bg.addColorStop(0,'#ffffff');bg.addColorStop(0.3,b.hue);bg.addColorStop(1,b.hue+'00');
    ctx.globalAlpha=0.95;ctx.fillStyle=bg;ctx.beginPath();ctx.arc(st.x*W,st.y*H,16*DPR,0,TAU);ctx.fill();
    ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(st.x*W,st.y*H,3.4*DPR,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}

// ================= LIVE AUDIO (gated, gesture-created) =================
const AUTO=new URLSearchParams(location.search).has('auto');
let actx, master, liveBalls=[], raf0=performance.now();
function audio(){ if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();} if(actx.state==='suspended')actx.resume(); return actx; }
function ensureMaster(){ if(master)return; const a=audio();
  master=a.createGain();master.gain.value=0.22;
  const comp=a.createDynamicsCompressor();master.connect(comp);comp.connect(a.destination);
}
// pluck = short triangle/sine burst with fast attack + ringing decay (harp-like)
function pluck(i,strength){
  ensureMaster();const a=actx;const f=lineFreq(i);const now=a.currentTime;
  const o=a.createOscillator();o.type='triangle';o.frequency.setValueAtTime(f,now);
  const o2=a.createOscillator();o2.type='sine';o2.frequency.setValueAtTime(f*2,now);
  const g=a.createGain();const amp=0.18+0.5*strength;
  g.gain.setValueAtTime(0.0001,now);
  g.gain.exponentialRampToValueAtTime(amp,now+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,now+1.1+strength*0.6);
  const g2=a.createGain();g2.gain.value=0.25;
  o.connect(g);o2.connect(g2);g2.connect(g);g.connect(master);
  o.start(now);o2.start(now);o.stop(now+2);o2.stop(now+2);
  rings[i]=Math.min(1,0.5+strength);
}
// live simulation: real falling balls; bounce off strings -> pluck
function stepLive(dt){
  for(const lb of liveBalls){
    lb.vy+=G*0.00000028*dt*dt + G*0.00018*dt; lb.y+=lb.vy*dt*0.001; lb.x+=lb.vx*dt*0.001;
    if(lb.x<0||lb.x>1)lb.vx*=-1;
    for(let i=0;i<NL;i++){ const ly=lineY(i);
      if(lb.vy>0 && lb.y>=ly && lb.py<ly){ lb.vy=-lb.vy*0.74; lb.y=ly; pluck(i,Math.min(1,Math.abs(lb.vy)*4)); }
    }
    if(lb.y>0.97){ lb.y=0.97; lb.vy=-Math.abs(lb.vy)*0.74; if(Math.abs(lb.vy)<0.02)lb.dead=true; }
    lb.py=lb.y;
  }
  liveBalls=liveBalls.filter(b=>!b.dead);
  for(let i=0;i<NL;i++) rings[i]*=Math.pow(0.5,dt/420);
}
function renderLive(){
  // draw strings+rings+live balls using same render() visuals fed by live ball positions
  ctx.globalCompositeOperation='source-over';ctx.fillStyle='#05030d';ctx.fillRect(0,0,W,H);
  let vg=ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,Math.max(W,H)*0.7);
  vg.addColorStop(0,'#0c0820');vg.addColorStop(1,'#05030d');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<NL;i++){ const ly=lineY(i)*H; const amp=rings[i]||0; const col=PAL[i%PAL.length];
    ctx.globalAlpha=0.18+0.5*amp;ctx.strokeStyle=col;ctx.lineWidth=(1.1+amp*2.4)*DPR;
    ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();
    if(amp>0.02){ctx.globalAlpha=amp*0.5;ctx.lineWidth=amp*7*DPR;ctx.strokeStyle='#fff';ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();}
  }
  for(const lb of liveBalls){
    lb.trail=lb.trail||[]; lb.trail.unshift({x:lb.x,y:lb.y}); if(lb.trail.length>10)lb.trail.pop();
    for(let k=lb.trail.length-1;k>=0;k--){const p=lb.trail[k];ctx.globalAlpha=(1-k/lb.trail.length)*0.5;ctx.fillStyle=lb.hue;ctx.beginPath();ctx.arc(p.x*W,p.y*H,(5-k*0.35)*DPR,0,TAU);ctx.fill();}
    let bg=ctx.createRadialGradient(lb.x*W,lb.y*H,0,lb.x*W,lb.y*H,16*DPR);bg.addColorStop(0,'#fff');bg.addColorStop(0.3,lb.hue);bg.addColorStop(1,lb.hue+'00');
    ctx.globalAlpha=0.95;ctx.fillStyle=bg;ctx.beginPath();ctx.arc(lb.x*W,lb.y*H,16*DPR,0,TAU);ctx.fill();
    ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(lb.x*W,lb.y*H,3.4*DPR,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}

if(AUTO){
  window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);
  window.__seek(0); window.__ready=true;
} else {
  let aim=null;
  cv.addEventListener('pointerdown',e=>{ audio(); aim={x:e.clientX/innerWidth,y:e.clientY/innerHeight}; });
  cv.addEventListener('pointerup',e=>{ if(!aim)return; const x2=e.clientX/innerWidth,y2=e.clientY/innerHeight;
    liveBalls.push({x:aim.x,y:Math.min(aim.y,0.12),py:0,vy:0.0,vx:(x2-aim.x)*0.9,hue:PAL[(liveBalls.length+2)%PAL.length],trail:[]});
    hint.style.opacity='0'; aim=null; });
  let started=false, last=performance.now();
  (function l(n){ const dt=Math.min(48,n-last); last=n;
    if(liveBalls.length){ stepLive(dt); renderLive(); }
    else render((((n-raf0)%LOOP)+LOOP)%LOOP/LOOP); // idle attract-loop
    requestAnimationFrame(l);
  })(performance.now());
}
</script>

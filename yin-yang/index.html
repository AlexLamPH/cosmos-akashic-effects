<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Yin-Yang</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Yin-Yang — Taiji disc, two swirls + two dots, tinted phantom-violet / cosmic-blue, soft glow, one rotation per LOOP. Pure Canvas 2D, deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
let W,H,DPR,R;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';R=Math.min(W,H)*0.36;}
rs();addEventListener('resize',rs);
const VIO='#8b5cff', BLU='#46b4ff';
// Draw the two halves of the Taiji as filled paths (radius R about origin, already rotated by caller).
function taiji(){
  // violet half: classic yin-yang silhouette built from outer half-circle + two inner half-circles
  x.fillStyle=VIO;
  x.beginPath();
  x.arc(0,0,R,-Math.PI/2,Math.PI/2,false);              // right outer half (top->bottom)
  x.arc(0,R/2,R/2,Math.PI/2,-Math.PI/2,true);            // lower small lobe (bulges into left)
  x.arc(0,-R/2,R/2,Math.PI/2,-Math.PI/2,false);          // upper small lobe (bulges into right)
  x.closePath(); x.fill();
  // blue half fills the rest of the disc
  x.fillStyle=BLU;
  x.beginPath();
  x.arc(0,0,R,Math.PI/2,-Math.PI/2,false);               // left outer half (bottom->top)
  x.arc(0,-R/2,R/2,-Math.PI/2,Math.PI/2,true);
  x.arc(0,R/2,R/2,-Math.PI/2,Math.PI/2,false);
  x.closePath(); x.fill();
  // the two dots (eyes): opposite colour
  x.fillStyle=BLU; x.beginPath(); x.arc(0,-R/2,R*0.16,0,TAU); x.fill();
  x.fillStyle=VIO; x.beginPath(); x.arc(0, R/2,R*0.16,0,TAU); x.fill();
}
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#070514';x.fillRect(0,0,W,H);
  const bg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,R*2.2); bg.addColorStop(0,'rgba(60,40,120,0.20)'); bg.addColorStop(1,'rgba(7,5,20,0)'); x.fillStyle=bg; x.fillRect(0,0,W,H);
  const rot=TAU*u, pulse=0.5+0.5*Math.sin(TAU*u); // breathing glow, seamless (k=1)
  x.save(); x.translate(W/2,H/2); x.rotate(rot);
  // soft outer glow halo (additive)
  x.globalCompositeOperation='lighter';
  const halo=x.createRadialGradient(0,0,R*0.7,0,0,R*1.35); halo.addColorStop(0,'rgba(139,92,255,'+(0.22+0.12*pulse)+')'); halo.addColorStop(0.5,'rgba(70,180,255,'+(0.14+0.08*pulse)+')'); halo.addColorStop(1,'rgba(70,180,255,0)');
  x.fillStyle=halo; x.beginPath(); x.arc(0,0,R*1.35,0,TAU); x.fill();
  // solid disc (normal blend so colours stay vivid, not washed out)
  x.globalCompositeOperation='source-over';
  taiji();
  // rim light ring (additive)
  x.globalCompositeOperation='lighter';
  x.strokeStyle='rgba(200,180,255,'+(0.35+0.25*pulse)+')'; x.lineWidth=2.4*DPR;
  x.beginPath(); x.arc(0,0,R,0,TAU); x.stroke();
  // dot highlights for sheen
  for(const s of [-1,1]){ const cy=s*R/2;
    const g=x.createRadialGradient(0,cy,0,0,cy,R*0.16); g.addColorStop(0,'rgba(255,255,255,0.5)'); g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g; x.beginPath(); x.arc(0,cy,R*0.16,0,TAU); x.fill(); }
  x.restore();}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

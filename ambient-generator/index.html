<!doctype html><meta charset=utf8><title>Cosmos Ambient PAD Machine</title>
<!-- Cosmos Ambient PAD Machine — layered detuned oscillator drones through slow lowpass filters with LFO swell + generated-impulse convolver reverb, evolving through a seeded chord cycle. AUTO: silent nebula/aurora visual breathes with chord changes. LIVE: click to start real Web Audio, drag Brightness/Density sliders. -->
<style>
html,body{margin:0;background:#05030d;overflow:hidden;font-family:ui-monospace,Menlo,monospace}
canvas{position:fixed;inset:0;width:100%;height:100%}
#ui{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);display:flex;align-items:center;gap:18px;
  padding:12px 22px;border-radius:48px;background:rgba(8,4,22,.72);
  border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,.55)}
#btn{width:40px;height:40px;border-radius:50%;border:1.5px solid #8b5cff;background:rgba(139,92,255,.18);
  color:#c9b3ff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,box-shadow .2s;box-shadow:0 0 14px rgba(139,92,255,.35)}
#btn:hover{background:rgba(139,92,255,.32);box-shadow:0 0 24px rgba(139,92,255,.6)}
.sliders{display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:10px}
.lbl{color:#9b8ecf;font-size:11px;letter-spacing:.6px;width:72px}
input[type=range]{width:110px;accent-color:#8b5cff;cursor:pointer}
#hint{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  color:#8b5cff;font-size:14px;letter-spacing:1px;opacity:.75;pointer-events:none;
  text-shadow:0 0 18px #8b5cff99;transition:opacity .8s}
</style>
<canvas id=c></canvas>
<div id=hint>▶ click to start</div>
<div id=ui>
  <button id=btn>▶</button>
  <div class=sliders>
    <div class=row><span class=lbl>BRIGHTNESS</span><input type=range id=sBright min=0 max=100 value=55></div>
    <div class=row><span class=lbl>DENSITY</span><input type=range id=sDens min=0 max=100 value=60></div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const hint=document.getElementById('hint'),btn=document.getElementById('btn');
const sBright=document.getElementById('sBright'),sDens=document.getElementById('sDens');
const LOOP=8000, TAU=Math.PI*2;
let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),W,H;
function resize(){W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
addEventListener('resize',resize);resize();

// mulberry32 seeded PRNG
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rng=mulberry32(20260615);

// ---- Chord cycle (lydian/minor 7th palette) ----
// Semitone offsets from base for each chord voicing (relative to A2=110Hz)
const BASE=110; // A2
const CHORDS=[
  [0,7,12,19],     // Am: A C E A
  [5,12,17,24],    // Dm: D F A D
  [3,10,15,22],    // C: C E G C
  [7,14,19,26],    // Em: E G B E
  [2,9,14,21],     // Bm: B D F# B
  [5,12,16,23],    // D: D F# A D
];
const NCHORDS=CHORDS.length;
// Accent hue per chord (shift through palette)
const CHORD_HUES=[260,220,200,280,300,170]; // violet→blue→teal→purple→pink→aurora

// Particles (seeded positions/phases)
const NP=48;
const PX=[],PY=[],PP=[],PS=[],PA=[];
for(let i=0;i<NP;i++){PX.push(rng());PY.push(rng());PP.push(rng()*TAU);PS.push(0.003+rng()*0.012);PA.push(0.18+rng()*0.55);}

// Nebula blob seeds
const NB=7;
const NBX=[],NBY=[],NBP=[],NBS=[],NBH=[];
for(let i=0;i<NB;i++){NBX.push(0.1+rng()*0.8);NBY.push(0.1+rng()*0.8);NBP.push(rng()*TAU);NBS.push(0.4+rng()*0.7);NBH.push(rng());}

function lerp(a,b,t){return a+(b-a)*t;}
function smoothstep(t){return t*t*(3-2*t);}

// ---- render(u): pure visual function of u in [0,1) ----
// Offset: t=0 → mid-swell, mid chord (u=0.5 is conceptually "chord 3, peak swell")
// We encode: swell = sin(u*TAU*2) so there are 2 full swells per LOOP
// Chord index advances slowly: floor(u * NCHORDS)
// Frame 0 is MID-SWELL: apply +0.25 offset inside render
function render(u){
  // shift so frame 0 is mid-swell and mid-chord-transition
  const uo=(u+0.22)%1;
  const swell=0.5+0.5*Math.sin(uo*TAU*2); // 0..1, 2 peaks per loop
  const chordIdx=Math.floor(uo*NCHORDS);
  const chordFrac=(uo*NCHORDS)-chordIdx;
  const chordT=smoothstep(Math.min(1,chordFrac*4)); // fast chord transition at start of slot
  const hue=lerp(CHORD_HUES[chordIdx],CHORD_HUES[(chordIdx+1)%NCHORDS],chordT);
  const swell2=0.5+0.5*Math.sin(uo*TAU*3.5+0.8); // secondary swell for detail

  // Background
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#05030d');bg.addColorStop(1,'#0a0416');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Nebula blobs
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<NB;i++){
    const bx=(NBX[i]+Math.sin(uo*TAU*NBS[i]+NBP[i])*0.08)*W;
    const by=(NBY[i]+Math.cos(uo*TAU*NBS[i]*0.7+NBP[i])*0.06)*H;
    const r=(0.22+NBS[i]*0.12+swell*0.08)*Math.min(W,H);
    const alpha=(0.06+swell*0.1+swell2*0.05)*(0.7+NBH[i]*0.3);
    const hShift=hue+(NBH[i]-0.5)*40;
    const grad=ctx.createRadialGradient(bx,by,0,bx,by,r);
    grad.addColorStop(0,`hsla(${hShift},80%,68%,${(alpha*0.9).toFixed(3)})`);
    grad.addColorStop(0.45,`hsla(${hShift+30},70%,55%,${(alpha*0.4).toFixed(3)})`);
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(bx,by,r,0,TAU);ctx.fill();
  }

  // Aurora bands (horizontal glow sweeps)
  for(let b=0;b<3;b++){
    const by=(0.25+b*0.25+Math.sin(uo*TAU*0.8+b*2.1)*0.1)*H;
    const bh=(0.04+swell*0.03)*H;
    const ah=0.04+swell*0.06+b*0.01;
    const hb=hue+b*25;
    const ag=ctx.createLinearGradient(0,by-bh,0,by+bh);
    ag.addColorStop(0,'rgba(0,0,0,0)');
    ag.addColorStop(0.5,`hsla(${hb},75%,62%,${ah.toFixed(3)})`);
    ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ag;ctx.fillRect(0,by-bh,W,bh*2);
  }

  // Drifting particles
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<NP;i++){
    const px=(PX[i]+Math.sin(uo*TAU*PS[i]*LOOP/1000+PP[i])*0.15)%1;
    const py=(PY[i]+Math.cos(uo*TAU*PS[i]*LOOP/800+PP[i]*1.3)*0.1)%1;
    const pr=(1+swell*2)*DPR;
    const pa=PA[i]*(0.4+swell*0.6);
    const ph=hue+(PX[i]-0.5)*60;
    ctx.globalAlpha=pa;
    ctx.fillStyle=`hsl(${ph},90%,78%)`;
    ctx.beginPath();ctx.arc(px*W,py*H,pr,0,TAU);ctx.fill();
    // soft halo per particle
    const hg=ctx.createRadialGradient(px*W,py*H,0,px*W,py*H,pr*5);
    hg.addColorStop(0,`hsla(${ph},85%,72%,${(pa*0.3).toFixed(3)})`);
    hg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=1;ctx.fillStyle=hg;
    ctx.beginPath();ctx.arc(px*W,py*H,pr*5,0,TAU);ctx.fill();
  }

  // Central glow core (breathes with swell)
  ctx.globalCompositeOperation='lighter';
  const cr=Math.min(W,H)*(0.18+swell*0.14);
  const cg=ctx.createRadialGradient(W*0.5,H*0.44,0,W*0.5,H*0.44,cr);
  cg.addColorStop(0,`hsla(${hue},82%,72%,${(0.08+swell*0.14).toFixed(3)})`);
  cg.addColorStop(0.5,`hsla(${hue+20},70%,60%,${(0.03+swell*0.06).toFixed(3)})`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha=1;ctx.fillStyle=cg;ctx.beginPath();ctx.arc(W*0.5,H*0.44,cr,0,TAU);ctx.fill();

  // Chord label (subtle)
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=0.22+swell*0.18;
  ctx.font=`${11*DPR}px ui-monospace,monospace`;ctx.fillStyle=`hsl(${hue},70%,75%)`;
  ctx.textBaseline='top';ctx.textAlign='left';
  const names=['Am','Dm','C','Em','Bm','D'];
  ctx.fillText('♩ '+names[chordIdx],14*DPR,14*DPR);
  ctx.globalAlpha=1;ctx.textAlign='start';
}

// ================= AUTO / LIVE SPLIT =================
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){
  window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP);
  window.__seek(0); window.__ready=true;
} else {
  // Live audio state
  let actx,master,comp,convolver,lfoOsc,lfoGain;
  let voices=[]; // [{osc1,osc2,osc3,gain}]
  let filterNode;
  let playing=false;

  // Build generated impulse response (decaying noise ~2.5s)
  function makeImpulse(ac){
    const len=ac.sampleRate*2.5;
    const buf=ac.createBuffer(2,len,ac.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++){
        // exponential decay with random noise
        d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);
      }
    }
    return buf;
  }

  // Get current chord based on time
  let currentChord=0;
  const CHORD_DUR=(LOOP/NCHORDS)/1000; // seconds per chord ~1.33s
  let chordTimer=null;

  function freqOf(semi){return BASE*Math.pow(2,semi/12);}

  function getVoiceCount(){
    // map density 0..100 → 2..6 voices
    return 2+Math.round((sDens.value/100)*4);
  }

  function getBrightness(){
    // map brightness 0..100 → filter cutoff 300..6000Hz
    return 300+Math.pow(sBright.value/100,1.6)*5700;
  }

  function buildAudio(){
    if(actx)return;
    actx=new (window.AudioContext||window.webkitAudioContext)();
    master=actx.createGain();master.gain.value=0.0; // will ramp up
    comp=actx.createDynamicsCompressor();
    comp.threshold.value=-18;comp.knee.value=8;comp.ratio.value=4;
    filterNode=actx.createBiquadFilter();filterNode.type='lowpass';
    filterNode.frequency.value=getBrightness();filterNode.Q.value=0.8;
    convolver=actx.createConvolver();convolver.buffer=makeImpulse(actx);
    // LFO for slow swell on filter/master
    lfoOsc=actx.createOscillator();lfoOsc.type='sine';
    lfoOsc.frequency.value=0.12; // ~8s period
    lfoGain=actx.createGain();lfoGain.gain.value=400; // ±400Hz sweep on filter
    lfoOsc.connect(lfoGain);lfoGain.connect(filterNode.frequency);
    lfoOsc.start();
    // chain: voices → filterNode → convolver (wet) + dry → master → comp → destination
    const dryGain=actx.createGain();dryGain.gain.value=0.55;
    const wetGain=actx.createGain();wetGain.gain.value=0.45;
    filterNode.connect(dryGain);dryGain.connect(master);
    filterNode.connect(convolver);convolver.connect(wetGain);wetGain.connect(master);
    master.connect(comp);comp.connect(actx.destination);
  }

  function stopAllVoices(t){
    for(const v of voices){
      v.gain.gain.setTargetAtTime(0.0001,t,0.4);
      v.osc1.stop(t+2);v.osc2.stop(t+2);v.osc3.stop(t+2);
    }
    voices=[];
  }

  function startChord(chordIdx, t){
    const semis=CHORDS[chordIdx];
    const nv=getVoiceCount();
    for(let vi=0;vi<nv;vi++){
      const si=semis[vi%semis.length];
      const f=freqOf(si);
      const o1=actx.createOscillator(),o2=actx.createOscillator(),o3=actx.createOscillator();
      o1.type='sine';o2.type='triangle';o3.type='sawtooth';
      o1.frequency.value=f;
      o2.frequency.value=f*Math.pow(2,6/1200);  // +6 cents
      o3.frequency.value=f*Math.pow(2,-7/1200); // -7 cents
      o3.frequency.value=f*0.5003; // sub octave slightly detuned
      const g=actx.createGain();g.gain.setValueAtTime(0.0001,t);
      g.gain.linearRampToValueAtTime(0.12/nv,t+1.2); // slow attack
      o1.connect(g);o2.connect(g);o3.connect(g);g.connect(filterNode);
      o1.start(t);o2.start(t);o3.start(t);
      voices.push({osc1:o1,osc2:o2,osc3:o3,gain:g});
    }
  }

  function advanceChord(){
    if(!actx||!playing)return;
    const t=actx.currentTime;
    // Ramp out old voices
    for(const v of voices){v.gain.gain.setTargetAtTime(0.0001,t,0.6);v.osc1.stop(t+3);v.osc2.stop(t+3);v.osc3.stop(t+3);}
    voices=[];
    currentChord=(currentChord+1)%NCHORDS;
    startChord(currentChord,t);
    chordTimer=setTimeout(advanceChord,CHORD_DUR*1000);
  }

  function startDrones(){
    const t=actx.currentTime;
    master.gain.setTargetAtTime(0.18,t,0.5);
    startChord(currentChord,t);
    chordTimer=setTimeout(advanceChord,CHORD_DUR*1000);
  }

  function stopDrones(){
    if(chordTimer){clearTimeout(chordTimer);chordTimer=null;}
    const t=actx.currentTime;
    stopAllVoices(t);
    master.gain.setTargetAtTime(0.0001,t,0.6);
  }

  btn.addEventListener('click',e=>{
    e.stopPropagation();
    buildAudio();
    if(actx.state==='suspended')actx.resume();
    playing=!playing;
    btn.textContent=playing?'⏸':'▶';
    hint.style.opacity='0';
    if(playing)startDrones(); else stopDrones();
  });

  // Also allow clicking canvas to start
  cv.addEventListener('pointerdown',()=>{
    if(!playing){
      buildAudio();
      if(actx.state==='suspended')actx.resume();
      playing=true;btn.textContent='⏸';hint.style.opacity='0';startDrones();
    }
  });

  sBright.addEventListener('input',()=>{
    if(!actx)return;
    filterNode.frequency.cancelScheduledValues(actx.currentTime);
    filterNode.frequency.setTargetAtTime(getBrightness(),actx.currentTime,0.2);
  });
  sDens.addEventListener('input',()=>{
    if(!actx||!playing)return;
    // Rebuild voices at next chord change — just update gain of existing for now
    const nv=getVoiceCount();
    const tgt=0.12/Math.max(nv,1);
    for(const v of voices) v.gain.gain.setTargetAtTime(tgt,actx.currentTime,0.3);
  });

  // Live render loop — uses seeded pattern for visual (no AnalyserNode)
  const s=performance.now();
  (function l(n){ render((((n-s)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l);})(performance.now());
}
</script>

<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Phyllotaxis</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Phyllotaxis — golden-angle sunflower seed spiral that blooms, rotates, with a colour wave sweeping outward. Deterministic, seamless.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=8000,TAU=6.28318530718;
const GOLD=2.39996322972865332;   // golden angle in radians (137.5deg)
let W,H,DPR,cx,cy,scale,seeds=[];
// seeded RNG (mulberry32)
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
const N=1500;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;scale=Math.min(W,H)*0.46;
  const r=mul(29);seeds=[];const c=scale/Math.sqrt(N);
  for(let i=0;i<N;i++){
    const ang=i*GOLD;                                  // golden-angle placement
    const rad=c*Math.sqrt(i);                          // radius grows as sqrt(i)
    const col=AC[i%AC.length];                         // cycle Cosmos accents by index
    seeds.push({ang,rad,norm:Math.sqrt(i/N),col,tw:r()*TAU,sz:0.5+r()*0.5});
  }}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP;
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);                  // full repaint each frame (pure of t)
  x.globalCompositeOperation='lighter';
  const spin=u*TAU;                                           // exactly one rotation per loop -> seamless
  // warm core glow
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,scale*0.5);
  cg.addColorStop(0,'rgba(224,178,74,0.35)');cg.addColorStop(0.5,'rgba(255,106,61,0.1)');cg.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=cg;x.fillRect(0,0,W,H);
  for(const s of seeds){
    // bloom: pattern breathes in/out once per loop (integer harmonic -> seamless)
    const bloom=0.9+0.1*Math.sin(TAU*u);
    const rr=s.rad*bloom;
    const a=s.ang+spin;
    const px=cx+Math.cos(a)*rr, py=cy+Math.sin(a)*rr;
    // colour wave sweeping outward: brightness pulses by radius & time
    const wave=0.5+0.5*Math.sin(TAU*(u*2 - s.norm*3));        // integer harmonics of u
    const tw=0.7+0.3*Math.sin(s.tw+spin*2);
    const alpha=(0.3+0.6*wave)*tw;
    const size=(1.1+s.norm*1.6)*s.sz*bloom*DPR;
    x.fillStyle=`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${alpha})`;
    x.beginPath();x.arc(px,py,size,0,TAU);x.fill();
  }
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cosmos Reveal — spotlight</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#04030a; cursor:none; }
  canvas { display:block; position:fixed; inset:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================================
//  Cosmos Reveal — the scene is veiled in near-darkness; the cursor is a soft
//  spotlight that reveals the glowing Cosmos content (logo + wordmark) beneath
//  it, with a luminous rim. One radial-gradient veil = the whole reveal. Pure
//  Canvas 2D, no deps, offline. ?auto=1 + window.__seek(t) sweeps a virtual light.
// ============================================================================
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const AUTO = new URLSearchParams(location.search).has('auto');
const LOOP = 7000, TAU = 6.28318;
let W,H,DPR;
const logo = new Image(); let logoOK=false; logo.onload=()=>logoOK=true; logo.src='./cosmos-logo.png';

let stars=[];
function srnd(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=canvas.width=innerWidth*DPR; H=canvas.height=innerHeight*DPR;
  canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
  const r=srnd(5); stars=[]; for(let i=0;i<140;i++) stars.push({x:r()*W,y:r()*H,rad:(r()*1.3+0.3)*DPR,tw:r()*6.28,sp:0.4+r()*1.3}); }
resize(); addEventListener('resize',resize);

// the bright "hidden" content drawn underneath the veil
function drawContent(t){
  const g=ctx.createRadialGradient(W/2,H*0.44,0,W/2,H*0.44,Math.max(W,H)*0.7);
  g.addColorStop(0,'#171036'); g.addColorStop(0.6,'#0b0820'); g.addColorStop(1,'#05030d');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const s of stars){ ctx.globalAlpha=0.5+0.5*Math.abs(Math.sin(t*0.001*s.sp+s.tw));
    ctx.fillStyle='#cdd6ff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.rad,0,TAU); ctx.fill(); }
  ctx.globalAlpha=1;
  if(logoOK){ const sz=Math.min(W,H)*0.46; ctx.drawImage(logo, W/2-sz/2, H*0.40-sz/2, sz, sz); }
  ctx.textAlign='center';
  ctx.font=`800 ${Math.round(Math.min(W,H)*0.11)}px -apple-system,system-ui,sans-serif`;
  ctx.fillStyle='#f1ecff'; ctx.fillText('COSMOS', W/2, H*0.74);
  ctx.font=`600 ${Math.round(Math.min(W,H)*0.028)}px -apple-system,system-ui,sans-serif`;
  ctx.fillStyle='#b9a3ff'; ctx.save(); ctx.globalAlpha=0.9;
  ctx.fillText('A I   L A B', W/2, H*0.80); ctx.restore();
}

function frame(mx, my, t){
  drawContent(t);
  const R = Math.min(W,H)*0.30;                    // spotlight radius
  // veil everything except a soft hole at the cursor (single radial fill)
  const v=ctx.createRadialGradient(mx,my, R*0.30, mx,my, R*1.25);
  v.addColorStop(0,'rgba(5,3,12,0)'); v.addColorStop(0.45,'rgba(5,3,12,0)');
  v.addColorStop(0.72,'rgba(5,3,12,0.9)'); v.addColorStop(1,'rgba(4,2,9,0.97)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
  // luminous rim + soft light + center dot (additive)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const rim=ctx.createRadialGradient(mx,my,R*0.5,mx,my,R*0.78);
  rim.addColorStop(0,'rgba(150,120,255,0)'); rim.addColorStop(0.8,'rgba(150,120,255,0.14)'); rim.addColorStop(1,'rgba(150,120,255,0)');
  ctx.fillStyle=rim; ctx.beginPath(); ctx.arc(mx,my,R*0.78,0,TAU); ctx.fill();
  ctx.strokeStyle='rgba(200,185,255,0.5)'; ctx.lineWidth=1.5*DPR;
  ctx.beginPath(); ctx.arc(mx,my,R*0.62,0,TAU); ctx.stroke();
  const dot=ctx.createRadialGradient(mx,my,0,mx,my,7*DPR);
  dot.addColorStop(0,'rgba(255,255,255,0.95)'); dot.addColorStop(1,'rgba(200,185,255,0)');
  ctx.fillStyle=dot; ctx.beginPath(); ctx.arc(mx,my,7*DPR,0,TAU); ctx.fill();
  ctx.restore();
}

if(AUTO){
  // virtual light sweeps a closed path across the logo + wordmark
  window.__seek=function(t){ const u=((t%LOOP)+LOOP)%LOOP/LOOP, a=TAU*u;
    const mx=W/2 + Math.sin(a)*W*0.28;          // figure-8 across the logo + wordmark
    const my=H*0.46 + Math.sin(2*a)*H*0.24;
    frame(mx,my,t); };
  const boot=()=>{ if(logoOK){ window.__seek(0); window.__ready=true; } else requestAnimationFrame(boot); };
  boot();
} else {
  let mx=W/2,my=H/2;
  addEventListener('pointermove',e=>{ mx=e.clientX*DPR; my=e.clientY*DPR; });
  const s=performance.now(); (function loop(now){ frame(mx,my,now-s); requestAnimationFrame(loop); })(performance.now());
}
</script>
</body>
</html>

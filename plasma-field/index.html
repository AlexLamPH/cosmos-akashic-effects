<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Plasma Field</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}</style></head>
<body><canvas id="c"></canvas><script>
// Cosmos Plasma Field — classic animated plasma: smooth shifting colour bands via summed sines, per-pixel. Deterministic, seamless, pure Canvas 2D.
const cv=document.getElementById('c'),x=cv.getContext('2d');
const AUTO=new URLSearchParams(location.search).has('auto'); const LOOP=7000,TAU=6.28318530718;
// Cosmos accents: violet, cosmic, nebula, aurora, solaris, sacred — plasma value maps through these
const AC=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
// build a smooth 256-stop palette LUT looping through the accents (computed once)
const LUT=new Uint8Array(256*3);
(function(){const n=AC.length;for(let i=0;i<256;i++){const f=i/256*n,j=f|0,t=f-j,a=AC[j%n],b=AC[(j+1)%n];
  LUT[i*3]=a[0]+(b[0]-a[0])*t;LUT[i*3+1]=a[1]+(b[1]-a[1])*t;LUT[i*3+2]=a[2]+(b[2]-a[2])*t;}})();
// internal low-res buffer scaled up for speed
const RW=220; let RH=160, off, octx, img, W,H,DPR;
off=document.createElement('canvas');octx=off.getContext('2d');
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
  RH=Math.max(80,Math.round(RW*innerHeight/innerWidth));off.width=RW;off.height=RH;img=octx.createImageData(RW,RH);
  x.imageSmoothingEnabled=true;}
rs();addEventListener('resize',rs);
function frame(t){const u=((t%LOOP)+LOOP)%LOOP/LOOP, ph=u*TAU; // drive all motion by ph (integer harmonics -> seamless)
  const d=img.data;
  for(let py=0;py<RH;py++){const fy=py/RH;
    for(let px=0;px<RW;px++){const fx=px/RW;
      // summed sines — every time-term is an integer multiple of ph so frame(0)==frame(LOOP)
      let v = Math.sin(fx*8.0 + ph);
      v += Math.sin(fy*9.0 + Math.cos(ph)*2.0 + ph*2);
      v += Math.sin((fx*5.0 + fy*5.0) + ph);
      const cxm=fx-0.5+0.18*Math.cos(ph), cym=fy-0.5+0.18*Math.sin(ph*2);
      v += Math.sin(Math.sqrt(cxm*cxm+cym*cym)*22.0 - ph*3);
      // v ~ [-4,4] -> 0..255 LUT index, plus a slow integer hue drift -> seamless colour cycling
      let idx=((v*0.125+0.5)*256 + u*256)|0; idx=((idx%256)+256)%256;
      const li=idx*3, di=(py*RW+px)*4;
      d[di]=LUT[li];d[di+1]=LUT[li+1];d[di+2]=LUT[li+2];d[di+3]=255;
    }}
  octx.putImageData(img,0,0);
  x.globalCompositeOperation='source-over';
  x.fillStyle='#05030d';x.fillRect(0,0,W,H);            // full repaint (pure function of t)
  x.globalCompositeOperation='lighter';                 // additive glow over Phantom dark
  x.drawImage(off,0,0,W,H);
  x.globalCompositeOperation='source-over';}
if(AUTO){window.__seek=t=>frame(t);frame(0);window.__ready=true;}else{const s=performance.now();(function l(n){frame(n-s);requestAnimationFrame(l);})(performance.now());}
</script></body></html>

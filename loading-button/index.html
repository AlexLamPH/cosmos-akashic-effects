<!-- Cosmos Loading Button: a button cycling idle("Submit") → click ripple → spinner(loading) → success checkmark(green) → back to idle, with a smooth width morph and accent glow. Deterministic render(u); seamless loop. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Loading Button</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
/* faint backdrop so the button reads as sitting on a form panel */
.panel{position:absolute;width:420px;height:240px;border-radius:20px;
  background:linear-gradient(160deg,rgba(255,255,255,.035),rgba(255,255,255,.012));
  border:1px solid rgba(255,255,255,.06);box-shadow:0 30px 70px rgba(0,0,0,.5)}
.btn{position:relative;height:54px;border-radius:14px;border:none;cursor:pointer;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:15.5px;font-weight:650;letter-spacing:.2px;
  background:linear-gradient(160deg,var(--c1),var(--c2));
  --c1:#9a6bff;--c2:#7a3df0;--acc:#8b5cff;
  box-shadow:0 10px 30px rgba(139,92,255,.45),0 0 0 1px rgba(255,255,255,.06) inset;
  will-change:width,transform,box-shadow}
/* ripple originating from click point */
.ripple{position:absolute;left:50%;top:50%;width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.45);transform:translate(-50%,-50%) scale(0);pointer-events:none}
/* label */
.label{position:absolute;white-space:nowrap;display:flex;align-items:center;gap:8px}
.label svg{width:17px;height:17px}
/* spinner ring: a 3px ring with one bright arc (top), rotated via JS */
.spinner{position:absolute;width:24px;height:24px;border-radius:50%;
  border:3px solid rgba(255,255,255,.28);border-top-color:#ffffff;border-right-color:#ffffff;
  box-shadow:0 0 6px rgba(255,255,255,.35);opacity:0}
/* success check */
.check{position:absolute;width:26px;height:26px;opacity:0}
.check svg{width:100%;height:100%}
.check path{stroke:#eafff5;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:1;stroke-dashoffset:1}
</style></head>
<body><div id="stage">
  <div class="panel"></div>
  <button class="btn" id="btn" style="width:180px">
    <span class="ripple" id="ripple"></span>
    <span class="label" id="label"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>Submit</span>
    <span class="spinner" id="spinner"></span>
    <span class="check" id="check"><svg viewBox="0 0 24 24"><path id="checkPath" pathLength="1" d="M5 13l4 4L19 7"/></svg></span>
  </button>
</div>
<script>
const btn=document.getElementById('btn'), label=document.getElementById('label'),
  ripple=document.getElementById('ripple'), spinner=document.getElementById('spinner'),
  check=document.getElementById('check'), checkPath=document.getElementById('checkPath');
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=t=>t<0?0:t>1?1:t;
const easeOut=t=>1-Math.pow(1-t,3);
const easeInOut=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const easeIn=t=>t*t*t;
const VIOLET={c1:'#9a6bff',c2:'#7a3df0',acc:'139,92,255'};
const GREEN ={c1:'#3fe0a0',c2:'#21b27c',acc:'54,211,154'};
const LOOP=5200;
function setColor(t){ // t 0=violet 1=green
  const mix=(a,b)=>lerp(a,b,t);
  // blend the two hex stops channel-wise
  const hx=(h)=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const toHex=(c)=>'#'+c.map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
  const v1=hx(VIOLET.c1),g1=hx(GREEN.c1),v2=hx(VIOLET.c2),g2=hx(GREEN.c2);
  btn.style.setProperty('--c1',toHex(v1.map((v,i)=>mix(v,g1[i]))));
  btn.style.setProperty('--c2',toHex(v2.map((v,i)=>mix(v,g2[i]))));
  const va=VIOLET.acc.split(',').map(Number), ga=GREEN.acc.split(',').map(Number);
  return va.map((v,i)=>mix(v,ga[i])).map(Math.round).join(',');
}
function render(u){
  // phases:  idle (0-.18) → ripple/press (.18-.30) → loading spinner (.30-.62) → success check (.62-.80) → relax to idle (.80-1)
  // offset so frame 0 lands mid-loading phase (spinner visible — rich, unambiguous)
  const g=(u+0.46)%1;
  let W=180, press=0, rip=0, spin=0, spinSpeed=0, chk=0, colorT=0, glow=0.45;
  if(g<0.18){                       // idle, breathing glow
    W=180; glow=0.42+0.06*Math.sin(g/0.18*Math.PI);
  }else if(g<0.30){                 // press + ripple expands; button narrows
    const p=(g-0.18)/0.12;
    press=Math.sin(clamp(p*1.4)*Math.PI)*1;            // dip then return
    rip=easeOut(p); W=lerp(180,60,easeInOut(p)); glow=0.5;
  }else if(g<0.62){                 // loading: compact pill, spinner rotates
    const p=(g-0.30)/0.32;
    W=60; spin=1; spinSpeed=p; glow=0.4+0.12*Math.sin(p*Math.PI*2);
  }else if(g<0.80){                 // success: morph to green, check draws, button grows back
    const p=(g-0.62)/0.18;
    W=lerp(60,180,easeOut(p)); colorT=easeInOut(clamp(p*1.3)); chk=clamp((p-0.12)/0.55);
    glow=0.5+0.25*Math.sin(clamp(p*1.6)*Math.PI);
  }else{                            // relax back to violet idle
    const p=(g-0.80)/0.20;
    W=180; colorT=1-easeInOut(p); chk=1-clamp(p*1.4); glow=lerp(0.5,0.42,p);
  }
  const accRGB=setColor(colorT);
  btn.style.width=W.toFixed(1)+'px';
  btn.style.transform=`translateY(${(press*2).toFixed(2)}px) scale(${(1-press*0.03).toFixed(3)})`;
  btn.style.boxShadow=`0 ${10}px ${30}px rgba(${accRGB},${glow.toFixed(3)}),0 0 0 1px rgba(255,255,255,.06) inset`;
  // ripple
  ripple.style.transform=`translate(-50%,-50%) scale(${(rip*22).toFixed(2)})`;
  ripple.style.opacity=(rip>0?(1-rip)*0.8:0).toFixed(3);
  // label: visible in idle, fades out during press, fades back during success
  const labelOp = clamp(1 - (g>=0.18 && g<0.62 ? (g-0.18)/0.10 : 0)) * (spin?0:1);
  // simpler: label shown when not spinning and not deep in check
  const showLabel = (g<0.24) ? 1 : (g>0.86?easeInOut((g-0.86)/0.14):0);
  label.style.opacity=showLabel.toFixed(3);
  label.style.transform=`scale(${lerp(0.9,1,showLabel).toFixed(3)})`;
  // spinner
  spinner.style.opacity=(spin?1:0).toFixed(3);
  spinner.style.transform=`rotate(${(spinSpeed*1080).toFixed(1)}deg)`;
  // check: scale-pop + stroke draw
  check.style.opacity=(chk>0?1:0).toFixed(3);
  check.style.transform=`scale(${lerp(0.4,1,easeOut(clamp(chk*1.6))).toFixed(3)})`;
  checkPath.style.strokeDashoffset=(1-clamp(chk)).toFixed(3);
}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else{
  // live: clicking the button restarts the cycle from the press phase; autoplay drives the demo
  let start=performance.now()-(0.18/1)*LOOP; // begin near idle
  btn.addEventListener('click',e=>{ start=performance.now()-0.18*LOOP; });
  (function l(n){ render((((n-start)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l); })(performance.now());
}
</script></body></html>

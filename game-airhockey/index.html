<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Air Hockey</title>
<style>
  html,body{margin:0;height:100%;background:#0a0816;color:#e8e6f5;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-user-select:none;user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #frame{width:560px;height:660px;box-sizing:border-box;padding:16px;
    background:linear-gradient(160deg,#140f28,#0c0a1c);border:1px solid #241a44;border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.55),inset 0 0 0 1px rgba(70,180,255,.06);
    display:flex;flex-direction:column;gap:10px}
  #hud{display:flex;align-items:center;justify-content:center;gap:38px;height:46px}
  .name{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9a8fd0}
  .sc{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  #pCpu{color:#ff5cc2;text-shadow:0 0 16px rgba(255,92,194,.5)}
  #pYou{color:#46b4ff;text-shadow:0 0 16px rgba(70,180,255,.5)}
  .col{display:flex;flex-direction:column;align-items:center;gap:3px}
  #vs{color:#5b5288;font-size:13px;font-weight:700}
  canvas{border-radius:12px;background:#0b0a1a;display:block;
    box-shadow:inset 0 0 26px rgba(139,92,255,.07);touch-action:none}
  #foot{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#8f86bd}
  #foot b{color:#36d39a}
  #msg{position:absolute;font-size:30px;font-weight:800;color:#36d39a;
    text-shadow:0 0 18px rgba(54,211,154,.6);display:none}
</style></head><body>
<div id="wrap"><div id="frame">
  <div id="hud">
    <div class="col"><div class="name">CPU</div><div class="sc" id="pCpu">0</div></div>
    <div id="vs">FIRST TO 7</div>
    <div class="col"><div class="name">You</div><div class="sc" id="pYou">0</div></div>
  </div>
  <canvas id="c"></canvas>
  <div id="foot">
    <span>drag your mallet or use arrows</span>
    <span><b>R</b> restart</span>
  </div>
</div></div>
<div id="msg"></div>
<script>
const AUTO=new URLSearchParams(location.search).has('auto');
const cv=document.getElementById('c');
const W=528,H=520; cv.width=W;cv.height=H;
const g=cv.getContext('2d');
const VIOLET='139,92,255',COSMIC='70,180,255',NEBULA='255,92,194',AURORA='54,211,154',SOLARIS='255,106,61',SACRED='224,178,74';
const MR=26;                 // mallet radius
const PR=15;                 // puck radius
const GW=170;                // goal width
const WIN=7;
const GX0=(W-GW)/2, GX1=(W+GW)/2;
// ---------- mulberry32 ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function clamp(v,a,b){return v<a?a:v>b?b:v;}

function newState(seed,auto){
  const rng=mulberry32(seed>>>0);
  const s={rng,auto:!!auto,
    you:{x:W/2,y:H-70,px:W/2,py:H-70},   // bottom mallet (cosmic)
    cpu:{x:W/2,y:70,px:W/2,py:70},       // top mallet (nebula)
    px:W/2,py:H/2,vx:0,vy:0,
    sYou:0,sCpu:0,over:false,winner:null,flash:0};
  serve(s, s.rng()<0.5?1:-1);
  return s;
}
function serve(s,dir){
  s.px=W/2; s.py=H/2;
  const ang=(s.rng()*1.0-0.5);
  const sp=4.4;
  s.vx=sp*Math.sin(ang);
  s.vy=dir*sp*Math.cos(ang);
  // seeded biases so AI mallets aim imperfectly -> goals happen, deterministically.
  s.cpuBias=(s.rng()<0.30)?(s.rng()-0.5)*150:(s.rng()-0.5)*40;
  s.youBias=(s.rng()<0.30)?(s.rng()-0.5)*150:(s.rng()-0.5)*40;
}

// move a mallet toward a target: lerp by reaction, capped at maxSp; clamp to half+walls
function moveMallet(m,tx,ty,maxSp,react,yLo,yHi){
  m.px=m.x; m.py=m.y;
  tx=clamp(tx,MR,W-MR); ty=clamp(ty,yLo,yHi);
  let dx=(tx-m.x)*react, dy=(ty-m.y)*react, d=Math.hypot(dx,dy);
  if(d>maxSp){ dx=dx/d*maxSp; dy=dy/d*maxSp; }
  m.x+=dx; m.y+=dy;
}

// deterministic AI: attack when the puck is on my half, defend otherwise.
// Returns a target + per-frame reaction (0..1). A lagged defender plus a seeded
// aim bias means struck shots beat it, so goals happen reproducibly.
function aiTarget(s,m,homeY,goalY,bias){
  const mine=(homeY<H/2);                       // top mallet => mine = top half
  const puckOnMySide = mine ? (s.py<H*0.5) : (s.py>H*0.5);
  if(puckOnMySide){
    // ATTACK: aim a point just behind the puck (from my goal's view) so moving to
    // it drives the puck toward the opponent goal centre, biased off-centre.
    const toGoalX=(W/2 - s.px)*0.5 + bias;      // lateral aim, seeded
    const behind = mine ? -1 : 1;               // approach from my-goal side
    return {tx:s.px - toGoalX*0.25, ty:s.py + behind*(PR+MR-6), react:0.55};
  }
  // DEFEND: sit on my goal line, lag the puck x; bias shifts the guard each rally
  // and the low reaction lets fast shots slip past.
  const tx=clamp(s.px + bias*0.5, MR, W-MR);
  return {tx, ty:goalY, react:0.17};
}

function collideMallet(s,m){
  const dx=s.px-m.x, dy=s.py-m.y, d=Math.hypot(dx,dy), rr=PR+MR;
  if(d<rr && d>0.0001){
    const nx=dx/d, ny=dy/d;
    // push puck out
    s.px=m.x+nx*rr; s.py=m.y+ny*rr;
    // mallet velocity this frame
    const mvx=m.x-m.px, mvy=m.y-m.py;
    // reflect puck along normal + impart mallet momentum
    const dot=s.vx*nx+s.vy*ny;
    s.vx=s.vx-2*dot*nx + mvx*0.9 + nx*2.2;
    s.vy=s.vy-2*dot*ny + mvy*0.9 + ny*2.2;
    const sp=Math.hypot(s.vx,s.vy), cap=11;
    if(sp>cap){ s.vx=s.vx/sp*cap; s.vy=s.vy/sp*cap; }
    s.flash=1;
  }
}

function step(s,youInput){
  if(s.over) return;
  // ----- mallets -----
  if(s.auto){
    const a=aiTarget(s,s.you,H-70,H-58,s.youBias);
    moveMallet(s.you,a.tx,a.ty,9.5,a.react,H/2+MR,H-MR);
    const b=aiTarget(s,s.cpu,70,58,s.cpuBias);
    moveMallet(s.cpu,b.tx,b.ty,9.5,b.react,MR,H/2-MR);
  } else {
    if(youInput){ moveMallet(s.you,youInput.x,youInput.y,16,1,H/2+MR,H-MR); }
    else { s.you.px=s.you.x; s.you.py=s.you.y; }
    // CPU always AI on top
    const b=aiTarget(s,s.cpu,70,58,s.cpuBias);
    moveMallet(s.cpu,b.tx,b.ty,7.2,b.react,MR,H/2-MR);
  }
  // ----- puck -----
  s.px+=s.vx; s.py+=s.vy;
  s.vx*=0.997; s.vy*=0.997;
  // mallet collisions first (may shove the puck out of bounds — walls clamp after)
  collideMallet(s,s.you);
  collideMallet(s,s.cpu);
  // side walls (always clamp last so the puck can never park out of bounds)
  if(s.px<PR){s.px=PR;s.vx=Math.abs(s.vx);s.flash=1;}
  if(s.px>W-PR){s.px=W-PR;s.vx=-Math.abs(s.vx);s.flash=1;}
  // top/bottom: goal gap or wall
  if(s.py<PR){
    if(s.px>GX0 && s.px<GX1){ s.sYou++; s.flash=2; checkWin(s); if(!s.over) serve(s,1); }
    else { s.py=PR; s.vy=Math.abs(s.vy); s.flash=1; }
  }
  if(s.py>H-PR){
    if(s.px>GX0 && s.px<GX1){ s.sCpu++; s.flash=2; checkWin(s); if(!s.over) serve(s,-1); }
    else { s.py=H-PR; s.vy=-Math.abs(s.vy); s.flash=1; }
  }
  if(s.flash>0) s.flash-=0.08; if(s.flash<0)s.flash=0;
}
function checkWin(s){ if(s.sYou>=WIN){s.over=true;s.winner='You';}
  else if(s.sCpu>=WIN){s.over=true;s.winner='CPU';} }

// ---------- AUTO simulation ----------
const SEED=20260616;
const T_OFFSET=11000;
const FRAME_MS=16;
function freshAuto(){ return newState(SEED,true); }
function simTo(ms){
  const s=freshAuto();
  const steps=Math.floor((ms+T_OFFSET)/FRAME_MS);
  for(let i=0;i<steps;i++){
    if(s.over){ s.holdT=(s.holdT||0)+1; if(s.holdT>40){ Object.assign(s,freshAuto()); s.holdT=0; } }
    else step(s,null);
  }
  return s;
}

// ---------- draw ----------
function mallet(m,col){
  g.save();g.shadowColor=`rgba(${col},.85)`;g.shadowBlur=20;
  g.fillStyle=`rgb(${col})`;
  g.beginPath();g.arc(m.x,m.y,MR,0,7);g.fill();
  g.fillStyle='rgba(255,255,255,.18)';
  g.beginPath();g.arc(m.x,m.y,MR*0.55,0,7);g.fill();g.restore();
}
function draw(s){
  g.clearRect(0,0,W,H);
  // center line
  g.strokeStyle='rgba(139,92,255,.22)';g.lineWidth=3;g.setLineDash([10,12]);
  g.beginPath();g.moveTo(0,H/2);g.lineTo(W,H/2);g.stroke();g.setLineDash([]);
  // center circle
  g.strokeStyle='rgba(70,180,255,.16)';g.lineWidth=2;
  g.beginPath();g.arc(W/2,H/2,54,0,7);g.stroke();
  // border
  g.strokeStyle='rgba(70,180,255,.12)';g.lineWidth=2;g.strokeRect(1,1,W-2,H-2);
  // goals (top=cpu/nebula, bottom=you/cosmic)
  g.lineWidth=5;
  g.strokeStyle=`rgba(${NEBULA},.65)`;g.beginPath();g.moveTo(GX0,2);g.lineTo(GX1,2);g.stroke();
  g.strokeStyle=`rgba(${COSMIC},.65)`;g.beginPath();g.moveTo(GX0,H-2);g.lineTo(GX1,H-2);g.stroke();
  // mallets
  mallet(s.cpu,NEBULA);
  mallet(s.you,COSMIC);
  // puck trail
  for(let k=6;k>=0;k--){const tx=s.px-s.vx*k*0.9,ty=s.py-s.vy*k*0.9;
    const a=(1-k/7)*0.5; g.fillStyle=`rgba(${SACRED},${a})`;
    g.beginPath();g.arc(tx,ty,PR*(1-k*0.06),0,7);g.fill();}
  g.save();g.shadowColor=`rgba(${SOLARIS},.9)`;g.shadowBlur=18;
  g.fillStyle='#fff7e6';g.beginPath();g.arc(s.px,s.py,PR,0,7);g.fill();g.restore();
  // HUD
  document.getElementById('pYou').textContent=s.sYou;
  document.getElementById('pCpu').textContent=s.sCpu;
  const msg=document.getElementById('msg');
  if(s.over && !AUTO){ const r=cv.getBoundingClientRect();
    msg.style.display='block';
    msg.textContent=(s.winner==='You'?'YOU WIN!':'CPU WINS');
    msg.style.color=s.winner==='You'?'#46b4ff':'#ff5cc2';
    msg.style.left=(r.left+W/2-90)+'px';msg.style.top=(r.top+H/2-22)+'px';
  } else msg.style.display='none';
}
function drawAt(ms){ draw(simTo(ms)); }

const LOOP=12000;
// ---------- LIVE ----------
let S,target;
function initGame(){
  S=newState((Date.now())>>>0,false); target=null;
  let raf;
  function loop(){ if(!S.over) step(S,target); draw(S); raf=requestAnimationFrame(loop); }
  raf=requestAnimationFrame(loop);
  const held={l:false,r:false,u:false,d:false};
  window.addEventListener('keydown',e=>{
    if(S.over && (e.key==='r'||e.key==='R')){initGame();return;}
    if(e.key==='r'||e.key==='R'){initGame();return;}
    if(e.key==='ArrowLeft'||e.key==='a')held.l=true;
    if(e.key==='ArrowRight'||e.key==='d')held.r=true;
    if(e.key==='ArrowUp'||e.key==='w')held.u=true;
    if(e.key==='ArrowDown'||e.key==='s')held.d=true;
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  });
  window.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft'||e.key==='a')held.l=false;
    if(e.key==='ArrowRight'||e.key==='d')held.r=false;
    if(e.key==='ArrowUp'||e.key==='w')held.u=false;
    if(e.key==='ArrowDown'||e.key==='s')held.d=false;});
  (function pk(){
    if(held.l||held.r||held.u||held.d){
      let tx=(target?target.x:S.you.x), ty=(target?target.y:S.you.y);
      if(held.l)tx-=8; if(held.r)tx+=8; if(held.u)ty-=8; if(held.d)ty+=8;
      target={x:clamp(tx,MR,W-MR),y:clamp(ty,H/2+MR,H-MR)};
    }
    requestAnimationFrame(pk);})();
  function ptr(e){ const r=cv.getBoundingClientRect();
    const cx=((e.touches?e.touches[0].clientX:e.clientX)-r.left)*(W/r.width);
    const cy=((e.touches?e.touches[0].clientY:e.clientY)-r.top)*(H/r.height);
    target={x:clamp(cx,MR,W-MR),y:clamp(cy,H/2+MR,H-MR)};
    if(S.over)initGame(); }
  let dragging=false;
  cv.addEventListener('mousedown',e=>{dragging=true;ptr(e);});
  window.addEventListener('mousemove',e=>{if(dragging)ptr(e);});
  window.addEventListener('mouseup',()=>dragging=false);
  cv.addEventListener('touchstart',e=>{ptr(e);e.preventDefault();},{passive:false});
  cv.addEventListener('touchmove',e=>{ptr(e);e.preventDefault();},{passive:false});
}

if(AUTO){ window.__seek=t=>drawAt(((t%LOOP)+LOOP)%LOOP); window.__seek(0); window.__ready=true; }
else { initGame(); }
</script></body></html>

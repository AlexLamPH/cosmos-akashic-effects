<!-- Cosmos Toast Notification: a polished snackbar that slides in from the top-right with icon+title+message+close, holds, then slides out; the demo cycles success/error/info/warning, each with its own accent. Deterministic render(u). -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Toast Notification</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0816;
  font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
/* faint app-window backdrop so the toast reads as an overlay */
.backdrop{position:absolute;width:560px;height:320px;border-radius:18px;
  background:linear-gradient(160deg,rgba(255,255,255,.035),rgba(255,255,255,.012));
  border:1px solid rgba(255,255,255,.06);box-shadow:0 30px 70px rgba(0,0,0,.5)}
.toast{position:absolute;top:38px;right:38px;width:330px;
  display:flex;gap:13px;align-items:flex-start;padding:15px 15px 15px 16px;
  border-radius:14px;background:linear-gradient(160deg,rgba(28,24,46,.96),rgba(18,15,32,.96));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 18px 44px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.2);
  backdrop-filter:blur(8px);overflow:hidden;will-change:transform,opacity}
.toast::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--acc)}
.toast::after{content:"";position:absolute;left:0;right:0;top:0;height:120%;pointer-events:none;
  background:radial-gradient(120% 80% at 0% 0%,color-mix(in srgb,var(--acc) 22%,transparent),transparent 60%)}
.ic{flex:0 0 34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--acc) 18%,#15122a);border:1px solid color-mix(in srgb,var(--acc) 40%,transparent);
  color:var(--acc);position:relative;z-index:1}
.ic svg{width:19px;height:19px}
.body{flex:1;min-width:0;position:relative;z-index:1}
.ttl{font-size:14px;font-weight:650;color:#f3f1fb;letter-spacing:.1px}
.msg{margin-top:3px;font-size:12.5px;line-height:1.45;color:#a9a4c4}
.close{flex:0 0 22px;height:22px;border-radius:7px;border:none;cursor:pointer;
  background:rgba(255,255,255,.05);color:#9a95b8;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;transition:background .15s,color .15s}
.close:hover{background:rgba(255,255,255,.12);color:#fff}
.close svg{width:12px;height:12px}
.bar{position:absolute;left:0;bottom:0;height:3px;background:var(--acc);width:100%;
  box-shadow:0 0 8px var(--acc);transform-origin:left;z-index:1}
</style></head>
<body><div id="stage">
  <div class="backdrop"></div>
  <div class="toast" id="toast">
    <div class="ic" id="ic"></div>
    <div class="body"><div class="ttl" id="ttl"></div><div class="msg" id="msg"></div></div>
    <button class="close" aria-label="Dismiss"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 5l14 14M19 5L5 19"/></svg></button>
    <div class="bar" id="bar"></div>
  </div>
</div>
<script>
const toast=document.getElementById('toast'),icE=document.getElementById('ic'),
  ttlE=document.getElementById('ttl'),msgE=document.getElementById('msg'),barE=document.getElementById('bar');
const I={
  success:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
  error:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v6M12 16.5v.01"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 7.5v.01"/></svg>',
  warning:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9.5 16.5H2.5L12 3z"/><path d="M12 10v4M12 17.5v.01"/></svg>'
};
// type, accent, title, message
const TYPES=[
  ['success','#36d39a','Saved successfully','Your changes have been synced to the cloud.'],
  ['error','#ff6a3d','Upload failed','The connection timed out. Please retry.'],
  ['info','#46b4ff','New update available','Version 2.4 is ready to install now.'],
  ['warning','#e0b24a','Storage almost full','You have used 92% of your available space.']
];
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOut=t=>1-Math.pow(1-t,3);          // decelerate into place
const easeIn=t=>t*t*t;                         // accelerate out
const back=t=>{const c=1.6;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);}; // slight overshoot in
const LOOP=8000;                               // 4 toasts × 2000ms each
function render(u){
  // 4 equal slots; offset so frame 0 lands mid-hold of the first toast (rich)
  const HOLD_CENTER=0.30;                       // where within a slot the hold sits
  const g=(u+ (1 - (HOLD_CENTER/4)) ) % 1;      // shift so t=0 is inside slot 0 hold
  const idx=Math.floor(g*4)%4;
  const local=(g*4)%1;                          // 0..1 within current toast
  const t=TYPES[idx];
  toast.style.setProperty('--acc',t[1]);
  icE.innerHTML=I[t[0]]; ttlE.textContent=t[2]; msgE.textContent=t[3];
  // phases within a slot: in (0-.20) → hold (.20-.78) → out (.78-1)
  const IN=0.20, OUT=0.78;
  let x, op, sc, prog;
  if(local<IN){                                 // slide in from right
    const p=local/IN; const e=back(p);
    x=lerp(120,0,e); op=Math.min(1,p*1.6); sc=lerp(.94,1,easeOut(p)); prog=0;
  }else if(local<OUT){                          // hold; progress bar drains
    x=0; op=1; sc=1; prog=(local-IN)/(OUT-IN);
  }else{                                         // slide out to right
    const p=(local-OUT)/(1-OUT); const e=easeIn(p);
    x=lerp(0,140,e); op=1-easeOut(p); sc=lerp(1,.96,p); prog=1;
  }
  toast.style.transform=`translateX(${x.toFixed(2)}px) scale(${sc.toFixed(3)})`;
  toast.style.opacity=op.toFixed(3);
  barE.style.transform=`scaleX(${(1-prog).toFixed(3)})`;
}
const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){window.__seek=t=>render(((t%LOOP)+LOOP)%LOOP/LOOP); window.__seek(0); window.__ready=true;}
else{
  // live: dismiss button restarts; autoplay loop drives the demo
  document.querySelector('.close').addEventListener('click',()=>{start=performance.now();});
  let start=performance.now();
  (function l(n){ render((((n-start)%LOOP)+LOOP)%LOOP/LOOP); requestAnimationFrame(l); })(performance.now());
}
</script></body></html>

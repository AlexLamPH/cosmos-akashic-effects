<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmos Frequency Rings — mic-reactive concentric rings</title><style>*{margin:0}html,body{width:100%;height:100%;overflow:hidden;background:#05030d}canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);font:13px/1.4 system-ui,sans-serif;color:#9fc8ff;
background:rgba(10,20,40,.55);padding:7px 14px;border-radius:20px;letter-spacing:.3px;pointer-events:none;
transition:opacity 1s;opacity:.9;border:1px solid rgba(70,180,255,.35)}</style></head>
<body><canvas id="c"></canvas><div id="hint">🎤 click to enable mic</div><script>
// Cosmos Frequency Rings — concentric rings are emitted from the center on each beat (level spike), expanding
// outward and fading as they go; each ring's thickness and brightness are sampled from the spectrum at emit
// time, and a steady center glow pulses with the overall level. render(spectrum,level,t) is the single draw path.
// Reacts to the live microphone (AnalyserNode spectrum); deterministic synthetic fallback for denied/auto.
const cv=document.getElementById('c'),x=cv.getContext('2d'),hint=document.getElementById('hint');
const LOOP=8400,TAU=6.283185307,BINS=64,MAXRINGS=22;
const COL=[[139,92,255],[70,180,255],[255,92,194],[54,211,154],[255,106,61],[224,178,74]];
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let W,H,DPR,cx,cy,RMAX;
function rs(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=Math.round(innerWidth*DPR);H=cv.height=Math.round(innerHeight*DPR);
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx=W/2;cy=H/2;RMAX=Math.hypot(W,H)*0.55;}
rs();addEventListener('resize',rs);

// ---- deterministic synthetic spectrum: seeded sum-of-sines formants + a beat kick ----
const srnd=mb(11);const FORM=[];for(let k=0;k<5;k++)FORM.push({c:0.10+0.78*srnd(),w:0.05+0.11*srnd(),a:0.5+0.5*srnd(),sp:0.5+2.5*srnd(),ph:srnd()*TAU});
function synthSpectrum(u){const spec=new Float32Array(BINS);
  const bp=(u*4)%1; const beat=Math.pow(Math.max(0,1-bp*1.7),2.2);
  for(let i=0;i<BINS;i++){const f=i/(BINS-1);let v=0;
    for(const F of FORM){const c=(F.c+0.05*Math.sin(TAU*F.sp*u+F.ph))%1;const d=(f-c)/F.w;v+=F.a*Math.exp(-d*d);}
    v=v*(0.45+0.55*Math.abs(Math.sin(TAU*u+f*4)))*(0.75+0.25*(1-f));
    v+=beat*(1-f*0.5)*0.85;
    spec[i]=Math.min(1,v*0.55);}
  let lv=0;for(let i=0;i<BINS;i++)lv+=spec[i];lv=Math.min(1,lv/BINS*2.2+beat*0.5);
  return {spec,level:lv};}

// ---- ring pool (deterministic: emission keyed off beat phase so AUTO is reproducible) ----
let rings=[];
function reset(){rings=[];rings._n=0;
  // pre-seed rings at staggered past birth times so frame 0 already shows rings mid-expansion
  for(let k=1;k<=4;k++){const born=-(k*0.13);const s=synthSpectrum(((born%1)+1)%1);const st=spectrumStats(s.spec);
    rings.push({born,thick:0.20+0.80*st.mid,bright:0.4+0.6*s.level,col:COL[(rings._n=(rings._n+1)%6)],lo:st.lo,hi:st.hi});}}
let pe=0,lastBeatT=-1;
function spectrumStats(spec){let lo=0,mid=0,hi=0;
  for(let i=0;i<BINS;i++){const v=spec[i];if(i<BINS/3)lo+=v;else if(i<2*BINS/3)mid+=v;else hi+=v;}
  return {lo:lo/(BINS/3),mid:mid/(BINS/3),hi:hi/(BINS/3)};}

function render(spec,level,t){
  // beat detection
  pe=pe*0.90; const hit=level-pe; pe=Math.max(pe,level);
  const beatPhase=(t*4)%1; const onBeat=beatPhase<0.06; // 4 beats/loop emission window
  if((hit>0.12||onBeat)&&t!==lastBeatT){
    const st=spectrumStats(spec);
    rings._n=((rings._n||0)+1)%6;
    rings.push({born:t,thick:0.20+0.80*st.mid, bright:0.4+0.6*level, col:COL[rings._n],
                lo:st.lo,hi:st.hi});
    lastBeatT=t; if(rings.length>MAXRINGS)rings.shift();
  }
  x.globalCompositeOperation='source-over';x.fillStyle='rgba(5,3,13,0.30)';x.fillRect(0,0,W,H);
  x.globalCompositeOperation='lighter';
  const life=0.6; // fraction of loop a ring lives
  for(const r of rings){
    let age=t-r.born; if(age<0)age+=1; if(age>life)continue;
    const p=age/life; // 0..1 expansion
    const rad=p*RMAX;
    const a=(1-p)*r.bright; if(a<=0.01)continue;
    const lw=(2+34*r.thick*(1-p*0.6))*DPR;
    const c=r.col;
    x.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+Math.min(1,a)+')';
    x.lineWidth=lw;x.beginPath();x.arc(cx,cy,rad,0,TAU);x.stroke();
    // faint inner echo tinted by high band
    x.strokeStyle='rgba(255,255,255,'+(a*0.18*r.hi)+')';x.lineWidth=lw*0.35;
    x.beginPath();x.arc(cx,cy,rad,0,TAU);x.stroke();
  }
  // steady center glow pulses with level
  const cr=RMAX*(0.05+0.10*level);
  const g=x.createRadialGradient(cx,cy,0,cx,cy,cr);
  g.addColorStop(0,'rgba(255,255,255,'+(0.6+0.35*level)+')');
  g.addColorStop(0.35,'rgba(70,180,255,0.6)');
  g.addColorStop(0.7,'rgba(139,92,255,0.35)');
  g.addColorStop(1,'rgba(5,3,13,0)');
  x.fillStyle=g;x.beginPath();x.arc(cx,cy,cr,0,TAU);x.fill();
  x.globalAlpha=1;x.globalCompositeOperation='source-over';
}

// ---- live mic source (LIVE only, behind a gesture) ----
let an=null,buf=null,useSynth=true;
async function mic(){try{
  const ac=new (window.AudioContext||window.webkitAudioContext)();
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  const src=ac.createMediaStreamSource(s);an=ac.createAnalyser();an.fftSize=128;an.smoothingTimeConstant=0.7;
  src.connect(an);buf=new Uint8Array(an.frequencyBinCount);useSynth=false;
  hint.textContent='🎤 mic live';setTimeout(()=>hint.style.opacity=0,1400);
}catch(e){useSynth=true;hint.textContent='🎤 mic unavailable — synthetic beat';setTimeout(()=>hint.style.opacity=0,1800);}}

function liveSpectrum(){const spec=new Float32Array(BINS);
  an.getByteFrequencyData(buf);const n=buf.length;let lv=0;
  for(let i=0;i<BINS;i++){const v=(buf[Math.min(n-1,Math.floor(i/BINS*n))]/255);spec[i]=v;lv+=v;}
  return {spec,level:Math.min(1,lv/BINS*1.6)};}

function startLiveLoop(){reset();const s=performance.now();
  (function loop(now){const t=((now-s)%LOOP)/LOOP;
    let d; if(!useSynth&&an){d=liveSpectrum();} else {d=synthSpectrum(t);}
    render(d.spec,d.level,t);requestAnimationFrame(loop);})(performance.now());}

const AUTO=new URLSearchParams(location.search).has('auto');
if(AUTO){ window.__seek=t=>{const u=((t%LOOP)+LOOP)%LOOP/LOOP; const s=synthSpectrum(u); render(s.spec,s.level,u);}; reset(); window.__seek(0); window.__ready=true; }
else { let useSynth=true; addEventListener('pointerdown',()=>mic(),{once:true}); startLiveLoop(); }
</script></body></html>
